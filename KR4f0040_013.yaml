body:
  text: 欽定四庫全書三魚堂外集巻一贈内閣學士陸隴其撰奏疏議條陳畿輔民情疏題為敬陳畿輔民情仰祈聖鑒事臣本外吏荷䝉皇上拔置臺班苟有一得之愚皆當次第敷陳以仰佐聖治之萬一顧臣官畿輔者久知畿輔之民情敢先為皇上陳之畿輔邊山一帶土瘠民貧異於他方荒多熟少自昔而然加以康熈十二年以後軍興緊急雜派繁多民困滋甚豐年僅可支持一遇水旱流離萬狀幸數年以來皇上加意撫綏禁止私派不惜蠲賑鳩鵠之民得苟延殘喘然以言乎家給人足則尚未也臣觀自古豐亨之治皆非一日而成唐虞之世其初亦不免黎民阻飢堯舜兢兢業業積久而後烝民乃粒漢自髙惠而後多方休養至於文景然後天下殷富唐之太宗日夜講求治道至貞觀之末然後民食充足今天下平定猶未久也而又疊遭水旱故雖皇上之勤恤民隱而百姓猶未免於艱難無怪其然矣求其殷富亦無他道惟在皇上常持此勤恤之心期之以積久而勿責效於旦夕恩已厚而不嫌其更厚心已周而不厭其更周則家給人足之盛庶乎可望矣至於目前所當議者臣見上年畿輔荒旱實異尋常其被災各州縣内雖閒有未被災之處亦不過稍有升合之獲差勝於被災者耳初奉上諭將二十八年及二十九年上半年錢糧盡行蠲免已經撫臣出示曉諭後因部議分别被災州縣中有不被災地畝不准概蠲百姓甚苦撫臣不得已題請秋後帶徵地方得以粗安然雖今歳秋收稍稔既徴其新又徴其舊臣恐非積貧之民所能堪也雖曰豐年所入幾何榖價又賤其值無幾私債之迫索者衣服之典當者已去其大半仰事俯育仍憂不足又可責其兼完新舊之糧乎若非皇上曲加垂恤臣恐地方有司惟知考成之是急不顧民力之難勝甚非皇上蠲免之初意此臣所目擊地方情形不敢不為皇上陳之伏祈睿鑒施行論奪情疏題為孝道為萬事之本奪情非治世所宜仰祈聖斷以維綱常事臣辦事衙門聞九卿科道㑹議湖南巡撫于養志在任守制一事臣以資淺不在㑹議之列不知所議若何及詢問與議諸臣謂會議之時昌言其不可者固有其人而依回不斷者比比而是臣竊怪之此明白顯易之事有何可疑而依回若是夫治天下之不可不以孝易明也在任守制之非所以教孝易明也天下正當承平之時湖南又非用兵之地無藉於在任守制易明也皇上以孝治天下在廷諸臣沐浴於皇上孝治之中久矣何難一言以直斷其不可耶且臣不知議者以于養志為何如人如其非賢者耶則固不當使之在任守制矣如其誠賢者耶則必不肯安心於在任守制矣在督臣代為題請或從愛惜人才起見然臣以為使之解任全孝正所以深愛惜之况皇上一日所行天下萬世奉為法程者也若使一撫臣因督臣之題請而留將來督撫之丁憂者皆將援此為例其不思僥倖奪情者鮮矣名教自此而弛綱常自此而壞此端一開關係天下實非淺鮮至於湖南一省之人是則是傚不復知有父母又無足論矣竊以為督臣所請無容議可也臣不知九卿作何啟奏理應靜聽皇上之定奪但恐衆論參差兩端易淆敢從名教綱常起見少効芻蕘縁係條陳事理字稍逾格伏祈睿斷施行請速停保舉永閉先用疏題為請速停保舉之捐永閉先用之例清仕途以安民生事臣伏見臣同衙門御史陳菁疏請停捐納保舉而開先用之例部覆俱無容議奉㫖九卿詹事科道會議具奏臣竊以為保舉之捐不可不停而先用之例不可開也敢為皇上陳之夫捐納一事原非皇上所欲行不過因一時軍需孔亟不得已而暫開復恐其賢愚錯雜有害百姓故立保舉之法以防弊為慮深逺矣近復因大同宣府運送草荳并保舉而亦許捐焉則與正途無復分别甚非皇上立法防弊之初意且保舉所重莫重於清亷故督撫保舉必有清亷字樣方為合例若保舉可以捐納則是清亷二字可捐納而得也此亦不待辨而知其不可矣若夫前此有捐納先用一例正途為之壅滯至今尚未疏通故皇上灼見其弊久經停止雖前九卿因運送草荳會議酌開事例亦未及此蓋誠知其為選途之害而不敢輕議也且捐納先用之人大抵皆奔競躁進之人故多一先用之人即多一害民之人此又不待辨而知其不可者矣在九卿自必有正大之見但恐衆論不一故敢瀆陳芻蕘惟皇上採擇臣更有請者臣竊見近日督撫於捐納之員有遲之數年既不保舉又不叅劾者不知此等官員果清亷乎非清亷乎抑或在清濁之閒未可驟舉驟劾乎夫既以捐納出身又不能發憤自勵則其志趨卑陋甘於汚下可知使之久踞民上其荼毒小民不知當何如故竊以為不但保舉之捐納急當停止而保舉之限期更當酌定不但目前先用之例萬不可開而從前先用之人不可不行稽核伏乞敕部查一切捐納之員到任三年而無保舉者即行開缺聽其休致庶吏治可清選途可疏而民生可安縁係條陳事理字稍逾額如果臣言可採伏祈睿鑒施行編審人丁議恊理浙江道事四川道試監察御史臣陸隴其仰遵上諭謹議得直𨽻地方今歲當編人丁之時宜痛除積弊以甦民困查舊例人丁五年一審分為九則上上則徴銀九錢遞減至下下則徴銀一錢以家之貧富為丁銀之多寡新生者添入死亡者開除此成法也無如有司未必皆能留心稽查惟憑舊冊為成案或聽甲長户頭之開報故有豪强隱匿而無立錐之民不免於當差此弊之在不均者一又相沿舊習毎遇一審有司務博户口加增之名不顧民之疾痛必求溢於前額故應刪者不刪不應增者而增甚則人已亡而不肯開除子初生而責其登籍溝中之瘠猶是冊上之丁黄口之兒已入追呼之檄始而包賠既而逃亡勢所必然是故一審一溢户口日加而民困日甚此弊之求在溢額者一請飭該撫令各州縣編審務求均平應開除者即行開除勿得苦累窮民其有荒瘠州縣開除之丁多而新收之丁少不免稍有缺額者當據實詳明聽憑部奪亦不得濫將㷀獨無告之民充數及將死亡逃絶責令里甲包賠庶鵠面鳩形者得免於剝啄而逃亡可息亦感召和氣之一端也臣隴其謹議請蠲免舊欠議謹議得直隸地方有康熈二十八年下半年及二十九年上半年未完錢糧原因二十八年遭遇竒荒其已經題報者業奉上諭盡行蠲免其被災而或稍有升合之獲有司未經冊報及㑹勘之後始行續報者部議不准概免撫臣不得已題請秋後帶徴及至秋收雖號稍稔然所入亦有限當大荒之後私債之迫索者衣服之典當者已去其大半仰視俯育仍憂不足又責其兼完新舊之糧實所難堪故臣於上年十月閒具有敬陳畿輔民情一疏題請豁免未䝉部允近見直撫郭世隆題稱宣府荒後殘黎兩月之内三季並徴勢難完納則因宣府一處而各處之民情可知又見直撫題叅無極縣知縣范永嘉將新舊錢糧並徴以致百姓不堪則因無極一縣而各縣之催科可知夫畿輔者天下之根本畿輔之民不可使稍有失所當二十八年大荒之後目今又雨澤愆期二麥難望新舊並徴實非民力所能勝且此項錢糧自上年秋收開徴之後至今已經半年苟力可完者必無不完至今而未完者皆係眞正窮民雖日事敲扑終難上納是無益於國課而徒苦於小民臣以為此所當急議豁免者也捐納保舉議謹議得天下之根本在民生民生之休戚在縣令故縣令一官關係非輕未有縣令貪汚而百姓不困窮者也近因有捐納一途縣令之中遂不免賢愚錯雜幸皇上洞見其弊特立保舉之法以防之近復因軍需孔亟并保舉之法而亦捐納焉則賢否全無可憑矣業經臣同衙門御史陳菁條請停止現奉部議然尚有未盡者敢再陳之夫保舉所重莫重於清亷故督撫保舉必有清亷字樣方為合例若保舉可以捐納則清亷二字可以捐納而得也此亦不待辨而知其不可矣臣竊怪近日督撫於捐納之員有遲之數年既不保舉又不叅劾不知此等官員果清亷乎非清亷乎如以為清亷則當即保舉矣如以為非清亷則當即叅劾矣即或有在清濁之閒未可驟舉驟劾者然既以捐納出身又不能發憤自勵則其志趨卑陋甘於汙下可知使之久踞民上不僅貽害小民亦且上干天和故以為不但保舉之捐納急當停止而保舉之限期更當酌定乞敕部查捐納之員到任三年而無保舉者即行開缺聽其休致庶使吏治可清而選途亦可稍疏此亦感召和氣之一端也復議捐納保舉謹議得捐納一途實係賢愚錯雜惟有保舉一綫可防其弊雖不敢謂督撫之保舉盡公然猶愈於竟不保舉也今若併此一綫而去之何以服天下之心即貪汙之輩或自有督撫之糾叅而其僥倖免於糾叅者遂得與正途一體陞轉國體之謂何恐未可云無礙也雖有次年三月停止之期然待至次年三月而後停則此輩無有不捐納者矣即無有不一體陞轉者矣澄叙官方之大典豈不蕩然埽地乎此臣請速停保舉捐納之議似亦難無容議者也至於設立保舉而不定限期則不肖之員多因循一日百姓多受累一日亦非皇上愛養斯民之意議者或因限以三年而無保舉即令休致恐近於刻不知此輩原係白丁捐納得官其心惟思撈其本錢何知有皇上之百姓踞於民上者三年亦已甚矣又可久乎况休致在家仍得儼然列於縉紳其榮多矣何謂刻也即云設立限期或反生其營求之弊此在督撫不賢則誠有此若督撫賢則何處營求臣不敢謂天下必無一賢明之督撫也即使督撫不賢亦必不能盡捐納之人而保之此臣請定保舉限期一議亦從吏治民生起見未有吏治不清而民生可安者未有仕途龎雜而吏治能清者似亦難無容議者也時務條陳六欵直隸眞定府靈壽縣為諮訪利弊以資政事以安民生事本月二十日奉廵撫直隸都察院于憲票前事内開照得本院初令樂亭再任通州歴年甚久直隸地方之利弊民生之困苦知之有素但自康熙二十一年陞任江寧之後迄今三載有餘不無因革之處今䝉皇上特簡撫綏畿甸陛辭復承天語諄諄惟以民生疾苦為念凡利所當興弊所當除務在實力舉行上副宸𠂻下慰民望恐地方遼闊耳目不能周徧合行諮訪為此票仰該縣官吏照票事理即將所屬地方利弊何者當興何者當除凡有益於國計民生者臚列具詳以憑酌奪務須秉公確查實在可行不得視為故套剿襲陳言無禆實政亦不得有所顧忌畏憚而不直陳盡言也望切望切等因職捧讀之下欣喜敬慕伏見憲臺虚懷至誠不遺葑菲之心苟有一得之愚敢不罄竭以仰佐髙深職書生也何知天下事但嘗靜觀今日之時勢百病之源起於民貧非無憂民之吏懷痌瘝乃身之志而民卒不免於凍餒者拘於法而無如何也得君如憲臺可為民請命於法之外矣敢略陳一二以備採擇一緩徴之宜請也自古稅歛必於秋成稼穡登塲而後上供可辦此一定之理亦必然之勢也今則以兵餉之故正月開徴民閒尚未播種而追呼敲扑急踰星火矣有餘者尚可勉强支吾不足者勢必轉貸完官富豪之家乗其急迫重利盤算及至秋成子金積累一歳所入不足以償債何暇論仰事俯育轉眼改歳而新徴又至所以閭閻日窮一日逃亡日多一日地畝日荒一日鵠面鳩形者滿野鬻妻賣子者接踵也二月賣新絲五月糶新榖古人猶以為苦今則新絲不待二月而賣新榖不待五月而糶矣堯舜在上何可不念及此也方兵興之際國用浩繁固無可如何今四方寧謐司農不至告匱上請緩徴此其時矣户部若可通融總計一歳春夏二季兵餉若干上年撥剰之銀若干以上年所剰之銀暫抵本年春夏之餉俟秋成催解以補庫額上無損於國賦而民力以紓富豪之家不得乗機盤剝逃亡可復敲扑可省一轉移之閒而其利無窮先試之畿輔次推之天下興唐虞三代之治此其首務也伏候憲裁一墾荒之宜勸也畿輔各州縣荒田累千百頃朝廷屢下勸墾之令而報墾者寥寥非民之不願墾也北方地土瘠薄又荒熟不常近山之地砂土參半遇雨方可耕種稍旱即成赤土近水之區水去則略有田形水至則一片汪洋一報開墾轉盻六年起科司農按籍而奏銷絲毫不得拖欠有司執簿而追比時刻不可稽遲所墾之地已枯為石田蕩為波濤而所報之糧一定而不可動始而包賠繼而逃亡累有司之叅罰責里長之攤賠所以小民視開墾為畏途寧聽其荒蕪而莫之顧也且報墾之時冊籍有費駁查有費牛種工本之外復拮据以應誅求非中等以上之家不能開墾何怪乎報墾之寥寥哉職竊謂此等荒地原與額内地土不同與其稽查太嚴使民畏而不敢耕何若稍假有司以便宜使得以熟補荒如該管内有額外新墾之地復荒者聽有司查他處新墾地以補之其荒糧即與除免不必如額内地土必達部奉㫖始准豁除無賠累之苦無駁查之煩民不畏墾之累自無不踊躍於墾矣其已墾成熟者或更請寛至十年起科使得償其牛種工本之費然後責其上供亦所以勸墾也伏候憲裁一水利之當興也欲民之富在於墾田欲田之墾在興水利北方土性燥烈灌溉易涸雖於南方不同然使川澤流通隨便灌溉猶愈於聽其焦枯而莫之救也職竊觀古人溝洫之制至精至密故孔子謂大禹盡力乎溝洫而周禮遂人匠人之職備載其制今一切置而不問聽其自盈自涸一遇旱潦束手無䇿何怪乎民生之日蹙也但古人溝洫之制隨時修理故不覺其煩費今以久湮久塞之河道一旦欲疏其壅而防其潰工費浩繁勢難卒辦又當公私交困之時州縣錢糧一絲一忽皆有款項不敢擅動民閒十室九空正供錢糧尚難完辦安有餘力以成此艱巨之事若不量時勢不計贏詘驟然興舉其為擾害必甚水旱職竊思屢年以來朝廷憫恤灾荒州縣議蠲議賑所費錢糧不可勝數與其蠲賑於既荒之後何如講求水利於未荒之前蠲賑之惠在一時水利之澤在萬世今憲臺撫臨畿輔欲成久逺之業無有大於斯者矣宜通查所屬州縣水道何處宜疏通何處宜隄防約長闊若干工費若干彚成畿輔水利一書進呈御覽請司農度錢糧之贏詘以次分年舉行永成萬世之利而不擾於民以一時言之雖若不免於費以久逺言之比之蠲賑所省必百倍或鼓舞官吏紳衿能開河道若干者作何優敘作何奬勵此亦一䇿也伏候憲裁一積榖之宜廣也今功令最重積榖定有議敘之例所以為窮民計至深逺矣然欲榖之多當廣開榖之源今止有捐輸一途故積者寥寥在富豪之邑猶可鼓舞勸捐若山僻疲罷如靈壽者既無富商大賈厚藏之家比户皆鳩形鵠面雖懸奬勵之典以勸之其誰能應耶職竊謂此等窮縣當稍為之通融使得廣積以備賑如該管縣内有荒地可開墾者許有司設法募人開墾收其所入貯倉備賑勿責其起科其一切河淤地畝雖已入糧原非額内者許其量留積榖吏員應納銀者許其入榖縣倉即准報充不必起解牙帖雜稅原額外新増者編審人丁溢額者悉許留本地方積榖諸如此類推廣行之庶幾疲僻之邑皆可有榖以救災荒若止藉捐輸一途其能有濟者鮮矣即就捐輸言之徒令二三有司嘵嘵勸諭所得有幾巧者隂派之里下名為捐輸與加派無異又非朝廷愛民之意是宜請㫖酌定旌奬之例使紳衿富民皆樂於捐輸將不待勸而粟自多至於在倉之榖宜聽有司之酌量支放如遇凶荒則先發後報平時出陳易新聽從其便勿因不肖之侵欺而盡掣賢者之肘則鳩鵠之民庶有頼矣伏候憲裁一存留之宜酌復也查賦役全書舊額有一項人役則有一項工食有一項公務則有一項錢糧蓋未有用其人而可不予之以食辦其事而可不費一錢者也用人而不予以食則必至於賣法辧事而求不費錢則必至於派民自兵興之際司農告匱將存留款項盡行裁減由是州縣掣肘貪墨無忌私派公行不可禁止百弊之源皆起於此自康熙二十年以後再頒恩詔漸次奉復海内始有起色然尚有應復而未復者敢為憲臺陳之如衙役犯贓之律甚嚴而書辦之工食獨不復不知此輩能枵腹而奉公乎抑將舞文弄法以為仰事俯育之資也給以食而犯法雖殺之無憾也不給以食使之不得已而犯法加之以刑其肯心服乎此其當復者一也心紅紙張修宅家伙此州縣所必不能免者也既奉裁革不知天下有司皆能捐俸而自備乎抑或有責之舖户派之里下者也有正項開銷雖貪吏無由借端苛派無正項可動將藉口以責之於民朝廷之所省有限而小民之受累無窮此其當復者二也上司過往下程中伙雜支供應此州縣所必不能無者也既奉裁革不知上官之臨州縣皆能自備供應自發價値乎抑或有不能不資藉於地方者也有司之懦者恐觸上官之怒百計逢迎賢者亦恐失事之體多方補苴無米之炊不知其安從出也此其當復者三也存留盡復則私派可禁私派盡禁則百姓可足在主持國計者惟知復一項則費一項之金錢不知裁一項則多一項之掣肘掣肘之害層累而下總皆小民受之小民疲罷逃亡其害仍自國家受之此留心民瘼之大臣所當急請酌復者矣伏候憲裁一審丁之不宜求溢額也直隸舊例人丁五年一審分為九則上上則徴銀九錢遞減至下下則徴銀一錢毎遇編審有司惟恐部駁必求溢額非盡民庶而富加於其舊也亦强以㷀獨無告之民充數而已王成偽增户口處處皆然且編審既定五年之内即有逃亡死絶不得開除夫㷀獨無告之民而責其毎年出銀一錢已不堪矣况已逃已絶而猶不得除乎職竊觀直隸各州縣現在之丁已不為不庶但求無缺額足矣不必更求溢額也一審一溢日積月累不知何所底止或果有丁盛而額溢者宜命有司留為積榖之用不必入額如五年之内遇有逃亡絶户即以此之溢補彼之缺如此則鵠面鳩形者得免於剝啄而甲長户頭無包賠之苦矣其荒殘州縣無溢而有缺者得隨時報上於奏銷時量准蠲免倘或慮不肖有司將溢額之銀侵入已槖無缺而揑作有缺則自有糾劾之典在總之寛一分在州縣即寛一分在窮民州縣之不肖者固有賢者實多上之搜求於州縣者無餘地則州縣之搜求於窮民者亦無餘地不肖者固樂於搜求賢者亦不能不搜求而民之塗炭日增日益矣伏候憲裁右所陳無非書生之論然欲為國家固根本培元氣必先從此數端下手孟子所謂王道之始也伏惟憲臺不以其迂腐而忽之則生民幸甚至於一切刑名錢榖務持大綱而止無益煩文俱宜省去如錢糧冊籍釐毫絲忽之差可以即行改正者無庸駁詰刑名案件明白顯易之事可以即行完結者無庸提解多一畨駁詰則多一畨需索多一畨提解則多一畨拖累吏胥所深喜而小民所深苦也漢蓋公有言治道貴清靜而民自足此雖非中正之論然事之煩簡當隨乎其時時病在太簡者宜濟之以煩時病在太煩者宜濟之以簡今之功令稍煩苛矣去煩就簡此正所謂時中若夫鄉約保甲之當重也土豪衙蠧之當除也陋規雜派之當禁也俱地方利弊之所在以虚文視之則皆故套也以實心為之則皆仁政也今之論治者類能言之無待職之贅陳為此備由開冊具申伏乞照詳施行三魚堂外集巻一
