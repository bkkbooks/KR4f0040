body:
  text: 三魚堂文集卷十一贈內閣學士陸隴其撰墓表墓志銘壙記傳中憲大夫江南布政使司參議分守蘇松常道加三級方公墓表分守蘇松常道參議方公諱國棟字干霄號艾賢以康熙十六年冬沒於位其政迹在口碑其家世生平在公子共樞所述行略及翰林院編修汪公所作墓志銘中其初仕也由舉人授蠡縣教諭遷國子監助教進博士遷刑部江西司主事歷雲南司員外郎福建司郎中出為廣東按察司僉事分巡海北道遷整飭寧武兵備參議裁缺改分守蘇松常道其在廣東也擒雷連巨冦鄧耀而招徠其餘黨白諸富人寃而卻其金其在寧武也以法飭武辨而盡謝絶其饋遺其光明磊落寬嚴有節所至如一彰彰在人耳目固無容復贅一辭矣至其在吳也正值閩粵用兵羽書旁午之際方是時大吏當軸者惟以能辦事為貴不暇問民生疾苦有司承風旨朘削窮民皮骨幾盡使無人焉覆翼噢咻之勢窮力極揭竿斬木而起如明季之禍不難見也寇橫於外盜起於內又紀綱盡廢人不復知有廉恥天下事尚可為哉公獨於干戈擾攘之中事事思與民休息每遇急徵從容布算鎮之以靜芻茭糗糧之需卒藉以辧而民宴然嚴飭屬吏無朘民生而摧其力自是郡縣稍稍知以百姓為根本不敢盡力排擊剝割當義所不可正色峻拒雖臨利害不肯委曲假借中朝貴人遣幸伶入吳怙勢縱恣大吏爭折節下之公獨不少屈綱維不至掃地者公為之中流砥柱也公既以仁愛培國本以廉恥維風俗一時精掊克甘脂韋者或不以公為然然卒無如公何公既沒之二年逆臣授首四方漸次削平鷹揚貔貅之士奏功於朝皆以為神器震而復寧者師武臣力也孰知賢者弭變於無形撫輯殘黎固結人心使腹內安堵而後將帥之臣得以成功於外譬之治病然披堅執鋭從事疆場者治其標者也正已率屬潛消禍變者固其本者也本不固則外病未除而內病雜作雖有良醫豈能為治然則公之毅然持正於舉世若狂之時安民生而挽頽俗以為郡縣倡使封疆大臣無內顧之憂而以次平定禍亂其功顧不大哉公之在位也隴其適待罪嘉定為公屬吏得親炙其休光公不鄙其不肖而特嘉其朴拙時引掖奬勸之及隴其罷歸公為扼腕太息方欲以間散之身從公於政事之暇從容盡叩公之學且欲問公家相國文端公中朝故事以定千秋之疑案而公忽溘然棄世矣公子共樞既葬公於順天府大興縣方家莊祖塋而以其行略墓志示隴其謂隴其曾備員公之宇下且嘗蒙公奬歎能知公之心不可無一言以表之隴其學疏文陋豈能闡揚公盛德特嘗慷慨世變歎今之論治者皆爭其流而不知其源獨公能於嚴霜堅冰中噓以陽春消弭禍本可謂得其源者推其功實與頗牧之徒相表裏而人顧不知也隴其故不復論其他而特表其卓然獨立於吳中而關天下安危者以備史官之採擇云孝廉系宣曹公墓表公諱穎洙字系宣别號住寒暮年寓懷也公父之罘諱繹祖蚤嵗遊庠孝友承家舉丈夫子五咸知名士公其長子也賦性沉毅介然自持且偉度修髯望而知為有道者隴其嘗遡公生平竊深企異之公年十五母王孺人蚤世恪遵庭訓一燈坐繐帳中誦讀無倦色閲十五年後母陳孺人亦故形神慘淡而至性依依則蕭然一韋素也甫遊黌序即登丁卯賢書時公父方壯上而高曾光祿公侍御賓湖公暨仰賓公咸慰焉聲先華萼交善嚶鳴及卜宅郡城天星湖又闢煙雨南莊書屋擬看杏苑之花旋奏鴈羽之捷倣佛比美扶風則卓然一典型也庚辰之役魁副南宫乃辭特典願以薄祿捧檄永豐經藝治事士之遊其門者多有濂洛聲則儼然一嚴師也運當鼎革播遷百粵歷瘴雨蠻煙幼子家人零落逮盡不免瞻岵生悲黍離同歎則纍然一孤臣也逮亂離初定兩度還家為問昔時郡室湖莊俱成幻境遂息倦飛之翮棲止祖廬力行敦睦培子姪之孤弱拯父黨之旅羇復祀田所以尊祖廓祠基將以收族凡親戚故舊洵生平一日歷事變當阽危必匱乏相周患難相恤懇懇未嘗或置膜外則慨然一仗義士也而公豈欲獨善其身哉明季申酉間偕仲弟攜妻孥跋涉山澨者數載公則一氊江右仲則糊口窮途彼時故鄉蝶夢憲檄吹求幾虞不保且公父耄疴季弟臻來輩尚少脊令是亟得保堂構於依然非公之感孚同氣者深而洽比鄉黨者素不至此嘗泫然書訓以示弟仲宣蘅芳遺孤曰孝弟謹信親愛學文立身之根本弗視弟子之小學也古人所謂寧刻鵠毋畫虎者非耶公素不攻釋家言於所居左額不限堂憩息其中自謂饘粥可供竹牀可卧杖頭錢可給求木雞是養杜忘一切則終翛然淡然一山林遁逸人也公生平出處大略如是公與先伯父濟南公同鄉薦則隴其固年家子也而余壻宗柱為公猶子聞之熟而知之詳又以公之令嗣名駕乘者請羽言於余故不愧言之諺而少文為敘次其生平云施孟達墓志銘施子玉符以其考孟達府君狀來請銘據狀言施氏之先自浙之秀州遷於蘇又自蘇遷崇明洲之西沙代有顯者是皆在宋元以前其自崇明遷疁之大場則君之高祖諱秩又自大場遷今所居之羅店則君之曾祖諱鈇鈇生勳勳生三子其長諱宿則故進士兵部主事諱鳳儀字孟翔之祖誥封文林郎諱三益之父其季諱宰則君之父也君諱于德生而孝友與弟天長儒學訓導于政俱業儒自以為穎悟弗及弟乃喟然曰弟橫經兄服賈不亦可乎豈必兄弟皆貴耶遂操奇贏權子母家以是益富厚然非僅知有富者親沒與其弟哀慟過禮凡喪葬之事爭先措置而財産則互讓視世之死其親而惟利是爭者霄壤也佃户有負租者夷然不較曰彼貧耳非本意也寧令負已不忍直於有司嘗出手書一册焚之皆田産積逋也計九千有奇越數年又出一册焚之倍於前其存心寬厚不忍以財物傷人如此崇禎辛巳歲旱道殣相望慨然太息曰人我一也彼僵而仆而我獨飽食可乎盡出其積儲散之倉廩一空順治甲午歲復祲率先煮糜療飢力勸鄉里有力者共相濟賴以活者甚衆嗚呼世之富人積粟藏金絲毫不肯假於人視其親戚鄉里若秦越之不相關少有負於已則跳躍叫號以為萬不可已其視施君度量相越為何如也然君以度量容人人亦感其意不忍負之家事亦卒不終落當鼎革之際邑有奴變羣僕𨽻結黨橫行以索劵為名焚掠無虛日君從容呼其衆僕檢契還之僕皆流涕不肯去亦其生平寬厚有以感人也君其他善行甚多如奉邑令委踏勘沿海坍荒分别全坍坍殘臨坍井井有條既竣不受旌奬皆人所難余獨喜其寬厚能容人有古人風宜其積厚流光子孫蕃且昌也故因玉符之請而為之志銘君生萬厯癸巳沒於康熙庚戌其配朱孺人沈孺人皆賢克成君之志俱先君卒子三人長麟祚次麟定皆庠生季麟瑞即玉符恩貢生孫男九人宗閬宗箕宗岐麟祚出宗嵋宗岏宗嶸麟定出宗嶧宗嶠宗峘麟瑞出女七人孫女九人麟祚等以壬子十二月二十日葬君於隱和府君宰之昭穴銘曰世滔滔兮咸錐刀之是爭君獨擴然有容兮若汪汪之千頃君既享有遐齡而子孫繩繩家其日贏積善餘慶兮豈不信而有徵陳母侯孺人壙記孺人姓侯氏世為商邱人前朝户部尚書侯公恂者孺人之祖尚書子方域字朝宗世傳壯悔堂集者則孺人父也孺人年十五歸于陳子子萬子萬世為宜興人祖少保端毅公諱于庭直節詳於國史父定生先生諱貞慧以德行重天下與朝宗為莫逆交甲申之亂朝宗避地宜興因締婚焉朝宗既北歸尋捐館舍而定生亦尋即世家日落徒四壁立子萬煢煢無依遂就婚商邱孺人生而端莊不妄言笑長循婦道雖世家女能以禮自範子萬之至商邱也伶仃躑躅孺人安之不以為苦子萬既壯務讀書好交遊孺人常竭力操作以供不時之需不以為厭子萬作丞黎城令安平孺人皆隨之任遇覃恩受封家道寖盛然益務儉約不輕用一錢不輕翦一幣子萬稱孺人之言曰婦人所貴在德不在翹珠鳴玉男子所重在品不在拖紫紆青霜臼雨薪叉荆裙布吾分內事也又曰世事何真惟做好人是真其所見卓犖如此故能歷艱辛遇通達而喜愠不形以宜其家以相其夫子使子萬得以磊磊落落之才處則優遊於墳典出則鞅掌於民社無室家米鹽之纍牽制其胸襟者孺人力也彼世之生長閨閣不識稼穡艱難不識禮義窮而怨達而侈使其君子內顧鬱抑常擾擾於衷甚則毁廉隅蹈羅網以徇其無涯之欲者聞孺人之風豈不可愧也哉孺人生於崇禎十五年六月初三日沒於康熙二十八年三月二十六日既沒而子萬痛之甚非獨其篤於琴瑟蓋孺人之賢實超越世俗而年不永宜子萬之感悼無已也孺人有子五而皆不育有女七多方為子萬置妾有螽斯不妒之風焉臨沒猶惓惓囑子萬愛身育嗣亦世俗所難哉子萬寓書於余求所以不朽孺人者余不敏非其人也承吾友之命且心重孺人之賢不敢辭故敘其大略以復子萬使識於其壙非敢附志銘之例也先府君壙記先府君諱元一諱標錫字叔因姓陸氏系出唐宰相宣公代有顯者詳家乘中自五世祖春坡公諱東始居平湖縣之泖口其地一名顧書堵高祖諱美字仰春妣姚氏曾祖諱堯夔字友唐妣戴氏祖諱錫胤字紹唐妣姚氏考諱瀗號泰交妣李氏自五世祖以下皆以儒術有名庠序泰交公四子府君行第三府君生於萬厯己酉正月初二日自幼孝友能文早年入庠數竒未達康熙乙卯以男隴其恭遇覃恩封文林郎府君性寬和生平未嘗有疾言遽色雖嘗有橫逆相加者絶不芥蒂於胸中好坦直不喜為城府入與家人言出以告於人未嘗有二也一生惟以真誠寬厚為主寧濶略於節文而不欲矯飾以欺世寧過於和平而不欲立崕岸以自異府君少時家道殷盛長兄墨濤公又顯仕然處之淡如也及遭喪亂家業盡落徒四壁立亦不以為意授書武塘者凡十有六年安之若素雖未嘗達而在位而常以蒼生為念每語子弟云貪與酷皆居官大戒然貪而酷人皆知惡之若恃廉謹而刻以繩人人慕其風節競相倣效禍不可言矣讀書必究極源委深惡俗學卑陋尤不喜務虛名順治間士子沿明季舊習互相標榜號曰某社某社時隴其初入黌序未知其病也府君每切戒之常舉海鹽吳忠節公語示之曰居官不入黨秀才不入社便有一半身分此至言也兒謹識之居常教子弟必令篤實務本每喜稱述祖德及盛衰興廢之故津津忘倦晚年深慮宗族繁衍子孫不能自知其支派乃修族譜義例精核族人賴之康熙戊午九月二十一日以疾終於正寢享年七十配鍾氏同邑太學生衢水公諱成純長女生萬厯丁未閏六月初二日終於天啓丙寅十一月初一日續配曹氏隆慶戊辰進士漳州府知府景坡公諱銑曾孫女萬厯丁酉舉人荆州府通判芝亭公諱蕃孫女處士越凡公諱棻長女生萬厯丙午三月初五日終於崇禎癸未正月二十七日皆有婦德皆以康熙乙卯覃恩贈孺人副室石氏三男皆曹孺人出長隴其康熙庚戌進士江南蘇州府嘉定縣知縣次肇熊後府君四十日而卒次承勳一名坦女二長適同邑庠生張光熹次許字婁縣陳嘉㖟孫男二人定徵宸徵皆業儒孫女四人一適太學生金山李鉉一適同邑庠生曹宗柱一許字同郡庠生張金城一幼未字以康熙庚申十二月十一日合葬於朱童港北餘墟祖墓之東亥山已向不孝孤等不能顯揚其考妣謹識其生平大略如此昊天罔極嗚呼痛哉亡弟尚桓壙記此吾弟尚桓之壙也其世系詳先府君壙志中弟諱肇熊生崇禎壬申十二月二十四日少余二嵗吾年十四而喪母弟才十二孤苦相依備極酸辛弟幼讀書未成輒遭亂離我與先府君皆糊口於四方弟獨在家無師友切磋之功學遂不成吾先府君家法子弟不能讀書則當執一業農工商惟所宜不得為天地間間食人以辱祖宗故弟既廢書遂習於農備歷艱難弟性亦淳朴安之不厭及豫舉於鄉捷於南宫遵守祖訓不敢獵取不義為父母羞家貧如故弟之自食其力如故也及豫為吏江南不欲變其初心家貧如故弟之自食其力又如故也方冀稍有餘俸使弟得息肩孰意其不能待耶戊午閏三月之十二日我應詔入都既拜先府君於堂上弟送我入舟孰知此一日即為我父子兄弟永訣之日也先府君屬纊之日弟病已篤聞變匍匐至牀下一慟幾絶家人扶至房中遂不復起臨沒時囑家人云我病不能成服我死當以衰絰斂我家人遵其言故今在棺中者斬焉凶服之人也以禮言之弟方至九泉日夕侍二親旁不應衰絰然弟之惓惓於垂沒者豈非其天性之不容已耶一息尚存不忘痛親此一念何可沒也又語家人云吾死停吾殯於室毋出也待吾兄歸嗚呼哀哉卒在戊午十月二十九日後府君之沒才四十日耳配李氏終於康熙己酉十一月二十七日繼娶馮氏皆無子以隴其次子宸徵為嗣二女一育於隴其許字同郡庠生張金城一幼未字今於康熙庚申十二月十二日同李孺人合葬於先府君墓之右穴嗚呼痛哉兄隴其抆淚謹識兩嬰兒壙記此兩嬰兒者一為遇龍姓陸氏生崇禎丁丑冬我幼弟也其生也有夢龍之祥故名焉我父母皆鍾愛之不幸我母沒而弟無所依時有常熟陸平侯者為守備於杭州與先府君有故以弟寄養焉在杭半載而痘殤時癸未秋也柩歸寄祖墓旁舍者四十一年其生卒之日月皆已不能詳一為蘭徵姓陸氏生康熙丙午十二月初三日我次子也其生之夕我時北上夜泊蘇州夢戴蘭於首芬芳異常以為有鄭穆公之祥不幸甫五嵗而痘殤時康熙庚戌六月十二日也柩寄爾菴僧舍者十有二年二子皆有異兆皆聰明過人而竟夭殤可哀也哉逢家多故久未克葬常痛於心今於康熙癸亥四月朔日合而寄葬於爾菴僧舍之後隙地叔左姪右庶幾相依以永久焉傳越凡曹公傳外祖曹公叔芳諱棻越凡其别號也世居華亭之東千里祖景坡公隆慶戊辰進士福建漳州郡守父芝亭公萬厯丁酉順天榜第四人湖廣荆州别駕芝亭公生四子外祖行在第三生長華胄不修貴介之容遊學京師數載公見尊人科名坎坷伏闕上書奔馳水陸者無暇晷屢試於有司不得志杜門讀書意泊如也荆州公挂冠歸公承意色養家庭愈悅不自居孝弟之名躬行無忝而已佳晨夕探荆州公所樂見之客折柬相邀或賦詩飲酒或啜茗彈琴以相娛性不能飲而喜客飲更喜與父之客飲所為承歡者殆何如也公性坦適不耐塵囂獨處斗室中無求於人亦無纍於人浩浩落落作逍遙齊物之觀近於老氏之學而不欲廢棄一切以鳴高疏水曲肱浮雲富貴其中有真樂識者服公精於養生之術云娶大參楊公諱欽孫女是為我外祖母女德淳備相敬如賓終身不聞誶詈之聲誠賢母也生三子三女長女即為我母歸先府君以孝敬為妯娌式母舅三人長説若公諱默遊平湖庠有聲膠序娶高氏次舜遺公好學食貧娶李氏早卒季桂生公娶翁氏以舌耕奉養好植名花異卉插槿編籬藝菊數十種每當秋風木脫與二三知己觴詠於東籬盤谷之間不愧清白吏子孫也隴其幼時隨我母歸寧外祖撫之膝上每曰此兒舉止沉靜不逐羣兒嬉戲異日必成廉泉讓水之名兒其勉之至今書紳不敢忘庚戌獲雋以來兩為縣令簿書鞅掌之餘凜然如奉外祖之訓即我母之訓也隴其匏繫一官母舅寓書云族譜告成願得一言為先人傳隴其痛我母之不得奉養又痛我父不得邀一命之榮以沒也又何辭以謝外祖哉然外祖有隱德而不彰是豫小子之責也故拜手略陳梗概云席文學熙菴傳熙菴姓席氏始祖諱溫唐末避黃巢亂卜居莫釐山三子曰尚曰常曰當常三十傳而至熙菴云熙菴諱啓祥字五雲熙菴其號也幼聰穎授書過目輒曉大意下筆滚滚千言立就弱冠補博士弟子員聲名藉甚然熙菴不喜標榜惟下惟攻苦當明季時婁東張西銘倡始復社海內翕然趨之士以不得及門牆為恥熙菴獨不屑也自與其友讀書山中互相切磋博覽經史百家之言去婁東不二百里若不知有西銘者性又慷慨倜儻有大略知天下將亂喜與里中俠少年遊親黨皆竊笑之及乙酉變起逺近鼎沸而熙菴家獨晏然安堵以諸少年感其平昔意氣謹衛之也江南初定玉石未分有誣山民不軌請兵搜山者一山皇皇懼不保然皆畏縮無敢向當事白之熙菴獨挺身見主兵者侃侃數言一山獲全順治庚寅辛卯間嵗大祲道殣相望是時熙菴家漸中落矣慨然傾囷賑之平生周人之急解衣推食無所吝惜尤喜引掖寒素之士延接款餽遊揚之恐後初熙菴父養虛公家故饒鍾愛熙菴欲其力學一切家事不使與聞故熙菴自幼不問生産更負氣數忤富豪為凌轢以故家日益落然熙菴廓然不以介懷也未嘗有歎息扼腕之聲晚年留心禪學遍閲傳燈録諸書一時浮屠大師皆與之遊咸推為有得云康熙已未以病卒壽六十四贊曰迹熙菴生平若三變然始而儒繼而俠終而禪然俠不至於捍文網則非朱家郭解之俠也禪不至於廢彝倫則非慧逺宗杲之禪也其始終皆讀書通儒術之效歟不然方婁東以聲利招致後進一時浮薄之士蟻聚其門非定力卓識烏能不餔糟啜醨於其間耶三魚堂文集卷十一
