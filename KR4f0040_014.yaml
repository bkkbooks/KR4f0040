body:
  text: 欽定四庫全書三魚堂外集巻二贈内閣學士陸隴其撰表䇿擬上臨雍釋奠禮成駕幸彝倫堂命祭酒司業坐講周易乾卦尚書堯典仍勅諭師儒勤修學業羣臣謝表會墨伏以聖帝右文四海爛星雲之色盛王崇學百代開禮樂之光闡精義於羲文爰紹千年之遺緒繹微言於謨典一空近代之膚詞輝溢成均祥生寰宇臣等誠惶誠恐稽首頓首上言竊惟帝王圖治必以尊儒重道為先國家化民尤以勸學崇儒為務故米廩瞽宗之制創自虞夏以前而陳書訪範之儀屢見殷周之世使庠序不設雖勲華難以登庸而墳典不親即湯武無以成理自嬴灰起而法律為師至漢蕞興而詩書安事所急在兵刑錢榖而學較止為美觀所感在土木神仙而師儒目為迂闊既鉅典之罕重遂大義之漸湮施孟梁丘分鑣羲畫之内夏矦張霸競爭孔壁之中馬鄭為注疏之宗僅傳章句於末學濓洛定性命之凖徒標奥義於諸儒雖太牢之祀曾舉於西京然非有崇文法古之思則牲帛止成故事即白虎之辨盛傳於東漢然非有尊聞行知之實則討論亦屬繁文唐宋皆設講筵孰可紹百王之心法元明俱敦學制疇為接四代之遺規未有肇舉隆儀修文因以修實聿興大典師古因以勵今如今日者也兹蓋伏遇皇帝陛下敦敏性成徇齊天縱神聖文武之徳逺邁乎昔王寛仁恭儉之猷黙符於往帝聲敎徧流沙之地咸推有道聖人車書通蟠木之鄉人誦太平天子顧念太學為風俗之本不臨以九重之赫濯懼其褻而不尊先師乃道徳之宗不加以一人之尊嚴懼其習而忘重遂舉臨雍之典因行釋奠之儀鳯輦朝馳瑞氣偕犧尊並集雞人曉唱祥光共爟火同輝猶謂奉玉帛而告䖍孰若遺編之親炙對俎豆而生敬何如大訓之聿宣爰命祭酒司業諸臣敬陳周易尚書之要道隂陽者莫若易毋徒貴象數之雜陳述政事者無如書勿徒為讖緯之兼進惟乾畫居六十四卦之首元亨利貞無一義之不關主徳堯典為五十八篇之祖欽明文思無一字之罔禆君心執簡而前曉然於吉凶悔吝之故正色以講昭然於治亂得失之原羣情方踊躍而呼曰稽古之學莫盛於斯聖主猶焦勞之念曰日新之功豈容有閒予一人深宫考道固當凜良玉未琢之憂爾師儒學舍潛修何可貽寶鑑失磨之誚其務勤修夫學業用以共佐夫昇平臣等徳愧顔曾才慚游夏誦伊川涵養薰陶之句敢吝敷陳讀紫陽正心誠意之言恒懷嚮往幸遇盛時不草相如封禪欣逢治世得歌班固辟雍伏願法自强之義成恊和之休以上聖為必可幾功勿閒於寒暑以至治為必可及念勿渝於始終聚天下之精神於禮經樂緯之中而無取乎雕龍吐鳯致一代之教化於仁漸義摩之内而弗尚乎月露風雲將見徧戴日戴斗之區而靈輝普耀撫卜年卜世之歴而神器常安矣臣等無任瞻天仰聖激切屏營之至謹奉表稱謝以聞治法鄉墨古之聖王所以能滌煩袪弊而躋一世於仁壽者必有畫一之規以齊天下之耳目必有寛大之意以繫天下之人心惟其寛大之意足以繫天下之人心然後其畫一之規足以齊天下之耳目從古立法未有不順乎人情本乎忠厚而能俾民寡過垂之永久者也苟立法者徒求畫一之規而不本乎寛大之意其始也不度天下之情而為一切之法以整齊之其繼也法不足以繩天下而天下反借法以生弊於是上之人不能不變法以維其後是故法溢紛而治益雜然則欲定一代之治法者與其屢變於法之後不若詳審於法之先與其轉恃乎法而法反未必行不若不盡恃乎法而法自無不行周漢唐所以稱盛於前而良法美意非後世所及者由此道焉耳今皇上恭已勵精承祖宗之業而光大之思所以立法而躋一世於仁壽者生以為其道無他亦惟以寛大之意定畫一之規而已所謂寛大之意者非有寛而無猛之謂也非有緩而無急之謂也未嘗無文告而文告之所及必行乎人情之所樂而無行乎人情之所苦未嘗無禁令而禁令之所加必為人情所易行而無為人情所難行未嘗無刑威而刑威之所至必使天下羣以為當然而不使天下以為可不然故有時寛以行之而不失為寛大有時猛以行之而亦不失為寛大有時緩以行之而不失為寛大有時急以行之而亦不失為寛大夫我之所行既有以順天下之情則天下之人自無不從於我天下之人既無不從於我則我不必更有以防天下之人如是則可行之一二人者亦可行之千萬人可行之一時者亦可行之萬世不必有更張之迹而自成畫一之規以之滌煩而煩無不滌以之袪弊而弊無不袪以之教化天下而一世躋於仁以之休養天下而一世躋於壽皇上所以覲光揚烈與民休息而成一代之治法為繼體守成之極者其道誠無踰此矣雖然欲行寛大之法又必本於皇上寛大之心心存於愛養斯民而法之寛猛自得其宜心存於永綏斯民而法之緩急自得其當以一心之寛大者為體以立法之寛大者為用將見法即成康之法治即成康之治而刑措之風再見今日矣何漢之文景唐之貞觀足云哉理氣天下一氣而已天下之氣一理而已氣不能離理而理亦不能離氣天得之而為天者人得之而為心古今聖賢之所發明者不越此理氣不越此理氣之在天地與理氣之在人心者已耳但其言有就理氣之渾淪言之者有就理氣之散殊言之者有就天地而言其渾淪散殊者有就人心而言其渾淪散殊者此源流分合所以若不相一而實無不一也愚生雖不敢自負於盡人達天之學然源流分合之際亦嘗竊聞之矣請因執事之問而條晰之執事所引易之繼善正䝉之太虚程子所謂形體主宰性情邵子所謂道為太極此就天地而言其理氣者也其於穆不已而循之不見其端者天地之理氣之渾淪其萬物各得而著之莫窮其際者天地之理氣之散殊雖其名遞變而其所指未嘗變易之言固無異於程子之言程子之言又無異於邵子之言也執事所引子思之言未發孔孟之言心張子所謂合虚與氣合性與知覺邵子所謂心為太極此就人心而言其理氣者也其無思無為而巻之退藏於密者人心之理氣之渾淪其隨感隨應而放之則彌六合者人心之理氣之散殊雖其言互殊而其所指未嘗殊子思之言固即孔孟之言而張于邵子之言又即子思之言也是故以其在天在人者言之則在天者為源在人者為流以在天在人之渾淪散殊者言之則天與人又各自有源流言天言人雖分而天之所以為天人之所以為人未嘗不合也言渾淪言散殊雖分而渾淪者即在散殊之中散殊者不出渾淪之外又未嘗不合也天人之原性命之藴可一言貫之矣然而學者所貴乎根極性命者非徒欲聞性命之說也貴實得乎性命之理則執事所謂存心以盡性達天者其功又可得而詳之蓋心之或出或入而不存者其病非一端故聖賢所以制其出入使之有存而無不存者其功亦非一事心之不存者以其偽而不誠故周子予之以誠心之不存者以其肆而不敬故程子予之以敬心之不存者以其私而不公昧而不明故張子本之於無沗匪懈朱子本之以格物致知凡此者皆所以存其心而不可或闕皆所存其心以達天盡性而不可偏用者也學者誠有得於此而操持不倦以古人各指其一端言之者合而致之我心則於盡人達天之學亦庶幾矣至於鼓舞引掖使天下人人以濓洛關閩為已任而性命之理昭徹宇内則在朝廷之敦崇正學以為天下先乎刑禮帝王所以化導天下而使之各得其性者惟中所以範圍天下而使之不戾於中者惟禮所以整齊天下而使之不違於禮者惟刑故禮也者所以納民於中者也刑也者所以納民於禮者也禮者天下之大範刑者天下之大防可相有而不可或無也但禮禁未然之前刑禁已然之後禁於已然者人皆見其效而以為不可廢禁於未然者人或不見其效而以為有可緩於是禮輕而刑重自禮輕而刑重而為治者徒思所以整齊乎天下而不知所以範圍於天下徒思以整齊天下者禁民於已然而不知以範圍天下者禁民於未然欲民之恊於中也難矣然則求帝王之治者無他亦惟灼然於刑禮之辨而不淆於異論而已今國家制作盡善秩然有等而又勒成律例為一代之令其於刑禮之用亦既兼施而罔偏已愚生復何所指陳其閒但恐朝廷雖知刑禮之相輔而天下之為異論者不能不以禮後刑朝廷雖知刑禮之同原而天下之為異論者不能不以刑絀禮異論出而取舍淆取舍淆而治術偏矣則所謂刑不可一日弛禮必百年後興者請得為執事析之夫禮者不可斯須去者也君臣之閒斯須而無禮則凌悖之端生父子之閒斯須而無禮則孝慈之恩薄故禮之漸漬於肌膚者固必待於百年而禮之範圍於日用者則不可或缺於一日今以一日不可缺之禮而誤以為百年待興之禮禮果若是其可緩乎生願國家斷然以刑禮為相輔而勿悞聽於百年後興之說則民之恊於中者庶有日矣抑所謂三代文質異賞罰先後不同者又請得為執事析之夫三代之各異者文質三代之不異者禮也三代之先後不同者賞罰三代之無不同者禮也故禮行於尚文之世而服物可以生恭敬禮行於尚質之世而儉素可以養誠慤禮行於先賞後罰之代而匪頒之節無非以别尊卑禮行於先罰後賞之朝而郊遂之移亦可以教祗徳今以其文質賞罰之殊而謂其禮之殊禮果如是殊乎生願國家斷然以刑禮為同原而無誤聽於三代文質賞罰之說則民之恊於中也又有日矣此則所謂審取舍之術而化導天下之至要也若夫刑之或當輕而或當重禮之或當損而或當益刑禮之或當互有輕重互有損益是在廟堂之上斟酌於古今之勢風㑹之變而出之以不忍行之以恭敬以求合於天秩天討而已明史為一代之史者必先明致治之大原而後備觀其行事之是非不觀其行事之是非則一代盛衰興替之故不彰而無以垂鑒於後不明其致治之大原則一代創業守成之模不具而無以為法於今故觀兩漢之史者必先觀髙光之所以創業文景之所以守成而後武宣以下桓靈以上之是非可得而備論也觀唐宋之史者必先觀貞觀建隆之所以創業開元慶歴之所以守成而後永徽以後熙豐以還之是非可得而備陳也蓋一時行事雖其盛衰興替所係而至於一代所以凝承天命永綿厯服者則尤視乎創業守成之際有以維持而培植之故帝王考監前代以為法戒雖一事之微而不敢忽而所尤重者創業守成之原也今國家纂修明史以備千古法戒生請先舉夫洪永之所以貽謀宣孝之所以紹前烈而後備論其一代之是非焉夫洪永之所以貽謀者不在法令之嚴密而在乎政體之寛大不在國勢之富强而在乎教化之肫篤宣孝之所以紹烈者不在乎紛更祖宗之制而在乎謹守祖宗之舊不在有以振攝天下之人心而在有以維持天下之風俗是故輕徭薄賦而國愈富恤獄緩刑而民愈服安常守故而綱紀愈肅天下相漸以忠厚亷恥之風而相洽於深仁厚澤之内此固當為法於千古而上繼三代之治者也至於金川之事無異建成元吉之事君子不以貞觀之治而輕恕於太宗則亦不能以永樂之治而曲諱於成祖雖瑕瑜不掩可也曹石之事無異五王之事然五王以行權而再造夫唐室曹石以行權而啟釁於明時雖謂之無功有過可也以興獻為異於濮園可也而入廟稱宗則已過以國本而阻其並封可也而語侵宫禁則已誣三案之興主之者未必皆小人而不覺其為小人所附會東林之起主之者寳皆為君子而其始也不免以君子而過激其繼也不免以非君子而妄入此亦紀綱之壞風俗之衰勢激使然而非盡諸臣一時一日之咎也夫紀綱與議論相為盛衰者也紀綱盛則議論衰議論盛則紀綱衰其始以議論而絀紀綱其繼且以紀綱之屈而無所庸其議論得失之故亦可鑒矣若夫二正之宜亡而不亡者輔理之得人也神熹之宜覆而不覆者祖宗之徳澤尚未絶也末季之正氣衰靡者追其本則由於靖難而考其弊亦由於正學日衰人心日漓洙泗濓洛之說不信於天下而浮文以誇於世者多也生之所論一代之是非者如此至於致治之大原可以上佐宸聰下濟蒼生為今日所當效法者則於洪永宣孝之貽謀紹烈加之意可也綏輯國家安初附之人與安久附之人異安初附之人而其衆止於千百與安初附之人而其衆至於億萬又異何則久附之人止在有以奠其居而初附之人則在有以謀其生初附之人而止於千百可聚可散而安之也易初附之人而至於億萬散之有不易散之勢聚之有不可聚之憂而其安之也難夫所附之人既衆則安之之法不當執一術惟善用其安之術而不致以我之安之者反生彼之不安亦不至以彼之安者使其土著之不安斯則綏輯之要也今皇上聲教誕敷而呉越閩廣之向化者數十萬執事兢兢焉思所以綏輯之術生謂綏輯之者無他亦惟度其人量其地審其勢而無務為一切之法而已則聚而為兵之說可用也但聚之則當度其人之精銳與老弱而以其精銳資干城之用勿以其老弱滋冗兵之累且減緑旗之冗耗者補以投誠之精銳者有增兵之利而無益餉之累斯兩得之道矣抑散而為農之說可用也但散之則當量其地之邊與腹而處之腹地之閑曠如荆襄川陜之城勿處之沿海之邊地如閩廣兩淅之境使之知耕屯之可樂勿復知有風㠶之故習斯永安之術矣抑令歸原籍之議可用也但歸其有可歸者勿歸其無可歸者使生於閩者歸閩然有生閩而閩無可歸者勿强之使閩生於粤者歸粤然有生粤而粤無可歸者勿强之使粤斯善全之䇿矣夫如是則可兵而兵可農而農可聚而聚可散而散在彼之求安者不一其情在我之安之者亦不一其術在我既無强而安之之擾在彼自無不安其所之念上則不以冗食者病國下復不以搔擾者病民生故曰度其人量其地審其勢而無務為一切之法也不然而區區焉挾一術以處之使之為兵則願為兵者安矣而不願為兵者不且以行伍為困乎使之為農則樂於為農者安矣而不樂於為農者不且以耒耜為苦乎使之歸籍則有可歸者歸矣而無可歸者不且以桑梓為累乎以云强置則可矣豈所語於柔逺之碩畫也哉保泰會墨自古明良相與未有不各盡其心而能成泰交之盛者也故在上者必有鼓舞之實而不徒恃乎下之精白在下者必有精白之心而不徒恃乎上之鼔舞夫誠盡乎鼓舞之實則雖中人且知自勵矣况其本能精白者乎誠盡乎精白之心則雖中主且必感動矣况其本能鼓舞者乎使上之人不知有鼔舞之實而徒欲以精白望之下下之人不知有精白之心而徒欲以鼓舞望之上其始也上與下有相諉之念其既也上與下有相伺之心而欲以保泰也難矣故唐虞三代之盛也吾不徒曰唐虞三代之君為之亦不徒曰唐虞三代之臣為之漢唐宋之盛也吾不徒曰漢唐宋之君為之亦不徒曰漢唐宋之臣為之蓋其君臣能各盡其心焉耳今我皇上孜孜圖治日與諸臣講求治理可謂有鼔舞之實矣在廷諸臣啓沃獻替定大議決大疑可謂有精白之心矣然生以為鼓舞之道無窮精白之心亦無盡則所以保泰而成一徳一心之治者誠不可不求其道也夫上之御下其道不一而莫貴乎誠下之事上其道不一而亦莫貴乎誠向者治化初基積習難盡上不能無綜核之心下不能無顧忌之念故内外臣工推諉之意嘗多而擔荷之力嘗少身家之慮嘗重而忠愛之情嘗淺今皇上坦然一出於寛大在廷莫不感激思奮矣生以為保泰之道無他亦惟皇上即此寛大之心而廣之與天下相繩於名法之中不若與天下相漸於禮義之内也與天下相習於猜疑刻急之風不若與天下相安於坦易含𢎞之化也雖寛嚴繁簡隨事不同而要無一日不以忠厚長者之道待其下則上之待下誠矣抑惟諸臣即此感激之意而純之以堯舜吾君自矢而勿徒避乎文法以匹夫不獲為恥而勿徒思保其禄位雖將順匡弼隨事不同而要無一日不以靖共匪懈之志事其上則下之事上誠矣下之事上誠而上不感其精白者未之有也上之待下誠而下不感其鼓舞者未之有也上之鼔舞足以感乎下下之精白足以感乎上是即古都俞吁咈拜稽颺言之盛也是即古之陳治安而進十思十漸三劄五規之風也而猶患堂陛之或隔交孚之無具歟故曰泰交之道在各盡其心而已矣察吏今之言安民者無不知其本在察吏矣顧不得察吏之人則吏不可得而察也不善乎察吏之法則察吏之人亦不得盡其察吏之能也察吏之人則督撫是矣察吏之法則考成之條是矣以察吏責督撫而督撫所守者考成之法也考成之法嚴則督撫不得不嚴矣考成之法寛則督撫不得不寛矣考成之法寛而寛之中有嚴則督撫亦可嚴以濟寛矣考成之法嚴而嚴之中有寛則督撫亦可寛以濟嚴矣故督撫不得其人固足以病考成而考成之法未極其善亦足以困督撫而使不得展其能然則今日為察吏計督撫固不可不擇而考成之法亦不可不稍為變通也欲擇督撫則在嚴之廷推之時而勿徒拘其資格澄之甄别之時而勿徒循其故事使為督撫者皆公正而不私則貪墨可以盡糾賢能可以盡舉預征雜派可以盡禁察吏之實在是矣然督撫能察吏而不能違考成之法以察吏考成之法向惟重乎錢榖盜案今則兼重乎興亷夫使天下皆亷吏則自能撫字以厚民生而錢糧可以無缺敷教以善民俗而盜案可以永清故興奬亷吏即所以為錢糧盜案計法誠善也然亷吏雖有益於錢糧盜案而不能必其目前無絲毫之欠與夫一夫之未獲督撫雖心知其賢而有違乎考成之條則不惟不敢舉而叅罰且隨之天下見亷者之不盡舉而不免乎叅罰則不知亷之足重是以舉亷之令雖下而吏不加勸竊以為考成之法當權其輕重以為寛嚴於至嚴之中不妨稍有所寛使亷吏有以自見而為督撫者亦可以伸其舉亷之意今夫錢糧盜案固不可不重然其絲毫之欠與夫一夫之未獲不足為錢糧盜案病而其人卓然有守可以風勵天下則宜令督撫破格奬薦不為文法所拘天下見吏之亷雖有小疵猶為上之所拔則自踊躍於亷相與勉為賢能而恥為貪墨民風日淳民生日厚錢糧自清盜案自靖既無榖賤傷農之患亦無縱盜諱盜之弊其與夫拘牽文法使亷吏困阨而上下交病者果孰得而孰失也誠欲實興吏治以仰副皇上奬亷之至意道無踰此矣治法治天下不可無畫一之法以垂之久逺也然欲垂之極其逺必先講之極其精講之之道亦折𠂻於人心之所安而已蓋天下之大百世之逺其事變紛紜不可以預度而人心之所安者則一也得其心之所安故定之朝廷而天下莫敢易定之一日而百世莫敢易非天下後世不能易其法也不能易其心之所安者已耳周禮一書為古今治平之準而漢唐之法或大綱正而萬目未盡舉或萬目舉而大綱未盡正是豈漢唐之法獨遜乎周哉周之所定合乎人心之所安而漢唐之所定未合乎人心之所安也我國家本以淳簡致治而邇來條例日增上未知所守下未知所從一法不效輒更一法法之變未有已也則倣會典舊例勒為全書以昭一代之制誠今日急務矣然生以為非折𠂻於人心之所安則今之所謂畫一者未必非即異日變更之端而求其簡要者適滋其繁叢也夫欲折𠂻於人心之所安則其心必至公公則能盡合好惡之正而不徇乎已私其心必至虚虚則能愽訪利病之源而不執乎成見其心必至慎愼則能曲當乎事理而不忽其細微是惟皇上以至公至虚至仁至愼之心總持於上而大小羣工各靖其心以佐議於下然後合古今之制而叅之酌新舊之例而定之視前代法之善者何在則從而法其善其弊者何在則從而革其弊舊例可從則不妨舍新而從舊新例茍善則不妨置舊而從新寛嚴必得其中也緩急必揆其當也詳略必審其宜也見其利也而興之而興利者或即為害之所伏則無徒徇乎目前之利見其弊也而去之而去弊者或又為弊之所生則無徒徇乎去弊之名如是則其所因者皆人心所欲因者也所革者皆人心所欲革者也行之一時而一時安焉行之萬世而萬世安焉雖與周官相表裏可矣又何患條例之日增而參差窒礙也哉雖然治天下者法也行法者人也法可以預立而人不可以預定故一明之會典也洪永以之而治啓禎以之而衰非法之有異行法之人有異耳夫欲法可世守則在乎酌古準今欲人之能世守其法則在乎廣教化重詩書是又惟皇上與羣工明道敦倫以興起百世則法立而子孫世世守之不替矣養士士之氣係乎上之所養也上之養士又貴因乎其氣蓋士之氣不能有正而無偏有純而無雜惟上之人因其氣之所在而有以養之使偏者皆歸於正雜者皆歸於純此虞周所以盛也茍不知所以養之其始也任其偏且雜焉及其弊則從而盡矯之故有一時焉其偏且雜者在是則又有一時焉其偏且雜者在彼士氣愈變而愈下此戰國兩漢晉魏所以不振也虞周之養士也教之於未用之日而䇿之於既用之後直寛剛簡使各協於中而止使戰國承春秋之末士尚竒謀而以凌鑠王矦為事其氣傲西漢矯戰國之弊辱儒慢士使天下之士俯首而就功名其氣懦東漢矯西京之弊崇奬髙尚使天下之士抗志而言名節其氣激晉魏又矯東漢之弊賤禮法而崇恬退其氣放方其弊也惟恐其矯之不速及其矯之而弊又甚於前由是觀之則善士習者與其矯之而愈逺於正何如養之使漸歸於正也與其矯之而愈至於雜何如養之使漸底於純也我國家初承明季之習士氣浮誇不得不稍示裁抑而士風日趨於下砥礪亷隅者百不得一而刓方為圓者比比而是茍可以獲利不知復有禮義也茍可以進身不知復有亷恥也向以激昂為髙者今且以逢迎為髙矣向以虚名為尚者今且以貪鄙為尚矣生竊以為前之矯之者似乎太過而養之之道不可不盡於今也養之之道其原在學校其要在銓選而尤在皇上之一心學校者士之所從出也學校之所重在篤行而無取乎浮文則士必以節操為尚矣銓選者士之所自集也銓選之所重在端方而無取乎奔競則士必以卑汗為恥矣而皇上於正直忠厚之士時有以愛惜而保全之略其小過而取其大節法令所加要以抑其浮誇而止而勿過為摧折使士之方嚴者常進依阿者常退則士氣日振士風日古而禮義亷恥以勸懲維之有餘矣雖然勸懲者可以維其外未足維其内天下之士因勸懲而丕變雖能自納於禮義亷恥之中而未必其心之所安也則養之以勸懲又不若養之以教化乎誠端極於上而又務崇正學以風示天下使士知中正之道不可一日而離相與勉為忠厚而恥為浮薄勉為正直而恥為茍容則雖虞周之化無以加兹矣治河自河淮之合也而治淮即所以治河治淮以治河者惟在淮之能制河而已蓋淮自桐栢而東至清口而與河合淮之勢足以敵黄則合流而東自可以無患茍淮弱不足敵黄則清口必淤淮不能東出而且潰而南矣即清口未淤而淮退則黄進淮愈退則黄愈進黄淮合而倒灌於髙寳之閒則淮揚一帶民罔寧居而運道遂由之而梗固其所也然淮之勢有强弱者非盡水勢之自然而人事有以致之蓋淮自清口以下則欲其易洩而在清口以上則又不欲其旁洩淮流盡出於清口其勢所以强也旁洩於清口以上其勢所以弱也故前代於鳯泗閒多築閘壩凡以遏淮之流使俱出於清口耳自鳳泗之閘壩不修而淮流分矣淮流分則清口之勢微而淮弱不足敵黄固其所也今欲使黄淮之順其道則莫若使淮足敵黄欲淮之敵黄則莫若使其上流之不洩欲淮上流之不洩則莫若修鳳泗之閘壩鳳泗之閘壩修則清口之流盛矣清口之流盛則黄淮之勢順矣此今日治淮以治河之要務也然海口未濬則淮雖能與河合於清口而未必能與河同入於海下流既淤則上流必潰淮潰而南河潰而北則桃宿以南髙寳以北未有寧宇也故疏濬海口之說亦今之不可不行者矣然河之潰也必由於沙淤故善治河者必以隄束水以水刷沙使河常無沙淤之患則濱河州縣自無河決之患故築歸仁隄遏睢湖諸水以入白洋河口亦今之不可不行者矣誠使河上諸臣酌其緩急擇其勢之至急者行之而以次徐及焉不必拘賈讓之三䇿不必泥宋禮劉大夏之成迹惟使淮治而河治河治而漕治則淮揚之民可免昏墊漕艘且安行而入董口豈不國與民交受其利而可釋我皇上宵旰之憂哉然而不議其經費專其責成則民雖免於河患而不免於治河之患是又當合漕臣與河臣總計之委曲以措辦專任以圖功而勿輕開加派之端勿競生推諉之途則䇿之善者矣夫既有治河之利而又無治河之害則平成之績雖與神禹同稱可也豈區區塞瓠子塞東郡者可比量也哉殿試䇿庚戌科臣對臣聞聖王之治天下莫先於正人心人心正然後法度可行法度行然後天下可得而治也唐虞三代之法非有異於後世也然法立於上而治效即臻者蓋其時上之道徳隆而教化洽其感人也深而道之也至天下之人漸摩於禮義亷恥之中者蓋已久矣是故立法以安民則人莫不守其安民之法立法以興賢則人莫不守其興賢之法立法以一文武則人莫不守其一文武之法立法以飭吏治裕國用則人莫不守其飭吏裕國之法此所以世運亨而治臻於郅隆也使唐虞三代不能先正其人心則其法之弊亦與後世等耳法寛而弊可生於寛之中者法嚴而弊即伏於嚴之内法無定而人得因其無定者以為姦法有定而人即因其有定者以滋弊雖有聖人豈能善其後哉然則治天下之道從可知矣未有法不立而能治者也未有人心不正而能行法者也是故恃法不如恃徳議法不如議教徳教立則人心正人心正則法無不行矣欽惟皇帝陛下智勇天錫寛仁性生重道敦倫文教誕敷於四海立綱陳紀聲靈丕振於九圍固與堯舜並其光華與天地同其髙厚乃徳雖至矣猶以為未至治雖盛矣猶以為未盛進臣等於廷諮以安民興賢之道一文武飭吏治通漕運之方以臣之愚陋何敢輕言天下之得失然狂夫之言聖人擇焉泰山不棄土壤河海不擇細流陛下有泰山河海之量臣敢不盡其土壤細流之益臣聞孔子曰道之以政齊之以刑民免而無恥政刑者法之謂也所以束人之身者也又曰道之以徳齊之以禮有恥且格徳禮者修於身而教於人者也所以感人之心也束其身則人不敢犯感其心則人不忍犯其為不犯同也而淺深難易之閒不可同年語矣先王知其然故其為治也不在乎以法整齊天下而在乎以徳化導天下不在乎使人畏吾法而在乎使人服吾教今陛下立法更制九年於兹矣有意於安民而民至今猶未盡安有意於興賢而賢至今猶未盡興而且文武未獲實效吏治未獲澄清漕運未能以時修濬意者求於法者詳而所為崇徳教以正人心者有未至乎伏讀制䇿有曰欲家給人足以成豐亨樂利之休何道而可臣觀今日安民之法不可謂不至矣逋欠之時蠲也賑恤之時聞也預征私派火耗常例悉禁也即今之法安今之民天下之民宜無不可安矣然惠之出於上者未必盡被於下禁之立於上者未必盡行於下功令之所著郡邑違之郡邑之所行猾胥撓之上之設法以利民者無不至下之為弊以戕民者亦無不至由是觀之則天下之民非區區之法所能安也伏讀制䇿有曰士風尚未近古以致吏治不清民生未遂臣觀今日興賢之法不可謂不至矣經術之已崇也科目之已重也頒於學宫者莫非古造士之方登於天府者莫非古闢門之制即今之法興今之賢天下之賢宜無不可興矣然賢者不必盡登登者不必盡賢禁鑽營也而鑽營因之而愈甚抑浮偽也而浮偽因之而愈生正誼明道者衆指為迂闊寡亷鮮恥者共賞其適時上之課士者屢易其法下之奔競者亦屢易其術由是觀之則天下之賢非區區之法所能興也伏讀制䇿有曰禮樂之彦韜鈐之臣兼收並重何以簡用得人臣觀今之所以責成文武者其法亦不可謂不至矣制科則兼重也事權則不相統也有督臣以總攝之有撫提以分轄之有京察以核文吏有戎政以核武弁有不時之糾劾以震攝文武之心即今之法用今之人宜乎文皆亮采之佐武盡干城之選矣然在文吏則推諉之意嘗多擔荷之力嘗少在武弁則身家之慮嘗重宗社之計嘗輕上之求之者以實下之應之者以名由是觀之則文武之臣亦非區區之法所能用矣至於督撫守令之係於民生也黄運兩河之關於國計也皆天下至重而朝廷之設法以責之者亦已至矣然在督撫守令則以䝉蔽為老成以黨同為敦厚茍可以合考成之條則朘民膏而不惜茍可以避叅罰之咎則殘民命而不顧在黄運兩河則有修之名未必有修之實有濬之名未必有濬之實一隄方成一隄復潰一水方通一水復塞由是觀之則是二者亦豈區區之法所能責其效哉夫法者治之迹而非所恃以為治也為治而責恃乎法自古及今未有能治者臣非欲陛下廢法而治也竊以為法之及人也淺徳之及人也深法之禁人也難教之化人也易故有徳不可無法有法尤不可無徳有教不可無法有法尤不可無教此萬世不易之理亦當今救時之急務也今日之治茍非崇徳教以正人心雖日議法無益矣伏願陛下日新其徳以堯舜禹湯文武之心為心以堯舜禹湯文武之學為學兢兢焉翼翼焉有勿言言則必可使天下共法也有勿動動則必可使天下共則也如此則朝廷之上四海之内莫不仰聖徳之髙深不待家諭户訓而人心已動矣於是務敦教化一如古者司徒黨正三物六行之制盡其實而勿徒循其名天下之人既動於上之徳而又習於其教則自相漸以仁相摩以義相勉以忠厚而恥為浮薄相勸以正直而恥為邪僻不待法之驅而人皆有君子長者之心由是立法以興利則人莫不安於上之所興立法以去弊則人莫不安於上之所去行一法而有一法之利者更一法而有更法之利天下之民由是而可安天下之賢由是而可興天下之文武由是而可用以之飭吏治則督撫守令必不敢欺上以剥下以之通漕運則黄運兩河必能以時而修濬郅隆之治庶乎其可成矣此正人心之效也使不先正夫人心而徒恃乎區區之法議法者日益精而刓法者日益巧一法不效輒更一法法之變未有已也雖然臣猶有進焉夫天下之人相遁於法也始於其心之不正亦由於其用之不足書曰凡厥正人既富方榖管子曰衣食足而禮義生今之大吏禄薄不足以給其費則思借法以自肥今之小吏俸微不能以養其家則思干法以為姦其罪可誅而其情可憫夫人方戚戚不能保其生則雖有徳化豈能發其禮義亷恥之心哉宜乎法出而姦生令下而詐起也是又在陛下倣古待臣之禮稍重其禄使之有以自給而又禁其淫靡定其車輿服飾之制嚴其宫室飲食之節勿使耗於無用夫既有以養之又無以耗之則為士大夫者皆充然有餘無皇皇不足之憂自然奉公守法竭心力以效忠於陛下然後徳教可行人心可正而郅隆之治可成也夫養以先之教以繼之徳以動之法以董之四者缺一而能治者未之有也陛下誠加意於臣之言務其全勿務其偏則治道備而治化成萬世子孫長享聖澤於勿替矣臣草茅新進罔識忌諱干冐宸嚴不勝戰慄隕越之至臣謹對三魚堂外集巻二
