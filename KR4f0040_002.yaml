body:
  text: 三魚堂文集卷二贈內閣學士陸隴其撰雜著學術辨上漢唐之儒崇正學者尊孔孟而已孔孟之道尊則百家之言熄自唐以後異端曲學知儒者之尊孔孟也於是皆託於孔孟以自行其說我曰孔孟彼亦曰孔孟而學者遂莫從而辨其是非程朱出而崇正闢邪然後孔孟之道復明而天下尊之自宋以來異端曲學知儒者之尊程朱也於是又託於程朱以自行其說我曰程朱彼亦曰程朱學者又莫從而辨其是非程朱言天理則亦言天理天理之名同而其所指則霄壤矣程朱言至善則亦言至善至善之名同而其所指則冰炭矣程朱言靜言敬則亦言靜亦言敬靜敬之名同至所以為靜敬則適越而北轅矣程朱之言有可假借者則曰程朱固若是也有不可假借者則曰此其中年未定之論也黑白淆而雅鄭混雖有好古篤志之君子力扶正學亦止知其顯叛程朱之非至其陽尊而隂篡之者則固不得而盡絶矣蓋其弊在宋元之際即有之而莫甚於明之中葉自陽明王氏倡為良知之說以禪之實而託儒之名且輯朱子晚年定論一書以明已之學與朱子未嘗異龍溪心齊近溪海門之徒從而衍之王氏之學遍天下幾以為聖人復起而古先聖賢下學上達之遺法滅裂無餘學術壞而風俗隨之其弊也至於蕩軼禮法蔑視倫常天下之人恣睢橫肆不復自安於規矩繩墨之內而百病交作於是涇陽景逸起而救之痛言王氏之弊使天下學者復尋程朱之遺規向之邪說詖行為之稍變然至於本源之際所謂陽尊而隂篡之者猶未能盡絶之也治病而不能盡絶其根則其病有時而復作故至於啓禎之際風俗愈壞禮義掃地以至於不可收拾其所從來非一日矣故愚以為明之天下不亡於寇盜不亡於朋黨而亡於學術學術之壞所以釀成寇盜朋黨之禍也今之說者猶曰陽明與程朱同師孔孟同言仁義雖意見稍異然皆聖人之徒也何必力排而深拒之乎夫使其自外于孔孟自外于仁義則天下之人皆知其非又奚待吾之辨惟其似孔孟而非孔孟似仁義而非仁義所謂失之毫釐差以千里此其所以不容不辨耳或又曰陽明之流弊非陽明之過也學陽明之過耳程朱之學豈獨無流弊乎今之學程朱者未必皆如敬軒敬齊月川之絲毫無疚也其流入于偏執固滯以至僨事者亦有矣則亦將歸罪程朱乎是又不然夫天下有立教之弊有末學之弊末學之弊如源清而流濁也立教之弊如源濁而流亦濁也學程朱而偏執固滯是末學之弊也若夫陽明之所以為教則其源先已病矣是豈可徒咎末學哉學術辨中陽明以禪之實而託于儒其流害固不可勝言矣然其所以為禪者如之何曰明乎心性之辨則知禪矣知禪則知陽明矣今夫人之生也氣聚而成形而氣之精英又聚而為心是心也神明不測變化無方要之亦氣也其中所具之理則性也故程子曰性即理也邵子曰心者性之郛郭朱子曰靈處是心不是性是心也者性之所寓而非即性也性也者寓於心而非即心也先儒辨之亦至明矣若夫禪者則以知覺為性而以知覺之發動者為心故彼之所謂性則吾之所謂心也彼之所謂心則吾之所謂意也其所以滅彛倫離仁義張皇詭怪而自放於準繩之外者皆由不知有性而以知覺當之耳何則既以知覺為性則其所欲保養而勿失者惟是而已一切人倫庶物之理皆足以為我之障而惟恐其或纍宜其盡舉而棄之也陽明言性無善無惡蓋亦指知覺為性也其所謂良知所謂天理所謂至善莫非指此而已故其言曰佛氏本來面目即我門所謂良知又曰良知即天理又曰無善無惡乃所謂至善雖其縱橫變幻不可究詰而其大㫖亦可睹矣充其說則人倫庶物固於我何有而特以束縛於聖人之教未敢肆然決裂也則又為之說曰良知苟存自能酬酢萬變非若禪家之遺棄事物也其為說則然然學者苟無格物窮理之功而欲持此心之知覺以自試于萬變其所見為是者果是而見為非者果非乎又况其心本以為人倫庶物初無與于我不得已而應之以不得已而應之心而處夫未嘗窮究之事其不至於顛倒錯謬者幾希其倡之者雖不敢自居於禪隂合而陽離其繼起者則直以禪自任不復有所忌憚此陽明之學所以為禍于天下也涇陽景逸深懲其弊知夫知覺之非性而無善無惡不可以言性其所以排擊陽明者亦可謂得其本矣然其學也專以靜坐為主則其所重仍在知覺雖云事物之理乃吾性所固有而亦當窮究然既偏重於靜則窮之未必能盡其精微而不免於過不及是故以理為外而欲以心籠罩之者陽明之學也以理為內而欲以心籠罩之者髙顧之學也陽明之病在認心為性髙顧之病在惡動求靜我觀髙子之論學也言一貫則以為是入門之學言盡心則以為盡心然後知性言格物則曰知本之謂物格與程朱之論往往齟齬而不合者無他蓋欲以靜坐為主則凡先儒致知窮理存心養性之法不得不為之變易夫靜坐之說雖程朱亦有之不過欲使學者動靜交養無頃刻之離耳非如髙子困學記中所言必欲澄神默坐使呈露面目然後有以為下手之地也由是觀之則髙顧之學雖針砭陽明多切中其病至於本源之地仍不能出其範圍豈非陽明之說浸淫于人心雖有大賢不免猶蹈其弊乎吾嘗推求其故天下學者所以樂趨於陽明而不可遏者有二一則為其學者可以縱肆自適非若程朱之履繩蹈矩不可假借也一則其學專以知覺為主謂人身有生死而知覺無生死故其視天下一切皆幻而惟此為真故不賢者既樂其縱肆而賢者又思求其無生死者此所以羣趨而不能舍嗚呼縱肆之不可易明也至於無生死之說則真禪家之妄耳學者取程朱隂陽屈伸往來之論潛心熟玩焉其理亦彰彰矣奈何不此之學而彼之是惑乎學術辨下自陽明之學興從其學者流蕩放佚固有之矣亦往往有大賢君子出於其間其功業足以潤澤生民其名節足以維持風俗今曰陽明之學非正學也然則彼皆非歟若夫明之末季潰敗不振蓋氣運使然豈盡學術之故也明之衰可以咎陽明宋之衰亦將咎程朱周之衰亦將咎孔孟乎是又不然周宋之衰孔孟程朱之道不行也明之衰陽明之道行也自嘉隆以來秉國鈞作民牧者孰非浸淫於其教者乎始也倡之於下繼也遂持之於上始也為議論為聲氣繼也遂為政事為風俗禮法於是而弛名教於是而輕政刑於是而紊僻邪詭異之行於是而生縱肆輕狂之習於是而成雖曰喪亂之故不由於此吾不信也若其間大賢君子學問雖偏而人品卓然者則又有故蓋天下有天資之病有學術之病有天資僻而學術正者有學術僻而天資美者恆視其勝負之數以為其人之髙下如柴之愚參之魯師之僻由之唁而卒為聖門髙弟此以學勝其天資者也如唐之顏魯公宋之富鄭公趙清獻皆溺于神仙浮屠之說而志行端方功業顯赫為唐宋名臣此以天資勝其學術者也人見顏富諸公之志行功業則以為神仙浮屠之無損於人如此且以為諸公之得力於神仙浮屠如此是何異見氣盛之人冒風寒而不病而謂不病之得力於風寒善飲之人多飲而惺然而謂惺然之得力於多飲豈其然乎今自陽明之教盛行天下靡然從之其天資純粹不勝其學術之僻流蕩忘返者不知凡幾矣間有卓越之士雖從其學而修身勵行不愧古人是非其學之無弊也蓋其天資之美而學術不能盡蔽之亦如顏富諸公學於神仙浮屠而其人其行則非神仙浮屠之可及也是故不得因其學而棄其人亦豈可因其人而遂不敢議其學哉且人但見顏富之品行卓犖而不知向使其不溺於異學則其所成就豈特如此而已但見明季諸儒為王氏之學者亦有大賢君子出其間而不知向使其悉遵程朱遺法不談良知不言無善無惡不指心為性不偏於靜坐不以一貫盡心為入門不以物格為知本則其造詣亦豈僅如是而已耶譬諸日月之蝕然不知其所虧之已多而但指其僅存之光以為蝕之無傷于光豈不誤乎嗚呼正學不明人才陷溺中人以下既汨沒而不出而大賢者亦不能自盡其才可勝歎哉恆山辨恆山之辨紛紛不一康熙甲子秋余以書問于唐縣鄭昱鄭答云太行綿亘數千里恆山自太行分支大茂山則恆山之一峯非專指此為恆山余聞其言乃知禹貢以太行恆山並言猶之西銘本從正䝉出而言橫渠之書者並稱西銘正䝉耳至大茂山之為恆山猶之乾稱父坤稱母此二語為西銘之文而西銘之文則固非止此二語也天下山川之名有分有合大抵如斯紛紛之論皆知其一不知其二者也如大伾山在濬縣東南二里不與西山諸山相接則異乎恆山太行矣滹沱河辨按漢書地里志以滹沱為禹貢九河之徒駭蔡九峯謂滹沱不與古河相涉而取酈氏程氏之說謂九河之地已淪於海深州志載嘉靖時深州知州山隂錢楩云班固以滹沱為徒駭未必無據禹時黃河北流西山諸水皆東注入河滹沱其一也滹沱正在大陸北不得謂與古河不相涉九河即恆山以東諸水逆河即易水逆與易音相近呼稍訛耳黃河自南而北易自北而南故曰逆河相合東行趨入直沽故曰同為逆河入于海蓋直以今保定真定諸水為九河逆河皆天作之川禹特疏而合之而非分河之謂也又謂漢唐諸儒以九河在滄州南皮東光間者皆非滄州南皮東光皆在大陸正東且濵海矣又何藉于分播耶大陸北播經有明文滹沱為北播之始易水為北播之終其說似是但如此則禹貢九河既道之文應在冀州不當在兗州矣先儒求之東光南皮之間又求之碣石之海而謂滹沱與古河不相涉豈無謂哉洪荒之事本難臆斷存之以備一說可也黍稷辨良耜詩曰載筐及筥其餉伊黍鄭氏箋云筐筥所以盛黍也豐年之時雖賤者猶食黍孔疏云少牢特牲大夫士之祭禮食有黍明黍是貴也玉藻云子卯稷食菜羮為忌日貶而用稷是為賤也賤者當食稷耳黍離詩孔疏云黍言離離稷言苗則是黍秀稷未秀出車詩云黍稷方華二物大時相類但以稷比黍黍差為早朱子詩傳云稷似黍而小爾雅云粢稷邢疏云左傳粢食不鑿粢者稷也曲禮云稷曰明粢是也郭注今江東人呼粟為粢然則粢也稷也粟也正是一物而本草稷米在下品别有粟米在中品又似二物故先儒甚疑焉今按真定府志有粟有黍有稷而稷下注云土人咸以飯黍為稷愚嘗合而觀之黍貴而稷賤黍早而稷晚黍大而稷小黍穗散而稷穗聚稷即粟也今俗所謂小米者稷也所謂黃米者黍也黍有粘有不粘不粘者飯黍也粘者釀酒之黍也其辨甚明自土人以飯黍為稷而黍稷粟之辨遂淆然本草已分稷與粟為二種則其相沿之訛非一日矣天啓時新城王象晉作羣芳譜近時江右張自烈作正字通亦皆指飯黍為稷甚矣俗訛之難辨也真定府志輯於雷禮雷博物多聞一言而解先儒之惑善哉小雅甫田疏又云春官肆師注粢六穀也則六穀總為粢天官甸師注粢稷也惟以稷為粢者以稷是穀之長為諸穀之總名愚按稷賤而小然為穀之長者以其多歟今土人獨指粟為穀豈非亦以其為穀之長而專此名歟稷之為粟更無疑矣靈夀春秋祭至聖先師以飯黍當稷而不用粟是無穀之長也可乎又稷有别種穗如狗尾草而味最美者謂之粱詩維糜維芑注云糜赤粱粟芑白粱粟是也朱子鴇羽詩注亦云粱粟類也明㑹典載祭先師用黍稷稻粱是此粱今或以髙粱當之者亦非至若齊民要術云古者以粟為黍稷粱秫之總稱而今之粟在古但稱為粱爾雅翼曰粱者黍稷之總名皆謬論矣可疑者惟朱子詩傳謂黍苗似蘆髙丈餘按黍苗無髙丈餘者此似指髙粱為黍然髙粱雖有蜀黍之名乃别是一種非粱亦非黍也意朱子仍先儒之說而未改歟荼蓼辨苦菜俗名曲曲菜詩謂之苦亦謂之荼按詩正義云爾雅有荼苦菜又有荼委葉弼風誰謂荼苦即苦菜也周頌以薅荼蓼即委葉也鄭於地官掌荼注及既夕注與鄭風有女如荼箋皆云荼茅秀乃是茅草秀出之穗非彼二種荼也依此則弼風之荼與周頌之荼是二物而朱子弼風詩傳云荼苦菜蓼屬也詳見良耜大雅堇荼如飴傳亦云是蓼屬則弼風周頌之荼是一物又正義周頌良耜章王肅云荼陸穢蓼水草田有原有隰故並舉水陸穢草依此則荼與蓼是二物內則云濡豚包苦實蓼亦似是二物而朱子詩傳謂一物而有水陸之異前後儒者所見似不同愚謂草木之類有種一而臭味别者故荼與蓼一物而有水陸之異弼風之荼與周頌之荼一物而有苦菜穢草之異正義以其分者言之朱子以其合者言之非抵牾也或疑蓼亦有陸生者此則必荼之别種俗呼為蓼爾幽閒貞靜解周南之美后妃曰窈窕朱子以幽閒貞靜解之說者謂幽則深潛閒則安重深潛而不淺露安重而不輕佻此貞靜之德容也愚謂后妃初不自知為幽閒貞靜只是如雎鳩之摯而有别雎鳩人未嘗見其乘居而匹處四為乘兩為匹乘居則亂而不摯匹處則狎而無别不摯無别則淺露輕佻之態形焉不貞不靜可知矣摯而有别自不淺露而見其幽自不輕佻而見其閒貞靜可知矣故幽閒貞靜者人之見后妃也摯而有别者后妃所自處也孟子言夫婦有别而不言摯者摯不待言也中庸言經綸大經綸也者摯之謂也經也者有别之謂也漢儒所云歡然有思者摯之謂也所謂粲然有文者有别之謂也然則周南所以為王化之基者無他亦曰摯而有别而已三魚堂文集卷二
