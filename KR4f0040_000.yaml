body:
  text: 三魚堂文集别集類六國朝提要臣等謹案三魚堂文集十二卷外集六卷共十八卷國朝陸隴其撰隴其有松陽講義諸書皆别著録是集為其門人侯銓所編凡雜著四卷書一卷尺牘二卷序二卷記一卷墓表志銘壙記傳共一卷祝文祭文共一卷外集六卷則裒其奏議條陳表策申請公移而終之以詩行狀之類併附録焉目録末原有其從子禮徵跋言隴其生平不屑為詩古文詞尤以濫刻文字為戒故易簀時篋中無遺稿至康熙辛已禮徵乃旁搜廣輯彚成是編而屬銓分類編次之蓋隴其沒後九年此集乃出也其文既非隴其所手定則其中或有未定之稿與夫偶然涉筆不欲自存者均未可知然隴其學問深醇操履純正即率爾操觚之作其不合於道者固已鮮矣惟是隴其一生篤學非徒以講明心性為一室之坐談其兩為縣尹一任諫官政績皆卓卓可紀蓋體用兼優之學而銓等乃以奏議公牘確然見諸行事者别為外集夫詩歌非隴其所長别之外集可也至於聖賢之道本末同原心法治法理歸一貫周禮惟述職官尚書皆陳政事周公孔子初不以是為粗迹即黃幹編朱子集亦未嘗薄視論政之文揮而外之銓乃徒知以太極論冠篇而轉以經世之學視為末務尊空言而薄實政是豈隴其之旨乎此本久行於世今亦姑仍原刻録之其編次之謬陋則不可以不辨焉乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1f38e0fb72d774310176e138a2b3261edb0c86c9401d692901f6044d9facce96
