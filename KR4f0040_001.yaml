body:
  text: 三魚堂文集巻一贈内閣學士陸隴其撰雜著太極論論太極者不在乎明天地之太極而在乎明人身之太極明人身之太極則天地之太極在是矣先儒之論太極所以必從隂陽五行天地生物之初言之者惟恐人不知此理之原故遡其始而言之使知此理之無物不有無時不然雖欲頃刻離之而不可得也學者徒見先儒之言隂陽言五行言天地萬物廣大精微而不從我身切實求之則豈前人示人之意哉夫太極者萬理之總名也在天則為命在人則為性在天則為元亨利貞在人則為仁義禮智以其有條而不紊則謂之理以其為人所共由則謂之道以其不偏不倚無過不及則謂之中以其真實無妄則謂之誠以其純粹而精則謂之至善以其至極而無以加則謂之太極名異而實同也學者誠有志乎太極惟于日用之間時時存養時時省察不使一念之越乎理不使一事之悖乎理不使一言一動之踰乎理斯太極存焉矣其寂然不動是即太極之隂靜也感而遂通是即太極之陽動也感而復寂寂而復感是即太極之動靜無端隂陽無始也寂然之中而感通之理已具感通之際而寂然之體常在是即太極之體用一原顯微無間也分而為五常發而為五事布而為五倫是即太極之陽變隂合而生水火木金土也以之處家則家齊以之處國則國治以之處天下則天下平是即太極之成男成女而萬物化生也合吾身之萬念萬事而無一非理是萬物統體一太極也即吾身之一念一事而無之非理是一物各具一太極也不越乎日用常行之中而卓然超絶乎流俗是太極之不離乎隂陽而亦不雜乎隂陽也若是者豈必逺而求之天地萬物而太極之全體已備於吾身矣由是以觀天地則太極之在天地亦若是而已由是以觀萬物則太極之在萬物亦若是而已天地萬物浩浩茫茫測之不見其端窮之莫究其量而莫非是理之發見也莫非是理之流行也莫非是理之循環而不窮也髙明博厚不同而是理無不同也飛潛動植有異而是理無異也是理散于萬物而萃于吾身原于天地而賦于吾身是故善言太極者求之逺不若求之近求之虚而難據不若求之實而可循故周子太極圗説雖從隂陽五行言之而終之曰聖人定之以中正仁義而主靜立人極焉其示人之意亦深切矣又恐聖人之立極非學者可驟及也而繼之曰君子修之吉修之為言擇善固執之謂也而朱子解之又推本於敬以為能敬然後能靜虚動直而太極在我嗚呼至矣先儒之言雖窮髙極深而推其㫖不過欲人修其身以治天下國家焉耳學者慎無騖太極之名而不知近求之身也理氣論理氣之辨不難乎明萬殊之理氣而難乎明一本之理氣一本之在人心者易見一本之在天地者難知自昔辨理氣者多在于分合先後之間言其合則以分者為支離言其分則以合者為混淆言有先後則不見其合一之妙言無先後則又不見其本末之序此理氣之説所以紛紛不一也然觀朱子曰理不離乎氣亦不雜乎氣則可無疑其分合矣又曰理氣本無先後之可言然必欲推其所從來須説先有是理則又可無疑其先後矣惟有是理則必有理所㑹歸之處有氣則必有氣所統攝之處天下未有無本而能變化無方者未有無本而能流行不竭者而理氣之本果安在哉今夫盈吾身之内者皆氣也而其運於氣之内者理也在目為視在耳為聽在身為貌在口為言君令而臣忠父慈而子孝兄友而弟恭夫婦别而朋友信理氣之萬殊者昭昭矣而其本則在心心也者是氣之精英所聚而萬理之原也故中庸曰喜怒哀樂未發謂之中中也者天下之大本此其為一本易明矣若夫理氣之在天地者人得之為人物得之為物日月以之明星辰以之運山以之峙川以之流鳶以之飛魚以之躍其萬殊者固亦昭昭矣而其本果安在哉嘗試以先儒之言推之程子曰天地無心而成化又曰天地普萬物而無心則似乎天地之為天地浩浩蕩蕩一氣鼓動而理隨之初無本之可言也然易曰復其見天地之心正大而天地之情可見程子亦曰以主宰謂之帝以性情謂之乾張子又有所謂天地之帥而詩書言福善禍淫降祥降殃則是蒼蒼在上者明有主宰故天地者不可謂之有心又不可謂之無心此一本之在天地所以難見也執為有心則恐穿鑿附㑹者多而焄蒿妖誕之説且接迹於天下執為無心則恐戒謹恐懼易弛而福善禍淫之理將不信于天下然則理氣之在天地其一本者果如之何亦曰有心而無心焉耳夫人為天地所生氣以成形必有精英之聚以具衆理而應萬事而謂造物之理氣散漫而無主宰吾不信也主宰之所在一本之所在也然是主宰者無思慮無營為百物自生四時自行可感通而不可諂佞也可昭事而不可矯誣也其降鑒也出王游衍無之不在而不可穿鑿附㑹也是其為理氣之一本者而已莫非天地之理而此則理之所㑹歸也莫非天地之氣而此則氣之所統攝也一本之在人心者能與天地無二則天命之性無少虧欠而萬化之原在是矣程張之所論大易之所稱詩書之所述皆一以貫之而無殊若夫理氣之為分為合一而二二而一不離不雜則朱子之論備矣又何所庸其紛紛之論乎河圗洛書説甚矣好奇者之無窮也先儒之成説不難盡更之而自逞其臆見以為不如是不足以為奇也天下見其説之奇而反疑先儒之未必盡當其惑後學豈不甚哉黄鐘之管九寸自京馬鄭蔡以及洛閩諸大儒皆有定説矣李文利者出獨主三寸九分之説欲盡廢諸儒舊法河圗數十洛書數九自劉向父子班固以及關子明邵康節皆有定説矣劉牧者出獨以九為河圖十為洛書易置圗書與諸儒之説迥異其好奇逞臆豈非同一揆耶愚嘗反覆朱子河圗洛書之説河圗以五生數統五成數而同處其方洛書以五奇數統四偶數而各居其所河圗以生成分隂陽洛書以奇偶分隂陽則河圗者虚其中則洛書者總其實其象其數皆昭然若白黑雖曰圗之理未嘗不可通於書書之理未嘗不可通於圗而各有條理夫豈劉牧之所得亂哉近世儒者又有厭圗書之數繁密而不易究悉欲一切廢之謂河圖洛書雖古有之而未必如今所傳此其説尤似近理而不知其好奇逞臆更甚於劉牧劉牧之説亂圗書而圗書尚存此説行則且以圗書為假偽而凡生成奇偶内外正側之義皆屬無稽朱蔡大儒之尊信且等於漢儒之信偽泰誓其輕於立論而無忌憚何其甚也夫先聖之微言奥義如三墳八索九丘之類不幸而泯滅無傳者固無如何矣幸而如河圗洛書之僅存又欲以私意亂之不幸而無大儒為之論正則亂之者之是非難明幸而有大儒焉表章訂定是非燦然矣又惡其繁宻而欲舉而盡廢之自有此議論而凡古昔聖賢相傳之精意先儒極力闡明者皆視為一家之言學者可不必究心其流弊何所不至哉故吾以為言河圗洛書者有朱子之易學啟䝉在學者潛心而熟玩焉可矣舍是而别自為説皆不知量而侮聖人之言者也閲詹先生太極河洛洪範諸解疑節齋蔡氏云主太極而言則太極在隂陽之先主隂陽而言則太極在隂陽之内盖自隂陽未生而言則所謂太極者其理已具自隂陽既生之時而言則所謂太極者即在乎隂陽之中也此一條雖載性理然似未融盖隂陽無始恐説不得未生既生體用可以分先後隂陽不可以分先後也謂中即夏至一隂始生之火正即冬至一陽始生之水二物始生其體最靜即繫辭傳所説乾坤各有動靜乾以靜專故動直坤以靜翕故動闢乾坤專翕之理于二至之候見之故周子主靜之意不但謂中仁是靜正義是靜愚意繫辭乾坤動靜似以對待者言以對待言則乾之内自具一動靜便自具一中正仁義坤之内亦自具一動靜便亦自具一中正仁義故上經乾坤二卦皆有元亨利貞之文若以流行者言則乾動坤靜中仁乾也正義坤也又安得謂各自有動靜必欲云各有動靜亦只當以正義為乾之靜中仁為坤之靜若二至是隂陽初動之候其動雖微不可謂非動以中正為靜仁義為動恐有未安朱子總論曰中之為用則以無過不及者言之而非指所謂未發之中也斯説似無可疑盖以中正仁義配五行言之則中仁屬木火為陽動時即論其始生之序火本屬隂然生之者微成之者盛圗固以火為陽盛而居左矣中不得為未發之中可知若以夏至之一隂言之此止可謂隂根陽耳亦不得謂之未發至圗説言中正仁義本注言仁義中正雖有始生運行之分而中之屬陽動則固圗之本意也謂耦之為畫二實一虚合耦之三而為一是所謂參天也分奇之一而為􅄲是所謂兩地也此説似直捷然以二實一虚言之則分奇之一而為􅄲亦可謂之參地乎恐不如先儒天圎地方之説為妥謂以天數五地數五之文言之則自一至十皆謂之數可也又以五位相得言之則自一至十皆謂之位可也但本義以一二三四為四象始生之位居圗之内故以位言之六七八九為四象已成之數居圗之外故以數言之位言其生數言其成位言其始數言其終其實位亦數也數亦位也在觀者㑹通其故而自得之非必真有此數箇圏子寄寓于天地之間若者是位若者是數可以表著而指計也又云八卦自一至八只是卦畫已成之次第而非卦畫所生之次第此發明朱子之意至明足為學者指南至圗卦辨疑中欲以河圗生數配陽儀四卦以河圗成數配隂儀四卦此則有所未安盖河圗以生成分隂陽今若以陽儀四卦盡配生數隂儀四卦盡配成數則陽皆配陽隂皆配隂陽生而無成隂成而不生非隂陽相生相成之道似不若仍依朱子以位與數分配洪範一篇金仁山黄石齋二先生所考定雖各有精義然蔡傳只依古本解之亦儘明白似不必方整如後世文字然後可也書傳雖成于九峯之手然多本之朱子盖朱子于此篇未嘗有更定之意故蔡氏亦止依古本作註嘗竊以為諸經在朱子之時誠有不容不更定者至朱子而後不得復紛更如南巢牧野只可許湯武一行元明諸儒往往見朱子於古經不難改易而遂有自闢井疆之意此病非小故不佞平生于吳草廬諸書皆不敢輕信非信目而不信心實以防微杜漸之意不得不爾不知君子以為何如然如金黄二先生之議論則亦不可不存於天地間似應將不宜輕改之意著于篇末庻㡬有以擴學者之胷襟而不開其弊書周易八圗説後我友邵子子昆述其所聞於師者雖與朱子啟䝉小有出入而可相發明吾嘗怪宋儒學易言理者宗伊川言數者宗康節既莫能相一自朱子作本義作啟䝉始合而一之可謂集程邵之大成矣而黄東發猶疑先天之説易書中本無有雖朱子言之甚著明曰易有太極是是兩儀兩儀生四象四象生八卦此先天之卦畫也天地定位山澤通氣雷風相薄水火不相射此先天之卦位也黄氏則曰未見其確然有合觀其所著之日抄中反覆論辨直以康節為穿鑿嗚呼道之難明而人意見之不同如此豈獨一歐陽繫詞非聖人所作哉今邵子解易圗以繫辭為證一本朱子本義啟䝉之意其言卦變言參兩言河圗之相得有合雖小有異同而可相發明然則黄氏之直欲舉先天而廢之者誠過矣古文尚書考經典釋文云伏生失其本經口誦二十九篇宣帝本始中河内女子得泰誓一篇獻之與伏生所誦合三十篇孔疏云武帝時孔臧與安國書曰時人惟聞尚書二十八篇取象二十八宿不知其有百篇也又云史記謂伏生獨得二十九篇以教齊魯馬融鄭𤣥皆謂泰誓非伏生所傳而言二十九篇者以司馬遷在武帝之世見泰誓出而得行入於伏生所傳内故并云伏生所出不復曲别分析但伏生雖無此一篇而書傳有八百諸侯俱至孟津白魚入舟之事與泰誓事同不知為伏生先為此説不知為是泰誓出後後人加増此語又王充論衡及後漢史獻帝建安十四年房宏俱謂宣帝本始元年河内女子得古文泰誓三篇今史漢書皆云伏生傳二十九篇則司馬遷時已得泰誓以并歸於伏生不得云宣帝時始出也或者爾時重得之故于後亦據而言之愚按據釋文則偽泰誓在二十九篇之外據孔疏則偽泰誓在二十九篇之内大抵釋文所云二十九篇是合書序言之孔疏則除序言之又釋文云後漢書謂中興扶風杜林傳古文尚書賈逵為之作訓馬融作傳鄭𤣥注解由是古文尚書遂顯于世案今馬鄭所注並伏生所誦非古文也孔疏云壁内所得孔為傳者凡五十八篇為四十六巻三十三篇與鄭注同二十五篇増多鄭注也前漢諸儒知孔本有五十八篇不見孔傳遂有張霸之徒於鄭注之外偽造尚書凡二十四篇以足鄭注三十四篇為五十八篇其數雖與孔同其篇有異孔則于伏生所傳二十九篇内無古文泰誓除序尚二十八篇分出舜典益稷盤庚二篇康王之誥為三十三増二十五篇為五十八篇鄭𤣥則於伏生二十九篇之内分出盤庚二篇康王之誥又泰誓三篇為三十四篇偽書所増益二十四篇者則鄭注書序舜典一汨作二九共九篇十一大禹謨十二益稷十三五子之歌十四𦙍征十五湯誥十六咸有一德十七典寶十八伊訓十九肆命二十原命二十一武成二十二旅獒二十三冏命二十四以此二十四為十六巻以九共九篇共巻除八篇故為十六故藝文志劉向别録云五十八篇藝文志又云孔安國者孔子後也悉得其書以古文又多十六篇篇即巻也即是偽書二十四篇也劉向作别録班固作藝文志並云此言不見孔傳也劉歆作三統歴論武王伐紂引今文泰誓云丙午逮師又引武成越若來三月五日甲子咸劉商王受並不與孔同亦不見孔傳也後漢初賈逵奏尚書疏云流為烏是與孔亦異也馬融書序云經傳所引泰誓並無此文又云逸十六篇絶無師説是融亦不見也服䖍杜預注左傳亂其紀綱並云夏桀時服䖍杜預皆不見也鄭𤣥亦不見之故注書序舜典云入麓伐木註五子之歌云避亂于洛汭註𦙍征云𦙍征臣名又註禹貢引𦙍征云厥篚𤣥黄昭我周王又註咸有一德云伊陟臣扈曰又註典寶引伊訓云載孚在亳又云征是三朡又註旅獒云獒讀曰毫謂酋毫之長又古文有仲虺之誥太甲説命等見在而云亡其汨作典寶之等一十三篇見亡而云已逸是不見古文也良由孔註之後其書散逸傳註不行以庸生賈馬之等惟傳孔學經文三十三篇故鄭與三家同以為古文而鄭承其後所註皆同賈逵馬融之學題曰古文尚書篇與夏侯等同而經字多異至晉世王肅註書始似竊見孔傳故註亂其紀綱為夏太康時又晉書皇甫謐傳云姑子外弟梁栁得古文尚書故作帝王世紀往往載孔傳五十八篇之書愚案據釋文則馬鄭所註並非古文據孔疏則馬鄭所註止得古文之三十三篇大抵釋文以其未見孔傳之全故云並非古文非謂三十三篇亦非古文也又釋文于舜典仍用王肅本而孔疏則用姚方興所上本今蔡傳從孔疏書古文尚書考後右據陸徳明之經典釋文孔穎達之書正義其言雖小異要之則漢儒如劉歆班固馬融鄭康成之徒以至晉杜元凱皆不曾見古文尚書之全又雜以偽泰誓直至東晉此書方出是以朱子亦嘗疑之謂不應伏生記得者皆難讀凡易讀者皆古文然命蔡沈作書傳卒主古文尚書又嘗謂門人輔廣曰書有易曉者恐是當時做底文字或是曾經修飾潤色來其難曉者恐只是當時説話當時人自曉得後人乃以為難曉耳則是朱子於古文尚書固終信之而不敢疑也惟書小序則斷以為非孔子筆只是周秦間低手人作又云書序不可信伏生時無之而于安國所増二十五篇梅賾姚方興所傳則固與伏生之書並尊不敢以張霸之徒例之也學者無以其晩出而疑之哉至若近世有為石經大學者有為子貢詩傳申公詩説者彼徒見古文尚書晩出得傳思僥倖欺世孰知碔砆美玉不可同日而論也張霸作尚書百兩篇欲託于孔子之百篇班固儒林傳既著其偽又為十六巻二十四篇欲以亂安國之古文固雖載之藝文志謂之古文經後世卒無傳焉偽書果何益哉大學答問八條或問春秋載夏五郭公杞子伯甲戌己丑之類疑則傳疑未嘗輒加増損論語曰君子於其所不知盖闕如也至宋代儒者多以己意删訂經文二程改大學朱子作孝經刋誤夫程朱雖賢不能踰仲尼仲尼不敢改魯史而程朱敢改孝經大學可乎曰春秋紀事之書事不可以臆斷孝經大學言理之書理則可以類推或傳疑或更定固各有其道也經固不可擅改而亦豈可因噎廢食乎曰漢儒校經首禁私易即禮記子貢問樂一章明知錯簡而仍其故文未嘗敢擅為移動但註於其下校經不當如是耶曰朱子何嘗不如是大學雖經更定而仍一一註其下曰舊本在某處此即漢儒之意也曰然則程朱而後諸儒之重定孝經大學者多矣亦有可取者乎曰有程朱之學則可無程朱之學則武斷而已且既經程朱更定聖賢之理如日中天矣復取而紛更之何為耶或問朱子於大學初以為格物只在窮理而補窮理一節於大學之首繼則又疑窮理不可為大學首功必須先涵養而後窮理又補涵養一節於大學之外東補西補不太煩乎曰是當論其補之是不是不當以補為煩也涵養須用敬進學則在致知此聖門一定之程於傳所未言則補之於傳所已言而闕則補之朱子何容心乎如以朱子之補為煩則文周於羲畫之外補彖象矣孔子於彖象之外補十翼矣是亦可以為煩乎或問朱子言古人由小學而進大學其於洒掃應對間持守堅定涵養純熟夫小學何事小子何年洒掃應對何功乃欲督之以涵養教之以持守固已異矣且持守之不足而曰持守堅定涵養之不已而曰涵養純熟信然則是大學聖功緝熙慎獨定靜切琢所難㡬者而于以責之小子將見孩提神聖其説反過于直尋本體專求心學者神奇百倍而欲以過髙之學歸咎他人非平情也曰是何言歟且未論朱子之是非先問如何謂之涵養持守豈以杳㝠昏黙者為涵養乎豈以矯世絶俗者為持守乎若然則朱子之言誠過矣夫所謂涵養持守不越乎日用存心處事接物之間故大學有大學之涵養持守小學有小學之涵養持守貫徹于八條目之中而素習于八條目之先洒掃應對即涵養持守之所在也當洒掃應對而其心主一無適即是涵養當洒掃應對而其心終始如一即是持守事事如此時時如此即是堅定即是純熟何不可責之小子而又何神奇之有若小子不可責之涵養持守則將使之放蕩于禮法之外乎孔子所謂孝弟謹信愛衆親仁學文者皆過髙之論乎是何言歟或問格有數義廣韻註格量也度也玉篇云格至也爾雅云來也至即來意書曰格爾衆庻故注疏訓格物云格來也物猶事也其知于善深則來善物其知于惡深則來惡物若文成以格為格正之格則本説文格正也書曰格其非心是也文成又有格去物欲之説則本之司馬温公扞禦外物解但扞格之格與沮格之格俱音閣如學記發然後禁則扞格而不勝史記廢格事漢書太后議格唐書其議遂格皆讀作閣至若朱子解作窮至宋後為字書者如元人黄公紹輩皆迎合朱子之意而又為小變改作窮究非古義矣朱子借古義至字而加窮字後人取新義窮字而去至字何如據玉篇廣韻諸書作量度解為妥乎曰至也者即量度而至也究也者即至之盡頭處也義本相通何得以朱子之解與陽明一例議之乎或問王心齋語録云格物者格其物有本末之物致知者致其知所先後之知其説如何曰家國天下皆物也身心意亦物也格物之本則於身心意求明德之事格物之末則于國家天下求新民之事謂格物之物即物有本末之物固無不可顧程子有云求之情性固切於身然一草一木亦皆有理不可不察此最説得周宻不教人泛求之天下之物亦不教人盡却天下之物一草一木非必一一察之然亦當觸目而識其理安得拘定且即以格物之物專就身心意家國天下言之與物有本末之物亦有綱領條目之分亦不得混而一之也至于知所先後知字尚淺在知行之前又何得扯入致知内或問大學依古本及董蔡諸儒改本則此謂知本此謂知之至也並非衍文缺文盖謂知本即是知至乃堯舜不徧物之意豈不明白而直截乎曰聖賢之學本末兼該雖有先後之序而非可偏廢也如謂知本即是知之至則是一本之外更别無學以綱領言之但當知有明徳而不必復講新民之方也以條目言之但當知有誠正修而不必復講齊治平之道也可乎故謂本之當先務則可謂知本而不必更求末則不可堯舜之不徧物是言治天下當以親賢為急乃是論緩急非論本末豈大學知本之謂乎朱子所以將此二句斷作衍文缺文此是不易之論董蔡諸儒復將此二句强作不徧物之解未免稍偏然其所認為本者猶未差若陽明之復古本則不過欲借知本二字自伸其良知之説其所認為本者又非董蔡之所謂本矣自陽明而後專以知本為格物者皆不可究詰此二句關係學脉非淺顧涇陽之學于明季諸儒中為近正然作大學通考亦謂此二句非闕文衍文吾不敢附㑹或問古之小學乃冩字之學非泛指小子之學也自朱子認為童學且急著為書而嗣是以後如王應麟之小學紺珠馬端臨之通考焦竑之經籍考皆不以小學專屬字學是一補傳而大學本亡大學本亡而小學且與之俱亡是不可惜乎曰字學固小學也一切童子之學皆小學也是其名固並行而不相悖也故漢書藝文志所云凡小學十家四十五篇者此專指字學也若王制白虎通尚書大傳大戴保傅篇所云小學則泛指童子之學也從來解經者未嘗以此而廢彼安在其亡耶而又何病乎朱子小學書也或問自嘉靖中甬東豐坊偽作石經大學託言魏政始中詔諸儒虞松等考正刻石萬歴時户曹唐伯元上之於朝雖格不行然鄭淡泉顧涇陽諸大儒皆信其説幸近日博聞之士考而正之人始知其偽何淡泉涇陽不如今之儒者也曰豐氏偽作石經偽作子貢詩傳申公詩説前輩早已辨之不待今日也特淡泉涇陽偶未之覺耳且淡泉涇陽何可當也其學問之淵深雖時與朱子相左亦豈俗學可及未可以其信偽石經之誤而盡没其學謂其反不如今人也三魚堂文集巻一
