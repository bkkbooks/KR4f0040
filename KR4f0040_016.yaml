body:
  text: 三魚堂外集卷四贈內閣學士陸隴其撰䇿郊祀郊祀分合之議自漢以來紛紛莫定久矣竊以為皆執其一偏而未博觀乎古人之禮也夫不博觀古人之禮則各操所見而不能相通主乎分者以分為是既知有分而不知有合主乎合者以合為是復知有合而不知有分按其説則皆有可行之理究其歸則皆有難通之失宜其歷千百年而紛紛莫定也夫古之郊祀不專主分亦不專主合周禮所謂冬至圜丘祀天夏至方澤祀地此固主分矣然圜丘而外有孟春祈榖之舉左氏所謂啓蟄而郊是也有孟夏祈榖之舉左氏所謂龍見而雩是也有季秋大享之舉月令所謂季秋大享帝是也一歲而祭天者四而又有因事告祭之舉如舜之類上帝武王之柴望此其間有分有合有其合者以見父母之當並崇而王者事天之心以盡有其分者以見母之不得抗乎父而王者事天之義以備此古人之禮所以盡善而無間也今不考其全而見其合也則以為是必不可分見其分也則以為是必不可合分合之論互峙而不定而典禮之晦也久矣故竊謂今日郊祀之禮分與合當並用不當偏循也分合並用而時勢有難行者則法古人之意而變通其迹可也古者天子出入儀衛簡省而所治不過王畿千里得以盡力於齊祭之事故一歲數出不以為煩後世海內為一皆統於上機務之繁億倍於古而又儀物滋多兵衛盛衆非可一歲而數出也夫分合既當並用而一歲又不可數出莫若以其合者每歲舉之以其分者五嵗舉之分之歲則不必舉其合合之歲則不必舉其分既可伸其父母並崇之念而又無母抗乎父之嫌既得古人分合並用之意而又無一歲數出之擾尚何有異論之難一而典禮之不可定也哉然愚更有進焉蓋今日郊祀之禮宜講求者不獨一分合之議也唐長孫無忌曰三代以來無父子同配明堂者故周不以文王配天者避稷也則配享之義古有定論矣今國家既尊高皇帝而殷薦於南郊必尊章皇帝而侑享於明堂則當折𠂻而論定者此其一也禮曰周之始郊其月以日至其日用上辛則郊之用辛古有定論矣後儒徒泥日至之文而不考用辛之義遂使對越上儀行於閉關不省之侯則當折𠂻而論定者此又其一也夫既有以定其分合之議又有以盡其配享之文正其上辛之吉則郊祀之禮庶乎萬世不易而承天子民之道胥於是焉在矣經學六經者聖人代天地言道之書也六經未作道在天地六經既作道在六經自堯舜以來衆聖人互相闡發至孔子而大備不幸火於秦微言大義幾於湮沒至漢興諸儒索之於燼煨之餘得之於屋壁之中收拾殘編斷簡相與講而傳之於是言六經者以為始於漢矣然漢儒多求詳於器數而濶略於義理聖人之遺言雖賴之以傳而聖人之精微亦由之而湮歷唐及宋至濓洛關閩諸儒出即器數而得義理由漢儒而上遡洙泗然後聖人之旨昭若白日而六經之學於是為盛是故漢宋之學不可偏廢者也然其源流得失不可不辨矣辨其源流猶易辨其得失則難辨漢儒之得失猶易辨宋儒之得失則難欲辨源流取兩漢儒林傳及伊洛淵源録考亭淵源録閲之一展卷而昭昭矣易之始於田何分為施孟梁丘而定於王弼又定於程傳朱本義也書之始於伏生分為歐陽大小夏候而定於孔安國又定於蔡九峰也詩之分為齊魯毛韓而定於鄭康成又定於考亭集傳也春秋之分為公羊榖梁左氏而定於何休范寧杜預又定於胡文定也三禮之始於高堂生戴聖劉歆而定於鄭康成又定於朱子之儀禮經傳通解也漢宋兩代之儒折角奪席於千有餘年之間者可歷歷數諸掌也若論其得失則必有高於諸儒之識然後可辨諸儒之惑有大於諸儒之力然後可以斷諸儒之誤即未能大且髙而不甚相逺然後能窺其堂奧而見其精髓程子所謂身在堂下焉能辨堂上之是非此與徒辨其源流者難易懸殊矣然而辨漢儒猶易辨宋儒則難者漢儒之所爭者不過郊壇之分合禘祫之大小明堂世室之制臯庫雉應之位祥禫之月日律吕之上下皆有迹可尋有數可稽故雖煩而易究至於宋儒之所爭者每在於太極之動靜先天之順逆理氣之離合知行之先後其得者足以救漢儒之支離其失者遂入於佛老之虛無一字之誤認而學術由之而頓變一言之謬解而風俗由之而盡移易所謂失之毫釐差以千里者非好學深思不能辨也然愚謂此不難辨先儒固有定論矣自堯舜而後羣聖輩出集羣聖之大成者孔子也自秦漢而後諸儒輩出集諸儒之大成者朱子也朱子之學即孔子之學故黃勉齋蔡西山之徒從之於前真西山魏鶴山之徒從之於後無異詞也在元則許平仲吳草廬從之在明則薛文清胡敬齋曹月川羅整菴從之無異詞也自姚江之學興而目之為支離指之為影響甚且詆之為楊墨而學者遂惑於所從然其弊也至於流俗敗壞人心陷溺天下崩潰其明效大驗亦可覩矣故愚嘗謂今之論學者無他亦宗朱子而已宗朱子者為正學不宗朱子者即非正學漢儒不云乎諸不在六藝之科孔子之術者皆絶其道勿使並進然後統紀可一而法度可明今有不宗朱子之學者亦當絶其道勿使並進朱子之學尊而孔子之道明學者庶乎知所從矣道統天下之盛衰自道統之明晦始君子之欲維持世教者亦必自辨道統始唐虞三代之世其道不待辨而明者統出於一也唐虞三代而後不辨則不明者統散於下也故董子曰諸不在六藝之科孔子之術者皆絶其道勿使並進然後統紀可一而法度可明居今之世而不明道統之所自在上者何以為臨民出政之本在下者何以為立身行已之方乎今日道統之辨遡其源則本於洙泗而求其要則必宗於宋儒洙泗之學晦而道統息矣宋儒之學晦而洙泗之統息矣明自洪永以後迄於成𢎞其君相之所奉以為政學士之所稟以為式曷嘗不宋儒是兢兢哉故其治隆俗古敻絶漢唐無何異端紛出持身者流入於晉魏講學者迷溺於佛老以方正為迂闊以傳注為塵腐教弛俗敗而宗社隨之生嘗推論及此未嘗不歎息痛恨於嘉隆以來諸儒也今國家方表章聖學而執事以道統下詢且殷殷於有宋諸君子也此真知天下之本務者矣生請因明問而極言之自宋以前非無發明洙泗之傳者也然或語焉而不詳或駁焉而不純荀卿之僻陋也楊雄之艱深也文中子之昧於進退也其不得與道統之傳固無論矣最高者莫如漢之董生唐之韓子然董知正誼明道之旨矣而不免雜於隂陽韓知道德佛老之辨矣而不免昧於性善向非周程張邵朱六子者崛起於宋室則道統或幾乎息後之人雖欲聞洙泗之傳其孰從而辨之故夫此六子者非特有宋一代之光實千百年道統絶續之所係也若論其先後難易則周子倡之於百家異同之時而有廓清之難朱子集之於統緒未一之日而有會通之難二程張邵倡和發明於邪正未判之際則有翼戴之難是六子之統有先後而未嘗有難易也論其始終同異則周子主理而理即數之所起邵子主數而數即理之所寓明道寬和而寬和之中未嘗無嚴厲伊川嚴厲而嚴厲之中未嘗無寬和露才者張子也而才要本於敬則其才為張子之才而非一切浮競之才主敬者朱子也而敬自發為才則其敬為朱子之敬而非曲學小儒之敬是六子之學有始終而未嘗有異同也但非周程張邵則洙泗之學不明非朱子則周程張邵之學不明故生以為漢之世當尊孔子而今之世當尊朱子朱子者周程張邵所自發明而孔子之道所自傳也尊朱子即所以尊周程張邵即所以尊孔子尊孔子而非孔子之術者皆絶其道勿使並進尊朱子而非朱子之説者皆絶其道勿使並進四書五經之注固學者所當奉以為式不敢稍叛矣而凡太極圖通書東西銘皇極經世諸書為朱子所表章者皆列於學宫俾學者肄而習之而又選敦厚有道術者為之師表使之不惟誦其言且法其行如是則天下曉然知宋儒之學為天下之正學為洙泗之真傳而向之嘉隆以來之學得罪於聖教得罪於國家有君國子民蒞官臨政之志者當擯而絶之不可稍有入焉者也將見濓洛關閩之儒接迹於世而凡一切章句之習異端之誣不待痛斥而息矣道統明而國家無疆之休從此出矣愚生竊有望焉䇿學帝王之取士也考之以言試之以功不以功則人之能否不可得而見不以言則人之愚智不可得而辨此對䇿之制所以古今不可易也虞書曰敷納以言又曰敷奏以言此即對䇿之始矣但其時有䇿之實無䇿之名至漢鼂錯公孫𢎞董仲舒之徒以䇿顯於時世遂謂對䇿始於漢其實非也䇿之體與奏疏相為表裏自其立朝之時因事上獻者則謂之疏自其進身之始承問敷對者則謂之䇿就漢言之如賈山之陳至言賈誼之論治安此疏也即䇿也若鼂錯公孫𢎞董仲舒所對此䇿也即疏也對䇿之制誠古今不可易乎今皇上罷黜八股特崇䇿學此直上法唐虞非特為漢唐所為而已然欲收䇿之益必去䇿之弊欲收其益而不去其弊則將羣而為剽竊為空疏為雜霸為迂闊如執事所慮者雖然愚以為此不足慮也但在主試者嚴去取辨真偽則其弊自去矣何則士之所以為剽竊者以剽竊之售也剽竊之所以售者以其似於淹博也夫剽竊之與淹博易明也淹博之文出入今古而不嫌其煩究極天人而不嫌其奧巨細畢陳精粗悉備而不嫌其雜剽竊者竊其貌不能竊其神飾於此不能不露於彼迥然不侔也誠有以辨之而去取之則淹博者出矣淹博者出則剽竊者退矣而何有於剽竊之弊士之所以為空疏者以空疏之售也空疏之所以售者以其似於清通也夫空疏之與清通易明也清通之文淺言之而自深質言之而自文粗言之而自精空疏者舉其一不知其二見其偏不知其全迥然不侔也誠有以辨之而去取之則清通者出矣清通者出則空疏者退矣而何有於空疏之弊士之所以為雜霸為迂闊者以雜霸迂闊之售也雜霸迂闊之所以售者以其似通達似正直也夫雜霸之非通達迂闊之非正直易明也通達之言必依仁義而雜霸則刻核而已正直之論必切時宜而迂闊則塵腐而已迥然不侔也誠有以辨之而去取之則通達正直者出而雜霸迂闊者退矣何有於雜霸迂闊之弊愚故曰此皆不足慮也若夫愚之所慮則有在矣夫士之抱所學以進獻於上者非徒貴明其理又貴養其氣氣不壯則雖有積學鴻儒退縮而不敢言何自而陳於上上之人又何自而收其益乎欲養其氣則必釋其所忌使之無所疑畏然後其氣壯而其言得以自盡士氣壯而言盡然後朝廷有以收其益而不至為無用之虛名愚觀今天下之士猶不能無所諱忌對䇿之際往往務合上意上之所是䇿亦是之上之所非䇿亦非之要以得第而止而主試亦兢兢磨勘是懼一有所觸不敢復登如此則氣何由得壯而言何由得盡乎故愚以為今日䇿學之弊不惟患其剽竊也患在有真實之見而不敢陳不惟患其空疏也患在有精詳之識而不敢獻不惟患其雜霸迂闊也患在有正大切直之言而不敢進聖人在上而天下不得盡其所欲言是豈獨一䇿學之得失哉竊恐自兹以往相習成風苟合取容何所不至故願皇上以大開言路為取士之本苟有益於國家勿嫌其戅苟有裨於民生勿惡其直雖有小疵勿輕棄之以養其敢言之氣雖有可疑勿深督之以勸夫能言之人朝廷有懸鞀止輦之風則天下以緘默為羞公卿有折檻引裾之節則四方以阿諛為辱天下之士曉然知皇上無所忌諱莫不奮而思進其所學氣壯而言盡而主試亦得以取其忠直無所屈折今日能直言得失於風簷寸晷之間他日即能直言得失於堂陛森嚴之地今日之䇿即他日之奏疏行見臯夔之典謨伊周之訓誥將出而共助皇上無疆之治區區漢之董賈宋之歐蘇何足並驅方駕也哉弭盜古今弭盜之術無他治於既熾之日不若治於未熾之先絶於既萌之日不若絶於未萌之先何則盜之初固吾民耳民非樂為盜也衣食之不給賦役之不時禮義之不知夫是以陷於盜而不能自免使其未為盜之先上之人有以引之於禮義使無迫於飢寒而無困於賦役則天下安有所謂盜哉故善弭盜者不於其終於其始不於其著於其微唐虞之詰姦宄周官之嚴守望固弭盜也稷以播榖契以明倫者亦弭盜也司徒教稼穡酇長趨耕耨者亦弭盜也用力不過三日起役無過一人者亦弭盜也不足有補不給有助其於恆賦用其一緩其二者亦弭盜也家有孰黨有庠術有序使其父與父言義子與子言孝少而習焉其心安焉者亦弭盜也唐虞三代所以化行俗美外户不閉者以其弭於未盜之先有此具耳三代以下則不然上之人平居固非能教其民也所尚者虛名也固非能安利其民也所急者賦稅也幸而歲豐無事則坦然四顧以為盜賦無自而有一遇水旱之災飢寒無知之民蹶然而起不可禁止待其既起然後設兵以禦之責官以詰之勦以威之撫以懷之申保甲以防之嚴緝捕以求之懲積窩以絶之此數者非不可以靖雈苻清潢池然孰非吾民不能使之安其生及陷乎罪然後從而區處之乎故前史所載龔遂虞詡張綱李崇之徒其弭盜之功非不嘖嘖人口然愚嘗鄙之以為非盛世之事也今天下一統海不揚波可謂治平矣而江浙之間政煩賦重歲書大有而藜藿不充者比比也吾君吾相可不為之所乎故愚以為天下有不足憂者有大可憂者兵不能禦盜不足憂官不能詰盜不足憂勦撫不得其方不足憂保甲不行緝捕不嚴積窩不懲不足憂教化不敦大可憂稅斂日增大可憂農桑不登大可憂所謂不足憂者非謂其無關於天下也數者之不理一盜未獲止一盜耳一方未靖止一方耳若夫起於一盜而有不止一盜之勢起於一方而有不止一方之勢此則所謂大可憂者矣是故教化不可不敦也教化者非必如古學校之制率草野之民盡教以師儒也但在朝廷示之以義申之以禮使知貨利為輕廉恥為重則風俗之淳可計日而俟矣稅斂不可不薄也薄之者非必如古蠲租減額也但在寬其期限勿使今歲而完來歲之糧絶其侵漁勿使加耗而半正供之額則憔悴之民可安枕而臥矣農桑不可不勸也勸之者非必如古省耕省斂也但使農夫紅女恆尊於富賈豪胥無擾之以非時之役無加之以非罪之刑則汙萊之區自不令而墾矣誠如是民何樂而為盜萬一有之則所謂自作不典者也所謂凡民罔弗憝者也所謂天降威者也夫然而兵以禦之可也官以詰之可也或剿之或撫之或申保甲嚴緝捕懲積窩以治之可也欲兵之禦盜而不為盜則在制之以良將欲官之詰盜而不諱盜則在糾之以督撫勦可施於渠魁而不可施於脅從撫可宥其生而不可濫以恩申保甲嚴緝捕懲積窩可以詰姦民而不可以擾良民此弭於既形之法也夫既有以弭於未形之前復有以弭於既形之後而世不登於唐虞人不躋於三代閭里猶有緑林之警往來猶有暴客之處未之前聞東南水利治水於東南與治水於西北異治水於今日之東南與治水於昔日之東南又異西北多平原廣野阡陌之制久廢溝洫之制久湮欲疏而導之也難東南一澤國也無地非水無地不可行水浚而通之易耳昔之東南聲教猶未盡通也疆域猶未盡一也疏於此者不能不塞於彼疏於一時者不能不湮於異日今之東南皆一王之版圖也疏瀹排決惟上所令耳然則今日興東南之水利以為農桑之本者亦在乎朝廷加之意而良有司奉而行之耳非煩八年四載之勞也生請因明問而極言之生聞地利無盛衰也政教之所詳則盛政教之所略則衰秦漢以前西北盛而東南衰者其政教略於東南而詳於西北也晉宋以來西北衰而東南盛者其政教略於西北而詳於東南也自漢季迄於六朝中原多故而江左偏安賢士大夫皆盡力於東南則其勢始盛唐之季也李氏錢氏保安而休息之則其勢又盛宋自建炎以來其君臣盡力而經營者東南數州也則其勢又盛然則地利豈有常哉朝廷誠加意於生民而務博其農桑時緝其隄防而疏浚其溝渠則天下一也何曠廢之虞而東南西北之異哉若今浙西諸郡歲苦淹潦者生以為此疏鑿之不時經畫之未詳耳浙西之利害在震澤震澤之通塞在三江三江者震澤之咽喉而江旁諸浦則又三江之肘腋也顧昔之為江者三而今則僅存淞江矣昔之為浦者三十有六而今則僅存白茅黃浦諸浦矣其已塞者未易修舉其僅存者時浚而疏之亦宜不至於大患也前代治東南之水者宋莫詳於郟亶單鍔而明莫詳於夏原吉郟亶主於築隄捍田而單鍔主於滌源濬流亶之説可以防一時之害而鍔之説可以規百世之利故急則宜從亶而緩則宜從鍔二者相時而舉之可也至於原吉之相地利濬諸浦民不勞而功不廢此非尤近事之可舉者乎然此不過就東南論東南耳若欲興萬世之利而建久安長治之業則執事所舉虞文靖之䇿不可不急講矣夫三代之世未聞取給於東南也而漢唐以來始以東南之粟食西北之士既有轉輸之苦又有不虞之憂此可不為之慮哉故生以為文靖之䇿其利有五西北獲一石之粟東南省數石之費利一溝洫既成水有所泄外可以防海患而內可以防河患利二阡陌既成寇盜不能馳驟利三江淮有警無咽喉之慮利四由畿甸而推之河北由河北而推之關陜上下殷富南北同風利五誠如是則成周三十年之通西漢粟紅貫朽之盛可計日而俟矣豈惟東南之人實受其賜也哉賈董優劣天下之士惟才學兼至者為上不幸而有所偏勝與其才勝於其學也毋寧學勝於才何則才勝之人明於事而熟於勢人君用之則國體立焉國勢安焉然其失也純駁兼施義利雜用有可見之功而未必無可憂之慮學勝之人守於理而秉於義人君用之或迂而罕效焉或拘而難達焉然其得也道足以格主而操足以範俗無一時可著之效而有積久可恃之功明乎此者可以辨賈董之優劣矣賈生者漢之名臣也董生者亦漢之名臣也當文帝之時諸侯強於內中行説之徒謀於外而朝廷所以厲風俗厚德澤固根本正體統者又皆未有其具上下恬然不知憂戚乃賈生獨為痛哭流涕於其間考其所陳皆鑿鑿可行此固絳灌之所不能言而鼂錯袁盎之所不能知也則賈生者豈非一時之傑哉武帝之時主驕而臣諛所事者征伐所尚者聚斂所用者嚴刑峻法見其利不見其誼計其功不計其道而董生獨持正議於其間觀其廷對之言於禮樂教化之際未嘗不反覆而陳之也於公私義利之辨未嘗不正色而道之也於傷肌膚斷支體之習未嘗不咨嗟而戒之也此固公孫𢎞石奮之所不敢陳而張湯孔僅之所不欲聞也則董生者豈非一時之傑哉使賈生之䇿用於前則漢有久安長治之業董生之䇿行於後則漢有更化善俗之休是二子者固未容優劣也然嘗試以其言考之賈之言多及於利害而董則主於義理也賈之言多至於激烈而董則穆然和平也激烈者其中猶有浮躁不平之意而和平者其源本於莊敬誠恪之餘涉於利害者與世運爭勝負而一害去未必無一害興主於義理者與性情為流通而義中自有利義中自無害賈之言其最精者在審取舍定經制而已所謂道之大原出於天者有之乎所謂正心以正朝廷者有之乎所謂正其誼不謀其利明其道不計其功者有之乎董之所蔽者獨隂陽災異之説耳使并此而去之雖與關閩濓洛比肩可也董豈賈之所及乎蓋賈生者以才勝而董生者以學勝才學之分優劣之辨也鼂錯之才近於賈生然其才益露而其敗立見其學賈生而不得者乎貢禹匡衡之學近於董生然其學益拘而其業益卑其學董生而不得者乎學董生而不得猶不失為迂闊之儒學賈生而不得則功利誇詐而已末流之弊又優劣之辨也要之賈生亦何可及也以聖門言之董生狷者也賈生狂者也夫子思狂者而不得然後欲得狷者而見之蓋狂而不學則不如狷狂而學焉則固出狷之上也嗚呼使賈生之才而加之以學又豈董生所可及也哉雲臺二十八將人臣佐主非飭躬勵行之為難而定其規模之為難非攻城野戰之為難而立其根本之為難何謂規模豪傑歸心羣材輻輳是也何謂根本元元歸命海內向風是也規模誠定根本誠立雖寇盜未息土宇未一而天下之勢固已牢固而不可拔人君而知此則於君為特優矣人臣而知此則於臣為特優矣以此為品品莫髙焉以此為業業莫隆焉若夫勵其亷隅守其謙退內之有守城捍禦之勞外之有斬將搴旗之功此可謂之賢臣能臣矣將以冠於羣臣之上曰特優則未也是故漢髙之臣特優者吾不曰韓信黥布之徒而必曰蕭何光武之臣特優者吾不曰寇恂馮異之徒而必曰鄧禹何則定其規模立其根本者何與禹也何之告漢髙曰養民以致賢人禹之告光武曰延攬英雄務悅民心是二人者其心同其識同其品其業亦同知此可以論雲臺諸將矣考之漢史雲臺諸將皆與禹不相上下平赤眉定關中威震三輔禹不如馮異斬張豐破隗囂執法不貸舍中兒禹不如祭遵守河內而轉餉不絶守頴川而盜賊不作禹不如冦恂降朱鮪走青犢破五校禹不如岑彭賈復北定彭寵東攻張步西取公孫述禹不如耿弇吳漢他如任光邳彤李忠萬修之追隨薊北也王梁蓋延景丹之擊賊以歸誠也銚期之威信著於魏郡也陳俊之堅壁以困賊王霸之詭辭以安衆劉植之據城以迎師也耿純之請正帝號朱祐之奏除王爵也臧宫馬武之鳴劒而志馳伊吾堅鐔馬成之繕障而身當矢石也杜茂劉隆傅俊之平鴈門討李憲擊王尋也孰非一時之俊而感會風雲稱為佐命者耶其品其業豈遽出禹下哉然此不過定一方陷一陳效績於一時耳而天下之規模根本則不在焉蓋光武所以得天下者有數端而皆自禹發之尊賢下士耿况以此服從矣黜陟官吏能否除王莽苛政河北以此喜悅矣平王郎燒棄文書反側以此畏服矣命將不必略地屠城要在平定安集之赤眉以此破散矣首以卓茂為太傅以奬循吏民生以此康阜矣所謂延攬英雄者非耶所謂務悅民心者非耶此固寇恂馮異之所不能言耿弇賈復之所不能知也此固智謀勇略所不能並而拔城陷陳之功所不能比也向微禹孰啓之而孰相之方其杖䇿追隨之時一言而定治安之略一日而決興亡之機河北未平中原未靖隴蜀未臣而天下之勢固有所在矣論品品莫髙焉論功功莫隆焉愚故曰光武之臣特優者禹也是故雖有髙陵之敗不足為禹損雖有宜陽之遁不足為禹貶雖屈於延岑誤於馮愔不足為禹咎何則其規模誠定而根本誠立也若夫定河東復長安垂髮戴白滿其車下此特禹一時之功耳事母至孝天下既定常欲逺名勢亦禹一節之善耳諸將人人能之豈吾所以優禹哉光武之不得不首禹猶高祖之不得不首何也髙祖不以百戰百勝之信越加於養民致賢之上光武不以折衝奮擊之耿賈加於延攬英雄務悅民心之上此其所以終有天下歟後之帝王程功計品者當視其規模根本之所在以為髙下唐之凌煙閣長孫無忌為首夫無忌雖有定難之勳然所以定規模立根本者不如房杜逺矣而居房杜之上何足以服天下耶然則太宗之見其去髙祖光武不亦逺哉馬援帝王之爵賞惟其至公而已不以疏而加薄不以親而加厚其薄之者必其人之當薄者也而我何心於薄其厚之者必其人之當厚者也而我何心於厚夫是之為至公若夫有心於厚之非公也有心於薄之亦非公也爵賞而不以公何足為萬世法乎異哉漢明帝圖功臣而馬援以椒房之親不與也夫謂之功臣者亦問其能披堅執鋭拔城陷陳否耳問其能運籌帷幄決勝千里否耳問其能拾遺補闕裨輔朝廷否耳使其人而無此數者則固當擯而抑之不得以椒房之故而濫與也其人而有此數者則自當尊而顯之亦安得以椒房之故而不與哉考之史傳馬援之功為不少矣坐制公孫䇿圖隗囂者援也西平羌亂南破交趾者援也內之則聚米以陳形勢外之則據鞍以示矍鑠者援也計其功烈即不得與馮鄧比肩乎亦何至出銚期堅鐔下哉且夫援又非如信布彭越之徒恃功驕恣而功不掩過者也雖氣冠三軍而恂恂儒雅有退讓君子之風假令援而尚在帝雖置之輔弼可也冠之百僚上可也如竇嬰霍光之以懿親秉政可也况區區一雲臺之圖畫引而列之其誰曰不然而奈何以椒房之故而擯不與耶噫朝廷之名器必舍椒房之親然後可則是塗山不得顯於夏申吕不得顯於周矣帝王之褒寵必舍椒房之親然後可則是虞賔不當與師濟之列尚父不當蒙鷹揚之稱矣大道之為公必舍椒房之親然後可則是文祖之受足以纍重華丹書之拜足以纍寧考矣噫所謂公者果若是耶帝徒見椒房之親為患於前吕産吕祿椒房之親也霍山霍禹椒房之親也王鳯王莽椒房之親也故以為寧屈元勳而無開寵幸寧抑賢豪而無生亂階寧使人謂功因親掩無使謂爵以親崇此帝於援所以寧薄無厚也帝以為是可以示公於天下矣而庸詎知有功不報非所以為公耶庸詎知功同而報異非所以為公耶庸詎知有心厚之與有心薄之俱非所以為公耶推帝之心不論賢否不問髙卑非親者祿為戚者退雖有被堅執鋭拔城陷陳之功置而弗問雖有運籌帷幄決勝千里之功置而弗問雖有拾遺補闕裨輔朝廷之功置而弗問幸而鄧禹馮異未有椒房之親耳使禹異而有椒房之親則亦不得與矣幸而寇恂賈復未有椒房之親耳使恂復而有椒房之親則亦不得與矣且援亦止於援耳等而上之使援為伊吕周召亦將不得與為臯夔稷契亦將不得與由此觀之公耶否耶夫天下之道惟其公故可以垂法萬世而無弊有功必録有罪必誅此天下之至公也有功而不録則亦將有罪而不誅其弊曷可勝道哉是故有雲臺不與之馬援勢必有殺都鄉侯暢而不問之竇憲勢必有拔扈不可制之梁冀孰非明帝有以啓之耶後之帝王欲示公於天下者亦循其理之當然可矣愼無有心以求之哉姚崇十事大臣之事君也必先有以堅君意而後天下之治可成也君意未堅而欲與之圖治則吾以寬仁進而君且流於殘薄矣吾以弭兵進而君且溺於好大矣吾以防微杜漸輕賦節用之説進而君且不勝其牽引矣吾以尊賢敬士開誠布公之説進而君且目為迂闊矣是故始乎堅而終乎怠者有之矣始之不堅而能成其終者未之有也三代以來如伊尹傅説之於商管仲之於齊商鞅之於秦雖其王伯異趨純駁異致莫不於其始進之日有以得之其君是故功成而不勞彼唐之姚崇其亦知之矣考崇所陳十事不過因當時所急者而言之彼見夫垂拱以來用法刻深羅鉗吉網紛紛於時也而曰政先仁恕見夫邊隅未靖突厥吐蕃未可力臣也而曰不幸邊功見夫武韋之禍幾危宗社而俳優宦寺乘寵恣肆也而曰監祿莽閻梁之禍曰戚屬不任臺省曰閹人不得與政曰佞幸犯法無寬見夫神龍之世賦斂無度奢侈淫佚公主婕妤多營佛寺也而曰絶田賦外貢獻曰絶佛道營造見夫五王被戮蕭岑繼誅而王魏直諌之風日逺也而曰接臣下以禮曰使諌官無忌諱凡此者因當時所急言之治天下之事固不止此而人臣之效於君亦不盡於此獨其能以十者要説於上使人主之意既堅而後徐起而圖之嗚呼此其所以成開元之治也歟君志既定於寬仁則張湯趙禹之徒不得以嚴刑惑矣君志既在於弭兵則大宛月支之使不得以開邊誘矣君有防微杜漸之志則外庭之事必不決於官闈尚書之柄必不屬於外戚𢎞恭石顯不得主樞密張放李明不得侍遊宴君有輕賦節用之志則雉頭之裘不以入內府湘宫之役不以煩將作君有尊賢敬士開誠布公之志則黥劓之罪不上於大夫放逐之禍不及於臺諫極天下之治皆始於吾君一念之堅而實始於大臣之有以堅之也是道也固伊尹傅説之所以成其王而管仲商鞅之所以成其伯也是故開元之時宋璟韓休張九齡皆稱賢相而吾必以崇為首何也堅帝意者崇也使崇無以堅之則明皇之荒晏不待天寶而九齡之徒又何所施其力歟雖然崇能必之於開元而不能必之於天寶何也曰崇知有以堅之而未知所以養之也君志固不可不堅而又不可不養堅之者存乎一日而養之者在乎平居古之為大臣者日以道德仁義進其君而又多選天下端人正士為其左右使其君日就月將而不貢於非幾凡此所以養之也夫是以堅者愈堅雖有姦邪不能惑之故曰惟大人為能格君心之非明皇之惑於李林甫楊貴妃也是其養之者未至也不然豈其二十年憂勤之主而一女子一小人能使之顚倒回惑而不可收拾也耶君子是以不滿於姚崇也劉晏五事言利之臣君子所不取也而其事有可法則君子亦未嘗棄焉非謂一言利之臣其事遂足為天下法也由其事而推之則治天下之法不越此耳是故管仲之治齊也其人不足取也然其務農貴粟雖君子不能不法矣商鞅之治秦也其人不足取也然其強本節用雖君子不能不法矣李悝之在魏也其人不足取也然其平糶齊糴雖君子不能不法矣秦漢而下人臣以利亂天下者多矣君子放而絶之惟恐其不峻而苟其事有足法則亦安得而不取哉唐劉晏之領鹽鐡度支也先儒謂其有可法者五事此所謂不取其人而取其事者歟夫晏一聚斂之臣耳在漢則桑𢎞羊孔僅之流耳在唐則楊愼矜皇甫鏄之徒耳何足為君子法且其所謂善理財者亦不過濟一時之急非能致夫粟紅貫朽之盛也非能致夫三十年之通也未幾而有脫巾之呼矣未幾而有奉天之困矣未幾而有梁州之厄矣晏直一聚斂之臣耳何足為君子法晏而可法則均輸平準之臣亦可法也晏而可法則間架阡陌之臣亦可法也晏而可法則青苗市易之臣亦可法也豈君子所以峻義利之防而為萬世有天下者訓哉噫是知其人之可擯而未知其事之足取也吾嘗歎後世之天下所以不可為者有五而晏庶幾免焉胥吏之姦蠧日甚法出而弊生令下而詐起不可為也閭閻之生計日困欲撫字則虞虧國欲催科則慮殘民不可為也度民非加衆而計官則益增政令紛然民不能堪不可為也計功則欲其廣度費則欲其節官吏無贏餘之樂而有鞅掌之苦不可為也法令繁密吏弗能紀事久而蠧益生令久而詐愈起不可為也乃觀晏之出納必委士類而胥吏之蠧庶幾止乎晏之理財以養民為先庶幾以撫字為催科乎而且知官多則民擾而且知大事之不可惜小費而且事無間劇必決於一日則庶幾政令之不紛官吏之不苦於鞅掌而姦蠧之不及生乎使唐常循晏法而守之則亦可以無脫巾之呼可以無奉天之困可以無梁州之厄是雖同一聚斂也而與均輸平凖之臣異矣與間架阡陌之臣異矣與青苖市易之臣異矣如曰是出於晏也而概棄之則豈聖賢取善之義而亦豈明於天下之治體者哉噫此君子所以不取其人而取其事也雖然晏於五事亦真能盡也耶其所謂士類不過用果鋭少年而所謂養民不過襲常平遺法耳所謂官多民擾者不過指鹽場之一二冗吏耳所謂不惜小費者不過於船場多給緡錢而所謂決於一日者不過任一已之聰明耳豈能如成周之府史胥徒皆俊乂而取民無過什一乎豈能如周官三百六十而量入為出者乎豈能以義制事而無疚於心者乎故曰法其事者非謂其事遂足為天下法也由其事而推之則治天下之法不越此耳三魚堂外集卷四
