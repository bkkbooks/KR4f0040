body:
  text: 三魚堂外集卷三贈內閣學士陸隴其撰䇿交泰君臣之交莫貴乎其誠誠也者積於上而孚於下者也故主用術則臣多挾私矣主用誠則臣多竭忱矣三代之時其臣非必盡性忠義不顧私不罔上者也然而有一德之美無乖忤之慮一時腹心大臣固皆竭其股肱保其勳名始終無閒而在廷諸臣上自六卿之長二下至酒漿醯醢之職親而文昭武穆疏而殷獻宗工近而侍御僕從逺而庸蜀羌髳與夫譽髦之多士赳赳之武夫莫不盡力以從上命勤其政而恤其民何哉禹湯文武以至誠之心感之而一時諸臣亦以至誠之心應之由是言之則誠也者洵萬化之源而御臣之樞機也是終始之所以一也是尊卑之所以睦也是親疏之所以協也是逺近之所以孚也是異同之所以泯也後世人主惟不能盡其誠而參之以術而一德一心之美遂不可復覯至於一德一心之難覯乃慨然曰古今臣不相及也孰知其一念之不誠以至此哉然則談交泰於今日舍誠其曷以耶皇上與二三大臣同心圖治罔有閒隔固以誠開其始矣尤願以誠保其終夫大臣者與人主共休戚者也如手足之於腹心原不必其存形迹故茍有益於國家勿以專行而疑其擅茍有利於民生勿以樹恩而罪其私我苐無猜忌之心則納其嘉謨而不嫌於屈即參以獨斷而亦不病於乖我苐秉忠信之情則尊以祿位而天下共羡其寵榮即示以裁節而天下愈見其無間上以一心遇其臣而臣不以一心報其上者未之有矣至於公孤庶尹其職分不同而可以誠感則一也果待之以誠使為公孤者無掣肘之虞為庶尹者無阻隔之患其誰敢自曠厥職焉滿臣漢臣其習尚不同而可以誠感亦一也果待之以誠無以滿臣而固抑之以示公亦無以漢臣而概疑之以為黨其誰敢自分涯域焉若夫內外諸臣非所以翼輦轂即所以備藩宣也文武諸臣非所以備顧問即所以效干城也孰非股肱而可不以誠遇乎孰無心膂而不可以誠動乎果皆待之以誠考課之法無閒彼此升遷之例無分異同其誰敢不共輸忱悃對揚休命焉總之御臣之道用恩可用威可用寬可用嚴可而獨不可以不誠不誠則將雜出乎權術上以術御下亦將以術應一人之術必不足以勝凡為下者之術欲望其一德一心共矢勵翼也豈不難乎唐太宗參用術者也唐德宗純用術者也參用術故以劉洎之賢而不能保其終純用術故內惑於盧杞裴延齡而不能覺外制於朱泚李懷光而不能克不誠之弊一至於此魏鄭公所以有去形迹之論陸宣公所以有貴誠信之奏也崇論閎議無踰於斯在皇上存之勿替而已抑愚猶有進焉人主誠於待臣必先誠於愛民何則人臣受主之眷必將視其主之所寤寐思服者以求稱其意茍徒以赤心待其臣而無惻怛為民之意則臣之求報稱者亦將惟主之欲而不暇及於民生之大計故愚願皇上以實心為民然後以實心待臣使羣臣知皇上於為民之外别無他欲而人臣於為民之外亦别無可以報主則將矢心勵翼共圖康濟民生安而治化成三代之隆可計日而俟矣經筵從來君德之成就在乎親近君子而君子所以成就君德者在乎使其心一於敬何則親近君子則近正事聞正言而涵養薰陶之益積於平日者深是故有言必入有諫必從心一於敬則聲色之不溺貨利之不殖而清明强固之氣凜於夙夜者嚴是故言一事而萬事之理畢達言一物而萬物之理畢通此古之帝王所以自成其德而古之人臣所以致君於明聖者由此道也使不能親君子於平日而欲責啓沃之功於一時平時漸漬於宦官宫妾之習而一旦進以仁義道德之言其不以為愚且誣者鮮矣即能親君子矣而其心不主於敬則進以一事止一事焉已耳能達於所進不能達於所未進告以一物止一物焉已耳能通於所告不能通於所未告將事事而進之不勝其煩也物物而告之不勝其紛也自古君德之成者莫如成康自古人臣能輔成君德者莫如周召迄今讀召誥立政諸書其所兢兢至愼者綴衣虎賁之職也至其所操以進君者一則曰疾敬厥德再則曰王敬作所由此觀之則君所以成就亦可知矣今皇上神明天縱度越古今而執事所以啓沃之術固聖益求聖之至意也顧言啓沃而不歸其要於親君子敦其本於主敬則經史典籍之言能必其陳之而悉聽乎古今因革生民休戚能必其陳之而不以為瀆乎正誼明道之說正心誠意之談能必其陳之而不以為迂乎且夫無窮者天下之事理有盡者臣下之嘉言以有盡之言發無窮之理言之所至幸而聽矣言之所偶不至而誤者德不且因之而隳乎故竊以為經史文籍當研究討論也然不必經筵之時始研究討論也深宫宴處無地不當親君子則無地不可研究無地不可討論古今因革民生休戚當條晰敷陳也然不必經筵之時始條晰敷陳也深宫宴處無地不當親君子則無地不可條晰無地不可敷陳正誼明道正心誠意當言也亦不必經筵之時始言也深宫宴處無地不當親君子則無地不可言道誼無地不可言誠正誠於滿漢諸臣之中擇其老誠端謹博通經史者俾其出入侍從朝夕顧問以仁義道德之言優游漸漬於旁則聖德之成有莫覺其然而然者而其本則尤在皇上之心一於敬敬則聲色玩好之物不足以惑此心而經史典籍自見其㫖趣也敬則豐亨豫大之境不足以蕩此心而古今因革生民休戚自得其利弊也敬則權謀功利之說不足以蔽此心而正誼明道正心誠意自覺其非迂也夫然故衆君子共進於朝而不以為黨一君子獨進於前而不以為矯有時聞君子之言而悉通其㫖有時未聞君子之言而已得其理此聖學之源聖德之本而職司啓沃者所當加意也不然而屑屑焉徒經筵之是恃將經筵之時暫而不經筵之時常也經筵之時端拱而陳者不過一二人而不經筵之時乘閒而進者不知其幾人也經筵之人則人主所敬而疏之人而不經筵之人則人主所狎而親之人也欲望君德之成也豈不難哉修省天之愛人主與愛天下之人不同天之愛聖主與愛庸主又不同天下之人其所行有得失止及其一身耳至於人主則固天所生之以乂安元元者也而聖主者則尤天所篤生以寄其乂安之任者也任之者重則其望之者不得不深望之者深則其責之也不得不切故一有失焉則變異隨之矣一不警焉則怪異隨之矣是非寬於天下之人而苛於人主也非寬於庸主而苛於聖主也天若曰是人也吾何如任之而未能稱吾任也吾何如望之而未能塞吾望也為之變怪以警懼之或者其終能稱吾任乎或者其終能塞吾望乎由是言之天之厚愛之者將以厚責之也天之厚責之者又所以厚愛之也故為聖主者茍遇災變必悚然而懼惕然而省務修其德而改其政以迓天休是以雖有災變而不能為害乃者彗星地震先後疊見愚以為其災其祥皆未可知所可知者惟皇上之能省而已自古人主當災祲下降未嘗不頒罪已之詔未嘗不下求言之令然而天變未必盡弭天意未必盡回則今皇上之省有益無益亦未可知所可知者惟皇上務省之實勿務省之名而已省之之實執事所謂崇源綜要是也崇源之道在正身綜要之道在寬賦斂緩刑罰振士氣何謂正身蓋人主之身天心所係屬也身有淑慝而天象因之故一動念必自省曰此可以對天乎一舉步必自省曰此可以對天乎一飲食一衣服一宫室必自省曰此可無咎於天乎事事不敢忘天念念不敢忘天則修省之源得矣何謂寬賦斂古之治世者必以富民為先而今也惟催科之是急非有水旱饑饉之災而民不給於藜藿此宜天心所憫也夫軍國之需固不可闕矣豈無冗兵冗費可減以紓我民者乎豈無汙萊棄地可闢以寬我民者乎今不務議此而苐蠲其逋賦逋賦者是姦胥汚吏之所侵漁而非良民之所負也蠲之適以惠姦人而何足以回天乎是故逋賦可不蠲而正賦不可不議漸減也何謂緩刑罰古之用刑者反覆戒諭其臣惟恐其濫於無辜也今也失出者有罪而失入者無咎法吏惟恐獲罪則務為深刻所坐愈大深刻愈甚雖豪猾大憝多伏其辜豈無寃抑而自誣者乎豈無株連而可憫者乎近雖奉詔肆赦而事涉重大仍不在赦例則是無辜者終無以自雪也無乃非上天仁愛之意乎是故罪果確當者雖輕可不赦而罪在疑似者雖重不可不赦也何謂振士氣古之為治者必曰重士謂其能誦法詩書者也謂其能守正不渝者也謂其知天下大體者也故雖他途不妨參用而必不使並於士雖取士之法不一而必使士常重於他途今也裁其進取之數艱其銓選之途使講道論業之儒偃蹇而不得進進而不得用其氣鬱而不伸亦足以致天變是故士習當敕而士氣不可不振也此皆修省之要也皇上誠以實心為之以此誠民即以此敬天天下之人孰敢不革心易慮以稱我皇上之意而共邀天眷然則赦條頒而有司之不奉行非所患也嘉謨陳而部議之不採取非所患也中外羣工不能洗心滌慮直省督撫不能洞燭幽隱非所患也何則皇上者羣臣之準四海所視而效也故修省之實不在有司不在部寺不在中外羣工不在直省督撫而惟在皇上未有祁寒暑雨之咨日切於宸𠂻而有司敢匿其仁慈者也未有懸鞀止輦之忱日切於堂陛而諸臣弗體其虛𠂻者也未有省躬責已視民如傷之意日篤於深宫而內而百僚外而督撫不能仰體君心者也萬一有之黜而去之可也責而警之可也去一以勵其餘可也其何足慮之有誠如是行且災消變弭天心昭格曰是果能稱吾任也是果能塞吾望也雖謂彗星地震祥也非災也亦宜治法帝王之道中而已矣惟中故緩獄措刑而不厭其寬詰姦鋤暴而不厭其嚴治具纖悉而不厭其煩獨持大體而不厭其簡以之為政則和而平以之為法則順而祥以之振風俗感人心無所施而不得其宜此唐虞三代之治所以卓然於萬世而莫與京也茍不審其中而徒徇於一偏方其寬也則姦宄肆行而不知詰方其嚴也則無辜觸網而不知恤方其煩也則天下多事而吏弗能紀方其簡也則教弛法廢而上弗知飭安在其能振風俗而感人心乎漢唐宋之所以有古治遺意者則以其寬嚴煩簡偶合於中也其所以不如三代者則以合而有未盡合也治亂之故盛衰之理一言以蔽之矣今皇上紹承先烈思所以整齊風俗和輯人心則寬嚴煩簡之閒誠不可不加之意然愚竊謂今日為寬嚴煩簡之說者皆未得其要而徒徇一偏者也故見周禮之委曲煩重則以為宜用煩見太公之三月報政則以為宜用簡見漢髙三章之約則以為宜用寬見諸葛嚴峻之治則以為宜用嚴夫周公之治周誠煩矣然其閒豈無簡者存乎太公之治齊誠簡矣然其閒豈無煩者存乎漢髙孔明誠一以嚴而一以寬矣然寬者豈無用嚴之處嚴者豈無用寬之處乎蓋寬嚴煩簡者為治之大體因乎時者也寬嚴並用煩簡互施者為治之大要隨乎事者也故善為政者貴因時而知變又貴因事而知變茍謂時可寬而一乎寬或可嚴而一乎嚴猶未知寬嚴之變者也謂時可簡而一乎簡或可煩而一乎煩猶未知煩簡之變者也皇上垂統方新比之於周則正成康制禮作樂之會也其道宜用詳擬之於漢則又文景與民休息之會也其道宜用寬此今日之時則然也然以其事論之則又有不可概論者愚請得指其一二而其他可以類推焉今日之宜詳者莫大乎尊卑上下之差别宜簡者莫要乎簿書文移之虛名宜寬者在錢糧之詿誤詔獄之株連宜嚴者在吏胥之舞法守令之貪汙尊卑上下之辨所以節淫侈定民志也今胥𨽻得與縉紳同服商賈得與公卿齊飾而法制不立其閒將何所底止乎宜命禮臣酌其差等不厭精詳務為定式庶貴賤不踰而朝廷之名器足為重於天下此以詳為貴者也簿書文移上下所憑以為信者也然今上之施於下者非必其盡行也以應故事而已下之申於上者亦非必其盡行也以應故事而已而徒使姦豪得借以為資而成其所欲此可不思所以省之乎宜務在必行不為虛文庶官吏得盡心於職業亦以少損姦豪之虛僞此以簡為貴者也錢糧之催徴不可寬矣然以分毫之拖缺而遭黜革以限期之稍踰而加譴謫不已甚乎詔獄之審録有不得已矣然以一事之蔓延而纍及千百以一人之有罪而禍及親屬不已甚乎此宜以寬為貴者也吏胥之舞法亦既屢申飭矣而舞法者自若守令之貪汙亦既屢申飭矣而貪汙者自若豈非舞法貪汙者未必盡發覺發覺者未必盡加誅乎此宜以嚴為責者也故愚嘗論之曰寬而詳者為體嚴而簡者為用此今日之中道也致治之謨無踰於此雖然猶有進焉夫寬嚴煩簡者治之迹而非治之本也治之本在皇上之一心漢唐宋所以不如三代者非獨其政之未盡適中亦其心有未純焉是故以至仁為心而無雜乎偏私以主敬為心而無入乎怠弛此又皇上用寬用嚴用煩用簡之本茍無是心雖施之政事者盡得其中亦漢唐宋之治而非唐虞三代之治也豈天下之所望哉謀斷天下之事未有不由獨斷而能成者也亦未有不合衆議而能斷者也以斷而成其議則是非一而不患有聚訟朋比之紛以議而濟其斷則衆論諧而乃以見師濟一心之盛三代之隆其時議論不盡見於詩書然嘗由周官所云議事以制者推之則知當日建宫畫井凡國家大典必博訪羣臣各陳得失然後諸大臣裁斷於上不因其紛紜滋擾而厭之惟斷之以理而不惑於似是是以政成事立而天下便之向使止任一已之見而不參考於衆論參考於衆蹐而或厭其滋擾使之顧忌而不敢盡言則利害必不能盡晰是非必不能盡當雖聰明齊聖之君秉德迪知之相亦豈能致天下之治如當日之盛哉三代以下治不古若無他或衆議紛紜而上不能決或君相多忌而公論鬱塞是以知者不敢言言者不敢盡而政日以乖然則議論之得失其關於時政豈淺鮮耶愚竊觀今日議論之弊與前代異前代之弊在議論之多今日之弊在議論之少國家創制立法斟酌古今羣臣章奏未嘗不下部議事稍重大未嘗不下諸大臣㑹議然愚以為議論之少者何也前代議論惟其執偏挾私而不欲言則已茍其胸中所欲言則未嘗有所忌諱今朝廷雖大開言路無有忌諱而議者未能深體上意往往局蹐而不敢盡是以雖章奏日上而試問引裾折檻者何人也碎首玉階者何人也言及乘輿而天子改容事關廊廟而宰相待罪者何人也惟其角立門户者則言之浮泛塞責者則言之至於社稷之大計生民之利病則固未嘗盡陳於上議論既少上之人雖善斷亦豈能盡晰其利害盡燭其是非而罔或不當哉故愚以為今日要務非有以大破其忌諱之見而廣開議論之門不可議論之門既廣其閒雖不無蓄疑懷私雷同諉卸者雜然並出然在上之人有以斷之耳非所患也今人皆曰宋人議論多而成功少所以不振然熙寧元佑之敗壞者議論也慶歷嘉祐之致治者亦議論也洛蜀朔黨之分爭者議論也韓范富歐之相濟者亦議論也議論果何負於人國哉若夫斷之之道則愚又得而言之矣天下事未有不講究於平日而能獨斷於臨時者也不講究而能斷者其所謂斷亦斷其所斷而非聖君賢相所謂斷也是以古之帝王雖聰明天亶必親師傳必誦詩書正直之士未嘗一日離於側也規誨之言未嘗一日絶於耳也而其大臣亦相與考究古今洞晰事幾是以事至而不惑言入而即辨此三代之世所以能總衆論而歸於一也今皇上將總攬萬幾宜勤御經筵留心典墳而又選方正博聞之士日侍左右與之講道論德究晰民瘼執政大臣亦時時親近儒生考求義理虛訪利病天下之事既熟悉於中一旦臨事出其所素定者斷決於上必能使衆論歸一疑似不淆既無盈庭莫執之憂又無偏僻自用之病以此為政何政不成以此圖事何事不立是文武再見於世而周召畢散韓范富歐復生於今也亦在君相加之意耳豈憂天下事之不可斷哉銓政人才不患其壅滯也天下之才無窮而朝廷之官有限以有限之官給無窮之才前後相守歷歲月而不能即登庸者勢也是惟上之人有以鼓舞之使已仕者樂於其職而不見有升轉之難未仕者安於在下而不覺其選授之遲上之人徐擇而用之才愈多則官益得人用之愈遲則天下之才益磨厲而有以效於上故鼓舞之道得則壅滯之端泯善用才者患無以鼓舞之不患無以疏通之也自古人才之多者莫如三代建官之少者又莫如三代然三代之時不聞有壅滯之患者無他鼓舞之道得焉耳後世之人才非加多於三代也建官非加少於三代也然而常患其壅滯者無他鼓舞之道失焉耳今國家選法初授者以考定先後為序升遷者以歷俸多寡為序一出於至公矣乃出缺有限選途日艱宜執事鰓鰓以壅滯為慮而欲求疏通之法為鼓舞之道也然愚以為今日之銓政當以鼓舞為疏通不必以疏通為鼓舞鼓舞之道莫若於循格之中行破格之典使中才不得越次而進以守銓法之常而英流閒得超擢以登以通銓法之變天下之士將爭自磨厲以求赴上之意而不見有壅滯之形竊以為凡今在籍候選之人宜令所在督撫每歲各以其職業考之舉其最者一人上送吏部使得越次而選而郡縣有司亦令督撫歲舉其最者一人使得越次而升越次而選者一省不過歲一人既無礙於選法之常而英流之士得以及鋒而用中才者亦將勉自滌勵而不至於委靡自棄選授之期雖遙而皆有旦夕可升之望則不見其遙升轉之途雖難而皆有旦夕可升之望則不見其難如此尚何壅滯之足慮哉此所謂於循格之中行破格之典以鼓舞為疏通者也今日銓政之要也若夫就疏通言疏通則又有其道矣一曰入仕之途宜清也夫今仕路之所以壅者以流品之太雜也自科目而外有任子又有例監有投誠有府史雜流此固朝廷所以廣用人之途而不可偏廢也然其中豈無冒濫而當核者乎宜嚴其例使一才一藝皆得踊躍於功名而不至開僥幸之門一曰考課之典宜嚴也夫不肖者安於其位則賢才不得上升宜令督撫察所屬貪汚者不時糾參而考課之時不特一二等之擢者不得濫施即平常留任者亦必奉身寡過有吏習民安之便而後使之久於其任一曰辟召之法宜參用也漢法長官得自辟曹掾一時文學才俊之士皆出其中宜倣其制令天下長官得辟有出身士人為掾吏既可息姦猾之風而士之未就職者亦得少展其才此三者皆今日疏通銓政之道也察吏安民談吏治於今日欲舍錢榖刑名而講安民之術迂矣然置安民之術而止求全乎錢榖刑名恐民不得安而所謂錢榖刑名亦不可得而全也夫錢榖刑名者必民安而後其效可奏未有民不安而錢榖刑名克奏其效者也故善為吏者求錢榖刑名於安民之中不求錢榖刑名於安民之外故其始也見有民不見有錢榖刑名其繼也民治而錢榖刑名無一之不治此兩得之道也不善為吏者求錢榖刑名於安民之外不求錢榖刑名於安民之中故其始也見有錢榖刑名不見有民繼也民敝而錢榖刑名無一之不敝此兩失之道也然則課吏之法無他亦惟以民之安不安課其錢榖刑名而已今國家課吏錢糧之稽遲者有罰刑名之失出者有罰此此亦欲其就安民之中兼全乎錢榖刑名非欲其舍安民而止求錢榖刑名也乃奉行者不察止顧錢榖不問民力止顧刑名不哀民命茍可以合考成之條則朘民膏而不惜茍可以免降謫之科則致民枉而不悔此甚非所以奉宣朝廷德意而致天下於治平之域者也夫治必隨時而變法必因弊而革向者明季之吏治弊在徇名而忘實為吏者借安民之名而置錢榖刑名於不道究之錢榖日耗刑名日弛而民愈不得安故國家立法不得不微重在錢榖刑名重在錢榖刑名者所以求安民之實效而無溺乎安民之虛名也今日之吏治弊在徇末而忘本為吏者以錢榖刑名之故而日困其民究之民困於錢榖而錢榖愈不可治民困於刑名而刑名愈不可治故今之立法又不得不重在安民重在安民者所以正錢榖刑名之源而無徇乎錢榖刑名之流也則所以稽吏治能否而合於古之所謂吏者其法有二一曰於錢榖刑名之中課其安民之效夫錢榖之催徴固急矣然必催徴之有法而不至以催徴病民者方為錢榖之最刑名之問擬固急矣然必問擬之平允而不至以問擬病民者方為刑名之最此則就錢榖刑名為安民者也一曰於錢榖刑名之外課其安民之效夫錢榖固不可緩而錢榖而外如勸農課桑諸務古有其制矣獨不可舉而行之乎刑名固不可輕而刑名而外如讀法憲老諸務古有其典矣獨不可舉而施之乎此則舍錢榖刑名為安民者也夫如是將民安而錢榖日豐是安民即所以為錢榖而不必問擬之是急也何吏治之不可登何古治之不可復是在察吏安民者一舉而振之而已不然而役役焉所重在彼所輕在此民生敝而逋缺益繁姦宄益出非所以為斯民計亦豈所以為錢榖刑名計哉漕運漕運之法三代以前無有也以漕運而裕國秦漢以來不得已之䇿耳夫以京師之重而仰給於遐方天下無事則有侵漁遲誤之弊天下有事則有咽喉中梗之虞此甚非所以久安長治也謀國者當以三代為常而以秦漢為變經其變所以為一時之利復其常所以為萬世之計故竊嘗以為漕運無得失也漕運之多寡即其得失漢之初漕山東粟以給中都歲不過數十萬石至其後則歲六百萬唐之初歲不過二十萬至其後則三歲七百萬宋之初亦不過數十萬其後四河所運至五百五十萬夫其所以不得不多者何哉養兵之太多也冗員之未盡去也西北之荒田未盡墾也茍不去其所以不得不多之原而馴復於不漕自裕之法乃區區講於漕運之得失不已末乎國家定鼎燕京仰給東南漕運最為重務今欲驟然廢漕其勢固必不能而以為裕國之本專在於此則非愚之所敢知也愚請先就漕論漕而徐探其本計可乎夫輸挽之所以愆期者以沿途之留滯也欲沿途之無留滯則莫若責之督糧諸臣旗辨之所以侵沒者以收納之不精詳也欲收納之精詳則莫若責之倉場諸臣若夫海運與河漕並行此固元世已行之事然愚以為海運不可行也元雖獲海運之利而今歲飄沒若干明歲飄沒若干數十年中民之納於鯨鯢之口者不知凡幾矣至其季世終以不給海運之效亦可睹矣以明祖之深謀逺慮豈不知海運速而河運遲海運省而河運費豈不知河海並運可以無咽㗋之變然卒舍海而就河者蓋親見元世之利害而不欲以民生國計試之波濤也况今海氛雖靜餘孽未盡而可冒險以爭區區之利耶河之害漕者在牽漕河諸水盡瀉入海也故河決之世陸則病水水則病涸發則病水去則病涸齊魯病水漕河病涸治之之法以漕避河不若以河避漕夫河之勢合則易潰分則自殺誠於河之南北相其地勢析其支流條分而派别之大者為川澮小者為溝洫則勢分而河安河安而漕安此皆就漕論今日之良䇿也而裕國之本則不在是焉裕國之本其必墾西北之閒田而寬東南之輸挽乎墾田之所以無成效者非墾田之難而未得其人未得其法也天下之大豈無能罷騎兵留屯田如趙充國其人者乎豈無能大治諸陂穿渠溉田如鄧艾其人者乎豈無能就髙為堡列柵二十如韓重華其人者乎誠能重爵位以尊之一事權以委之久任使以俟之必有竭盡忠力出而稱朝廷之㫖者然後為之清其疆理缺風俗世運之盛衰風俗實為之而所以維持乎風俗使之淳而不澆朴而不侈者則惟視乎上之政教何如耳三代之時非無澆漓侈奢之民也然而道德一而風俗同者其政教得也漢唐宋之時非盡澆漓侈奢之民也然而世風漸靡不能返於隆古者其政教非也三代之時經制定於上其車服有等其宫室有度其飲食器用有制雖一寸之微一絲之辨必為之釐定而頒布之而又為立大學以教於國設庠序以化於邑日夜以孝弟忠信磨勵其民人其有竒邪蕩泆之民則鄉大夫州長閭胥之徒以時糾而去之故民之生也所見皆仁儉之風所聞皆仁儉之訓少而習焉其心安焉一有不如是者則鄉里相與怪之栗焉而不寧澆漓侈奢何自而生乎若夫漢唐宋之時其所重者在簿書期㑹所急者在錢榖兵師而凡先王所以導民之具則以為迂闊而不暇為閒有賢君發憤而行之亦不能如三代之詳密則其俗之不古若也豈不宜乎由斯以觀則政教者風俗之本原也不深加意於政教而徒咎風俗之不古曰吾民不如三代之淳不如三代之朴噫是果民之不如三代耶抑所以導民者其本原猶未得耶國家承明季之衰其澆侈之習已非一日宜執事慨然思欲為之所愚以為欲反今日之俗而登之隆古無他亦惟以三代所以導民者導之而已愚非敢謂三代之法可一一施之今也然其大體固有不可得而易者其一則經制宜定也民之所以不敢厭縱其耳目者有上之法制為之防耳茍法制所不及則何憚而不為今民閒冠婚喪祭之禮宫室飲食衣服之節初未嘗有定制也惟其力之能為則無所不可富者炫耀貧者效尤物力既絀則繼之以貪詐故靡麗日益亷恥日消誠宜畫為定制使尊卑上下各有差等不得踰越庶幾儉朴可興貪詐可弭其一則學校宜廣也民之所以不入於淫蕩安其朴素者以其知禮義之可重耳茍禮義不足動其心則朴素必不如奢靡之可樂忠厚必不如淫蕩之可慕學校者所以教民禮義也今惟州縣有學又止及於生徒而董其任者亦止掌其冊籍核其進退未嘗有所謂禮義之教人不知以行誼自重則惟以服美為榮何怪風俗之日澆日侈乎宜選方正有道之士為州縣之師長重其祿秩而又倣古里孰黨庠之制以農隙教導其民使知禮義之可重而無慕乎澆侈其一則賞罰宜審也民之所以從上之令者以其賞罰行焉耳賞罰不行而欲其從令不可得也今朝廷之賞罰亦綦嚴矣而獨於奢儉淳澆之際未見有賞罰行焉胥吏被文繡富賈為雕牆而有司不問子弟凌父兄悍僕侵家長而有司不問而其忠厚朴素不隨時好者則徒為笑於鄉里不聞有所奬勵如此安望其不為澆侈乎宜敕有司以時訪於境內舉其尤者賞罰之而即以風俗之淳疵為考成之殿最庶有司不敢忽良民知所勸而莠民知所懲凡此者皆所以導民之具而風俗之本原也誠一一舉而行之而皇上以恭儉之德端化源於上公卿大臣樹惇守素奉宣德意於下寰海內外有不返朴還淳去奢從儉其登三代之盛者未之前聞倘曰簿書期會錢榖兵師今日之急務何暇為此迂闊愚恐風俗之日澆日侈所謂今日之急務者亦將理之不勝理也三魚堂外集卷三
