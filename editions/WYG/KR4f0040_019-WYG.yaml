body:
  text: 三魚堂外集附録清故文林郎四川道監察御史陸先生行狀貫嘉興府平湖縣華亭鄉二十四都異字圩曾祖錫𦙍妣姚氏祖瀗妣李氏父元封文林郎妣鍾氏曹氏贈孺人先生諱隴其初名龍其後改今諱號稼書姓陸氏裔出唐宰相宣公世為浙之平湖人宋季有靖獻先生正以學行聞於時元初程文海至江南訪求賢材以正與張伯淳薦正獨不起尋又與劉因同徵固辭不應隠居著書詳具邑舊志靖獻曾孫宗秀明永樂未以賢良徵仁宗引見於便殿奏對稱㫖以疾辭賜鈔幣還正統中傾粟麥賑飢勅旌尚義子珪景泰中出榖千數以賑者再賜爵迪功郎自後子姓繁衍科第貴盛孝義雍睦迄今以禮法甲邑中迪功孫溥為豐城縣丞嘗督運夜過采石舟漏跪祝曰舟中一錢非法願𦵏魚腹漏忽止旦視之則水荇裹三魚塞之人以為盛德之祐溥子東始遷居泖上築堂名三魚今先生文稾率稱三魚堂者以此東四世孫瀗先生祖也瀗長子燦崇禎甲戌進士濟南府推官戊寅歲被兵城陷闔門殉難今祀於鄉賢第三子元先生父也邑庠生以先生貴勅封文林郎繼室曹實生先生先生端重静嘿聰穎過人兒時封公授以左氏傳稍有芟節先生舉所芟盡讀之詰朝暗誦不遺一字後授六經子史輙上口成誦少長勵志聖賢之學專意洛閩諸書嘗點勘四書大全參以䝉引存疑淺說之要而一折衷於朱子每讀一句必反覆玩味俟其貫通其於科舉之業功名之㑹泊如也先生少食貧嘗授徒嘉善館席一樓下樓久就圮先生作危樓文以見志有李氏欲延之託友道意先生曰我固願往但館榖不可有加使我有以謝主人其審義利決取舍一介不與一介不取之節素所樹立固如此順治丙申補邑弟子員尋食餼康熙丙午舉於鄉庚戌成進士需次里居則益肆力於學凡程朱之文集語録以及有明諸儒之書莫不咀其精英抉其瑕疵至於嘉隆以後陽儒隂釋改頭換面之說亦皆悉究其微而盡燭其蔀於是居敬窮理履仁蹈義粹然一出於正矣乙夘授嘉定縣知縣嘉定為濱海大邑土高乏水民多逐末以故城居者少而富商鉅室散處市鎮武斷暴横相沿成俗富者競奢麗貧者舞刀筆喜事健訟又夙有饒裕名旅客圗潤囊槖者往來如織胥役土豪倚為姦利不可方物號稱難治地不産米漕糧例任之他邑而代輸其折色故徵銀倍於他邑積逋動以萬計令率坐是落職先生至歎曰民不輸賦大率以貧也其所以貧風俗為之也譬如少年以遊冶傷其元氣力不能服勞為父兄者禁其遊冶則元氣自復不禁而予以飲食抑末矣今且不為飲食而又督過之則官與民俱病固其所耳故其治一以鋤豪强抑胥吏禁侈靡變風俗為主大賈汪姓者素交結長吏横行邑中先生蒞任適其僕佔賣薪者妻賣薪者來控先生命拘汪僕匿弗出益遣役捕之訊得其實以妻還賣薪者汪大恐令所識探意先生曰人無不可自新茍為善即善矣汪平日所為我知之若毋犯我自新未晩汪感泣果不敢有犯市鎮少年數十為朋以拳勇毆擊為豪用細民畏苦之先生盡廉得其名遇有控者責而械於門時時勸諭之視其情色果悔則釋不匝月其黨悉解散民有告其子不孝者訊之果然即涕出自訟曰我德薄無以化汝令汝父子至此因委曲曉譬娓娓踰時其父泣其子亦泣乃慰而遣之大塲鎮民有兄貧稱貸於弟不應輙舁弟物以去弟賄巡檢司以報盜先生怒曰是可以為盜乎訊之乃其弟婦翁所為遂痛懲之因呼其弟曰彼兄也乃聽婦翁謂兄盜不悌也責之又呼其兄曰汝為長貸弟弟不應而徑取之陷汝弟不悌是汝不友也亦責之咸感服而退俗素澆父子兄弟不相顧恤者日見告自後遂無一來控者先生折獄不甚拘於律聽斷時孝悌忠信之名不絶於口和平惻怛以至情相感動使人心悅而誠服有恥而且格踰年後訟者亦絶少案牘幾廢惟上官以他邑事屬訊者日至孔子謂聽訟不難使無訟為難先生殆庶幾焉嘉邑胥役向以千數先生至官未幾易業自去者過半葢邑所轄地廣而事劇勢不能不多役先生惟輸解上官乃遣役絶不令至民間有不獲已則戒其需索酒食役心服先生潔己愛民莫不恪守其戒民亦信先生之愛己常不待役至先期而赴地雖廣不啻臂指事雖劇率咄嗟而辦故多役為無用而相率自化呉俗尚侈靡邑尤甚富室宴㑹窮極華縟娼優猱雜費以百十計貧者轉相倣效至有方丈對客而㸑下乏薪粟者婚喪皆盛鼓吹酒食稠叠以多費相誇勝縗絰醉倒不以為怪博奕遊手獻笑覓食之輩多於四民謂之清客市井子弟日遨遊街肆以布衣為恥用是財益匱乏逋賦日積先生痛禁飭之懇切教戒且以身先俗乃一變稍稍知禮法賤惰遊嗇衣食急賦稅催科不迫督而自集矣前此催科者惟事敲扑貧民業窘於輸而一遇限期償杖錢又數倍先生至為立甘限法令應輸者自限輸若干屆期及半即得宥以故絶不用杖而輸者争至在任二年逋尾絶少惟接徵前任者止十一二先生之意欲更休養一二年使給足好義決不尚有逋賦然竟以此不獲於上官先生始至時巡撫為廣寧馬公有亷名頗愛重先生静寧慕公繼之亟稱先生治行略嫌其儒術迂緩丙辰上允晉撫議暫抽市肆錢一年佐餉例不及巷􅅤先生如例造冊報徵慕公不悅疏言時方多事該令當列侍從從容諷議非應變材部議遂引材力不及例降二級調用嘉民大駭罷市日號巡撫門乞留巡撫不自安為再具疏請復未及下而先生又以盜案落職矣盜案者邑民張與汪姓者以小隙訐訟汪赴理夜遇盜傷歸謂其弟曰張遣殺我言訖而絶汪弟遂以讎殺控先生疑小隙無殺理而張亦不似殺人者汪以不刑訊張大哭於庭先生乃以實報謂是盜是讎未敢遽定俟緝獲兇犯定擬而一面遣捕役緝之尋獲真盜七人讞上部議以先生初不直指為盜疑有諱匿引例革職而不知先生固從命案勘出盜案非原詞稱盜而諱之為讎殺也人謂先生盍辨諸則曰是咎誠在我邑有盜長吏固宜罪且夜半殺人於路果讎亦盜也而我不能斷議黜不枉奚辨為嘉邑益大震耆老士紳悉詣督撫為辨卒莫省里民扶老攜幼填塞街市為先生呼寃以薪粟餽者麕至號泣請受先生盡慰而遣之即胥史輿儓宜幸其速去者亦無不涕泗霑臆委巷悉架枅結綵然燭額手以送逺鄉之民各刻木為位旌幢鼓吹迎歸以祠者日數輩凡兩月乃己四方人士競為詩文以傳之彚為公歸集邑有陳生者老矣未嘗與先生相識特蠲脩脯授諸梓至今邑人言及先生皆泣數行下謂建縣五百年所未有也適詔舉博學鴻辭同郡工部呉公凖菴遂以先生名薦㑹丁父憂不果應試蔚州魏公環極晉總憲首抗章言先生寃再疏舉亷吏十人縣令居其二一即先生也奉㫖復原官先生雖被薦復職服闋後雅存誓墓之志徘徊再三郡縣敦迫乃起又素懐秉鐸之志且慨當世任教職者多非其人赴部時欲求改選教授遴諸生之有志者而訓之銓部以方奉特㫖不便改授而止癸亥冬補靈夀縣知縣靈於真定最為磽瘠易患水旱迫近畿輔多徭役俗强悍善鬬少訟而輕生先生曰民富而後可以教輕生之習禁令尤嚴然未盡絶者民貧而不知義也嘉定可使富而不及為靈邑又非嘉定比奈何力言於上官非大恤民力不可時派運上供石灰騾車靈以五輛視他邑獨多前令争之不能得民以病告先生首以為請至以去就争乃得更代邑北負太行南濱滹沱不毛之土十三而贏順治康熙間兩奉㫖盡蠲其征後以言者復申隠地處分之例州縣畏罪稍有首報由是倚山瀕河之地間可耕穫者亦相戒不敢墾先生掲示遍曉謂荒地雖係瘠壤豈無略可播種收升合之利為餬口計者爾民或慮一行播種便當起科所入不足以完稅利有限而害無窮然朝廷決不與爾民争此些須之利爾民但耕種勿慮於是漸有闢者先生在任七年竟無一畝首報靈邑額丁萬四千有奇例五年一編審必增數十丁至先生審丁反虧額一千五百有奇葢前此為令者以溢額為功逃亡死絶不敢復除而攤派包賠之累日甚先生謂如是是驅之使逃也具以實聞上官且曰裕課之道惟有愛恤窮民使漸充足逃亡日少則國課日增若目前形勢實難就筋力疲盡之民責其無缺也適巡撫于公諮訪利弊先生遂調陳六事略曰職静觀今日之時勢百病之源起於民貧非無憂民之吏懐痌瘝乃身之志而民卒不免於凍餒者拘於法而無如何也得君如憲臺可為民請命於法之外矣敢畧陳一二以備採擇一曰緩征宜請也自古稅斂必俟稼穡登塲而後上供可辦向以兵餉之故正月開徵有餘者尚可勉强支吾不足者勢必轉貸所入不足以償僨何論仰事俯育所以閭閻日窮逃亡日多地畝日荒今四方寧謐司􅑫不至告匱若可通融總計以上年撥剩之銀暫抵本年春夏之餉俟秋成催解以補庫額一轉移間而民力以紆矣一曰墾荒宜勸也朝廷屢下勸墾之令而報墾者寥寥非民之不願墾也地土瘠薄荒熟不常一報開墾轉盼六年起科所墾之地己枯為石田蕩為波濤而所報之糧一定而不可易所以小民視為畏途聽其荒蕪而莫之顧竊謂此等荒地原與額内地不同與其稽查太嚴使民畏而不敢耕孰若稍假有司以便宜使得以熟補荒如新懇復荒者聽有司查他處新懇地補之其荒糧即與除免其已墾成熟者請寛至十年起科民不畏墾之累自無不踴躍於墾矣一曰水利當興也墾田在興水利古人溝洫之制隨時修理故不覺其煩費今以久湮久塞之河道一旦欲疏勢難猝辦然屢年以來議蠲議賑所費不可勝數與其蠲賑於既荒之後何如講求水利於未荒之前宜通查所屬州縣水道何處宜疏通何處宜隄防約長濶若干工費若干彚成一書進呈御覽請司農度錢糧之贏絀以次分年舉行以一時言之雖若不免於費以久逺言之比之蠲賑所省必百倍一曰積榖宜廣也功令最重積榖然止蠲輸一途在富饒之邑猶可鼔舞勸輸若山僻疲罷如靈夀者雖懸旌勵之典其誰能應當稍為通融如荒地可開墾者許有司設法募人開墾收其所入貯倉備賑勿責其起科一切河淤地畝雖己入糧原非額内者許其量留吏員應納銀者許其入榖不必起解牙帖雜稅新增者編審人丁溢額者悉許留本地方積榖諸如此類推廣行之庶幾疲罷之邑皆有榖以救災荒至於在倉之榖宜聽有司酌量支放先發後報平時出陳易新聽從其便勿因不肖之侵欺而盡掣賢者之肘則民庶有賴矣一曰存留宜酌復也自兵興之際將存留款項盡行裁減由是州縣掣肘私派公行不可救止百弊皆起於此康熙二十年漸次奉復然尚有應復而未復者如衙役犯贓之律甚嚴而書辦之工食獨不復不知此輩能枵腹而奉公乎抑將舞文弄法以為仰事俯育之貲也心紅紙張修宅家伙州縣必不能免既奉裁革不知天下有司皆能蠲俸自備乎抑或責之舖户派之里下者也上司過往下程中伙雜支供應州縣必不能無既奉裁革不知上官之臨州縣皆能自備供應自發價值乎抑或不能不藉資於地方也在主計者惟知復一項則費一項之金錢不知裁一項則多一項之掣肘掣肘之害層累而下總皆小民受之小民疲罷逃亡其害仍自國家受之又其一則謂審丁不宜求溢額也且曰果有丁盛而溢額者宜命有司留為積榖之用不必入額遇有逃亡絶户即以此補之其無溢而有缺者得報上蠲免或不肖有司無缺而揑作有缺則自有糾劾之典在總之寛一分在州縣則寛一分在窮民上之搜求於州縣者無餘地則州縣之搜求於窮民者亦無餘地不肖者固樂於搜求賢者亦不能不搜求而民之塗炭日增日益矣末又言一切刑名錢榖務持大綱而止無益煩文俱宜省去如錢榖毫忽之差可以即行改正者無庸駁詰刑名案件明白顯易之事可以即行完結者無庸提解多一畨駁詰則多一番需索多一番提解則多一番拖累吏胥所深喜而小民所深苦也先生所陳皆籌畫久大之謀非徒為一時補救之術真有如于公所稱許者己巳夏大旱無麥秋大風隕霜禾盡槁奉㫖蠲免錢糧發帑金兼支倉粟賑濟靈邑貯榖僅二百石有奇而飢民核有二萬三千八百餘名口奉撥帑金三千兩先生躬為部署驅馳山谷夜以繼日而府檄以限單至不許踰額先生不顧卒盡散之幾欲責令先生賠補僅而得免先是甲子夏雨江總制于公薨於任上臨朝痛悼問九卿詹事科道今天下清亷官如于成龍者有幾人於是九卿等以直𨽻巡撫格爾古德部郎范承勳蘇赫江南學道趙崙揚州知府崔華充州知府張鵬翮靈夀知縣陸隴其對時雖未即擢用然七人者後多至大官有聲名上固己心識之矣及蒞靈一年巡撫格公薦先生清操飲冰愛民如子題請擢用庚午夏科道員缺上面諭部院官各舉所知於是工部尚書張公敦復左都御史陳公說巖兵部右侍郎李公厚菴禮部右侍郎王公昊廬交口論薦遂奉俞㫖行取先生念靈邑頻年饑饉未有起色正供猶恐不支而雜稅泛徭未盡除減將永為民累業當謝事乃於數日内盡為申請首乞緩征又乞房地稅句係墊解不可為常勢必仍派里下題請量減又乞上司供應久奉全裁宜永逺革除又乞將貯倉米榖不時借放飢民巡撫于公報曰以謝事之時為災黎起見真仁人君子愛民至意臨行邑民哭送者數萬竪碑志遺愛如去嘉定時是年秋補四川道試監察御史遂上疏曰臣官畿輔久知畿輔之民情邊山一帶荒多熟少自昔為然康熙十二年以後軍興緊急雜派繁多民困滋甚賴皇上加意撫綏禁止私派不惜蠲賑鳩鵠之民僅延殘喘然言乎家給人足則尚未也臣觀自古豐亨之治皆非一日而成惟皇上常持此勤恤之心期之以積久勿責效於旦夕恩己厚而不嫌更厚心己周而不嫌更周則家給人足庻乎可望至目前所當議者上年畿輔荒旱實異尋常雖間有未被災之處亦不過稍有升合差勝於被災者耳初奉上諭二十八年及二十九年上半年錢糧盡行蠲免後因部議分别不准概蠲百姓甚苦撫臣不得巳題請帶徵雖今歲秋收稍稔既徵其新復徵其舊恐非積貧之民所能堪也葢先生任靈夀時徵糧地九百三十餘頃未被災地止七十餘頃後又以彚冊失開秋災地三百餘頃雖奉全蠲其實止半致聖恩不得下究故首疏言之未幾湖廣總督以撫臣在任守制請舉朝頗右之先生上疏曰臣辧事衙門聞九卿科道㑹議湖南巡撫于養志在任守制一事昌言其不可者固有其人而依違不斷者比比而是臣竊怪之此明白顯易之事有何可疑而依違若是夫治天下之不可不以孝易明也在任守制非所以教孝易明也天下正當承平之時湖南又非用兵之地無藉乎在任守制易明也皇上以孝治天下在廷諸臣沐浴於皇上孝治之中久矣何難一言直斷其不可耶且臣不知議者以養志為何如人其非賢者耶則固不當使之在任守制矣如其誠賢者耶則必不肯在任守制矣在督臣代為題請或從愛惜人材起見然臣以為使之解任全孝正所以深愛惜之況皇上一日所行天下萬世奉為法程者也若使一撫臣因督臣題請而留皆將援此為例其不思僥倖奪情者鮮矣名教自此而弛綱常自此而壞此端一開闗係非淺至於湖南一省之人是則是傚不復知有父母又無足論矣尋有㫖如先生言辛未夏上以久旱諭諸臣協同㑹議直陳利弊先生遵上三議其一言直𨽻被災帶徵錢糧當急豁免一言直𨽻編審人丁宜求均平一言蠲納保舉之法斷宜停止皆切中時弊既又上疏曰夫蠲納一事原非皇上所欲行不過因一時軍需孔亟不得已而暫開復恐其賢愚錯雜有害百姓故立保舉之法以防之慮深逺矣近復因大同宣府運送草荳并保舉而亦許蠲焉則與正途無復分别且保舉所重莫重於清亷故督撫保舉必有清亷字樣方為合例若保舉可以蠲納則是清廉二字可蠲納而得也此亦不待辨而知其不可矣若夫蠲納先用之人大抵皆奔競躁進之人故多一先用之人即多一害民之人此又不待辨而知其不可者矣臣更有請者臣竊見近日督撫於蠲納之員有遲之數年既不保舉又不叅劾者不知此等官員果清亷乎抑或在清濁之間未可驟舉驟劾乎夫既以蠲納出身又不能發憤自勵則其志趣卑陋甘於汙下可知使之久踞民上其荼毒小民不知當何如故竊以為不但保舉之蠲納急當停止而保舉之限期更當酌定伏乞勅部查一切蠲納之員到任三年而無保舉者即行開缺聽其休致庻吏治可清選途可疏而民生可安及奉㫖同往㑹議又獻議力争曰蠲納一途實係賢愚錯雜恃保舉一綫可防其弊今若并此一綫而去之得與正途一體陞轉國體之謂何恐未可云無礙也雖有次年三月停止之期然待次年三月停止則此輩無有不蠲納者矣澄叙官方之大典豈不蕩然埽地乎此臣請速停保舉之蠲似難無容議者也至於設立保舉而不定限期則不肖之員多因循一日百姓多受累一日即云設立限期反生營求之弊此在督撫不賢則誠有此若督撫賢明何處營求臣不敢謂天下必無一賢明督撫也即使督撫不賢亦必不能盡蠲納之人而保舉之此臣請定保舉限期一議似亦難無容議者也時大兵草荳需運甚急計臣方恃蠲納一項以濟國用當軸者亦頗以為便治標治本各持一見與先生既相水火而富室儲貲日夜俟開例希進者相率彈冠不啻飢渇即諸臣以蠲納進者内外都有先生於疏議中痛詆斥之由是都士大譁部議以先生拘執資格致蠲納之人猶豫觀望遲誤軍需飾虚詞紊政事負言官之職擬革職謫奉天安插於是朝野有識之士莫不代為歎息扼腕時庶常張君昺向欲從先生受教未果至是恐遽失之即日執贄為弟子而先生曾無幾微見於顔面泰然處之將促裝就道顧上心知其無他特原宥之俾仍舊職是年冬試俸滿遂從改調歸論者以先生持論太嚴進言太驟致叢衆怒席不暇暖以去使稍和平委曲相時而動其所樹立殆未可量然枉尺直尋未有不至枉尋直尺者也故寧直道而三黜必不枉道而徇人從古聖賢道理如是先生惟知秉義以自處守正而不渝利害得失豈所計哉先生既歸屏居泖口足跡不一至城市閉户食貧讀書課子茅屋數椽不蔽風雨布衣蔬食泰如也先是先生嘉定罷歸工部席君啟寓相延至家至是復懇延先生先生欣然往與學徒論制舉業踽踽若故寒士凡有就正者必為之闡明義理辨晰精微誨人不倦先生有焉在館一年貌加腴色加晬人方謂先生涵養自然中和備至天必將以其身任明道之責成繼往開來之功其年夀正未有艾孰意臘月館歸偶感寒疾一日遽卒四方學者聞之莫不痛傷泣下悼喪其師而嘉定之民相率至先生祠哭弔者踵相接也先生於世俗嗜好一無所留意惟濟人利物之念不釋頃刻未第時語及民生困窮風俗澆薄必愀然於色兩為縣令嘗以程明道一命之士存心利物之言横於胸中及任御史侃侃正言直聲震天下遭遇聖明庶幾一展其志而在外既不得志於上官在朝復不見採於當軸特立獨行幾陷大戾賴上恩得釋再起再躓卒不究其用以死惜哉先生之學繩尺考亭以居敬窮理為要謂窮理而不居敬則玩物喪志而失於支離居敬而不窮理則將埽見聞空善惡其不墮於佛老以至於師心自用而為猖狂恣睢者鮮矣自有明中葉姚江倡良知之說鼔動一時而聖人下學上達之法所以為規矩凖繩者盡決裂破壊邪說詖行蠭起蔑禮法放名教人心大壞而國運隨之陷溺之害至今而未己故為今之學者必尊朱子而黜陽明然後是非明而學術一人心可正風俗可淳嘗著學術辨三篇又與河南湯宗伯潛菴山西范進士彪西書往復辨論夫白沙陽明之病今世學者亦類能知而言之至於涇陽景逸固宗程朱固斥陳王而謂其偏於主静近於禪學是非先生深入閫奥辨析秋毫豈能為此極論哉先生在靈夀時率五日一至學宫集諸生講四子書諄諄於義理邪正之辨彚為松陽講義百餘篇而其言曰今之為世道計者必自羞乞墦賤壟斷闢佛老黜陽儒隂釋之學始一編之中三致意焉其衛道之心可謂嚴且切矣先生天性孝友迎養封公於嘉署定省温凊備極肫樸以奉薦入都不獲視含斂為恨孺慕哀泣幾不欲生居喪不作佛事服闋猶不忍肉食至於友愛兄弟雖堂從如一教之若嚴師恤之若慈母歡好無間祖殯未舉獨任之不以及諸弟親戚無後者輙為之殯少壯時能飲酒不亂後以仲弟有酒過遂絶飲冀以化之未幾而仲弟歿先生遂終身不飲居常容止慤敬一言一動皆有法度坐必端正立不跛倚行必正以莊語必徐以簡燕居齋如若對嚴賓事無鉅細皆極誠敬自少至老無惰容率性自然不由勉强人謂其恭而安家故貧及登仕籍貧益甚人所不堪先生絶不為意衣足以蔽體食足以充腹不辨美惡祁寒盛暑不爐不扇賓客往來披襟忘倦傾所有具雞黍前輩講學之書未經見者輙賃衣易之雖晡粟不繼不顧也先生性情謙謹和厚善氣襲人雖告戒僮僕亦煦煦若子弟及辨正學術分别是非則反覆痛快不少回䕶至於民生之休戚政事之得失忠愛迫切尤抗言極陳不暇顧忌坐是與世齟齬但以戅直結九重之知終以激烈來衆口之怨而至於事後則雖嫉先生者又未嘗不心服其言而諒其心也先生為令時上官有欲招致門下者堅執不允用是失歡又嘗以公事至都門政府欲一見之接淅而行即魏公環極薦先生於朝亦不先自私謁其履蹈不茍又如此先生雅不喜以辭章自鳴然經史淹貫義理粹精其發為文章皆昌明博大純正有體有德者必有言非世之絺章繪句誇多鬭靡者比也所著述有靈夀縣志松陽講義及評選國䇿去毒五十篇手定先正一隅集己刋行其篋中所遺有問學録一編日鈔二十巻尚有語録若干文集若干方在彚緝俱未授梓先生生於明崇禎庚午十月十八日卒於康熙壬申十二月二十七日年六十有三配朱氏封孺人子二長定徵娶曹氏先卒次宸徵娶王氏初繼仲弟先生未卒前一日命季弟以其次子繼而宸徵仍為先生後女二長適太學生金山李鉉次適太學生平湖曹宗柱撫仲弟之女一適太學生秀水張金城宸徵寢處苫塊心志瞀亂不能撰次先生行事家復清貧即兆宅之卜亦尚有待而二三戚友暨及門之士惟恐先生之嘉言懿行日久而漸有遺忘因屬崇樸為狀崇樸自惟識見卑陋詞理荒淺不足以傳先生之萬一顧嘗歴覽史傳大凡理學著稱者未必盡嫻治術循良表異者未必悉勵純修故儒林循吏分途各見求其大成無憾者惟朱子能全之惟先生克繼之葢先生之學朱子之學也先生之志朱子之志也故先生之宰嘉定宰靈夀仁育義正吏畏民懐即朱子知潭州知南康之治理也先生條奏三疏直陳三議勤恤民隠飭厲官方即朱子經筵劄子便殿奏劄之議論也先生之筮仕嘉定擢拜臺中俱甫一年旋遭罷黜即朱子登第五十年仕於外者僅九考立朝纔四十日之出處也至朱子正心誠意之奏輙嘗稱善先生孝道為萬事之本一疏亦荷允行總以忠誠懇惻上邀主眷亦無弗同者卒之直道不容忌之者衆雖有推之之力終不敵擠之之工然其所可擠者身也不可擠者道也所以朱子之道愈逺而愈光則先生之道歴久而後顯理有必然無可疑者失今不傳其何以明當時信後世故不敢辭避輯録見聞述其世系爵里出處之詳與夫學問政績言論行事之大以俟當世大人君子誌之墓石載之國史以垂不朽謹狀康熙三十二年四月内閣中書􅅤人同郡後學柯崇樸狀三魚堂外集附録
