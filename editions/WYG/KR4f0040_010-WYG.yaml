body:
  text: 三魚堂文集卷十贈内閣學士陸隴其撰記畿輔八府地圖記康熙甲子有詔命天下考正山川之圖井陘道僉事李公分查保定真定順徳廣平大名五府之地天津道朱公分查順天永平河間三府之地既徧乃合而為圖以上隴其備員俗吏得縱觀焉蓋畿輔之水惟永平之灣渝諸河自入海其餘皆歸於衞白二河以入海衞發源河南衞輝府輝縣蘇門山百泉流經直𨽻濬縣滑縣内黄大名縣過大名府城南折東經山東館陶縣臨清州為運河至天津而入海白河又名潞河在密雲縣南十八里自密雲過懷柔順義通州香河武清至天津三岔口與衞河合流入海大名之水如洹如淇皆自入衞順徳廣平之水如􅇭陽如漳皆經大陸㑹於滹沱以入衞真定之水如滋如派如滱保定之水如漆如易如徐皆㑹於任丘縣趙北口之四角河又東至霸州保定縣為玉帶河順天之水如拒馬如琉璃皆㑹於渾河合玉帶河而入白滹沱河在真定府城南八里發源山西太原府繁峙縣由鴈門流經直𨽻靈壽平山遶真定府城南歴藁城晉州束鹿至冀州㑹􅇭漳二河過衡水武邑武强至河間府獻縣為二攴一東流為鹽河一南流支河縣抵青縣岔河口入衞漳河在成安縣南五里有清濁二水濁漳發源山西潞安府長子縣西發鳩山清漳發源山西太原府平定州樂平縣流至河南歸徳府武安縣交漳口合流至磁州三臺口一支東流入直𨽻廣平府盛安縣經肥鄉抵曲周東南一里合􅇭陽河一支北流入邯鄲縣經永年至曲周㑹􅇭陽河歴雞澤平鄉任縣隆平寧晉至冀州合滹沱河􅇭陽河在廣平南五里發源河南彰徳府滋州神麕山流至邯鄲縣㑹渚沁二水由永年抵曲周㑹漳河大陸澤一名廣阿澤受水之處在任縣鉅鹿隆平寧晉一帶每水發時浩淼無際禹貢所謂大陸既作者是也趙北口之四角河在任丘縣西北五十七里一接高陽河一接長流河一接白溝河之一支流過趙北口由柴火淀入玉帶河玉帶河在保定府北城外接柴火淀東流㑹渾河合流又分四支曲折流入信安河石城淀慈老淀落坡淀黑母淀四角淀文爾淀總滙三角淀歸白河高陽河在雄縣城南二十里上流即猪龍河至雄縣名高陽河由蓮花淀入四角河猪龍河在新安縣南十六里上流即布裏河至新安名猪龍河布裏河在高陽縣東二十里上流即楊村河至高陽縣名布裏河楊村河在蠡縣南十里上流即滋沙滱三河自祁州三吩口合流至博野縣境名蟾河至蠡縣名楊村河滋水在真定府城東北三十里發源山西大同府靈丘縣枚回山流經直𨽻靈壽行唐真定藁城無極深澤至祁州三吩口合滱沙二水沙水即派河在新樂縣南關外發源山西太原府繁峙縣白坡頭口流經直𨽻阜平曲陽行唐縣新樂定州以至祁州三吩口與滱滋二水合流滱水即唐河在唐縣西南二十里發源山西大同府靈丘縣流入倒馬關經直𨽻唐縣西南過完縣曲陽定州至祁州三吩口合滋沙二河定州北十里有清水河發源白龍泉流至城北入滱水俗亦謂之唐河白溝河在新城縣南三十里由定興縣南流來在定興河陽渡係淶易沙三河㑹流處俗名北河經容城至雄縣城南東流矛兒灣入玉帶河一支由容城縣分流至雄縣西三里名黄灣河又經新安流入四角河淶水即拒馬河在淶水縣東三里發源山西大同府廣昌縣流入紫荆關過易州西北界至房山縣境分為二支一東流涿州經固安縣東南入渾河一南流淶水縣經定興新城入白溝河易水在易州南三十里發源易州寛中谷流至定興縣北河村合拒馬河入白溝河沙河即遒攔河在淶水縣西十五里發源本縣平樂山流至定興為沙河入拒馬河長流河一名長溝河在新安縣西南五里上流即徐水雹水合流至新安名長流河徐水在安肅縣南四十里又名順水發源山西大同府廣昌縣經直𨽻昌州五迴嶺流下為雷溪至滿城縣為大冊河至安肅為徐河過清苑折東與漕河一畝泉方順河合流達安州城北為依城河至新安合雹水為長流河瀑河在容城縣西南十二里即雹水自安肅流至容城下流安州新安入長流河渾河即桑乾河在宣府西城南十里發源山西大同府馬浥縣桑乾山金龍池接山西天鎮衞流入直𨽻宣府鎮西城東城深井堡保安州礬山堡缺縉山下名縉河南流名合河經沿河口流至宛平縣蘆溝橋俗曰渾河達固安縣境南分一支入新城縣東轉流入霸州一支順流又分岔復合流入霸州遶城東南名通濟河流入玉帶河大抵千流萬派而衞白二河其綱也入衞諸水滹沱其綱也入白諸水渾河及趙北口之四角河其綱也以禹貢之迹言之在畿輔者有澤水有大陸有九河有衡漳有恆衞大伾山在濬縣東南二里不與西北諸山相接大陸即任縣鉅鹿隆平寧晉之大陸衡漳即合􅇭陽滹沱之漳也恆水在唐縣西七十里俗名横河發源恆山北合經縣西南流入潞水或以為即派河者非也衞水發源靈壽之良同村東南流四十里入滹沱河非衞輝之衞九河濟水此圖不載其處黄河故道在開州南一百二十里俗名響子口由河南流來經直𨽻長恆濬縣湑縣東明開州元城等州縣又過山東館陶縣界入直𨽻清河下達河間歸海按漢河決酸棗河決瓠子自塞宣房後河復北決館陶分為屯氏河東北經魏郡清河信都渤海入海正統間河決陽武循響子口故道東州抵濮州張秋入海𢎞治二年決封丘荆隆口漫子長垣東明今河水南徙益逺故道淤塞瓠子宫在滑縣北十里賈讓治河策云決黎陽遮害亭放河使入北海遮害亭在濬縣南五十里一展巻而古今水道之源流了然在目誠壯觀也使廟堂之上因是而講求其蓄洩之法如禹之盡力於溝洫者以防民害而興民利則是圖之所係豈淺鮮哉宋曹氏墓碑記靈壽人物著於史策者莫如燕昌國君樂毅宋濟陽武惠王曹彬其功業烜赫固不待言至如昌國報燕惠王書云君子交絶不出惡聲武惠平南唐歸奏云奉勅差往江南勾當公事回其不怨不伐雖儒者白首居敬窮理之功有未能到是者是豈尋常將帥所能企其萬一哉余謂兩賢天資固不同當日必有得於師友講論薰陶之益者惜其淵源不可考矣及承乏兹土得盤桓於二公桑梓之地不勝高山景行之思間嘗問其遺老冀得其遺跡而昌國君墳墓里居已無復有知之者獨縣北朱樂村南相傳有曹氏塜亦未知其為武惠歟抑武惠之上世若子孫歟寧晉亦有曹氏墓與此孰先孰後皆不可知余親造朱樂村徘徊其域則蕭然一平衍漫無丘隴計地廣二十步縱二十二步東去松水百五步南去朱樂村百四十步片石偶立者四皆剡其上竅其中意必塋坊夾柱之石而規制粗陋似非勲戚家所用疑是後人表識之物蓋曹氏當靖康之末子孫多從高宗南渡無復在北者又歴金元用兵之際故至今纔七百年而若存若泯至於斯歟抑當時武惠謙恭不伐其規制本不甚𢎞壯故易就湮沒歟余以語傅維橒曰武惠之跡在靈壽者僅此一塊土豈可使當我世而湮没耶傅君曰吾邑西阜安村有韓太保墓者無碑誌可稽無封樹可識特元末東平趙哲有韓太保墓碑數百年來遂指為韓忠獻億不知韓氏遷雍丘之後果還葬靈壽耶或其先世贈官有至太保者耶忠獻第六子縝以太子太保致仕或令縝留守祖墓不隨遷者耶前人好附㑹而後人輕信聽未可知也今曹氏墓亦在疑信離合之間弗傳疑焉懼又如韓氏傅君斯言春秋書夏五郭公之意也余既不忍武惠之泯泯於兹土而又嘉傅君之能慎并記之於石云衞水尋源記靈壽縣治東北十五里有良同村衞水發源於其北即禹貢恆衞既從之衞也由良同村東南流四十里而入於滹沱河衞在恆陽特一小水耳而見於水經見於漢書見於禹貢其名赫然蓋此水在唐虞時或苦汎濫不似今之安瀾且按今松陽淤泥慈􅆜諸河皆逼近於衞安知當時不同滙於此源逺而流長非僅如今之限於四十里也桑田滄海變易無常安能據目前所見而遥斷數千年以前之形勢哉採舊聞述殘編想見古聖人憂民之心則可矣今康熙二十三年夏僉事李公奉命查考輿圖至靈壽求問所謂衞水者親造良同村之源而臨視焉值歲旱源竭非但無唐虞之汎濫比班孟堅酈道元之時水勢亦迥然不侔矣公慨然賦詩一章其末云萬世聖人憂在水誰將飢溺繪吾民蓋欲以禹之憂洪水者憂吾民凡政有未善吏有不肖皆吾民之洪水也其憂何時可已耶公之意亦深逺矣哉今之在民上者誠能皆以公之憂為憂則天下豈難治也隴其謂公此念實可與大禹八年胼胝四載隨刋之事同垂萬古謹記於末以告後人云靈壽縣知縣陸隴其敬記丁滙湖放生記海鹽之丁滙湖我六世叔祖銓部胥涇公之墓在焉是湖舊為放生之所自明季以來其禁廢弛網罟交錯其中近年我族之好生者請於官復申舊禁一時鱗介之屬得安其所亦盛舉也余竊惟王制澤梁無禁聖人愛物止云釣而不綱故放生非古也自佛氏始也然君子或有取焉者豈非以其一念不忍擴而充之不可限量乎昔齊宣王不忍一牛而孟子謂是心足以王非謂不忍一牛之可以王也欲其察識此心而擴充之老我老以及人之老幼我幼以及人之幼則王道不外是焉今放生之心非即不忍觳觫之心乎苟於是而察識焉思我之於魚猶戚戚若是而況我同類之人乎況我君臣父子夫婦兄弟朋友乎然則仁民之道不可一日不講也親義序别信之理不可一日不講也使天下鰥寡孤獨顛連無告之民有一夫不獲其所吾心忍乎五倫之内有一處之缺陷不能歡然有恩以相愛粲然有文以相接吾心忍乎是充一放生之心而仁不可勝用也故君子有取焉願遊斯湖者睹鱗介之生長蕃育油然生其親親仁民之心無勇於挾山超海而怯於折枝則兹之放生者真盛舉也夫新修文昌祠記文昌何神也司馬遷天官書曰斗魁戴筐六星為文昌一曰上將二曰次將三曰貴相四曰司命五曰司中六曰司禄周禮大宗伯以槱燎祀司中司命月令季冬之月畢祀天之神祗鄭康成謂司命司中與焉然則文昌天神也星有六各有攸司而統之曰文昌蓋道之顯者謂之文將相禄命皆權於道明乎非有道者不得與凡世之不以道而得將相禄命者皆非文昌之所授古之祀之者蓋所以答其黙相道統之功而非教人禱祀以求寵利也近世祀文昌者不復分司中司命而統號之曰文昌從其重者為主猶未大逺乎古但祀之之意專以求富貴功名而不知有道則已失其本而又雜以道家不經之説謂上帝命梓潼神掌文昌府事及人間禄籍元時遂加號為帝君按所謂梓潼神者相傳姓張諱亞子其先越雋人因報母仇徙居劒州之七曲山仕晉戰沒人為立廟梓潼嶺上唐明皇西狩追封左丞僖宗入蜀封濟順王宋咸平改封英顯是則文昌者天神也梓潼者人鬼也合文昌梓潼而一之不經甚矣即以梓潼神配文昌如棄之於稷句龍之於社然梓潼神非可以配文昌者也配文昌者自孔子而下宜莫如四配十哲及兩廡從祀之先賢先儒擇一而配焉可也於梓潼何有哉以梓潼配文昌猶不可而況直呼梓潼為文昌而不復知有戴筐六星司命司中者耶靈壽舊有文昌祠在南城樓上摶土以為神傅以彩飾綠衣烏幘兩童子夾侍其為戴筐六星之文昌耶其為梓潼嶺上之神配食文昌者耶吾不得而知也康熙戊辰孟冬修南城樓遂新其祠而易以木主題曰文昌之神蓋吾知祀文昌而已他非所聞也吾知祀周禮月令史記之文昌為吾道宗主者而已他非所知也在人則有至聖孔子及先賢先儒在天則有文昌皆教人以正誼明道而一切計功謀利之私知有富貴功名而不知有道及假道以干富貴功名者孔子之所擯文昌之所擯也明乎文昌之所以為文昌庶幾俎豆馨香來格來饗不吐而棄之乎嘉定白鶴寺記丙辰七月余以公事泊舟南翔寺前吏有持寺記來閲者言寺建於梁天監盛於唐祥符常有二白鶴飛集其上或自東飛來必有東人施其財自西來則施者亦自西至其他皆隨方而應久之鶴去不返僧齊法師者號泣甚切忽於石上得一詩有白鶴南翔去不歸之句因以名其寺云蓋此寺之興久矣豈非以鶴之清高標異人樂傳之而寺因之以久耶嗚呼鶴一禽耳猶能以清高之姿標異於世至於千百年之久而其迹不泯而況乎人秉五常之性有六藝之教大可以經緯天地小可以振育一方有非鶴之所能企其萬一者而乃泯泯無聞者不可勝數可不悲耶即以兹土論自天監以來仕且遊於此者若干人矣其迹至今顯然可指者幾人耶方其來也人莫之喜其去也人莫之思如蚊蠅之偶集而偶散何曾二鶴之不若乎此無他大道之不明汨於欲溺於習而不能自振拔故雖有五常六藝萬倍於鶴之本原而汙穢迷溺返出於鶴之下宜其泯泯而不傳也兹土之南不十餘里有吳淞江者此大禹之遺迹也在天監以前又幾千年矣當時禹之經營兹江也其駐劄何處用夫工若干雖以遼逺不可知而至今臨流者思禹功不衰嗚呼又何鶴之足言乎余因南翔之寺有感而為之記謙守齋記余既以謙守名周子憲章之齋或問謙守之義曰滿損謙益之理備於書矣裒多益寡之訓詳於易矣我見人家有累世富盛者必其人戰戰兢兢常若履虎尾涉春冰自卑而尊人者也有方盛而忽衰者必其自尊大視其家若泰山之固磐石之安人無如我何者也此理甚明但人家子弟生長富厚不能如創業之人更歴事變不知稼穡之艱難往往驕溢為父兄者亦末如之何此無他術惟使多讀書觀古今盛衰之故則知自謙矣知謙則知自守矣亦有讀書而愈長其傲增其驕者則以其不知讀書之法視聖賢之書不過為干禄之具而不實體之身心不實驗之人情世變竊其皮膚潤色為文章謂可取富貴如拾芥不自覺其傲且驕反不如不讀書之人猶知有所畏懼此則又君子所深病而非讀書之咎也吳磊齋先生有言子弟一讀書則百病皆除㫖哉言乎由是觀之謙也者守家之本也善讀書者又謙之本也憲章以謹厚起家退然若不自足真有得乎古人之謙者欲使子孫永保此風以守其成以昌大其門則莫如讀書矣其必有味乎斯言困學齋記好生周子名其讀書之所曰困學齋謂余記之余以為困而學非難知困為難夫人心苟有所困心溺焉身汨焉膠固而不可拔方且自以為適豈知困哉吾見今天下之學者不陷溺於佛老則迷沒於詞章舍坦途而入荆棘困莫甚焉然肯自以為困耶今吾與好生幸讀程朱之書知其大綱彼之迷溺而不自覺者吾知􅊵矣然天下之困人者非獨此一心之微日用之間利害得喪愛憎毁譽困之者嘗四面而至乘間伺隙受其束縛而不知能開柱下天竺之雲霧而或不能不徘徊於一官一爵之得失能破姚江金谿之籓籬而或不能不猶豫於一錙一銖之有無能埽顔謝徐庾之綺麗而或不能不動色於閭巷匹夫之喜怒一有入焉則吾之學皆為其所困嗚呼知之者豈不難哉然則如之何曾子曰吾日三省吾身能省然後能困知困然後能學日用之間凡接於吾耳入於吾目發於吾心者必察之必防之知其在桎梏之中則必思所以脱於桎梏矣知其在波濤之内則必思所以出於波濤矣聖賢居敬窮理之學雖欲傾刻離之而可得耶遂書之以為記當與好生共勉焉孔孟程朱豈逺乎哉退思堂記靈壽縣堂之後曰退思堂蓋取左傳進思盡忠退思補過之義余既重修斯堂而深有味乎其名夫忠者盡我心之謂也盡我之心者宜若可以無過然天下事有定理輕重疾徐寛嚴厚薄各有其分過與不過其辨在毫釐之間而人常不及覺夫惟聖人見理明而處事熟隨其心之所發無非至善不待思而自無過自聖人而下大賢如顔子雖曰如有所立卓爾然猶不能保其無幾微之差顔子而外又無論矣非慎思之而善補之末由去也故孔子告子張曰主忠信徙義主忠信者進思盡忠之謂也徙義者退思補過之謂也彼謂致良知之説者謂致吾心之良知而事事物物皆得其理是知主忠信而不知徙義知進盡忠而不知退補過者也其為學術政事之害可勝道哉坐兹堂者毋曰我盡我心而已其亦思輕重疾徐寛嚴厚薄果各得其中乎不蔽於氣質乎不囿於習俗乎不矯枉而過正乎不因噎而廢食乎有時獨斷者不為荆公之執抝乎有時從衆者不為蘇氏之模稜乎如射之有的不中其的皆過也如匠之有繩不中其繩皆過也思之而補之而後吾所盡之忠庶幾可以無憾不然自謂能盡而毫釐之間稍有偏倚其害於民將不可勝言嗚呼盡我心而猶不能無害於民而況其不能盡者乎可不懼哉可不懼哉活潑潑齋記天地間惟道無不在鳶之戾於天也魚之躍於淵也莫不有道焉其於人也窮達貴賤尊卑惟其所遇而道隨之昔孔子居鄉黨則有鄉黨之道為大司寇則有大司寇之道為委吏乘田則有委吏乘田之道道豈須㬰可離者哉故子思謂之上下察程子謂之活潑潑地使其須臾可離則不得謂之察與活矣淵明之辭曰倚南窓以寄傲吾謂淵明未聞道也傲之非道亦明矣何地何時何事而可以傲哉如南窓可傲則是道可須臾離豈察與活之謂耶余親家王子天市官於上谷其署中燕息之所舊題曰南窓寄傲愚請易之曰活潑潑地竊以為善學淵明者莫如斯言也淵明之為人高風峻節卓犖古今雖朱子亦重之然能操持於君臣父子之大而不能涵養於視聽言動之際知傲之為達而不知其為病傲之一字伏於胸中而形於四肢氣質用事而不覺嗜慾横行而不悟湎於酒躭於菊閭巷鄙夫之所謂快心適意者而不免涉獵乎中自以為瀟灑自得而不知其沉溺錮蔽束縛拘囚與所謂活潑潑者相去逺矣古之君子知道之無不在也戒慎恐懼息有養瞬有存貌則思恭言則思從視則思明聽則思聰猶懼其隠微之際私意潛滋而須臾離道也於是乎有慎獨之功有内省之法懲忿窒慾遷善改過惟恐其或怠也正誼明道主敬行恕惟恐其或懈也是以用力之久則義精仁熟充乎中而達乎外氣稟不得而拘嗜欲不得而蔽習俗不得而溺塞天地横四海而無所礙活之至也嗚呼是豈淵明之所知也哉知活之味則知傲之病有淵明之節而傲猶為君子所鄙而況不如淵明者乎以程子之活易淵明之傲斯為善學淵明也夫崇明老人記吾家某於九月廿六日在洙涇周我園家與雲間佳士王慶孫同席慶孫述曾至崇明縣中見有吳姓老人者年已九十九嵗其婦亦九十七嵗矣老人生四子壯年家貧鬻子以自給四子盡為富家奴及四子長咸能自立各自贖身娶婦遂同居而共養父母焉卜居於縣治之西列肆共五間伯開花米店仲開布庄叔開醃臘季開南北雜貨四舖並列其中一間為出入之所四子奉養父母曲盡孝道始擬膳每月一輪家週而復始其媳曰翁姑老矣若一月一輪則必歴三月後方得侍奉顔色太疎復擬每日一家週而復始媳又曰翁姑老矣若一日一輪則歴三日後方得侍奉顔色亦疎乃以一餐為率如蚤餐伯則午餐仲晩餐叔則明日早餐季週而復始若逢五及十則四子共設於中堂父母南向坐東則四子及諸孫輩西則四媳及諸孫媳輩分昭穆坐定以次稱觴獻壽率以為常老人飲食之所後置一櫉櫉中每家各置錢一串每串五十文老人每食畢反手於櫉中隨意取錢一串即往市中嬉買果餅啖之櫉中錢缺則其子潛補之不令老人知也老人閒往知交遊或博奕或樗蒲四子知其所往隨遣人密持錢二三百文安置所遊家并囑其家佯輸錢於老人老人勝輒踊躍持錢歸老人亦不知也亦率以為常蓋數十年無異云老人夫婦至今猶無恙其長子年七十七嵗餘子皆頒白孫與曾孫約共二十餘人崇明總兵劉兆以聨表其門曰百齡夫婦齊眉五世兒孫遶膝洵不誣也康熙二十二年十月十六日某為余備述慶孫之言矍然不勝景仰贊歎因援筆而記之以告世之為人子者按崇明老人壯而鬻子自給老猶博奕樗蒲雖克享大年不過碌碌庸人耳所可敬者其子四人厮養卒也不讀書不知理義乃父母鬻其身而不怨及拮据成家惟知孝養其親不特能養口體且能養親之志焉蓋亦難矣嗚呼世之有親不能養養而不能曲盡其道者覩此能無愧乎三魚堂文集巻十
