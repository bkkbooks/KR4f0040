body:
  text: 三魚堂文集巻三贈内閣學士陸隴其撰雜著貢助徹論論者疑帝王之道同條共貫而若貢若助若徹何以異名五十七十百畝何以殊制且殷周之天下猶是夏后之天下殷周之民人猶是夏后之民人度田非加益而計民非加少夏田五十而殷周過之其何以給況疆理有定制溝洫有定域自五十而變為七十自七十而變為百畝必將移易其阡陌變更其川澮然後可以舉天下之田盡合新王之制其為騷擾不已甚歟求其説而不得於是有謂夏之民樸故費少而田少殷周之民漸文故費多而田亦多然先王量入為出未聞量出為入也有謂夏之世洞洚方平可墾之田少故授田不得不少殷周之世狉獉既逺可墾之田多故授田不得不多然六府既修之後不應多未墾之田徹田為糧之日未聞盡開荒之土也有謂殷之七十猶是夏之五十周之百畝猶是殷之七十尺度有修短而畎畝無增減然井疆既悉由舊何必虚張其數以眩民耳目也或曰百畝之制兼萊田而言之五十七十去萊田而言之或曰夏之田一井十八夫受之殷之田一井十二夫受之考之傳記亦未有明據噫是皆不達夫立法之意而各以其意附㑹之者也夫地有廣狹民有衆寡勢有便否先王所不能强而同也必欲舉一世之田而盡為五十盡為七十盡為百畝則必有格而不通必欲於一日之内易五十為七十易七十為百畝又必扞而難行三代創制必不其然然則果如之何曰先王之法亦因其土地之所宜時勢之所易而其有不便者則固不必盡以吾法繩之也夏之五十殷之七十周之百畝特言其大略如此而豈必當日之天下較若畫一耶立法以垂後者所以明一王之大典也審勢以合宜者所以順天下之大情也以法權勢而以勢權法是故可改者改之而不嫌其異可易者易之而不虞其擾可増者増之而不憂其不給噫此立法之意也而紛紛之説可以不作矣然則何以知之曰考之周而知之周之世固以徹為法也而當時侯國有疆以周索者有疆以戎索者可見先王未嘗為一切之法强天下而同之也不然不顧土宜不揆時勢而惟一切之法是為則是王莽之周官安石之新法以私意罔民者耳豈先王取民之制乎始經界論古今聖賢為政者多矣曷必以經界為始哉奚獨於滕必始於經界哉吾知孟子之言度當日之時當日之勢而言之非謂凡有國者皆當如是也盖戰國之時與春秋異滕之勢與齊梁異春秋之時經界固未嘗亂也雖税畝邱甲已非先王之舊然但擴其什一之制未嘗易其溝塗之位但因田以加賦未嘗因賦以壊田則行仁政者自不必以經界為急也至戰國而經界盡壊矣自周興至於七國歴歳彌逺其制固不能不就湮且當時諸侯皆擴土數圻地大則統攝為難而奸弊易起而一時富强之臣又爭言盡地利之説以阡陌為無益而盡闢之於是先王溝塗封植之制不可復問矣世之君子雖有志於仁政將何所憑乎是故經界之在春秋與在戰國其緩急固不得不異也然其在齊梁猶緩而在滕獨急者何故齊梁之國方且窮兵黷武方且嚴刑重斂今日出師明日略地使人曾不得聚廬而處焉徭賦煩興丁男轉運使人曾不得粒食而飽焉嚴其文網峻其法令使人曾不得手足而措焉民方困憊而無如何也何暇議先王之邱甸哉且當政殘吏酷之世而欲易其疆壟變其溝洫舉百年湮没之制一朝釐定之國必大擾是故其所急者在寛刑斂戢兵戈以與民休息而經界之説且以為後圗何者虐政未去則仁政未可舉也若滕則彈丸耳其疆理易考也其山川易悉也其原隰易甸也無攻城略地之擾無頭㑹箕斂之苦無踊貴屨賤之酷雖悉索敝賦以供强鄰國且駸駸乎有不虞之憂而幸而無事則修廢舉墜固易易也然則清經界以為仁政之始其時當為其勢可為固莫如滕矣此孟子所以斷然以是為始歟或曰經界之始獨滕為然然則齊梁之國經界壊極矣使必待刑清政簡國内無事然後可定則當其未定之先民之困於古制之湮者不知凡㡬矣夫去患者必先其甚其甚者既去而後其他可得而去也故非謂齊梁之國經界可緩而寛刑斂息兵戈正所以徐為經界之計耳使徒知經界之為急而不察其時勢驟舉而行之其不至病於民者㡬何吾故曰孟子之言就滕言之而非謂凡有國者皆當如是也後世如宇文融之括田王安石之方田亦自附于孟子經界之意然以開元天寶之荒淫熙寧元豐之紛擾不知清其原本乃欲就民間土田較其毫釐分寸徒使奸民猾吏借以成私而不可究詰豈非不達於時勢之故耶後之君子有志於仁政而欲行聖賢所言者其必審於時勢也哉泰伯三讓論説者曰伯之讓讓周也太王有立季歴之心伯知之而逃遂使季之後終有天下是為以天下讓嗚呼是未嘗深原乎古人之事而猥以已意揣測之者也夫使太王果有立季歴之心則亦何足為太王廢長立幼此晉獻齊景之所為而謂太王為之乎即曰季歴生昌有聖德使泰伯嗣位昌為之佐可矣豈遂以是廢長幼之倫哉且如太王果欲立季則是非正也邪也伯探其父之邪志而成之可謂至德乎然則其為讓奈何曰伯非讓周也太王之欲立季歴在伯既去之後不在伯未去之前也季歴之天下因伯之讓而有而伯之讓不為季歴也伯非讓周也讓商也讓商也者太伯有翦商之志而伯不從而周不遽王商不遽亡是之謂以天下讓云爾考之周史太王遷岐在小乙之世繼而武丁中興六十年商道方隆太王何自有翦商之志泰伯又何自以天下讓曰是不然武丁之中興泰伯之讓成之也使泰伯不讓則武丁不中興何則史稱小乙之世商道寖衰是時六七作之賢聖已逺而恭黙思道之君猶在民間商之不絶如綫而周以積功累仁之後加之以太王之英明綱紀益修德澤益廣國勢益强天下歸太王於小乙之世猶其歸文王於辛受之世也而泰伯又以明聖顯懿之資佐乎其後使太王主之泰伯從之商之不祀豈待孟津之㑹哉泰伯知其勢之不可止也是故以身去之泰伯去而太王以遲暮之年王季又當儲位初定之日勢不能以及逺然後天下之歸周者稍衰商之勢得以稍安而徐俟夫賢聖之君出而振興之此泰伯之志也故武丁之興泰伯成之也盖泰伯之志猶之文王文王之權在已故率六州以事之而直行其臣節泰伯之權在父故逃荆蠻以避之而曲遂其忠貞文王不幸而遇紂故六州之事不得不變為牧野之師而名以相形而愈著泰伯幸而終遇武丁故荆蠻之逃止見為家庭之變而名遂相泯而不彰要之兩聖人之德則一而已矣噫泰伯所以為讓者如此泰伯之讓所以為至德者如此夫子懼天下之民不知稱也故表而出之而後世乃曰讓周也非讓商也則是泰伯之讓與魯隠宋宣子臧季札之徒無異也夫魯隠宋宣子臧季札之徒春秋譏其啟亂矣泰伯之讓而如是也夫子肯謂之至徳耶甚矣其不深原乎古人之事而猥以已意揣測之也雖然以泰伯為讓商是矣以太王為翦商無乃非人臣之義乎曰不然泰伯守天下之大經者也太王通天下之大權者也太王翦商之志猶武王誓師之志泰伯讓商之心猶夷齊叩馬之心故知武王與夷齊之無異者則知太王與泰伯之無異不然以太王之明豈不知泰伯之志以泰伯之德豈不足以感動乎太王而乃父子相戾若是也哉衛公子荆善居室論夫為人臣者以尊主庇民為善不聞其以保家守位為善以扶危定傾為善不聞其以寡取節用為善使荆也上之能佐其君復康叔武公之舊翼戴王室比隆豐鎬次之足國强兵招攜懐逺號令諸侯擬跡桓文下之修守備睦强鄰有保境息民之功使天下稱之曰衛有人焉是為善耳區區居室何足道哉而荆也不然荆之時非無事之時也内則君荒於上臣佞於下外則齊晉交逼國無寧歳荆也沈黙其間無所建明直諫則不如史魚先機則不如蘧瑗推賢讓能不如公叔發攻城野戰斬將搴旗不如王孫賈應對賔客善事鬼神不如孔圉祝鮀衛之不亡者數人之力而荆無與焉齊豹之亂為公驂乗矢集於肩此亦計窮勢極不能自免故就傷耳原其所由與仇牧荀息異矣乃僅節嗇於家室之間為持盈保滿之計若荆者可謂不墜其室矣善則未也彼季札之衛而稱為君子盖其謙退守節適與札相類故咄咄歎賞以為賢耳豈至論哉乃夫子亦振振焉稱之何居噫此夫子之不得已也春秋之大夫驕侈極矣魯三桓鄭七穆齊田鮑晉趙魏衛孫甯之徒紛紛以豪富相尚無有紀極大者竊國小者僭擬其禍皆始於貪冒之無已務富其室而不恤其他曩令盡如荆之循序有節不凌上不踰分何至横溢如此之極哉是故有臺門旅樹之侈也而後見守節之可貴有肆夏八佾之僭也而後見循分之可嘉有爭田重幣買環請帶之貪也而後見寡欲之不易素絲退食之風𣺌而有不貪為寶者即以為良臣赤舄几几之度遙而有不侵其上者即以為名卿夙夜匪懈之節希而有不縱其欲者即以為碩彥夫子之取荆也猶之作春秋而美齊桓晉文云耳猶之論仁而取管仲云耳而或者謂仲虺之稱湯曰不殖貨利此與荆之不瀆於貨何異謂夫子不得已而取荆豈虺亦不得已而取湯耶是又不然不殖貨利之心充之則可以保四海守之則僅及乎一室荆守之而湯則充之者也使湯無以充之而區區守不殖之心亦烏能彰信兆民而表正萬邦也哉然則季文子之妾不衣帛馬不食粟晏平仲之豚肩不掩豆其儉節過於荆矣夫子欲風有位不取彼而取此何哉曰聖人之論中而已矣二子之行非中也世雖多詐偽而尾生之信不可取世雖多爭奪而宋宣魯隠之讓不可取世雖多奢侈而文子平仲之儉不可取聖人之慮天下亦詳矣嗚呼以此為訓後世猶有不食兄禄如田仲子脱粟布被如公孫𢎞者猶有親執牙籌如王戎紫絲步幛赤石脂塗壁如王愷石崇者原壤論論語原壤夷俟集註謂壤盖老氏之流自放於禮法之外者愚謂壤為老氏之流信矣而非墨守老氏者也使其墨守老氏則將跳梁倔强如接輿荷蕢之不可羈絆夫子豈得而折辱之耶夫子可以折辱之則知其尚有可教之機而非墨守老氏者矣何則壤乃夫子故人夫子必嘗習與之言壤亦必聞夫子之道而慕之夫子之道足容重手容恭正其衣冠尊其瞻視禮樂不可斯須去身此必壤之所素知豈惟素知必嘗歎其與老氏之教如雅鄭朱紫之不同亦必嘗於夫子之前强為恭敬顧其放蕩之習浹乎肌膚藏乎骨髓雖暫息乎矜持之際而卒然之間不覺其發露是夫子所深惜也方其母死登木而歌夫子若為弗聞也者而過之是其狂方熾之時未可教訓至此則漸漬乎洙泗之風稍知有禮義矣乗其舊疾之發藥而瘳之此與鳴鼓之攻同一剛克之意故曰壤非墨守老氏者也可惜者其終不能改耳使其因夫子之教而克改則當在七十子之列而史記家語弟子傳中皆不見有壤論語自叩脛之後亦不復見壤則其終身自棄乍明乍闇乍恭乍肆禮義不能勝其氣禀學問不能勝其私欲可知親炙於髙山景行而卒不免陷溺如壤者豈不可哀也哉公伯寮季氏之黨愬子路沮夫子子服所欲肆諸市朝者也而自漢以後皆列在七十子内意其必悔過自新服膺聖教故能如此冉求聚斂宰予短喪卒成賢者皆此類也惜壤之不能如寮如求如予耳人之賢愚何常之有苟能自奮則雖得罪名教如公伯寮不難登堂入室而況不至如寮者乎不能自奮則雖親受聖人之提撕警覺如原壤者亦終於汨没而況拾其糟粕得其影響者乎然而為壤者常多為寮者常少甚矣克己之難而變化氣質非賢者不能也然則夫子之叩果無益乎是又不然曩非夫子深責壤則箕倨佻達之徒將滿天下無復忌憚自壤脛一叩而萬世知夷俟之不齒其為世教之防維大矣且壤雖不得列於七十子而一叩之後不至愈甚猶未如稽阮之猖狂孰謂聖人之教無益哉衛輒論正名章朱子論之詳矣語類中有一條問胡氏之説只是論孔子為政正名事理合如此設若衛君用孔子孔子既為之臣而為政則此説亦可通否朱子曰聖人必不肯北面無父之人若輒有意改過遷善則孔子須先與斷約如此方與他做以姚崇猶先以十事與明皇約然後為之相而況孔子乎若輒不能然則孔子決不為之臣矣此一條答待子為政之㫖已十分明白若如王陽明所云令子迎其父父讓其子而不居仍令輒得國焉即留養其父於宫中盡父子之禮如後世太上皇之類此正是世俗之見未嘗以義理事勢深揆之也當年蒯瞶得罪於父若使父没而晏然歸國受其子之養是匡章之所大不忍也而謂孔子肯教蒯瞶為之乎蒯瞶既義不可歸國而輒可安於其位乎此以義理揆之而有不可也且當時南子尚在蒯瞶歸國不知何面目以見南子能保其不相殘乎況以蒯瞶之暴戾使其歸國肯袖手讓其子乎萬一蒯瞶不讓國人不服衛國之亂未有艾也此以事勢揆之而有不可也故為輒計者惟有奉公子郢而立之斯為求仁得仁孟子論瞽瞍殺人事正是如此集註取胡氏之説恐未可謂誤也靈夀志論二十條泮宫修而魯頌作學舍鞠為園蔬博士倚席不講而漢道衰學宫之關係豈不重哉自明季以來有司困於掣肘習於因循求如文翁興學於蜀常袞興學於閩盖難言之而地方士大夫率多自急其私雕牆峻宇經營家室惟恐其不華且固而於出身之地曾莫顧而問焉宜其日敝哉興起之責吏於其土與生於其鄉者均無膜外視焉可矣右論學宫從祀諸賢經累朝論定殆無遺議惟嘉靖九年増入陸象山九淵萬歴十二年増入陳白沙獻章王陽明守仁三先生雖皆一時賢者然學近於禪與孔門之㫖不免莛楹學者取其長而去其短庻㡬為善學三先生者至漢儒鄭康成歴代從祀嘉靖九年以其學未純改祀於鄉然其所注詩禮現今行世程朱大儒亦多採其言恐不當與何休王肅輩同置門墻之外若以其小疵而棄之則孔門弟子亦有不能無疵者豈可以一𤯝掩大德乎右論從祀余讀安州志言祀事之失嚴敬曰壇壝廟宇宿莽積塵神主龕籠傾欹破毁几案皆鳥鼠之迹庭除有人畜之糞及祭祀屇期齋戒視為虚文執事何嘗告戒拂拭者濁膩重重滌濯者汚垢斑斑葅醢不問生熟犧粢未知精潔帶泥連草之菁芹含蛀䝉塵之棗栗凡百供陳盡託僕𨽻師生不躬親有司不省視嗚呼今天下如此者多矣豈獨安州哉魯秉周禮禘自既灌而後夫子猶不欲觀而況如今日乎知禮君子其知畏敬哉其知畏敬哉又論署者出政之地也自居之者以傳舍視之而署乃多廢彼前賢之一日必葺館信宿必掃地者獨何謂乎盖不以傳舍視官者斯不以傳舍視署然則當民窮財盡之際則如之何曰如衛文公之務財勸農通商惠工敬教勸學授方任能而後楚邱作焉斯善矣右論公署國家以科目取士原非謂所取者盡賢也意其中或有賢者耳宋太宗謂豈敢望㧞十得五得一二足矣士之列於科目者思太宗之言豈不當汗出發背也哉前輩特由此以進身而所重初不在此也學者不可不知右論科目分野之説賈公彥謂古者受封之日歳星所在之辰僧一行謂是山河之首尾與雲漢之升降相應論者往往疑其不同余以為二説一也賈公彦言其流僧一行推其源而已惟山河與雲漢旁之列宿相應故歳星在其地則受封雖千百世皆如是占可也右論分野地丁之額不過一時所定自當視民力為上下故禹貢賦法有上上錯者有下上上錯者有下中三錯者未嘗以一定之額責之民也以一定之額責之民此孟子所謂糞其田而不足則必取盈焉者也豈經乆可行之道哉余考各州縣折徵糧之法輕重懸殊求其所以然之故盖因萬歴九年丈量是時江陵當國政尚嚴切有司不敢缺額故各以其原額之糧派於所丈之地地寛者糧輕地窄者糧重如元氏縣上地毎三畝六分七釐四毫折徵糧地一畝至下下地則每十一畝折徵糧地一畝以靈夀較之不啻倍蓰則拘於額之故也又考明㑹典户口之數洪武二十六年天下户一千六十五萬二千八百有奇人口六千五十四萬五千八百有奇𢎞治四年天下户九百一十一萬三千四百有奇人口五千三百二十八萬一千一百有奇以𢎞治全盛之世而其户口反減於洪武豈非當時軫恤民隠舉疲癃殘疾鰥寡孤獨盡去之所以額賦驟減如此至萬歴六年天下户口又復與洪武相等由此言之不缺額者莫如萬歴之世也而言明祚之衰必始萬歴缺額多者莫如𢎞治之世也而言明祚之盛者必首𢎞治左氏傳稱尹鐸損晉陽户數而趙氏世賴之其𢎞治之謂歟損額之利孰與増額甚矣額之當因時隨地而不可必取盈也國初定鼎懲明之覆轍荒糧逃丁不惜豁免民力稍甦矣然㷀獨之未得上聞者猶不乏也自承平以來有司謹守原額如天經地義之不可移易鳩形鵠面之人呼天搶地無所告訴甚則人已亡而不肯删除子初生而責其當差溝中之瘠猶是册上之丁黄口之兒已入追呼之籍苟無缺額而已遑恤其他嗚呼額之厲民一至是哉司牧者誠三思於禹貢之錯法尹鐸之保障願為𢎞治之盛而勿學萬歴之弊視其時與地而上下焉吾民其庻㡬乎右論審丁學者多言井田然觀周禮載師之士田賈田皆不用井法而左氏傳載楚蒍掩定土田自度山林至井衍沃有九等之殊是一國之地有井有不井也祝鮀言魯衛晉之始封有疆以周索疆以戎索之異是天下之國有井有不井也孟子所謂野九一國中什一者恐亦就滕之地勢言之耳余觀靈夀地形髙下不齊肥瘠各殊其在三代以前亦所謂疆以戎索者耶隨其土宜定其經界斯善言井地者哉至若徵斂之法近代大率多本唐之租庸調及兩税元史言元制取於内郡者曰丁税曰地税此倣唐租庸調也取於江南者曰秋税曰夏税此倣唐兩税也今州縣或分地丁為二即租庸調法或合地丁為一而總派於地即兩税法二法各有利弊去弊就利亦存乎其人焉右論賦税差役僱役各有利弊傅承問有疏言差役之善僱役之不善至詳悉矣然良民之畏役已乆惟游惰之民樂于為之欲禁樂者之不為而驅畏者使為之此勢之至難也此法行勢必良民隂僱游惰之民在官以為差役在民則仍僱役特官僱與民僱殊而游惰之民充役則一且官僱則有定額民僱則誅求無已其或犯法究及僱者利則歸於游惰害則及於良民其為弊更無窮此熙寧元祐大臣所以各持一見而不能定論治者止可因其弊之最甚而稍通融之難以一槩論也周禮有轉移執事之游民僱役之法恐不待後世而始有大抵治之得失在官不在吏官誠賢則雖僱役亦足以為治官誠不賢則雖差役亦足以生奸讀此疏者知僱役之害而謹防之可矣若欲舉其法而盡變之亦未易言也至疏中云原設工食除冗役扣解充餉而所留者仍給見役此亦可商今賦役書所載各項工食皆民之僱役錢也如役當留則此工食固應給役役不當留則此工食應還之民或即以補現役之不足者若扣解充餉是朝廷既役民而又得其錢也可乎先生一時之言未慮及此敢僭論之所以推廣先生憂民之心也右論役法馬從聘有摘陳漕政一疏内云今日治河之病原自有在而黄堌之塞止不與焉夫黄河善淤其來逺矣故沿河州縣俱設有淺夫原為桃河而設如夏鎮額夫一千二百五十四名徐州額夫三千五百一十六名邳州額夫八百三十五名雖他處夫數不同總之計道里逺近以為多寡自足供一處挑河之用使當水落灘見之時即率前項夫役於灘淺所在逐段挑深俟伏秋水至衝刷一空黄雖善淤安得數十年間河身遂髙與城齊也惟是前此治河者創為束水滌沙之説歳増長隄若干丈歳築埽壩若干處即謂治河得善策矣而不知此朝三暮四之術也所謂束水滌沙者果遂能滌之以歸于海乎無論旋滌於此復停於彼且河水暴發併前隄壩盡化而為河身矣此與載土實河者何異安得不日髙也盖由河官以挑淺則用力勞而無可見之績築隄則取效速而有可紀之功所以相率日習於非而不自知覺耳如䝉敕下總河大臣督行各管河官除水漲冰凝之候即率各處之淺夫挑各處之河道總河但時加稽查勿令虚曠則河道不日深通而壅徙之為患者臣不信也盖公議治河不滿於潘公以水刷沙之論云右論河漕余聞之太行綿亘數千里傍真定諸縣之山大抵皆太行也今志列之曰某山某山者猶江漢之分為沱潛河濟之分為灉沮也好奇之士見其一峯一嶺往往驚駭而嗟異之而況觀太行之全勢者乎滹沱慈水皆穿太行而入海在靈夀者特其上流耳觀山川者其毋囿於一隅哉右論山川古蹟信而有徵斯足貴焉如漢世祖滹沱冰合之事談者皆言在饒陽南而靈夀又有忽凍村兵行間道亦或有之然不可考矣疑則傳疑可也萬歴中知縣周官立碑於河上大書特書曰光武冰堅可渡處此豈春秋書夏五郭公之意哉至若寧晉志云邑有名勝可以登眺游覽以云雅致韻事則得矣然往往有一邱一壑之奇一峯一石之美一亭一臺之異一水一碑之佳而賔客絡繹上司往來供億費煩地方受累甚至釋道之募棲士女之樂遊損財誨淫廢時失業恒因之故古蹟鮮少地方一幸斯為民生利病起見固君子之言哉然果係古蹟亦何忍聴其湮没也使好奇之士聞此言而慄然不寧勿以遊覽病民致憂時君子歸怨於古蹟則可矣右論古蹟物生於天而成於人嘉禾必植稂莠必剪雞豚必畜虎豹必逺要使各得其所而已孔子言學詩多識鳥獸草木之名豈欲其廣異聞資談説已耶夫亦民生日用之物有天下國家者所當裁成輔相學士不可不知者耳不然山海經博物志不賢於三百篇哉右論物產龍王者何其地祇之主龍者歟抑古豢龍御龍之類歟古者祈雨天神則有風伯雨師地祇則有名山大川隋唐間祈雨初祈嶽鎮海瀆及諸山川能興雲雨者七日乃祈社稷及古來百辟卿士有益於民者又七日乃祈宗廟及古帝王有神祠者又七日乃修雩祈神州宋興始有五龍廟及九龍堂之祈盖龍神之祀於古無聞有之自宋始也至廟貌冕服擬於王者特世俗從二氏之説耳右論龍王藝文志上自廊廟得失下至閭閻疾苦無所不録惟歎老嗟貧誇多鬬靡嘲風㺯月之辭則無取焉韓退之文號起衰然感二鳥賦上宰相書皆其少年作君子恥之司馬相如上林子虚載在漢史然黄東發謂文所以載理豈有不關義理而可言文張幹臣先生有言後生學李白詩何用如何不學好人却去學醉漢彼于藝文皆超軼絶倫猶然可鄙況尤而效之者乎易六十四卦三百八十四爻未嘗言太極然無非太極也若此類於太極何有哉右論藝文世治則重孝義世亂則尚游俠太史公作史記於孝義之士未見表章而劇孟郭解之徒顧津津稱道之長輕薄之風而滋驕横之習何其陋也嗚呼此其所以為遷歟故知孝義游俠之分則可與論世可與守身矣右論孝義八蜡見於禮記郊特牲鄭康成註云先嗇一也司嗇二也農三也郵表畷四也貓虎五也坊六也水庸七也昆蟲八也孔穎達疏云王肅分貓虎為二無昆蟲鄭數昆蟲合貓虎者昆蟲不為物害亦是其功或疑昆蟲害苗不當祭似王説為優不知祭非祭昆蟲乃祭主昆蟲者也鄭孔之説何病又按古祭八蜡在十二月近代則於春秋丁祭之後盖取春祈秋報之意亦各有其義也右論蜡祭昌國君勲名德器前史載之詳矣余獨怪其報燕惠王書所侈陳者大吕存于元英故鼎反乎磨室而弔民誅暴不及焉豈猶未免戰國氣習歟至其語意藹然有仁人君子之風雖儒者豈能逺過之哉右論樂毅史稱曹武惠宋良將第一及考之史其開國元勲固自掀揭然猶有及之者至於善戢下不妄殺一人不自矜伐不冠帶不見吏平生未嘗言人過失則類非諸將之所能及矣然則謂之為宋良將第一不亦宜乎右論曹彬玉生於山而成珪璋之用者琢磨之力也木生於山而勝棟梁之任者繩墨之功也余觀前代名臣磊磊落落於天壤間者雖地靈固殊哉亦由其發奮刻勵能自拔於流俗也人茍能自奮何可限量耶雖洙泗洛閩無不可㡬及而況樂曹諸公乎右論名臣大學説涇陽以為致知不必窮至事物之理也窮至事物之理乃是訓詁記誦詞章之習豈性學哉故定傳即以本末傳為致知格物傳唱此知本性學尊經者尊此性學之經立志者立此性學之志審㡬者審此性學之㡬非率人入空門而何知本説五倫本於五性而成親義别序性之五善確有可據何必懸空説一察字涇陽不指㸃破何耶陽明四句宗㫖辨之確矣尚取其致良知之説何歟更定大學不遵朱子以補傳為非説得鶻鶻突突沈淪於釋學其失易辨涇陽信服乎良知單排宗㫖其誤難窺大學知本明明有明德修身必渾言性善乃曰善者性之實也善存而性存矣性學説五性合三達德乃是聖學之性異學之性中國則有告子生之謂性之性西土則有佛家作用是性之性兩性專以知覺運動者言人與物同蠢然之性也斷絶五性而三達德靡所用全向氣上發露而佛家之明心見性乃無吾性之知仁勇白鹿洞規説陽明提致良知驅人入禪涇陽提知本講性善亦驅人入禪人人叅性為學談性為問認性為思証性為辨東林㑹約説虚言善也認差可欲為善之㫖格致工夫必在博文今日之四書五經文君子以文㑹友講五倫之可躬行者而已誠正修工夫必在約禮日用之作止語黙禮也君子以友輔仁共勉於五倫之躬行而已不必提宗也五倫有多少當窮學如不及猶恐失之錢子辰字説錢子子辰初名樞一日有志於聖賢之學奮然曰吾惡夫向者之不聞道也因改其名曰民而請字於余且問學焉余告之曰子何以改名為哉自古聖賢豈皆生而聞道者耶盖亦有始為庸人一旦發憤而力學者矣方其未學則人聞其名而忽之賤之及其既學則人聞其名而重之敬之名不變而聞其名者變矣何以改為哉然吾聞之新沐者必彈冠新浴者必振衣惟恐其舊染之汚也子辰志於學而改其名是亦彈冠振衣之意也且業已改之矣然則請改其名而仍其字可乎子辰曰吾初之名樞而字子辰也盖取北辰天樞之義今改其名而仍其字毋乃名與字不恊乎余曰何為其不恊哉夫聖人之道始乎卑極乎髙始乎邇極乎逺其為道不過君臣父子夫婦長幼朋友其教人用力之方不過學問思辨篤行其修于身也不過忠信篤敬懲忿窒欲遷善改過其處事而接物也不過曰正其誼不謀其利明其道不計其功已所不欲勿施於人行有不得反求諸己初無髙逺難行之事杳冥昏黙不可知之理而造其極則至於位天地育萬物是故卑者髙之基也邇者逺之則也今夫天下之卑且邇者莫如民而髙且逺者莫如辰子辰誠審乎民之義則守其庸言庸行循循乎規矩之中而勿躐等以進誠審乎辰之義則以聖神為必可學以叅贊為不足異而勿半塗而廢始乎民終乎辰聖學備矣中庸曰夫婦之愚可以與知則民之謂也及其至也察乎天地則辰之謂也論語曰下學而上達下學者民之謂也上達者辰之謂也子辰勉之哉三魚堂文集巻三
