body:
  text: 三魚堂外集巻六贈内閣學士陸隴其撰詩乙夘候選北上途中偶吟屯亨隨遇去遲速總平常我今跨騾北萬事正難量所賴此方寸養之有微長執巻對先聖猶如在家鄉途中遇雨湖水正瀰漫風雨復連綿路上泥深尺僕夫不肯前天晴何可期日中强加鞭長隄𣺌無極一步一盤旋整轡坐騾背慄慄恐隕顛寄語當途者須知行路艱清水潭紀事去歲波濤上今年成坦途東隄雖未竣功成良已多羽書旁午至暫從浮橋過糧艘仍湖行安瀾未可歌廟謨正焦勞莫憂久蹉跎有儀軒歌有序昔年嘉定有署事公倪伯屏者我邑人也曾有德於民民因建報德祠其内有假山為余前任趙尹雍客移置署中有儀軒軒雖美觀而祠幾廢予故有感而作吁嗟有儀軒其石何離奇問石何自來來自故侯祠聞昔祠初成吏民競祝釐或持觴酒勸或獻萬年辭翼翼堂與室尊嚴若神祗孰知祠中石一朝遷在斯廢興誠可歎此理豈𣺌微我聞召公棠周人永勿移翦拜各相戒千載以為期動之何如耳今古豈異時感應捷桴鼓聖賢寧我欺恭寛信敏惠斯須不可離反躬而己矣何歎亦何疑夀倪母仲孺人七十有序余昔奉教於貞吉先生佩服典型高山景行常在心目而貽孫以英年克紹前矩門風之美甲於吾邑天下禎祥孰大於是兹值仲太孺人七十誕辰以家範占之眉夀其未有艾乎敢述徽懿用當忭祝不足云詩也至聖有懿訓慈孝家之祥物則有麟鳳器則有琳瑯孰若慈與孝太和斯洋洋吾友抱奇質生長當湖旁家門多藹吉蓄極生輝光手持尺素來示我蘭芷芳曰予有慈母恩重如穹蒼襁褓失所恃慈母勤撫將辛苦常萬千不能一一詳寳我如珍珠惟恐寒暑戕嚴君當耄期往往伏枕牀湯藥躬調奉日夕常無方又恐子婦知每誡勿徬徨誠心貫上下事事縈肝腸今年七十載精力幸康强願借君子辭庶幾進一觴我聞起竦立展巻覺芬香君家和氣積福履正未央我昔挾陳編肄業君東堂朝夕君喬梓銘刻在中藏愛必計深逺敬則及梓桑慈孝相感嘘盤結成光芒澹泊與寧静古道猶不亡積善有餘慶斯言豈愚狂況復賢慈母令德自當章純嘏皆自有期頤亦尋常何必少室芝乃足慶無疆寳此萬石風何往非康莊願借君家矩埽除聲利塲囂競永不作天地長平康祝杜母朱太夫人七十夀滔滔鴛湖水日夕流不窮自昔產英傑卓犖光鼎鐘今兹清淑氣爰萃少宰公學貫千秋上令德四海宗經術陳丹陛正色率羣工朝野競歡羨昭明日有融夀母顧之喜有子慰我衷我昔相夫子一經常苦攻兢兢守祖德豈敢冀亨通源盛流自大穮蓘必有豐何以報聖恩惟有勉靖共仁義我家學拳拳服心胸薫蕕務分别鸞鳳必盡庸風俗登三古事業臯夔同恭聞至聖訓顯親孝乃隆期頤吾自有慎勿念尸饔燕山千萬仞峨峨極蒼穹僉言願夀母遐福如山崇田家行誰云田家苦田家亦可娯上年雖遭水禾黍多荒蕪今年小麥熟婦子儘足哺所懼欠官錢目下便當輸昨夜府檄下兵餉尚未敷里長驚相告少緩自速辜不怕長吏庭鞭撻傷肌膚但恐上官怒謂我縣令懦傷膚猶且可令懦當改圗陽春變霜雪爾悔不遲乎急往富家問倍息猶勝無田中青青麥己是他人租聞說朝廷上方問民苦荼貢賦有常經誰敢咨且吁不願議蠲免但願緩追呼滹沱篇贈靈邑貢士馬子隲兼示諸生二十二韻我來滹沱濱滹沱水盈盈浩氣所盤結賢哲常挺生屈指數前獻往往移我情邇來教養弛人才多圮傾弦誦雖不輟實學苦難明馬子秉秀質文詞麗且清鏖戰黌序中每試輙先鳴天子臨曲阜慨然思治平有詔搜俊傑選㧞貢於庭馬子首應選光耀滿荒城余聞喜不寐匪為相知榮方正者獲進庶幾吾道亨願言益努力聖學是經營一勝何足言所志在大成男兒生天壤當學朱與程兢兢務主敬致知且力行天理爛熟時萬事鴻毛輕古今艱鉅任皆於我身擎山川亦生色千秋常錚錚勿謂世滔滔何妨亦裸裎勿謂聖域逺近在牆與羮我聞先民訓致曲能有誠贈安平令陳子萬兼訪中州名集十四韻君家世忠貞況復盛文章代有風雅才海内共稱揚君生震澤畔長在閼伯鄉南北清淑氣君兼有其長喜與君作吏同在恒山陽願言資切琢示我以周行聞說古商丘自昔聖賢塲人才常濟濟史冊多芬芳近代風未泯作者亦鏘鏘君為我訪問俾得瞻輝光堂奥雖難言庶幾藥其狂時事多棘手愧我學未詳藉君廣聞見或得起膏肓勿謂掣肘中何用尋粃糠贈阜平令潘价維視災靈邑十四韻與君生南服作吏恒山陽君質如鸞鳳君器如珪璋區區樗櫟材視之若望洋所與君同者惟此惻怛腸荒邑遭洪水四野盡蒼茫束手正無䇿中夜起徬徨喜君捧檄來痌瘝若身癢慷慨告大吏不救民且僵閭閻鳩鵠情遂得達廟廊君馬自喂養君僕自齎糧有酒不敢飲有肉不肯嘗知君憐溝瘠意不在豆觴可以報大德惟有中心藏悠悠滹沱流此念固不忘潁川行贈同寅景翁并夀潁川太守黄次公卓犖不與凡吏同八載潁川無他技力行教化贍貧窮耕桑樹畜不厭煩田者讓畔獄長空亭猪烏肉特餘事所尚不在誇明聰是時百姓苦吏急桑孔張趙聲隆隆獨用寛和稱長者治去泰甚何妨聾户口歲增治第一鳳皇神爵鳴雝雝有詔賜爵闗内侯黄金百斤旌其庸太傅御史次第拜起家謁者丞相終謁者丞相亦偶爾可喜得之寛平中乃知持法不貴刻俗吏嚴酷真矇矇夏侯尚書洵有用經術原與吏治通煌煌班史循吏傳讀之不覺生清風贈陳安平子萬并夀束髮誦漢史仰止博陵崔亭伯既翩翩子玉亦多才實也少沉静卓然出塵埃惟讀政論篇不能不徘徊文以嚴致平兹言何為來王道尚寛仁豈盡欺我哉解網非罷軟斯民良可哀子真激一時無乃未細裁陳君宰兹土膏澤日益培借問何以治聞賦山有臺申韓非我學視民如嬰孩一破崔生論俾我心目開君常持此念陽春為君回心與造化游千秋常恢恢表賢母閭越歲在龍蛇風景偶告愆畿南及畿北處處民苦癲黍苗盡枯槁農夫空胝胼草根盡充食斗米三百錢恒陽有賢母惻然心憫憐我賴先世德諸子聿翩翩聲名溢中外冠纓滿堂前當此旱魃虐千里多罄懸天子尚咨嗟憂形雲漢篇況吾桑梓情忍視無突煙前憲有遺則我願一追搴鄭展出鍾粟黔敖陳粥饘豈不惜錢財其如心鬱邅我食可無肉我衣可不鮮但無溝中瘠我便安食眠出我饔飱資一一陳路邊務使鳩鵠形殘喘得茍延閭里競歡呼何啻甘露零歌祝遍遐邇直達九重天有詔出丹陛伐石南山巔特表賢母閭芳聲俾永傳寄語厚積者勿徒務戔戔蘇兹菜色人勝於買良田夀叔祖話山翁七袠憶昔總角時屈指里中賢卓犖固多人叔祖實翩翩自兹竊向往服膺常拳拳每一接緒論輙復意欣然私喜黄叔度近在家庭前中歲逺宦蜀召杜聲流傳一朝賦歸來優游茂叔蓮身隠名愈震年高德彌堅隴也愧不敏留滯在幽燕嘗思脫塵網追隨當湖邊時聞老成訓庻幾箴其偏竊怪漢伏生九十便多愆空勞鼂大夫不能辨百篇孰如我叔祖終日常乾乾有詔問尚書一一能口宣贈崔平山聞說古王母遺跡在房山簡編莫可考紛紛傳里闤豈願從八駿來觀禮義閑抑是穆天子挈之游人寰區區白雲篇大雅久欲刪況兹益訛傳千載疑信間君子貴令德何必逺追攀瑤池咫尺耳無事西出闗惻隠滿腔子勝似仙人顔不見崔使君視民如恫瘝自從兵戈來閭閻日若艱一自君下車逃亡漸次還嘖嘖歌頌聲往往流山灣充君愷弟念召杜直等閑此德何終極滹沱水潺潺梁溪詠題潘貞女奔喪記夙昔聞梁溪蔚為賢聖鄉赫赫高與顧發憤立大防埽除末俗態奕世有輝光至今兒女子亦知重綱常制行有偏全此道猶未亡卓哉潘貞女志操嚴秋霜未識夫壻面永矢不敢忘於禮似為過摯性逾共姜不惜一生寡斯志良可傷我從貞女弟得一聞其詳示我奔喪記滿紙覺芬芳人生茍努力何事不可彊劇秦美新者是誠何心腸孤松吟送僉憲梅崖李公解任還都孤松生高岡夭矯挺奇形雖遇大風起不隨衆草零大風有時息孤松長青青人生有屯亨自昔多變更所貴學道者猝加之不驚毁譽任紛嘵吾獨守吾貞不見黄次公歴盡通與窮忽從廷尉議忽並丙魏崇榮落有何常萬事真夢夢所以董江都明道不計功下帷是吾事升沉惟上穹勿憂世嶮巇但願吾道隆俯仰無愧怍何虞衆論訌路旁多歎息競欲問太空誰知君子胸霽月與光風箕山吾聞古箕山云在嵩高旁又聞許由跡乃在郤榖鄉孰是孰非歟往事多渺茫不識勲華世何故有留良豈見共驩輩意氣猶揚揚所以甘高蹈不願任棟梁不知臯與禹日孜孜廟堂懐襄勞拮据飢溺在心腸之子若聞知應愧獨翺翔我友産洛水筮仕恒山陽宰相箕裘在膂力況方剛努力崇明德前途正未央鳩鵠賴扶持四海仰休光應令箕山客俯首謝疎狂光武臺咄咄光武臺遙接堂陽城當年馮鄧輩竭力相扶撑功勲垂竹帛至今有休名世道方隆平無事談戰征儒生思報國惟在六經明敷之為吏治膏澤徧蒼生人心永固結勝是求干城王子抱經術洞悉閭閻情絃歌徧四境村農安鑿耕方且搜文獻逺追先民程但願行君學何憂潢池驚為謝雲臺將無勞費經營寄山西范進士彪西聞道汾水濱大儒又篤生弓旌不能屈逺追先民程發憤尋絶學非為求名聲卓卓辛與薛時時在牆羮家學有淵源丕承愈益精著書滿篋笥吾道賴干城愧吾風塵中未獲隨景行河津既己逺誰人開我肓願言去世網竊附在嚶鳴勿嗤下里音如何屬韶英送鮑湖叔南歸仕宦如奕棋勝負何足論所貴有天爵到處自長存所以古先哲三己色常温不見宋考亭一生明六經登朝九十日謠諑滿中庭著述仍不倦身退名愈馨莫恨一書生不得作公卿古來書生業往往勝蓬瀛高山衆所仰千秋常錚錚願言志大道一切鴻毛輕埽除詞章習佛老并擴清濓洛與闗閩時時在牆羮孰云三徑中不可追咸英讀宋布衣集偉哉宋布衣文詞何陸離氣呑雲夢澤舉世皆披靡遺編十存一光芒若鼎彛磊落真可愛胸中無一疵男兒當如此何庸學脂韋所惜圭璋質未經琢與追洙泗既云逺狂狷多陵夷魁梧奇偉人汨沒酒與詩展巻一莊誦慨然思仲尼贈宗冀州意園并夀咄咄宗使君分符來信都喜君在衆中慷慨發訏謨曰余同舟人所貴相匡扶有善宜競勸有過莫面諛卓哉君斯語迴與流俗殊自從大道隠人各謀自腴吏治日益雜民生日益劬茍能充君言相應如鼓桴臯夔可攀躋龔黄何有乎願我百君子人書置坐隅同寅而協恭相率遊康衢埽除晩近態直上追唐虞借問何能爾皆君所感孚兹德視恒山千秋永勿渝贈潘子逺亭尊人夀錫山潘逺亭秉志何芬芳作吏恒山南逺邇稱循良一朝賦歸來意氣殊洋洋益勵青雲志精進不可當問君何能爾淵源正孔長有親未白頭寄跡在戎行少小耽經史志在追黄唐孝友著族黨才器重珪璋偶因感世變一試黄石方挾策上幕府慷慨當危疆轉戰常岳間洞庭波不揚數奇未封侯荷戈帝京旁兵民相錯雜一一歌平康衛霍何足論直希渭濱姜嘗聞過庭訓男兒須自强文當贊化育武則務匡襄不必計利鈍但祈此心臧余聞起竦然所見何堂堂宜吾逺亭子志操如鸞凰愧余樸遬材不能頌琳瑯幸昔託同舟得一睹光芒捉筆述梗概聊當進一觴贈曹翁臻萊七十自從出門來不覺七八春頭髮强半白勉强涉風塵羨君秉奇質豪邁超等倫兒孫多英拔不啻太丘陳優游談詩禮終日常津津門風雍以肅古道賴未泯屈指君甲子七十今纔旬七旬何足言眉夀正無垠愧余樗櫟姿幸託在姻親磋磨亦有年猶然徒苦辛常思脫軒組逍遙當湖濱從君問竒字日啖鱸與蓴左手握芝蘭右手攜鳳麟各出青箱業仔細論道真箕裘告成就世風亦返醇君應倍欣然陶陶同大椿贈張長史庶常自余來京師喜與君周旋倉皇顛沛中感君意纒綿相期在千古知君念己堅慚余學鹵莽不能有所宣徒與俗齟齬自省亦多愆幸遇浩蕩恩得放早歸田自此共野老耕鑿安堯天但樂聞賢者所學益精專正誼明道志皎然日月懸繭絲牛毛理直接先民傳正學既昌明爝火盡棄捐統紀從兹一王道惟平平始信俗可移只在日乾乾村農亦狂喜光耀滿林泉贈某十四韻舟發潞河頭朔風初颼颼濟汶正浩瀚河淮水悠悠喜逢素心人晨夕共優游世網何足言邈然念前修君方際休明尚當展嘉猷舟楫鹽梅效行將次第收司馬洛中園恐難許久留我歸安耕鑿村農是吾儔一經付豚兒坦然便無愁君住䢴江上自昔多名流聞說漢董生作相在此州正誼明道語直追孔與周遺風猶在否為我一訪求贈姚亘山丈夫志四方此言須細詳四方雖云樂何如在家鄉況復多變態前途更難量網羅到處有不可不慎防所以先聖訓教人善行藏進禮退以義窮達視彼倉滔滔雖皆是我必擇康莊人生貴知道豈必登廟廊君不見詩人拳拳十畝桑子陵老布衣咄咄勝侯王堯夫安樂窩至今仰耿光此中有真味難與世人商君誠熟反覆知吾言不狂贈周敉寧尊慈陳太孺人七十夀我友抱竒質矢志學周程不逺三千里翩然來帝京不入金張室不逐紈絝行不求印纍纍不羨金滿籯但願聞大道歸慰夀母情夀母長名族椒蘭由性生況復歸高士家世篤忠貞鮑車與梁案閭里傳相驚白頭無他願惟願兒學成無使鄒孟母獨擅千秋聲所以令子心自愛若瓊英必欲琢成器不敢憚逺征長安多名傑人間之蓬瀛先猷或不逺庶幾在牆羮愧余樸遬姿平生徒硜硜承君來相問不能一發明無已有一言敢願為君傾恭聞古聖賢其道惟立誠人心與道心苗莠不並榮朱子白鹿規若射有鵠正夙夜常念兹名實自俱宏勿謂俗滔滔何妨亦裸裎歸求有餘師無事逺經營六經昭日星只在一與精慈幃應心喜期頤顔如嬰題靈邑南寨村佛寺二絶亦是聰明奇偉人能空萬念絶纎塵當年可惜生西土未聽尼山講五倫偶憐愚俗多狂惑敷衍輪迴俾駭聽若知同泰舍身事應悔當年語不經讀張文潛江上詩因嘲宛丘先生學頗堅惜從蘇氏雜狂禪莫道紛紛渾似夢人生何事可茫然三魚堂外集巻六
