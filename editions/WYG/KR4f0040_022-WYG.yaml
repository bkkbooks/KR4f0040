body:
  text: 三魚堂外集跋先生居敬窮理好學力行闇然自修不尚文采雖晩年道明徳立終不敢著書以自表見若詩古文詞尤不屑為也故每以世之濫刻文集者為戒以為司馬之癖相如之俳猶見譏於有道况下此者乎故易簀時篋中並無遺稿然考其一生著述散軼人閒者於文章諸體己無不備先生雖無自揣必傳之意但其中長篇累牘片紙隻詞凡出於先生之筆者皆所以闡明學術陶淑人心維持世道之文而絶非無用之空言則又不可不亟為表章而聽其或存或亡也禮徴故與二三同志旁搜廣緝彚成是編練水侯子大年略訪朱子昌黎文集分類而前後之琴川及門席氏漢翼漢廷伯仲復加審定出帑付梓遂得告成以垂不朽吁是豈可與風雲月露之章同類而譏之哉康熙辛已季春姪禮徴謹跋
