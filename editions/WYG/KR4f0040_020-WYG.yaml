body:
  text: 附魏總憲叅劾疏題為吏治漸壊公道宜彰據事直陳以警將來事竊惟進退賞罰國家之大權是非可否天下之公論進一人賞一人而天下知勸退一人罰一人而天下知懲葢有合乎天下之公是公非共可共否也故孔子曰舉直錯諸枉則民服舉枉錯諸直則民不服洵不誣也皇上用人致治以大公至正之道出之滿漢内外惟取賢良而督撫大臣受上之恩自當體皇上之心為心亷介者宜舉而不宜黜溺職者宜黜而不宜舉貪酷者宜掲叅而不宜徇隠略指一二事所當嚴飭以警將來者為我皇上陳之如原任江南嘉定縣知縣陸隴其者廉介之官也知縣任内清操飲冰愛民如子賢聲傳播於都下臣心竊重之謂異日可步于成龍之後塵者此人也乃未幾而該撫疏稱隴其守絶一塵才非四應德有餘而才不足部議降調又有被盜一案該督撫疏稱隴其據汪標首告仇殺審明仇殺無據請緝結案獲盜過半原無詭飾與武官竟不報聞者迥别正以開報職名遲延部議革職例之所在臣俱不暇問但縣令中有此亷介愛民之官正當為羣僚作榜樣為百姓作慈母今之有司惟守與德為難耳既知其守與德矣何不即留以長養百姓雖該撫再疏奏稱隴其委係氷操不染一塵勵其素守策效將來部覆不允終以例拘萬民怨恫為之罷市去之日攀轅號哭執香遮道去之後家家尸祝比於父母乃行李一介而蕭然歸去矣又如原任江南鎮江府知府劉鼎者溺職之官也知府任内全無才能叅罰至五十案其停陞及戴罪督催者三十餘案降俸者四十餘級應追銀兩無完者二萬三千兩有竒應追米麥無完者五千九百石有竒此一官者溺職之極乃保陞蘇糧道該督撫從何見其才能一旦盡銷叅罰停陞之案而脫然陞去矣又如原任絳州知州曹廷瑜者貪酷之官也知州任内貪如虎狼敲骨吸髓捐納員外因而酷以濟貪聽信衙蠧撥置將富民之妻王氏指稱私鹽名色鎖禁署前神廟嚇詐銀兩縱役淫汚氏不允從羞憤自縊合州士民告伊貪縱惡蹟平陽知府李廷梅匿不掲報反令本府㕔官親身赴州以講和為名將廷瑜擁䕶出境以致士民不敢具告現今公憤寃詞竪碑於州此一官貪惡之極竟不報巡撫糾叅而飄然颺去矣夫朝廷所以鼓勵人才澄清吏治者惟在賞善罰惡進賢退不肖耳況當公道昭明之日乃將亷官與貪官叅處同例盡職與溺職保薦無分豈皇上勵精圗治激濁揚清之盛心哉若不嚴加申飭則前者不戒後者不警下官可以欺上官上官可以欺皇上上下相䝉使亷吏灰心貪風日長臣切鰓鰓慮之也伏乞嚴飭各督撫大破積習躬先率下表正則影直源清則流潔薦舉必首亷介叅劾必協輿情於以肅官方而勵人心民命庻其有瘳乎縁為指陳事蹟字數逾額如果臣言不謬伏乞睿鑒採擇施行附魏總憲舉亷疏己未題為遵諭舉亷以惜人才以勵官方事臣謬任風紀不能激濁揚清每一撫心惶愧無地前隨諸臣之後跪聽上諭諄諄以用得其人為要以操守清正為本又於本月初四日隨吏部滿漢諸臣面奉上諭更見進退黜陟務祈確當之盛心臣思用人者在知人懲貪必先舉亷謹按周官六計弊吏曰亷善曰亷能曰亷敬曰亷正曰亷法曰亷辨咸冠以廉也京察大計冊開四柱曰守曰才曰年曰政以守為先也人生大綱有四曰忠曰孝曰亷曰節是亷吏與忠臣孝子節烈並重也邇來吏治不清貪以為能廉以為拙雖風俗漸染寔由臣等不能表率所致今天語既宣之後砥礪名節者必當躍躍而興起其在天語未發之前謹守廉隅者亦未可泯泯而無聞也孔子曰舉爾所知臣雖不才無所知識又曷敢沒人之善以負我皇上至公至明至虚之心哉除諸臣見在部院等衙門皆聖心洞悉者臣不敢舉其在外各官己經㑹議令督撫將現任清正賢良者薦舉臣亦不必舉臣謹將侍郎以下素有清亷之名者滿漢得十人為我皇上陳之原任户部侍郎雷虎滿洲人老成戅直清名甚著臣在户部時司官言及此人無不歎服臣雖未識其面嘗慕其人今請告在旗聞其年齒稍衰原任户部侍郎班迪滿洲人居官清正臣曽共事二年又奉㫖查户部各司見其念念為國復差江西臣不知因何事處分今降級隨旗上朝原任督捕侍郎達哈塔滿洲進士清謹自守四壁蕭然人有醇樸之風行無奔競之習今京察降級原任刑部侍郎高珩山東淄川縣進士性甘淡薄志絶俗塵並不自有其身安知世有富貴告病在籍年過六旬原任大理寺卿胡密子滿洲人清謹自守家道甚貧素聞安静之風兼有讀書之志今京察降級隨旗上朝原任吏部郎中内陞宋文運直𨽻南宫縣進士清而且直守正不阿掌選之時錚錚有聲臣與同時内陞識其一面今候補在籍原任翰林院侍講蕭惟豫山東德州進士督學畿輔大著清名士子至今頌之臣雖不識其面曾聞其人終養在籍原任湖廣布政司未任告病畢振姬山西高平縣進士歴任部郎道員臬司清操絶世才略過人請告十餘年躬耕百畝猶讀古不輟臣前以有體有用薦之左副都御史劉揵亦薦其操守清嚴一塵不染其回籍之日一馬一僕而外了無長物真學行兼優之人係臣丙戌同榜年過六旬原任直𨽻内黄縣降調知縣張沐河南上蔡縣進士清操惠政深得民心有古循良風因詿誤鑴級去之日老㓜追送臨河尚不忍捨其愛戴如此臣雖未識其面曾聞其人今保舉軍前候用原任江南嘉定縣革職知縣陸隴其浙江平湖進士清操飲氷愛民如子因詿誤被革萬民怨恫未去而皇皇罷市既去而家家尸祝又聞與妻同駕一舟惟有圖書數巻其妻織機一張而己前薦舉博學到京臣有一面之識今丁憂在籍以上十人有候補者有候用者有告病者有終養者有降級者有革職者臣祗就平日之清操仰陳於座右俾天下曉然知此等清簾之人當世所輕者而朝廷特重之其曾任京官者原在器使之中擢一人而四方觀感其曾任外官者雖無起用之例褒一字而千載光榮皆非臣之所敢必也若臣所舉非亷有違天下之公論臣自不敢辭咎矣統祈睿鑒施行三魚堂外集奏疏
