body:
  text: 靈夀縣遺愛碑記頃者天子採公卿言徵海内吏業之最聞者入補侍御之職吾靈夀令當湖陸公被璽書入朝邑人士不克留共勒石鏤狀而亭之五父衢庶一舉目而若睹公而後其思稍慰焉靈邑介在瘠陋災䘲頻仍歲在己巳夏旱麥不登秋旱霜殺禾民間終歲勤動不獲粟升斗相與劚樹刈草而食流離野死者相屬公為疾首蹙頞以勞求於野亟繪災民之狀告救於郡二千石及中丞以下鄰邑傳誦其牘者多至痛哭焉所請格於上不憚再三卒守初議天子俞所請下全蠲歲租之詔發帑金為賑於是公遍歴山谷旅宿不歸者閱月按邑之被災者為三等躬為部署而均之逺近帖服無復怨咨復為簡詞訟省文書懾姦宄蒐盜賊招流亡大約倣古十二荒政之遺而節約其概靈邑數萬垂死之飢民一一從公恩勤鬻閔中特與以更生再造也他如興學課農減丁緩賦省刑恤孤繩姦飭胥葺淫整廢公聽斷罷追呼自昔書史所載仁心質行之君子所以推誠御物者公且博採而兼收之葢公賦仁智之性傳聖賢之學規畫措置一出於經術之正故能專劇肩難略不以利害奪其志也公之赴召也在庚午五月間新榖未登公所講荒政未及竟民之依公者方如魚之於水鳥之於木欲倣古者借冦故事上書以聞而謀之父老解事者父老曰朝廷咨於九卿謀之宰相徵海内循良僅得如公者四人吾儕寧得遮留之公之入為臺諫言官也言行道亦行也聖天子必不以一邑之啼號而故漠視乎四海且吾邑之所未竟者公必有以處此矣以是徘徊不能己共疏遺愛於碑且徐圗肖貌奉祠以垂千百世之祀焉公名隴其字稼書浙江平湖人力學著書傳道統之正登庚戌進士兩舉亷在靈夀日家人紡績以佐薪水其去也實不能具行李云三魚堂外集碑記
