body:
  text: 三魚堂文集卷六贈内閣學士陸隴其撰尺牘答同年許子位憶自西湖别後久濶台顔時深飢渴不意奉命承乏貴邑擬於涖任後躬叩龍門快聆大教忽䝉台翰宣頒深感殷勤至意但隴其生平勵志以亷潔自期而力薄才劣又值國步多艱之日便民利國勢或相左擬學第五倫之躬斬馬草鄧伯道之自運家糧敢期保障庶免繭絲生平簞瓢自樂行且冰蘗知甘然何以除稂莠而植嘉禾何以親鸞鳳而逺梟獍何以遺利澤於百年何以解倒懸於今日撫字何方催科何法大而移風易俗小之剔蠧損煩先生理學經濟夙著東南蒼生望澤甚殷況貴邑利弊所熟悉者乎惟期一一賜教開我愚䝉敢不虚已以聽使嘉邑受某一分之益即大君子一分之賜也臨楮不勝仰企之至復房師趙耐孺先生前到呉閶囱囱違侍至今悵然世兄來捧讀手教得悉近履殊慰遙思但隴其勞生虚擲方顧影以自慚何煩尊者念及致䝉世兄枉臨隆情疊錫益增汗下猥涖任以來才庸事劇手亂絲棼交盤諸務毫無頭緒新舊積逋盈億累萬憲檄羽飛餉急莫應不知奏銷作何景狀兼之素性迂拙凜凜春冰不敢自玷生平以負康成門下之知故冷署蕭蕭祗覺坐愁城而避債無臺感遇如老師尚無以為情惟深惶仄而已世兄淵才雅度令人心儀但猪肝一片地主之誼歉然耳嘉貺愧不敢當即藉附璧外具不腆略申鄙私幸為哂納感愧縷縷難罄筆端統惟原照不宣與李子赤茂數年契濶得一聚首又冗劇之際不能細罄衷曲耿耿何如此時此地為有司者其日在荆棘閒何如物外軒中擁萬巻書焚香吟詩具人間樂境耶願足下寳此閒暇專志正學勿以有用光隂浪擲旁門此則故人所私禱耳前聞留心文獻通考此儒者有用之學以大才肆力於此欣羨欣羨但程朱文集語録及明儒薛敬軒胡敬齋諸録尤為體用兼備之書不可不讀高明豈有意乎淵伯常㑹否所作貽安録一書大有闗係弟已為作序但文樸陋不足以表揚似不可少物外軒一序幸速成之答表叔李慧生違範日久每厪馳依知杖履近多康吉欣慰何似謭材而試巖疆錢榖之積逋者新舊累億憲檄催餉奚啻如火曉夜徵輸苦莫以應嗟我勞人惄焉如擣不知將來作何奏銷至若守兔凜冰又姪素性荒署依然壁立更難為親知道者斗大疁城竟等茫茫苦海矣奈何至戚如表叔尚無一芹將獻惶愧難言當從容申敬高年玉趾幸慎跋渉答曹微之進士久違教言每深雲樹遙知道履綏佳神全養到將來駿馬春風定應首唱矣慰羨慰羨弟以迂疎之質任此繁劇蚊負鳩營惟恐隕越以貽枌社憂奈事事棘手不知所措催餉之檄如雨積逋之案如山晝夜艱辛癯欲骨立至於冷署蕭條之況依然故我更難為知己道也今而後知宦遊之味不惟似蠟抑且若蘗矣辱承雅愛翰傳汪年翁雲誼中心藏之何日忘之苐恐鹿鹿魚魚不足以當鼎植耳手口卒瘏容徐徐親麈乞為叱謝高情縷縷感愧率復不盡統冀鑒照曷勝依切與雲間陸郡博恭惟先生學有淵源教育之澤久著三吳兹者秉鐸雲間事事步武前人譽髦之士蒸蒸向化此地久汨沒於辭章近復馳逐於聲利以先生方正篤實之學為之砥柱轉移之機當不逺矣弟嘗竊思學校為天下根本當今欲整頓缺壞必自此始而上下皆不甚留意近來益復龎雜居此職者亦往往多自菲薄不肯以古人自期待然胡安定曹月川所以赫赫今古者正以其能為於舉世不為之時也使舉世皆已為之則亦無貴乎安定月川矣然則今之龎雜而苟且者不可謂非豪傑振興之時也先生豈非其人哉弟夙仰高風秋間在玉峰晤靈昭令姪益悉道範又獲讀四書定解如親承指示高山之仰何啻飢渇而台駕枉臨不及倒屣每用耿耿兹因舍姪壻屠生王機獲在門牆敢附數行申候并謝教益屠生為亡弟㓜壻向曾執經於弟年少有志先生進而教之俾知聖賢之學得有所成就幸甚臨楮曷勝悚惶之至答川沙王守備日者得聆麈言喜慰無似霏霏玉屑至今猶令味思也兹承教并將禁條頒示具見親臺留意巡防未雨綢繆之思不獨裨益疆圉即弟輩亦叨庇多矣至論及私販之徒出沒踪跡燎若列眉愚民為蠅利所驅而不知累及身家誠屬可恨今欲窮其源而塞之似亦至論但慮賣鹽之家而根究出洋之犯轉展推求恐捕緝之輩又於從中播弄或至擾害反與不計轉展攀指之律有礙莫若辨鹽色嚴禁坐賣之家有犯必究則頓者無人而販者自絶更於編甲之内互察嚴查飭以隠諱連坐之法如是則利無所營而趨者少害有所叢而避者多自然姦志潛消矣老親臺與弟見合符即當示曉愚民專役協查也疆索遼濶鞭長不及者惟親臺加意焉率復不既統惟犀照上座師張素存先生自山左道上得侍函丈囱囱言别不及細聆教言至今耿耿遙想老夫子從容侍從臯䕫事業行當照耀宇宙豈惟門牆之内實寵嘉之隴其荷䝉垂愛夙夜惕厲思欲稍自樹立以圖報稱不意才疎政拙不能免於部議遂遭罷黜固分所宜但私心竊懼者世俗不諒謬以隴其為過於寛厚有誤催科此言流傳功名之士遂將以寛厚為殷鑒其害非細其實隴其於催科較之他邑不大相逺核其民欠尚少於他邑特勸諭多而敲扑少其迹類於縱弛耳隴其方自愧不能盡用德教而論者乃以為寛厚之誤豈不誣乎既退歸田園悠悠之口應置勿論然此乃人心氣運所闗故敢於知已之前一陳之使大君子鑒焉知其罷黜之故由於學不至德不足而寛厚無罪焉則庶幾耳至若一身之得失榮辱雖不能如古人之塵視軒冕然聖賢義命之學則固嘗聞之矣豈敢以此咎人也兩載鹿鹿未獲一候起居疎慢之罪不可言狀兹因便羽聊展寸忱不莊不備統希鑒原臨禀曷勝悚切之至答崑山丘近夫夏間接手札未獲裁報時懐耿耿年翁學問文章夙昔欽仰過承謙抑殊不敢當不棄駑鈍得常親道範斯厚幸矣今之志於道者鮮如年翁之卓然以正學自任此直斯世之祥麟威鳳豈特曼絶三邑已耶惟望益加砥礪如陟泰岱進而彌高如遡星宿探而愈深直造其巔直窮其源使古學之不絶如縷復昭昭於天壤則世道之福也疁城學者雖衆然與之言舉業則欣欣樂聞與之言為已之學多捍格而不入惟諸莊甫超然功利之外可謂篤行之士所著文字亦彬彬可觀近常相往來猶記高明之極口贊歎洵不虚耳瞻望咫尺未獲把臂罄所欲言悵悵何如因便申候臨楮曷勝神馳復房師陳省齋先生客歲從闗使者得老師札即作一稟附呈想已入台覽兩載鹿鹿未獲專使一候起居罪何可言隴其本屬菲材荷䝉提拔驟得一官硜硜自守惟恐有負知己不意以此見諒於君子亦以此獲戾於世俗命也復何言哉錢糧雖無大挂礙然亦小有未完冬底可竣局寒家本無貲蓄今亦適還故我幸而老親亦安貧不以蕭然為苦明歲尋得一訓䝉地為餬口計當世之事不敢復問矣自念生平學力疎淺此後或得以閒暇之身究心古人之學倘或稍有進益不終於昩昩即為原幸敢尚有他望哉前歲為老師尋一十七史因恐浮沈蹉跎未寄舍親北來即當送呈臨稟曷勝悚切之至與李枚吉壻在呉門遇來使知吾壻欲援近例愚竊以為不可朝廷設科取士三年一舉此正典也方正之士莫不由之而進今科之設不過為急於功名者使之稍助軍需亦得一體進取原非所以待豪傑也吾壻英年有志前程逺大苟發憤力學將來鳳翥鵬翔何可限量奈何不以豪傑自待而甘心出於此耶且就吾壻今日所處又有大不可者禮為人後者為其本生父母降期然服雖降而一切食稻衣錦之事必有不安於心者葢可降者服不可降者心也故考試之事但當與歲考不當與科舉秉禮之士莫不皆然今吾壻期年雖滿而心喪未畢儼然與應舉之士角逐於文塲可乎不可乎況功名遲速有命難易亦無一定苟命應得雖在千萬人中自當脫穎而出如其不然即兩人相較亦有得失況十五人而中一人安在其必得耶即功名未必得而徒冒不韙竊為高明不取也相愛之深不覺盡言惟吾壻熟籌之幸勿以吾言為迂交盤尚未完局秋凉當歸草勒不悉示大兒定徵我雖在京深以汝讀書為念非欲汝讀書取富貴實欲汝讀書明白聖賢道理免為流俗之人讀書做人不是兩件事將所讀之書句句體貼到自己身上來便是做人的法如此方叫得能讀書人若不將來身上理㑹則讀書自讀書做人自做人只算做不曾讀書的人讀書必以精熟為貴我前見汝讀詩經禮記皆不能成誦聖賢經傳與濫時文不同豈可如此草草讀過此皆欲速而不精之故欲速是讀書第一大病工夫只在綿密不間斷不在速也能不間斷則一日所讀雖不多日積月累自然充足若刻刻欲速則刻刻做潦草工夫此終身不能成功之道也方做舉業雖不能不看時文然時文只當將數十篇看其規矩格式不必將十分全力盡用於此若讀經讀古文此是根本工夫根本有得則時文亦自然長進千言萬語總之讀書要將聖賢有用之書為本而勿但知有時文要循序漸進而勿欲速要體貼到自身上而勿徒視為取功名之具能念吾言雖隔三千里猶對面也慎毋忽之答嘉定李生玉如不孝生平積愆禍及先人逺辱光唁心肺方裂不能一叙契濶悚惕而已方期賢者積學奮飛為時羽儀不謂亦罹此大故何天之降罔一至於斯苫塊之中未得以生芻一拜几筵兼謝厚誼徒懐耿耿使者來知方為葬事經營而手札諄諄下詢惟恐稍有勿當則終身莫贖此一念已得禮之本擴而充之知必有大過人者但不孝平時學業鹵莽未能徧考古今之禮動多窒礙豈能為高明決疑辨惑耶承問不容自己姑據所見言之夀壙一事儀禮家禮皆無明文然古人往往為之似無預凶事之嫌左氏所謂預凶事非禮者葢指含禭賵賻之類言之至於棺槨之屬則不可以此論故檀弓有君即位而為椑之文王制云六十歲制七十時制未聞以為嫌也至若有庶母之葬而以兩邊俱葬夀壙居中為疑則庶母𦵏位於禮原不應與嫡母相並或另祔於旁或稍退一二尺如此則與夀壙亦似無嫌而亦不必停庶母之葬以有待也惟是世俗封夀壙純用吉禮則哀樂同時誠有如來札所云者不孝亦嘗疑此而未有所考據查儀禮筮宅主人皆往兆南北面免絰註云免絰者求吉不敢純凶疏云主人之服不純吉免絰亦不純凶也此是卜葬宅之禮以此推之則封夀壙亦當稍叅以吉但不可如世俗之純用吉禮或者暫釋衰絰以素服臨事可也然當更詢之博聞知禮者臆度之言不足據也冗中不敢久羈尊使囱囱草復知無當於禮意伏惟鑒諒不一答同年顧蒼巖表叔舊冬都門獲接尊札并領學蔀通辨正欲覓便致謝忽聞家變狼狽南歸一載以來㷀㷀苫塊不復知有人世應酬之事未獲以一字達左右乃復逺䝉光唁施及先人曷勝悲感又䝉垂愛欲延之家塾深荷惓惓之意但隴其明歲已受虞山主人之訂不容中更當另訪一友與表叔祖商定再圖報命也月川先生集謹已拜登此書求之十餘年不可得一朝獲之何啻百朋之貝耶但月川尚有四書詳說存疑録等書不在此集中不知彼中尚可尋覔否更望留神家鄉風景如舊但今歲米價驟騰人心皇皇葢民窮財盡譬如尫羸之人稍遇風寒百病交作明歲若再加長其勢便難支撑可為隠憂者此耳中州光景度必相同催科之事勢不能全緩須使百姓洞然見我惻怛之意然後急之而不怨所謂信而後勞斷斷不誣吕新吾講究荒政最為詳悉宜急求其書觀之擇與地方相宜者為小民盡力經畫一番此根本之計也囱囱草復并謝隆誼不盡欲言答某索序先生以箕潁高踪道揚風雅為後進表儀久矣乃辱俯念謬以珠玉問序於章句鄙儒其亦古人芻蕘是詢之意乎然黄鐘大吕豈淺學所能贊一詞所以聞命逡巡而不敢答也兹者更值家變㷀㷀苫塊不復知人世有斯文之事雖琳瑯在前不知其為何物而況能序之乎竊恐高明未鑒病其懶於奉命敢佈愚忱至若古之詩人必先有志其志卓然出於流俗之上可以對天地質聖賢然後發而為詩故其詩正大高明而非風雲月露之學所能彷彿其萬一知先生於此必有所得力伏惟不棄愚矇而教之則所厚望焉與閩臬趙公恭惟先生道原洙泗文遡韓歐霖雨之澤已徧乎中外斗山之仰益重乎朔南隴其自乙卯都門獲瞻道範願學之私常深寤寐山川間之不能時奉大教每切耿耿兹者台旌秉憲八閩正值朝政寛仁與民休息之時風動之美當不讓庭堅種德非特如漢于公昌大門閭已也況八閩為考亭朱子闡道之鄉以大君子式臨兹土刑措之餘知必將振揚風化興起儒烈俾紫陽遺澤重光海宇世道之幸為何如耶又紫陽門人如勉齋北溪西山九峰之徒皆係閩産遺書久湮搜緝而表章之其在斯乎企望企望舍弟承烈係先伯墨濤公嗣子來叩台墀肅此附候舍弟向來杜門株守未曾涉歴世故進謁之時深望教誨統希俯鑒臨楮曷勝悚惶之至復席治齋虞部不肖弟以樗櫟下材與時牴牾承高賢顧盻付以師友之任垂愛之殷有倍尋常方圖報稱不謂生平積愆弗為天佑至於大故狼狽南歸乃更辱憫憐逺勞賻唁心肺方裂未獲以寸簡致謝耿耿何如春初令親到舍傳述盛意感切寤寐但不肖方㷀㷀在疚秋冬又當經營先君窆事未能逺出有虚高誼惶悚而已令郎天資英妙必成大器鄙意目下但當多讀書勿汲汲於時文左傳之外易詩禮諸經皆不可不讀讀必精熟熟必講解聰明自然日生將來便不可限量養其根而俟其實古人為學皆然世俗子弟所以多壊只縁父兄性急一完經書便令作文空疎杜撰不識經史為何物雖僥倖功名亦止成俗學與前輩學問相去殊絶此不足效也芻蕘之見惟高明採擇肅此布復并謝隆施苫塊餘生言不能盡統希鑒原臨楮神馳又春杪曾有一札奉謝未知得達否嗣後復承令親到舍為明歲之訂弟自愧愚鈍無毫髮之長可以有裨高明而謬䝉垂愛惓惓無已感荷之私豈筆能述但弟明年尚在苫塊中長安道上非棘人所宜不能馳赴台命遙望龍光耿耿而已令郎今歲學業必更精進幼學工夫不患不長但如築室須堅其基址然後可起樓閣五經四書皆基址也時文則樓閣也須先將各經熟讀細講浸灌其中使之有得然後及於時文循序漸進而不欲速自然所就不可限量榮補未知當在何日仕途遲速皆有定命不必攖心肅此附候并謝高誼統希垂鑒臨楮曷勝神往答楊某不孝廢黜之餘更值家變伏處苫塊不知何自姓名入於高明之耳逺辱台翰過䝉奬譽皆非薄劣所敢當也豈高明欲攬當世之英賢而姑先從其所最不足數者而惓惓焉古人所謂請自隗始者乎不孝雖嘗有志於古人之學然才質駑鈍無所知識偶膺民社未有絲毫之益於時輙遭罷黜皆所自取不敢尤人來翰以古之撫字心勞者比之此以告者過耳巢來昆季盛稱賢者之志行知胸中所負必有超出尋常流俗者惜未得一對叔度消其鄙吝也猥承高誼敢布區區統希俯鑒與趙生魚裳旂公七夕邊適苦瘧疾故尊篇久留未歸兹同康齋集暨龜山通紀一併奉到細看康齋文字大抵返躬克己之意居多明初儒者一派真實工夫真不可及但康齋於格致上微覺未足故其議論尚少發明而行事亦時有未滿人意處方之薛胡不無高下焉近來昆仲所用何功雖舉業上不得不著力但必使字字從身心上體貼出來則舉業無非聖學矣日記一編甚好讀書如此留心方不是俗學但判斷前人尤易磨勘身心為難耳與周好生兩月之内再遭家變此實生平積愆天降大罰復何言哉惟有痛自刻責庶天其厭禍偶書二語置坐右云老大始知氣質駁尋思只是讀書粗以此當韋弦即以此代祈禳但恐粗處未能盡知駁處未能盡見惟兄有以教之兄處淡漠奉老親此乃人生不易得之境上天所以篤厚兄者甚至豈弟所可望耶研田逺不如近必不得已則亦無可如何者也陸學師札奉上此公素聞其方正前在玉峯承其枉顧因弟先解維不及一晤覲候見時可一致意弟歸期當在望後歲内當圗至武塘種種俱俟晤時悉之答某己未之春承駕逺臨時不佞正在苫塊之中心肺方裂不能一叙契濶至今耿耿服闋以後念學疎性拙與俗多暌未敢遽出兩年旅食虞山借村學究伎倆為餬口計門外之事一無所與來札巡鹽冒犯云云皆屬訛傳並無此事惟去秋遭西河喪明之慘情最不堪此乃生平積愆天降之罰無足言者讀來札知高明力學之志不少退屈為之喜躍世俗滔滔篤志如此真不易得但札中所謂近年少有所得自以為孟子後無人知者未知所得如何竊以為孟子後無人知但可語宋以前若宋以來則有周程張邵有考亭朱子不可謂無人知賢者此語得無未深考而言之太易乎不然則辭未達意也愚近年所見覺得孟子之後至朱子知之已極其明言之已極其詳後之學者更不必他求惟即其所言而熟察之身體之去其背叛者與其陽奉而隂叛者則天下之學無餘事矣未審高明近所得者從朱子而入乎抑不從朱子入乎此中得失相去懸殊得一面論之幸甚或詳書所見寄示使不佞得辨别焉亦所願也使回囱囱不盡欲言臨楮神馳與曾叔祖蒿菴翁一身逺出㓜子無知所恃者師保得人耳臨行囱囱言不能盡想太翁亦不待言而知其意也舟中細思一齊衆咻之義覺得咻字情狀萬千愈思愈覺可畏非必有意引誘然後為咻凡親友來者或語言麤鄙或舉止輕率一入初學耳目便是終身毒藥故有心之咻猶有限無心之咻最無窮此孟子所以必欲置之莊嶽然莊嶽勢不易得惟恃一齊人之辭嚴義正能使衆咻辟易望風而靡則瀟湘雲夢盡成莊嶽矣舟行吳江道中半日悶鬱思至此又不覺欣然慰也至於户外之事惟有一静仲書夬履貞厲之占切中其病神明如見晤時幸時提撕此意内無咻而外無夬千里逺懐便可坦然矣惟太翁留意又六月初二到京部例急選與大選不同文書必自勳司而轉功司自功司而達選司有二十餘日之擔閣非一日便可投供也選司題覆又有一月功夫總之補期在九月矣初意欲改教職部中無此例只得聽其自然但將來做法甚難諸君子之期望亦最難副十分小心猶或庶幾倘得一世俗所謂美缺家中人切不可以為喜望太翁居常時時提醒此意在京師自覺紛華盛麗不能動此心頗浩浩落落但時一念及稚子愚蠢未有知識輙不能不膠擾於中未知近來讀書何如姪孫意惟欲其精熟不欲其性急太翁可取程氏分年日程細體古人讀書之法使之循序漸進勿隨世俗之見方妙周禮禮記俱宜令其温習一季得一周庶能記得姪孫㓜時温書皆一月一周也左傳諸書迄今猶能成誦皆當時温習之功惟太翁留神館中凡有不便不妨直言不比在别家也惟有一事意中欲望太翁之裁節者向在家時屢欲言之躊躇中止到路上思之不言畢竟是客氣非所以待太翁也敢一陳之煙之為物從古所無明季始有之呉梅村以為妖見於綏宼紀畧中姪孫見今之大賢君子無喫此者葢皆知其非佳物也太翁留心正學而嗜好偶同於流俗何難一舉而絶之一則見克已之勇一則免火燭之虞一則後學無效尤之弊一舉而三善備焉不識太翁不以為妄言否便中草附不能盡悉臨楮依依又到京三月家信未通心甚懸懸八月十七始接得閏月中信喜不可言姪孫已經投供但部中新例急選不論項款惟以文書到部日為先後而近來教官縣丞兩項捐陞知縣者聞改歸單月姪孫名次在七十人外補期尚遙遙矣冬末春初或作南歸計亦未可定尚在徘徊也家中百事都放不下所恃以寛其内顧之憂者惟以學生子付太翁耳明歲不敢另具約奉教自應如舊姪孫教子之念與他人異功名且當聽之於天但必欲其為聖賢路上人望時時鼓舞其志氣使知有向上一途所讀書不必欲速但要極熟在京師見一二博學之士三禮四傳爛熟胸中滔滔滚滚真是可愛若讀得不熟安能如此此雖尚是記誦之學然必有此根脚然後可就上面講究聖賢學問未有不由博而約者左傳中事迹駁雜讀時須分别王伯邪正之辨註疏大全此兩書缺一不可初學雖不能盡看幸檢其易曉者提出指示之庶胸中知有涇渭冬天日短應囑其早起夜間則又不宜久坐欲其務學又不得不愛惜其精神也聞家鄉米價甚賤此最是喜信季飛叔姪近況何如晤時并希致人處境不佳只有和平一法怨尤之氣減得一分有一分受用也示三兒宸徵前有一字寄嘉善柯寓匏帶歸不知曾到否我在外甚安好家中不必懸念但汝讀書要用心又不可性急熟讀精思循序漸進此八箇字朱子教人讀書法也當謹守之又要思讀書要何用古人教人讀書是欲其將聖賢言語身體力行非欲其空讀也凡日閒一言一動須自省察曰此合於聖賢之言乎不合於聖賢之言乎茍有不合須痛自改易如此方是真讀書人至若左傳一書其中有好不好兩樣人在内讀時須要分别見一好人須起愛慕的念我必欲學他見一不好的人須起疾惡的念我斷不可學他如此方是真讀左傳的人這便是學聖賢工夫汝能如此吾心方喜歡勉之勉之與前令董子祁奉教兩月如飲醇醪不覺心醉東郊言别曷勝依依一路老㓜捧觴逺送聞寅翁馬上酣醉猶諄諄勸百姓完糧息訟嵩陽父老以為數十年來勝事中山誌中又添一段佳話矣弟以菲材幸承善政之後成法可師事逸功倍叨庇𢎞多但駑鈍性成雖喜附驥實愧續貂未知將來作何景狀也使旋奉覆囱囱不既答鄭唐邑忝叨同譜山川遙阻不獲常瞻光霽祗聆教言惟神馳左右時切依依而已某駘駑庸才向待罪南中已遭蹉跌不知退遯復承乏疲邑每事掣肘撫字催科皆無良䇿内懷慚愧遙想足下宏才偉抱必有超軼絶倫者曷勝仰止未獲專力修候乃䝉手翰下頒復承隆貺過情之賜何以當之細讀來扎知足下冰雪為操留心民隠只不敢剥民擾民一言已足為某輩南車至云所講求者已政之得失非官階之崇卑卓哉斯言益令某歎服不已則足下教我實多乃復下詢芻蕘某何能更進一籌耶老年伯尊稿及李道臺嘉什俱已領入苐衛水占星之句某何敢當足下庶幾無愧耳上井陘道李梅崖先生前者憲駕光臨山僻疲邑諸事草率不恭之罪無所逃避乃執事汪汪千頃之量不督過之又寵榮之頃某縣某令傳致衛水尋源詩區區下吏荷䝉注念何幸如之至恭誦詩詞慨然於萬古聖人飢溺同民之意此大儒有本之言非月露風雲家所能道其隻字豈惟下吏實受其賜衛水增光多矣當尋片石敬勒水濱以誌不朽前䝉面諭疏通此源及查趙王臺高若干卑職隨令村民將所指舊源處疏掘至丈餘纔有水然甚微土人謂此水隨旱澇為盈縮大抵然也又據土人言其旁更有一源擬於農隙時再督其疏濬使一番憲節按臨與禹之明德俱永也趙王臺在縣治西十五里故城村城周圍約十五六里已多圮壊然規模尚在臺在城中約高五六丈無磚石但巍然一土阜上有武靈王廟廟甚陋係近時里民所修然其所由來則逺廟前一望平山井陘獲鹿諸山皆歴歴在目滹沱河環繞其下誠佳境也宜其為武靈所流連哉臺下相傳舊有八角井今已無形迹可考臺東里許有養魚池周圍約四五里今已為田但四圍高而此獨下儼然池形也卑職更有陳者禹貢恒衛二水皆屬真郡境衛在靈夀諸書無異論恒水則行唐誌謂即派河曲陽誌謂即沙河府誌則恒水沙河派河又各自為一水未知其孰是宜討求畫一使有定論亦羽翼經傳之一端也因論衛水而并及之統希憲鑒與鄭唐邑上谷把臂囱囱言别不及從容就正為悵年兄學有淵源議論丰采迥異流俗膏澤及民將與唐水俱永敬羨敬羨承許貴治邑誌專役走領大茂山勢曲折并望指示此山諸書皆以為即恒山禹貢太行恒山自是二山前聞年兄之論却似恒山即太行之隨地異名者不知果是一是二恒嶽之辨乃畿南一大疑案得年兄考正愉快何如邑中有文獻可開茅塞者惟勿吝賜教是荷一芹之微聊申鄙忱并祈哂納答張西山先生恭惟先生學貫天人聲徹内外隴其自某年某處得瞻仰高山私心向往年來南北間隔無由執鞭兹幸承乏靈邑得與令郎朝夕共事涖任之始又䝉不鄙逺辱台翰重以尊刻曷勝忭慰儒宗理要一書補近思之缺去性理之煩真足為學者指南衍義補刪筆削精嚴有功文莊不淺讀青齊政畧諸書則皆得之涉歴體認又令人爽然自失矣受教𢎞多肅此奉謝統希垂鑒與各鄉紳勸戒賭謹啓某學疎才短生長南方未諳北土情形承乏兹邑入境以來見地瘠民貧禮教廢弛蹙焉内傷求所以撫字之方教化之術使家給人足風清俗美不知何道而可恭惟諸老先生年臺一方表率利弊必素知之茍有益於民生有裨於風俗切實可行者伏祈詳悉指示勿吝讜言隴其將奉以周旋或可稍逭尸素皆高明之賜也至不佞亦有芻蕘之言望諸君子之採擇者敢并陳之如賭博一事實民間大害然而有司不能禁也禁之其心必不服何也彼見鄉紳士大夫皆聚而為之而有司所禁者獨此蚩蚩之民宜其心不服也夫移風易俗必自貴者始諸老先生年臺中高明逺見者自能洞燭此理不待下吏之言或有向來習慣以為此游戲之事無傷大體不知愚民因而視效開盜賊之源成惡薄之俗皆此游戲為之且士大夫家一有此風子弟慕效因而蕩廢祖業敗壞家門者恒必有之是非特一方之害亦本家剥膚之災也詩書中滋味甚長何可為此伏冀俯採鄙言互相戒勉以為民法禮讓之風既敦於上則酖毒之害自去於下蚩蚩者將不待禁而自止矣統祈垂鑒不宣與席生漢翼漢廷科塲一時未能得手此不足病因此能奮發自勵焉知將來不冠多士但患學不足不患無際遇也目下用功不比塲前要多作文須以看書為急每日應將四書一二章潛心玩味不可一字放過先將白文自理㑹一番次看本註次看大全次看䝉引次看存疑次看淺說如此做工夫一部四書既明讀他書便勢如破竹時文不必多讀而自㑹做至於諸經皆學者所當用力今人只專守一經而於他經則視為沒要緊此學問所以日陋今賢昆仲當立一志必欲盡通諸經自本經而外未讀者宜漸讀已讀者當温習講究諸經盡通方成得一箇學者然此猶只是致知之事聖賢之學不貴能知而貴能行須將小學一書逐句在自已身上省察日閒動静能與此合否少有不合便須愧恥不可以俗人自待在長安中尤不宜輕易出門恐外邊習氣不好不知不覺被其引誘也胸中能浸灌於聖賢之道則引誘不動矣切望切望尊公先生不及另札祈一致意與鄰邑某足下中州名彥家學淵源夙著海内某初至靈邑自謂得近耿光可以從容就正不意台駕遄行不得稍致寸敬悵歉何似某以菲材待罪疲邑雖外簡僻而鵠面鳩形之衆無術焉可以起之難乎其為撫字我輩叨朝廷一命之榮無可報効惟愛養赤子為國家培植元氣是其職分而學疎才短每切悚惶未審足下何以教之肅此附候不盡欲言答某縣令伏䝉寵錫龍川巨編所以品題之者劑量曲當非素有所主於中者能爾乎弟嘗謂本朝理學大明而戰國縱横之學如三條四列隠見起伏錚錚於本朝者尚四人蘇老泉其巨擘乎其次為李太白其次為王雪山其後為陳龍川獨龍川登晦翁之門日就斂挫縱横之餘氣到此遂收此理學大明之功之驗也執事以為何如敢因求教與祁州某足下江漢鍾英荆衡毓瑞循良之績聲滿祁陽某仰止髙山之日久矣幸於上谷獲晤丰采如飲醇醪兹啟某先生為某地理學之宗某生長呉越無由私淑兹幸待罪中山密邇貴治足下能為悉致其遺書俾樗櫟之質得沐浴於大賢之訓如親炙其人而開其茅塞當不啻百朋之錫也統希垂鑒貴治誌書并祈賜教一芹之微稍申鄙私伏冀哂存臨楮悚切三魚堂文集卷六
