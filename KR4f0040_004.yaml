body:
  text: 三魚堂文集卷四贈內閣學士陸隴其撰雜著讀孔子家語家語致思篇孔子曰季孫之賜我粟千鍾也而交益親自南宮敬叔之乘我車也而道加行故道雖貴必有時而重有勢而後行微夫二子之貺財則丘之道殆將廢矣此一條必有為言之也猶孟子所謂雖有智慧不如乘勢雖有鎡基不如待時云爾亦就夫時勢之合義者言之耳若不問義而但求時勢將何所不至耶孔子之道雖大行不加焉窮居不損焉豈必待季孫之粟南宫之車而後不廢耶豈粟與車遂能操道之權耶飯疏飲水菜色陳蔡道何嘗廢也讀正䝉太虛條正䝉云由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名朱子謂太虛便是太極圗上面一圓圈氣化便是隂靜陽動此是總說合虛與氣有性之名有這氣便有這理合性與知覺有心之名知覺又是那氣之虛處此二句就人上說本只是一個太虛漸細分說得密耳九峰蔡氏曰橫渠四語只是理氣二字而細分由太虛有天之名即無極而太極之謂以理言也由氣化有道之名即一隂一陽之謂道之謂以氣言也合虛與氣有性之名即繼之者善成之者性之謂以人物稟受而言也合性與知覺有心之名即人心道心之謂以心之體而言也以朱子九峰之言觀之則知張子此四語備一篇太極圗說之意由太虛有天之名是指太極之不雜乎隂陽者言之所謂一故神也由氣化有道之名是指太極之不離乎隂陽者言之所謂兩故化也下二句則是無極之真二五之精妙合而凝以下之事橫渠此條之意本極精密近思録不載者豈以其變太極為太虛恐滋學者之惑歟蓋程子嘗言子厚以清虛一大名天道是以器言非形而上者朱子亦嘗言正䝉說道理處如太和太虛虛空云者止是說氣愚按張子非不知理氣之辨者程子朱子亦非病張子不知理氣之辨也特以其言似止說氣辭未達意耳觀其論虛空即氣云不可謂虛能生氣亦不可謂萬象為太虛中所見之物蓋惟恐人以虛空為道而深破其說謂虛皆是實雖若以氣言而理在其中也但濓溪分氣為二曰動曰靜而太極在其中不離乎動靜亦不雜乎動靜橫渠分氣為二曰虛曰氣而以太虛為不雜之太極太和為不離之太極所以朱子謂其落在一邊辭不達意以此故耳語類載此條謂其議論極精密又謂其有未瑩處此固不足為橫渠病若夫所謂氣聚散於太虛猶冰凝釋於水朱子謂其流乃是箇大輪回此則與程朱不可合者也讀朱子白鹿洞學規朱子白鹿洞學規無誠意正心之目而以處事接物易之其發明大學之意可謂深切著明矣蓋所謂誠意正心者非外事物而為誠正亦就處事接物之際而誠之正之焉耳故傳釋至善而以仁敬孝慈信為目仁敬孝慈信皆因處事接物而見者也聖賢千言萬語欲人之心意範圍於義理之中而已而義理不離事物明乎白鹿洞學規之意而凡陽儒隂釋之學可不待辨而明夫子告顏淵克已復禮而以視聽言動實之其即朱子之意也夫讀朱子告郭友仁語考亭淵源録一條郭友仁德元告行先生曰人若於日間閒言語省得一兩句閒人客省得一兩人也濟事若渾身都在鬧場中如何用工人若逐日無事有見成飯喫用半日靜坐半日讀書如此一二年何患不進高忠憲纂朱子節要亦載此條愚按德元曾學禪此語係德元所記恐失其真觀朱子答劉淳叟云某舊見李先生嘗教令靜坐後來看得不然只是一個敬字好方無事時敬於自持及應事時敬於應事讀書時敬於讀書便自然該貫動靜心無時不存又答潘子善云云可見朱子未嘗教人靜坐況限定半日哉愚故謂德元所記恐失其真幾亭陳氏以此二語為朱子教人之法誤矣或疑程子見人靜坐便歎其善學朱子於復卦象注曰安坐以養微陽也是言初動之時宜靜也於咸卦初爻注曰此卦雖主於感然六爻皆宜靜而不宜動也是言方動之際宜靜也於太極圖注曰聖人全動靜之德而嘗本之於靜是言未動之先宜靜也程朱何嘗不言靜不知程朱固未嘗不言靜而未嘗限定半日且其所謂靜者皆是指敬非如學禪者之靜又恐敬之混入於禪也而申言之曰略綽提撕夫敬猶恐其有病也而況專言靜乎讀象山對朱濟道語象山對朱濟道言收拾精神自立主宰當惻隱時自然惻隱當羞惡時自然羞惡愚按言收拾精神何如言敬敬則主於存天理收拾精神則自私自利而已主於自私自利則雖略綽提撕如朱子猶非正學而況其所謂收拾者不免如觀心說之所譏耶大抵象山陽明景逸念臺皆是收拾精神一路工夫但象山主靜陽明則不分動靜景逸主靜念臺則分動靜象山陽明都不要讀書窮理景逸念臺則略及於讀書窮理象山陽明則指理在心外景逸念臺則指理在心內究竟則一轍讀東萊博議東萊論管仲云王道之外無坦途舉皆荆棘仁義之外無功利舉皆禍殃此與董江都正誼明道之言正相為表裏合二公之言方盡得孟子首章之意讀離騷離騷就重華而陳詞一段因女嬃譏其婞直而欲求中正之道下叩閽一段則欲以中正之道感君求女一段則欲以中正之道求賢而一則結之曰世溷濁而不分兮好蔽賢而嫉妒一則結之曰世溷濁而嫉賢兮好媲美而稱惡則非特婞直不可行即中正之道亦不可行矣讀通考讀通考載何基字子恭婺州金華人師黃幹告以必有真實心地刻苦功夫而後可基悚惕受命年八十一卒諡文定按何黃金許之書皆不可不看而文定所著學庸發揮大傳啓䝉發揮通書近思録發揮及文集尤要緊讀綱目宋元嘉十年魏陸俟嘗為懷荒鎮大將未期歲高車諸莫弗訟俟嚴急無恩復請前鎮將郎孤魏主徵俟還以孤代之俟既至言曰不過期年郎孤必敗高車必叛魏主怒切責之明年諸莫弗果殺郎孤而叛魏主大驚立召俟問之俟曰髙車不知上下之禮故臣臨之以威制之以法欲以漸訓導使知分限而諸莫弗惡臣所為訟臣無恩稱孤之美臣以罪去孤獲還鎮悅其稱譽益收名聲專用寬恕待之無禮之人易生驕慢不過期年無復上下孤所不堪必將復以法裁之如此則衆心怨懟必生禍亂矣魏主笑曰卿身雖短思慮何長也即日以為散騎常侍綱目特筆書之蓋美俟也按郎孤前之用寬恕似孔子所謂寬以濟猛後之以法裁似孔子所謂猛以濟寬然以此敗者何也是非寬猛之過用寬猛而不知分寸之過夫所謂寬以濟猛者豈可便一於寬所謂猛以濟寬者豈可便一於猛矯枉過正因噎廢食此孤之所以敗而豈寬猛之咎哉且寬者德教之謂董生所云任德教而不任刑者是也非德教而但言寬豈聖賢所謂寬耶其後羽林虎賁作亂殺將軍張彛胡太后止斬凶强者八人亦似合於殱厥渠魁之道而卒以釀亂亦此類也夫宋元嘉二十二年魏詔中書以經義決疑獄發明云元魏之好尚如此其亦異乎䝉古之所為此綱目所以豫之按明儒之擯元綱目之豫魏固各有其義焉難以執一論也尹氏得之矣讀宋史看書不可只見一邊如宋史云陳淵入對論比年以來頒賚賜與之費太過周官惟王及后世子不㑹說者謂不得以有司之法治之非周公作法開後世人主侈用之端也臣謂冢宰以九式均節財用有司雖不㑹冢宰得以越式而論之若事事以式雖不㑹猶㑹也臣願自今錫賚三省得以共議户部得以報奏則前日之弊息矣此可見王安石之徒講周禮都只見一邊所以成病痛學者當自省氣質偏處用力變化宋史載李方子字公晦性端謹純篤初見朱子謂曰觀公為人自是寡過但寬大中要規矩和緩中要果決遂以果名齊此可謂能自變化者若李道傳字貫之卧榻屏間大書喚起截斷四字此又是變化氣質之要法即所謂慎獨也朱子門人李燔字敬子嘗曰仕宦至卿相不可失寒素體學者常將此語玩味便覺一切紛華靡麗俱不足慕朱門黃幹李燔並稱而傳不言燔有著述此二句便可當一篇大文字讀金史世宗本紀金史大定十三年上謂宰臣曰㑹寧乃國家興王之地自海陵遷都女直人寖忘舊風朕時嘗見女直風俗迄今不忘今之宴飲音樂皆習漢風蓋以備禮也非朕心所好東宫不知女直風俗苐以朕故猶尚存之恐異時一變此風非長久之計甚欲一至㑹寧使子孫得見舊俗庶幾習效之又上御睿思殿命歌者歌女直詞顧謂皇太子及諸王曰朕思先朝所行之事未嘗暫忘故時聽此詞亦欲令汝輩知之汝輩自幼惟習漢人風俗不知女直純實之風至於文字語言或不通曉是忘本也汝輩當體朕意至於子孫亦當遵朕教誡也按世宗之言可謂不忘本矣有周公豳風七月之遺意焉然周公不忘豳俗至於制禮作樂則監視夏殷不純用陶穴陶復之舊蓋文質得中然後為久安長治之道世宗所謂漢風乃漢人後進之禮樂耳以為不足學固矣何不反而求之先王文質得中之道乃沾沾於㑹寧舊習哉至於明昌承安之際文物粲然如一拜儀也公服則用漢拜若便服則各用本俗之拜可謂損益得宜矣特不能擴而充之且婢寵擅朝而金源氏從此衰非習漢人風俗之過也揚雄所謂秦之有司負秦之法度秦之法度負聖人之法度若金源氏可謂負漢人之法度矣讀金史章宗本紀金章宗明昌四年東京路副使王勝進鷹遣諭之曰汝職非輕民間利害官吏邪正略不具聞而乃以鷹進此豈汝所職也後毋復爾嗚呼金之盛時其君勤恤民隱如此然自明昌而後日衰而況縱欲不顧者乎讀金史哀宗本紀史臣贊曰金之初興天下莫强焉太祖太宗威制中國大槩欲效遼初故事立楚立齊委而去之宋人不競遂失故物熙宗海陵濟以虐政中原觖望金事幾去天厭南北之兵挺生世宗以仁易暴休息斯民是故金祚百有餘年由大定之政有以固結人心乃克爾也章宗志存潤色而秕政日多誅求無藝民力浸竭明昌承安盛極衰始至於衛紹紀綱大壞亡徵已見宣宗南渡棄厥本根外狃餘威連兵宋夏內致困憊自速土崩哀宗之世無足為者皇元功德日盛天人屬心日出爝息理勢必然區區生聚圖存於亡力敝乃盡可哀也矣雖然在禮國君死社稷哀宗無愧焉按金源盛衰之故前之暴後之壞無足言者獨大定明昌之間一代極盛之時也所以固其根本貽謀百世者較之三代漢唐相去逺焉讀食貨志大槩可知何怪其不永哉觀幽蘭軒之事者追源於世宗章宗之世可也讀金史完顏奴申傳金史完顏奴申傳曰哀宗北禦以孤臣弱卒託之奴申阿不二人可謂難矣雖然耶墨有安平君玉壁有韋孝寬必有以處此又曰金自南渡之後為宰執者往往無恢復之謀臨事相習低言緩語互相推讓以為養相體每有四方災異民間疾苦將奏必相謂曰恐聖主心困事至危處輒罷散曰俟再議已而復然或有言當改革者輒以生事抑之故所用必擇愞熟無鋒鋩易制者用之每北兵壓境則君臣相對泣下或殿上發長吁而已兵退則大張具㑹飲黃閣中矣因循茍且竟至亡國按金之用人採唐宋之法特重科目然其末也風氣至於如此豈非知科目之名而不知科目之實歟讀金史禮志金史明昌五年陳言者謂葉魯谷神二賢創製女直文字乞各封贈名爵建立祠廟令女直漢人諸生隨拜孔子之後拜之禮官言前代無創製文字入孔子廟故事詔令依蒼頡立廟於盩厔例官為立廟於上京按創製文字可入孔廟則李斯王次仲久在兩廡矣禮官之言有以也夫讀金史食貨志金制夏稅六月止八月秋稅十月止十二月為初中末三限泰和五年章宗諭羣臣曰十月民穫未畢遽令納稅可乎改秋稅限十一月為初又以陜西諸處地寒稼穡遲熟夏稅限以七月為初嗚呼金取民之制亦煩苛矣然所謂二月賣新絲五月糶新榖則猶無之自明季以來急征法行求如金制不可得焉民奈何其不病哉讀金史方伎傳金史方伎傳云張從正字子和睢州考城人精於醫貫穿難素之學用藥多寒凉然起疾救死多取效古醫書有汗下吐法亦有不當汗者汗之則死不當下者下之則死不當吐者吐之則死各有經絡脈理從正用之最精號張子和汗下吐法庸妄淺術習其方劑不知察脈原病往往殺人噫治天下而用法必若張子和然後可哉又金史云五穀有恆性而順成不可必故有年大有年以異書於聖人之經猶人有恆性而至行不易得故孝友以異傳於列代之史若治天下者能如張子和之用藥亦何患孝友之風不滿天下哉讀金史隱逸傳金史隱逸傳曰杜時升字進之霸州信安人隱居嵩洛山中以伊洛之學教人正大閒大元兵攻潼關拒守甚堅衆皆相賀時升曰大兵皆在秦鞏間若假道於宋出襄漢入宛葉鐵騎長驅勢如風雨無高山大川為之阻土崩之勢也頃之大元兵果自饒峰關涉襄陽出南陽金人敗績於三峰山汴京不守皆如時升所料郝天挺字晉卿澤州陵川人太原元好問嘗從學進士業天挺曰今人賦學以速售為功六經百家分磔緝綴或篇章句讀不之知幸而得之不免為庸人又曰讀書不為藝文選官不為利養惟通人能之又曰今之仕多以貪敗皆苦飢寒不能自持耳丈夫不耐飢寒一事不可為子以吾言求之科舉在其中矣按杜之料敵郝之論學不是以隱為高者所由與沮溺之徒異矣讀元史五行志元史五行志謂天之五運地之五材其用不窮其初一陰陽耳陰陽一太極耳人之生也全付畀之具為五性著為五事修之則吉不修則凶箕子因之以作九疇其言天人之際備矣漢儒不明其大要如夏侯勝劉向父子競以災異言之班固以來采為五行志又不考求向之論著本於伏生生之大傳言六沴作見若是共禦五福乃降若不共禦六極其下禹乃共辟厥德爰用五事建用王極後世君不建極臣不加省乃執其類而求之惑矣否則判而二焉如宋王安石之說亦過也按此引伏生大傳之言可見六沴有應有不應由於王極之建不建其義至精國語伯陽父論三川震亦以周德若二代之季知其必亡蓋古來無不應之灾異亦無必應之灾異視其極之建不建德之修不修而已濂溪所謂君子修之吉小人悖之凶與伏生之言若合符節論五行者蔑以加矣讀祁州志祁州志唐河在城南十五里沙河去唐河十里滋河去沙河五里唐河東南注於沙沙河注於滋俗名三岔口愚按唐縣志唐河即滱水又按曲陽新樂行唐縣志滋水即慈水沙河即派河派河即恆水也滱水自唐縣定州而至祁恆水自阜平曲陽新樂行唐而至祈滋水自靈夀行唐真定藁城無極深澤而至祈蓋滱水滋水皆與恆㑹禹貢云恆衛既從衛水在今甚微而恆水獨盛蔡注言恆水東入滱水又引昆氏云今之恆水至真定府行唐縣東流入於滋水非古徑矣豈未知滋與滱下流固合耶又按缺地志云恆水出常山郡上曲陽縣恆山北谷自言北嶽者專以大茂水當之不亦過乎禹貢有大陸既作之文唐杜佑李吉甫以邢趙深三州為其地余向讀一統志疑邢當作祁康熙甲子讀祁州志亦云邢是祁字之訛蓋祁之束鹿縣即大陸地鹿與陸通束鹿縣東至深州二十五里西南至趙州之寧晉縣一百二十里以地勢考之其為祁也無疑矣讀南皮縣志南皮縣志云九河多在境內或錯呼者有之非全無蹟而妄借虛名也酈道元以及宋儒皆謂已淪於海恐非確論夫西南之邢臺即大陸東北之靜海有逆河而此方支分派别渠岸顯然謂非九河之故道不可奈何舍有蹟而談無蹟又云徒駭在縣西北太史在古皮城南馬頰在城南覆釜在東南胡蘇在西城下簡潔在城西鈎盤在西北鬲津在東南其一則河之經流也在東南五十里外岸高丈餘中濶里許境內回環三十餘里又曰毛河即覆釜王莽河即馬頰銀鈎河即鈎盤其言鑿鑿蓋亦其土人相傳之說似乎可信而先儒多有異論何歟惜修志者不細考其上下流之在鄰封者又不載前人之議論按南皮人物如北齊之李鉉唐之賈耽高適宋之賈黃中皆閎覽博物君子而耽尤號悉地里見四方之人與使外國者必從詢索其山川風俗豈其鄉之古蹟未嘗一論及耶土人但能述舊聞而不知引先哲之言以為據可慨也然以漢書溝洫志許商之議及鄭康成孔穎達詩允猶翕河注疏考之其蹟正當在此許商鄭康成在酈道元之前其言可據此志所載豈盡無稽也哉蔡九峰書傳載程氏酈氏之說亦姑傳疑云爾非真以為淪於海也讀武功縣志康對山武功縣志云漆水縣東門外水今謬為武水者也自豳岐之間來縣北受浴水南受湋水入渭鄭漁仲序地里略謂天下如指諸掌而信漆由富平入渭之說蓋括地志未審豳岐涇渭脈絡所在富平在涇東漆在涇西安有岐梁之水越涇而東再至富平始入渭也漁仲誤且如此況其餘乎詩曰自土漆沮漢書曰斄在漆縣今邰與斄同封里有漆村是也又云浴水乾州西夾道水也亦從豳西梁山來意此或即沮水關西人讀浴若于于沮固易訛耳漁仲亦以東自富平入渭殊誤按對山言漆沮與蔡九峰禹貢注不同蓋不知禹貢之漆沮非詩之漆沮可謂疏矣志又稱武功為后稷始封之斄在渭水之北東興平東南鄠南盩厔西南郿西扶風西北麟遊北乾州東北醴泉亦不言其去邠岐豐鎬之逺也讀呻吟語疑呂新吾先生呻吟語一書鞭䇿身心針砭末俗有功世道非淺然其閒亦有一二可疑者謹志之以質君子意在舍瑕取瑜非敢妄議論先儒也一條謂內外本末交相培養此語余所未喻只有內與本那外與末主張得甚愚謂此似與孟子持志養氣之論顯背易言敬以直內義以方外亦是交相培養若輕視外與末豈程子所謂體用一原者乎聖賢之學雖云美在其中則自然暢於四肢發於事業然欲其中之充實非內外本末交相培養不可一條謂性只有一箇才說五便著情種矣愚謂若如佛氏以知覺為性則性只有一箇若如程朱言性即理也則理有分有合合之則為一分之則為五安得謂性只有一箇一條謂先天理而已後天氣而已愚謂先天後天似不可以理氣分一條謂人問君是道學否曰我不是道學是仙學否曰我不是仙學是釋學否曰我不是釋學是老莊申韓學否曰我不是老莊申韓學畢竟是誰家門户曰我只是我又一條謂宋儒紛紛聚訟語且莫理㑹自家何等簡徑愚謂此二條是不欲專主宋儒之學而自成一家但宋儒不同如吕謝游楊象山慈湖不主之可也若周程張朱之學即孔孟之學也可概以宋儒目之而曰且莫理㑹我只是我乎人茍有我只是我之心何所不至耶一條言堯舜至孔子都不自滿假孟子自任太勇自視太髙而孜孜向學欿然自歉之意似不見有宋儒談論都是道理身所持循亦不染世俗豈不是聖賢路上人只是自家平生之所不足者再不肯口中說出以自勉自責亦不肯向别人招認以求相勸相規所以自孟子以來學問都是登壇說法直下承當與聖人作用不同愚謂此等病痛只可以言金溪姚江一流不可以言孟子及周程張朱一條謂儀禮是嚴苛煩細之聖人所為愚謂時勢不同儀禮亦或有不可行於今者而遽以嚴苛煩細目之可乎一條謂漢儒雜道宋儒隘道宋儒自有宋儒局面學者若入道且休著宋儒橫於胸中只讀六經四書而體玩之久久胸次自是不同又一條言漢儒無見於精宋儒無見於大愚按此二條皆不分别概稱宋儒舉周程張朱而謂之隘謂之無見於大可乎舍周程張朱而讀六經四書猶入室而不由户也明季諸儒何人不讀六經四書只是不肯從周程張朱入門故各以其所見窺測聖人之意遂成一橫議世界聖賢之書適助其氣質之偏而已殷鑒不逺不敢不懼一條謂明道答安石能使愧屈伊川答子由遂激成三黨可以觀二公所得愚謂尊明道而抑伊川嘉隆以來諸儒議論多如此其實明道伊川雖一寬和一嚴厲然不可以遽分優劣寬和有寬和好處嚴厲有嚴厲好處明道能屈安石伊川不能服子由者蓋安石尚能容明道而子由不能容伊川也此是王蘇二公之有優劣非明道伊川之有優劣也一條謂明道在朱陸之間愚按朱子之學即明道之學也象山之學則與明道相冰炭者也特明道之言閒多渾融為陸學者往往假借之以伸其說遂謂明道在朱陸之間可乎一條謂明道不落塵埃多了看釋老伊川終是拘泥少了看莊列愚謂明道看釋老何嘗有一些釋老之纍若以伊川為拘泥而欲以莊列融之則亦不成其為伊川矣一條謂儒者惟有建業立功是難事自古儒者成名多是講學著述人未嘗盡試所言恐試後縱不邪氣其實成箇事功不狼狽以敗者定不多人愚謂此不知指何等樣儒者若程朱大儒任之以事亦豈狼狽以敗乎是何視功業重而儒術輕也一條謂多學而識是中人以下學問教有頓漸二門愚謂博文約禮聖門教人只有此一法謂有頓漸二門者此嘉隆以來諸儒隱入於禪者之言也一條謂有不容已之真心自有不可易之良法其處之未必當者必其思之不精者也其思之不精者必其心之不切者也又一條謂周公是一部活周禮世只有周公不必有周禮愚按此與孟子仁心仁政之說不同不如程子云有關雎麟趾之精意然後可以行周官之法度說得無弊一條謂中庸為賢智而作愚謂中庸為智愚賢不肖而作不是專為賢智一條謂六經言道而不辨辨自孟子始愚謂唐虞之吁咈即辨也不可謂自孟子始一條謂申韓亦王道之一體聖人何嘗廢刑名不綜核四凶之誅舜之申韓也少正卯之誅侏儒之斬三都之墮孔子之申韓也即雷霆霜雪天亦何嘗不申韓哉愚謂王道之與申韓猶碔玞之與美玉也王道朱嘗無刑罰然非申韓之刑罰也其體則仁其用則義故曰天討若申韓則以殘酷之心行殘酷之事而已故謂聖人不廢刑罰則可謂聖人不廢申韓則不可舜孔子之事豈可與申韓同日論哉舜孔子所行王道也申韓者王道之罪人也若以申韓之刑罰為王道之一體則桑孔之理財亦王道之一體歟一條謂聖人之為政也法天當寬則用春夏當嚴則用秋冬而常持之體則於威嚴之中施長養之惠又一條謂居上以寬為本未嘗以寬為政愚謂嚴威中施長養是以嚴為體也不如曰長養中施嚴威蓋嚴不可少而非所以為體也居上以寬為本本非在政之外本亦政也謂未嘗以寬為政可乎聖人為政寬處常多嚴特偶用耳雷霆霜雪豈天所常用乎子産為政不專於寬而孔子謂之惠人者亦以其寬處常多耳非謂子産政多尚嚴只為一箇寬的心也董生任德不任刑之論豈欺我哉我浙張考甫先生云隂陽之體固是對待然人之一身當使陽和之氣多而隂肅之氣少蓋陽饒隂乏之理固如此新吾吕先生之言蓋欲以救一時姑息之弊與崔子真政論一般意思然却未免於偏閲馬從聘修文廟記此篇勉諸生為碩大光明之賢以不負立教之意今學者不可不將碩大光明四字反復玩味碩大即中庸致廣大之意必不以一毫私意自蔽方是碩大光明即中庸極高明之意必不以一毫私欲自纍方是光明然非加以問學之功則其碩大光明者猶不免於粗疏欲不負立教之意豈不難哉學者其勉之孝經要解跋孝經一書始於事親終於通神明光四海上自天子下至庶人不可不讀朱子特舉其切於庶人者述其大㫖以示愚俗真西山先生又從而廣之其惓惓斯民之意至矣其言大抵與今州縣所講六諭相表裏我民既聽六諭又於此一玩味焉則知向所講者皆聖賢經傳之言萬世不可移易之道雖欲頃刻離之而不得矣愚故復梓而傳之以告我民云經典釋文跋陸德明經典釋文三十卷其二十九卷則易書詩三禮春秋三傳孝經論語老莊爾雅之音義其第一卷則序録也雖其列老莊於爾雅之上未免不倫然其有功經傳亦多矣自刋諸經注疏者將音義附各條下學者遂不復見此書之全辛酉季春余在虞山葉子石君以家藏抄本示我始獲睹德明本來面目雖音義都已散見各經然如費氏之以彖象文言附卦爻杜氏之以左氏傳附經范望之以太𤣥贊散於八十一首之下先儒往往病其變亂古訓則此書惡可不存其舊耶惜乎世俗滔滔好古者鮮工詩賦者既視經學為迂濶學程朱者又以漢注唐疏為淺陋而古書日就湮沒不知注疏乃程朱之所自出也孔子從周尚拳拳於夏殷之禮孰謂漢唐諸儒之書遂可辨髦視之也哉文廟考略跋右是書所考定賢儒位次與明㑹典所載不同蓋㑹典修於萬厯中如李延平羅豫章增祀於萬厯末年者固不及載又因從前兩廡從祀先賢有議改議黜之人如東廡則黜顔何改曾點孔鯉共三位西廡則黜公伯寮秦冉申黨改蘧伯玉林放顔無繇共六位於是東廡先賢尚有三十三位而西廡先賢則止二十九位當時止各於東西兩廡用魚貫之法就便升躋而未嘗合叙兩廡東西遞遷故統而觀之有西廡之後儒躐出於東廡先賢之上者不無紊亂失次之嫌康熙二十五年江南學臣李振裕言㑹典定序多有未安請行釐正部議謂國子監先賢先儒從祀位次遵行已久不便更張事遂寢按古者宗廟之制昭常為昭穆常為穆既有東西廡之分似不嫌於凌躐部議遵㑹典舊序亦非無見然東西廡同在一廟中與古宗廟之昭穆不同則是書所考正與江南學臣之所請固不可廢也宜並存之以待論定云若崇禎末年詔宋儒周敦頤張載程皓程頤邵雍朱熹六子進稱先賢從祀牌位列在左丘明下序於公羊高榖梁赤上此書不載者蓋以程朱大儒宜與四配同列而僅進儒為賢未盡表章之道故略而不録歟戰國䇿去毒跋戰國䇿一書大抵皆縱橫家言也其文章之竒足以悅人耳目而其機變之巧足以壞人心術子弟識見未定而讀之其不為之漸染者鮮矣當時惟孟子一人卓然於波流之中直以為是妾婦之道而大丈夫之所不為蓋其視秦儀輩不啻如厚味之中有大毒焉惟恐學者陷溺其中而不能出也今之讀戰國䇿者多亦曾以孟子之道權衡之乎余懼其毒之中於人也故取今文士所共讀者指示其得失使學者知其所以異於孟子者庶幾嚌其味而不中其毒也夫南豐一序言其病最詳故并附焉又此書原本各繫於其國讀者輒迷其先後今一以通鑑編年為次小學集解跋明初注小學者二家宣德時常熟吳氏訥有集解成化時臨海陳氏選有集注二公皆名儒皆以其身體力行者發其藴奧以詔來學非世俗之訓詁比二書雖詳簡不同其中多互相發者不可偏廢也自正德嘉靖後學術分裂小學一書且束之高閣又何有兩家之注解哉崇禎時詔以陳氏小學注頒學宫集注始顯而集解罕有傳者余從虞山得其抄本因録而藏之當再訪求别本校其訛而授梓焉原本有文恪傳不知何人撰今仍存之使學者誦其書而知其人庶幾有以興起也夫原本分為十卷今合為六卷而存其舊目讀史質疑跋右讀史質疑五篇皆端本澄源之論末一篇言萬厯閒爭國本爭梃擊之事謂當日諸君子不免過於深文無以處神宗皆由學術之疏此論亦甚正又論國本以委婉密陳者為宜論廷擊以風顛蔽辜為深得國體此則有說焉讀者不可以文害辭先生之意非謂主委婉主風顛者賢於深文諸君子也天下固有議論非而心術光明者有議論是而心術暗昧者自學術既壞一二正人君子雖懷忠義之心而議論偏拗適為暗昧者藉口此所謂五榖不熟不如荑稗也然荑稗豈得遂傲五榖耶彼留侯之招四叟田叔之燒獄詞皆君子事也非當日諸臣所可附㑹先生蓋歎息痛恨於陽明之學敗壞人材釀成世禍惜五榖之美種不熟豈為荑稗左袒哉跋讀書分年日程後讀書分年日程三卷元程畏齊先生依朱子讀書法修之以示學者朱子言其綱而程氏詳其目本末具而體用備誠由其法而用力焉內聖外王之學在其中矣當時曾頒行學校明初諸儒讀書大抵奉為凖繩故一時人才雖未及漢宋之隆而經明行修彬彬盛焉及乎中葉學校廢弛家自為教人自為學則此書雖存而由之者鮮矣鹵莽滅裂無復凖繩求人才之比隆前代豈不難哉今國家尊崇正學諸不在朱子之術者皆擯不得進而羽翼朱學之書以次漸行學者始知有此書然舊板漶漫不勝魯魚亥豕之訛讀者病焉余故校而梓之有能由是興起且以此建白於上依朱子貢舉議鼓勵天下讀書之士盡由是法則人才其庶幾乎或曰學者天資不同敏鈍各異豈必皆如程氏所謂看讀百遍背讀百遍乎曰中人以下固不待言若生知學知之人而用困知之功不更善乎況生知學知者有幾人耶或曰明初纂四書五經性理大全採諸儒之說備矣蔡虛齊林次崖陳紫峰之徒又推大全之意各自著書為學者所宗矣今程氏讀經日程又必取古注疏朱子語類文集及諸儒之解釋而鈔之而讀之而玩之不可省乎朱子綱目一書治亂得失昭然矣程氏又必取溫公通鑑及司馬遷班固范祖禹歐陽修之史而參之不亦煩乎曰綱目猶春秋也溫公通鑑及遷固諸家之史猶魯史舊文也魯史舊文不存學者不能盡見聖人筆削之意故言春秋者至於聚訟今通鑑及遷固諸家之史具在參而觀之而紫陽筆削之妙愈見是烏可以不考乎永樂時纂大全當時承宋儒理學大明之後雖胡楊金蕭未為升堂入室之儒而所採取者無非濓洛關閩之微言蔡林諸儒又從而發明之固皆有功學者之書也然其缺略疏漏者亦有矣幸而朱子之全書具存諸家之解釋未盡湮沒遡而考之以補大全之闕不亦善乎至於古注疏則固漢唐千餘年間學者之所講求程朱之學亦從此出而益精焉耳雖曰得不傳之學於遺經然非鄭康成孔穎達之流闡發於前程朱亦豈能鑿空創造耶故程朱之於古注疏猶孔子之於老彭也幸而其書尚存不至如夏殷之無徵是亦不可以不考也曰然則學者所當讀之書盡於程氏所編乎程氏以前諸子百家之書程氏而後諸儒之書亦有當讀而玩者乎曰程氏特言其切而要者耳書固不盡是也先秦之時若國語戰國䇿以至老莊之道德荀卿之言學管韓之論治孫吳司馬之談兵雖皆駁而不純儒者亦當知其梗概漢以後若揚雄董生王通之書雖未及洛閩之精而亦往往為先儒所取固當擇而讀也然程氏而後若薛文清之讀書録胡敬齊之居業録羅整菴之困知記陳清瀾之學蔀通辨皆所以辨學術之得失丘瓊山之大學衍義補所以明政事之源委是皆羽翼經傳之書不可不深考也宋元以來之治亂則有若成化之續綱目薛方山之續通鑑有明一代未有成書而其時政得失雜見於諸家之記載者亦不可不知也曰然則窮年纍月於章句之中不近於支離博而寡當乎且世益逺而書益多後之讀者不愈難乎曰一代卓然不可磨滅之書固不多有其他紛然雜出之書隨出隨沒惟患讀之無法耳不患其多也亦惟謹守是編之法而已以讀書為支離是固近年以來陽儒隂釋之學非我所敢知也是編之法非程氏之法而朱子之法也非朱子之法而孔孟以來教人讀書之法也舍孔孟讀書之法而欲學孔孟之道有是理哉書四書惜隂録後江隂徐子爾瀚以所著四書惜隂録示豫謂之惜隂者其大㫖以為聖賢之學隨知隨行若知而不行雖讀盡十三經二十一史徒敝精神其光隂可惜也故嘗深痛舉業之驅人入鄙欲學者實從事於聖賢之道而勿務空知蓋其㫖與曾子之尊聞行知董生之正誼明道相為表裏而每於一章之中三致意焉豈非所謂喫緊為人者歟學者誠知其所惜而勉强焉以孔孟之言為範圍身心之資而勿視為爵祿之資以程朱之解為指點行道而設勿視為作文而設知人心道心之辨矣則必實使道心為主而人心聽命知理義之性氣質之性有殊矣則必實以理義變化其氣質勿徒曰吾姑辨之姑言之發為議論可以恱人耳目而已一息勿敢懈也一言一動勿敢慢也如是可謂不負其隂而於聖人之道不逺矣雖然徐子所惜亦就知道而不實用力者言耳若夫甘陷溺於道外孜孜矻矻以聲色為可娛以勢利為可慕以辭章為可誇以虛無寂滅為可樂或援儒以入墨或推墨以附儒其於道也尚不能知又何論行其為可惜更何如哉其可不以陷溺之餘轉而從事於聖人之道哉余不敏少嘗汨沒於舉業中年竊聞先儒之緒論始若望見涯涘而未能得其堂奧今髮種種矣尚不免於出入紬繹徐子惜隂之義不覺惶然汗下遂書於其末以志仰止之意願以餘年竭其駑鈍作秉燭夜遊之計以庶幾無愧於曾子董生之言徐子其尚有以䇿我哉陳氏三世崇祀録跋余嘗怪漢末諸君子如荀朗陵陳太丘皆一代正直之儒而子孫仕魏晉間者不免從俗浮沈雖才猷爛然家聲稍墜矣宜興陳端毅公為東林翹楚讜言直節載在國史洵宇宙完人而子定生先生早奮鷹鸇之志晚堅箕潁之節身雖未遇先烈彌光至孫其年以俶儻非常之才發為文章目空四海遂從諸生登天祿石渠年雖不永克揚祖德正氣直道三世如一可謂盛矣子萬為其年難弟與余同官恆陽以所輯三世崇祀録示余余喜子萬不忘其祖父兄之懿德蓋將以朗陵太丘之後人浮沈流俗為深耻其所以夙夜匪懈思無忝於前人而益振其家聲者當無不至陳氏之盛其有未艾也夫曹魯元交友尺牘跋古之以一藝名者皆有不可一世之意如僚之丸秋之奕由基之射負其能視天下莫與儔雖使周孔顔曾在其旁吾知吾技耳又焉知其他書家如唐之歐宋之米亦莫不然嗚呼此其所以為藝而逺於道也曹魯元先生余母舅行當今書法妙天下嘗與臥子彛仲諸君子游集其手牘裝成一卷珍若拱璧諸君子之書法不能加於先生特以重其文行故寶而藏之如此此豈知有藝不知有道者哉余既喜睹諸君子之手澤又深歎先生之虛衷謙懷不可及也使讀書談道之士用心皆如此其所造豈可量耶遂為之跋翁養齊教子圗跋客有持養齊翁君教子圖請跋者展而閲之竒松怪石出沒煙霞而翁君挾四子徜徉其間左圖右書顧盻自得洵人間樂事宜乎軒冕之士皆咏歌而嘆美之然我不知翁君之所以教子者如何也夫教之途至雜而其收功不一無論溺於佛老汨於詞章蕩其心而不可以為教即五經四書人誰不讀然有讀之而得其精英出則澤潤生民處則名垂天壤亦有讀之而得其糟粕借以獵取富貴而未嘗真知聖賢之道熙熙攘攘於名利之中為世之蠧而已翁君誠分别以示其子使之出乎此勿出乎彼取舍既定然後日就而月將焉則今之挾一編咿唔松石間者行當為祥麟威鳳光耀宇宙而兹圗洵足羡也已題許朂亭小像坐栁隂深處清流激湍映帶左右洵讀書佳境但未知所讀何書蘇子瞻兄弟古今稱讀書人然早拾蘇張之緒餘晚醉佛老之糟粕君子惜焉若盧駱王楊之徒沉醉風雲月露中又無足論矣讀一句有一句之益者其惟濓洛關閩之書乎知我朂亭世學相傳必能辨乎此曾點春風沂水所詠必係尼山刪定無疑也題上谷參軍王天市小像讀書楓溪畔作吏一畝泉上君不見程明道為上元主簿胸中有天地風雲氣象宗伯董文敏公像贊公之學殖見乎文章公之翰墨藝苑稱長肅瞻遺像我心洋洋人知公聲名被乎八荒不知其夙興夜寐孜孜矻矻日就而月將宜乎至今有耿光董季苑先生像贊并序先生為宗伯文敏公季子抱道自高不攖世網於紛華之㑹泊如也余從弟鼎勳為先生壻故得熟聞先生孝友之實壬申仲夏先生嫡孫某以宗伯公及先生遺像索余一言以志懿行余不敢辭謹為之贊焉惟公肅乎其容淵乎其兢兢業業之衷惟孝惟友一經是崇惟懼箕裘之弗克承顧我後之人永弗替文敏之遺風自針銘洪範六極弱居其一所貴讀書變化氣質當斷不斷爾自貽戚座右銘生者待汝養死者待汝葬天下後世待汝治汝無或輕爾身以徇無涯之欲而喪厥志書座右楊慈湖知溫州自奉最菲常曰吾敢以赤子膏血自肥乎陸象山知荆門軍時曰簿書目數之間此姦貪寢食出沒之處故于錢榖事綜核不遺張子韶僉書鎮東判官大書于壁曰此身茍一日之閒百姓罹無涯之苦讀此三言可悚然于清慎勤之不可須㬰忘矣是三先生學術皆偏僻不可為訓而其居官乃能如是學程朱者其可不知愧哉書之壁間朝夕自警又當思三先生天資如是之美所以不能入聖人之室者則以其不善學也仕優而學又居官者所當汲汲哉三魚堂文集卷四
