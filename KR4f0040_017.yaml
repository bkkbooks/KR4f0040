body:
  text: 三魚堂外集巻五贈内閣學士陸隴其撰申請公移運軍行月糧詳文為請查漕項舊例以蘇民困事竊惟漕糧藉衛軍以濟運衛軍藉行月以自資行月舊例均派於各州縣未嘗專責之一方也今查江南嘉定編有蘇太鎮三衛運軍行月糧折銀伍千陸百陸拾兩今此各州縣所無而嘉定所獨也考其由來起於順治十八年總漕蔡因各省衛運軍行月口糧半本半折折價不敷疏請加給務期本折均平部議行糧向係本色今改半本半折每石壹兩貳錢月糧向係本折兼支除本色一半外折色一半舊額每石折銀伍錢今改每石壹兩此加增之銀止應從原派折銀州縣加給或均攤有漕州縣可也乃竟永派高淳安東興化泗州嘉定溧水六州縣就六州縣中嘉定之為數獨多始則姦蠧乘機横派至伍萬叄千捌百有奇後因里長倪國柱陸秀德等赴京叩閽得減至貳萬陸千㭍百有奇查嘉定當年本為土瘠無米而折漕今反為土瘠無米而倍漕既供原派蘇太鎮三衛之行月又增派省衛之行月初派之時衛軍得之望外赴縣支領或俟之春夏或俟之秋冬小民得以從容完納尚為緩項今則編入考成隨漕支給刻不容緩遂為急項初派之時軍至縣支領尚為存留之項所給不過正額今則彚解糧道給軍遂為起解之項初派之時民力尚可支持今則勢窮力盡難復支撑此瘠土窮民萬萬不能當也竊思江南數十州縣若以此貳萬有零之數均派各州縣所增不過亳末若萃於一縣則極重難堪伏祈查從來漕項獨累一縣之例酌議均派使軍額不虧而民困得蘇有裨於民生國計不淺也辭平山署印文為疲邑難以兼理懇賜轉詳另委以免曠職事卑職庸碌下材䝉簡攝篆誠各憲不遺葑菲之意自應感激自奮但卑職待罪靈邑以土瘠民貧之區又承屢年荒旱之後鳩鵠滿目雖盡心撫字民氣難復催科稍急則恐相率逃亡概從寛緩又恐賦額不登一切利病不力為釐剔既恐積習難除欲驟為更張又恐驚駭耳目疲罷之民愈不聊生譬之尫羸之症須刻刻防維漸漸補救庻幾元氣可復客感可去稍一不虞百病交作雖若簡僻無事其實比之衝煩之地更難下手卑職所以日夜焦思惟恐調劑不得其宜有負各憲之知遇若使復攝平篆彼此兼營必致曠職伏乞憲臺念疲邑之不易理另委賢能以管平篆使卑職得盡心於一邑庶幾獲免於瘝職感沐鴻恩更無窮矣申平山縣典史文為衙官肆行無忌事卑職於本月内奉憲委署平山縣印隨奉有井陘縣代署之文自某月某日起至某日止在任幾日一切利弊俱未及詳查但有典史某卑職素聞其在縣横行擅受民詞作威作福無所畏忌人人側目卑職因受事不久未能得其實款不敢以風聞凟報竊有一事大可駭異不得不為憲臺陳之卑職自到平邑不敢輕出一票不敢輕派民間一物而典史某公然出票私派行户且公然於年月上硃標印字與堂官無二現有仰紙舖行票可證即一票而其所標之票不知凡幾閔然不知有功令之可畏百姓莫辨其偽竟以為事出堂官是卑職且代為典史受罪也非奉憲威懲飭則疲邑窮民豈能當其毒耶派灰車詳文為運灰一歲已週見值旱傷之餘援例籲憲詳請撥換以均勞逸以拯災邑事卑職隨查得前䝉各憲票派靈夀縣車五輛赴灰厰運灰此係欽工緊件庶民子來之義自不敢辭但靈邑地瘠民貧凋敝情形俱在上臺洞鑒中灰車費用浩繁運灰五輛計用騾脚三十餘人夫十餘名經年盤費約六七百金山僻疲罷之邑萬難支持所以前任董令一詳再詳哀懇免替未䝉憲允卑職到任之初鵠面鳩形之衆環立呼號皆言本邑自康熙十八年秋旱水災逃亡殆半十九年又報秋雹災二十年又報夏旱災二十一年旱災未報二十二年夏秋無雨麥禾盡焦西北一帶又被雹傷俱經董令報有成災在案旱荒如此又經大差聖駕巡幸五臺協濟夫一千二百名車二十輛又有蘆席方磚牛車等費又陜西防兵經過協濟車五十輛又現奉部派寳砂一萬觔又有此灰車五輛小民筋骨已盡賣男鬻女難以供應卑職目擊情形委實難支若非憲臺矜憫將來逃亡盜賊勢所必至除各項疾苦卑職漸次申詳外查灰車一項如定州新河栢鄉等縣止䝉派車二三輛不等則靈夀小邑原派五輛本屬過當況赴厰已經一年原有更換休息之例伏乞憲臺俯憐窮邑查於未撥州縣中轉移更替轉詳咨部俾災黎得稍息肩均享憲仁更生之賜矣請免灰車詳文為民力萬分難支請垂格外之仁以救殘黎事卑職查看得靈夀一邑地止一十四里不過大邑十分之一又半係沙壓水衝之地疊經荒旱頻遇大差民生憔悴不可言狀上年䝉憲派灰車五輛較之大邑反多費用浩繁實難支持迫於憲檄勉强供運一歲之内賣男鬻女筋骨已盡今歲萬難再運卑職前經兩次具詳請替未䝉憲批本月初六日奉憲票仰該縣勉力照舊供運一邑之民驚惶無措敢再冒昩上請伏乞憲臺格外垂仁俯賜轉詳倘以靈邑地方稍僻不比衝途故派車獨多則又有說焉州縣之中有衝而大者譬之强壯之夫雖處風霜之中猶能負荷重擔若僻而小者譬之尫羸之人雖安居一室四肢無力尋常舉步待人扶持況任之以百鈞之重其不立斃者幾希若止論衝僻不論大小是猶責怯夫以烏獲之任求駑馬以千里之程也卑職極知冒瀆之罪然情急勢迫萬不能已如䝉憲臺憐憫窮民使免狼狽雖將卑職罷黜亦所甘心矣復請免役詳文為民力萬分難支敢再瀝情上請懇賜轉詳更替以救殘黎事切照靈夀彈丸小邑地瘠民貧更兼荒旱頻仍大差接踵之後其小民顛連困苦之狀久在憲臺電鑒中卑職不敢復贅陳上年正月間案䝉䕶理道憲鮑分派靈邑灰車五輛較之别邑獨多事干欽工緊件小民勉力供運脚騾費用浩繁承值維艱業經卑職屢次備文詳懇更替未䝉憲允今供應十有八月為時已久窮黎之典鬻殆盡骨髓俱枯捧讀原詳奉有拉運年餘者輪值更換之憲批卑職極知冒瀆之罪不可逭然民力已竭萬不獲已合再詳請憲臺俯念窮黎供運已久准賜轉詳更替俾災民稍得息肩延喘感沐憲仁無窮矣編審詳文敬陳審丁缺額縁由懇祈憲鑒事照得靈夀人丁舊額順治十四年賦役全書載三等九則通折下下人丁一萬四千七百零二丁歴年遞增至康熙二十二年賦役全書實在下下則人丁一萬五千六百八十八丁查其遞增之故則非盡民庶而富加於其舊也因編審者惟恐部駁必求足額故逃亡死絶者俱不敢刪除而攤派於現存之户且又恐僅如舊額猶不免於駁也必求其稍益而後止更復嚴搜徧索疲癃殘疾鰥寡孤獨無得免者溝中之瘠猶是冊上之丁黄口之兒已登追呼之籍小民含辛茹苦無所控愬加以屢歲荒旱上年又被水災現在强壯之民飢寒切身不能自給而又責其包賠逃亡之糧代供老㓜之差所以民生日蹙閭井蕭條卑職編審之際號呼滿堂不忍見聞然亦恐缺額太多不敢盡數刪除其間逃而有著落可招撫者即不除亡而有地畝遺下即量加於承受之人而不除孩童而有產業者即不除老而有產業者即量加於子孫而不除窮無寸土而未至垂斃者即不除惟是逃亡之無踪跡老㓜之無立錐者鳩形鵠面而奄奄一息者雖欲不除不得不除因復搜求新增之丁冀其不失舊額而應增之數不足以抵刪去之數共計現今審定丁數較之賦役全書之額缺一千五百五十六丁此等缺額之丁實因屢年編審有增無減今若照舊攤派以求無缺恐非憲臺軫恤窮民之意而卑職一點良心亦不肯自昩不敢不據實詳明謹將增除數目造冊呈報伏候憲裁覆駁編審詳文查看得靈夀一邑土瘠民貧豐年則苟延性命荒歉便相率逃亡飢寒疲罷之衆長養甚難摧折甚易頻年以來疊遭水旱丁倒户絶者比比而是然所以一審一增者非編審之官無愛民之心也止以拘於舊例惟恐部駁故有頂替者始准開除無頂替者不敢輕刪而甲長戸頭數年以前雖甚艱難猶尚可勉强支吾甘自包賠亦不敢求免包賠愈久窮苦愈甚積至今日正筋疲骨盡之時雖欲再勉强承認萬萬不能卑職非不知額不可缺但處不得不缺之勢故敢據實詳請亦非有意破從前之積習也至憲票内開應作何料理上不虧課下不病民卑職竊思裕課之道亦惟愛恤窮民使之充足逃亡日少自然國課日增若目前形勢實難就筋疲骨盡之民求其無缺伏祈憲臺垂鑒格外轉賜詳院鳩鵠殘黎永沐憲恩於無既矣至於卑職自為民牧平日失於撫綏以至户口缺額聽候上臺另自處分以為溺職之戒可也請題減稅詳文為敬陳稅銀遲解縁由懇乞憲慈俯鑒疲邑情形酌請垂恤事查得靈邑房地稅一項舊額七十七兩五錢康熙十六年復增銀一十五兩五錢共銀九十三兩徵收之法每民間交易價銀一兩完稅三分此九十三兩之稅須有交易價銀三千一百兩方得如額靈邑地價每畝止一二錢不等民居多係草房泥屋所值尤無幾一歲之内彈丸之區安能有如許交易所以每年稅銀常苦不及額舊多派之里下苦累不堪卑職到任不敢違例私派有不及額多係墊解故每稽遲如二十五年額銀直至今年四月終旬始得完解本年春季應解額銀完者寥寥將來萬萬不能及額捐墊亦不可為常勢必仍派之里下此實地方一苦累伏懇憲臺軫念荒瘠之邑與通都大邑情形不同無論續增之十五兩零賠累堪憐即舊額之七十七兩零亦竭蹷難完官不能賠必至苦民合無題請量減庶國課早完不致壓欠官民永戴高厚無疆矣請除派辧井陘道執事詳文為請頒憲禁永除地方苦累事查靈邑賦役全書内載有每年井陘道更換桌圍額支存留銀五十兩自順治十二年奉裁銀四十兩順治十四年奉裁銀十兩此項存留久已全裁解部歴年奏銷在案而每逢新道到任所有安設等項仍責之原派地方從前皆係里長供應苦累不堪不但製辦各項工費浩繁其交納之際不免需索之苦即額銀不裁尚苦不敷況額銀全裁無米之炊艱難萬倍幸逢近來各任道憲俯軫下情每從寛恕不至大累前任井陘道劉蒞任恒陽尤加體恤疲邑官民得免掣肘離任之時一應舊執事俱檢留本衙門絲毫不以自隨將來新道憲到任可以一無所累但恐本衙門各役相沿舊習藉口修理朦朧催辦或仍問之原派地方則卑職仍不能堪或另派之别州縣則是卑職以鄰國為壑皆未可定伏乞憲臺批行井憲將前道劉所留執事等項責成本衙門各役收管如有毁壞各役自行修理不許派之州縣永為定例則鳩鵠窮黎長沐憲慈於勿替矣卑職謝事之時為地方他日之慮故敢冒昩瀆陳伏候憲裁監生捐納米榖借貸窮民詳文為敬陳地方賑後情形懇祈憲鑒曲賜矜恤事竊照靈邑上年叠遇夏秋二災小民苦狀萬千歴經詳明在案幸遇皇仁浩蕩既蠲且賑僅延殘喘不意今歲復遭風霾肆虐二麥無收亦經卑職將夏災情形報明在案目今雖幸遇甘霖秋田盡種然屈指西成尚須兩月有餘前之賑者已經喫盡豈能枵腹以待兩月之後近雖奉有憲檄勸蠲煮粥然靈邑山僻窮縣素無大商富賈蠲者有幾卑職又現在奉文造冊聽候交盤無俸可蠲目擊心傷查現有生員傅支裝呉達俊秀安日强陳某四名蠲納監生共計米三百二十石例應貯倉懇乞憲檄仰署印官確查至極無路飢民每名借給若干令其秋後還倉既無損於貯倉報部之數而鳩鵠之民得濟眉急所全實多卑職即日謝事因從地方起見敢冒昩瀆陳伏候憲裁申直𨽻學院文為申送講義事照得士子學問莫先於講明書理文風卑下皆由書理不明士習不端亦由書理不深卑職自蒞任以來每於簿書之暇到學命諸生講書疑者開之舛者正之一則欲端其舉業之根本一則欲引入聖賢之門路冀稍有補於學政積有講義百餘篇所見淺陋未能盡發聖賢之精藴合行上呈憲覽乞賜裁之又為申送書籍事照得今之士子窮年累月止知用力時文而一切經史皆不暇讀所以學無根本而士風日陋故選先正制義數十篇名曰一隅集為之指點其開闔虚實之法使之略知時文路徑而以其暇日依程氏分年讀書日程肆力於經史庶幾學有本原而真才可出或稍補士風之萬一除一隅集先經申送外其程氏分年讀書日程舊板多訛今為校定付梓分給諸生合將樣本上呈伏候憲裁為此備由具申伏乞照驗施行須至申者季考示照得靈邑山川盤結地氣鬱葱自昔多材如樂曹之功業巍煥千古維絳之科第彪炳一時今豈無其人乎亦在人之自奮何如耳士果有志則何事不可為以豪傑自期則豪傑矣以聖賢自期則聖賢矣古人之成法具在也微言精義昭然經史也身體而力行之豈患不為天下第一等人哉苟志不立甘為庸愚拘於氣囿於習迫於飢寒陷於功利溺於異端蕩於辭章學術愈卑人品愈下即欲如樂曹如維絳且不可得而況過此以往聖賢事業哉如是而曰地不生材豈地之罪哉本縣承乏兹土為朝廷宣教化厚風俗作人材是其職掌愧未之能也竊樂觀爾多士之志焉謹擇本月幾日舉行季考凡在學生員暨闔境儒童務期畢集各抒懐抱使本縣知爾多士平日之所學若何能不移於氣習否能以古人自期待否將拔其尤者以為一方之儀型庶幾相磨相礪人材日出而本縣亦得藉手以報朝廷焉雖其所以相期者不在文藝之末然言者心之聲也觀其言可以知其心韓退之不云乎仁義之人其言藹如也爾多士果能志聖賢之志上窺周孔之奥下入程朱之室以正誼明道為學以先憂後樂為心發而為文其不與流俗之文相去霄壤者未之有也本縣當拭目以觀爾多士其勉之墾荒示為勸民墾荒事照得務本力穡乃備荒之上䇿磽瘠之土苟可播種皆足資生查靈邑兩次奉㫖蠲除荒田糧額䝉朝廷浩蕩之恩固甚厚但此等荒田雖係瘠壤其中豈無可略施播種收升合之利為餬口之資者乎爾民或慮一行播種便當起科一行起科則所收之利不足以完公稅播種之利有限起科之害無窮所以逡巡而不敢種耶不知此不足慮也朝廷所欲起科者乃膏腴沃壤永逺成熟之田若爾靈邑荒田皆係邊山濱河岡阜之區邊山者遇雨則略可種植逢旱則盡成石田濱河者水去則略有田形水至則依然浩𣺌至岡阜之所半土半石縱有種作不成片段此在爾民辛勤拮据耕得一升可免一日之飢耕得二升可免二日之飢朝廷豈與爾民争此些須之利耶為爾地方官長者苟非病狂喪心豈肯將此瘠薄不堪水旱無常之土勒爾起科以貽爾無窮之累耶爾民但放膽耕種勿有所慮與其出加倍之息借貸富室債負日積生計愈促何如取之地利之無窮也與其忽遇凶荒號呼無䇿何如及此雨澤調和盡力耕耨苟家有三年之蓄雖遭水旱可免流亡父母妻子始為我有萬福之源皆自此始里長鄉老其徧諭村民及時努力苟有寸壤可種植者皆勿得荒棄其不可種榖可種棗梨等物者即行栽種以廣生計如怠惰不耕及里長不行勸諭者查出一體究治或有刁民將前項荒熟不常之地指為熟田挾仇索詐者當以誣告論從重治罪禁賭博示為嚴查賭博事照得賭博之禁屢經各憲申飭本縣諄諄出示曉諭良善之人無不改弦易轍近訪闗廂内生員之家竟有公然開塲賭博者聚集無賴深藏密室之中地方保長既不敢問晝夜呼盧罔顧法紀獨不思既列宫牆之内何甘為不肖至此縱然僥倖不露為鄉黨所鄙薄雖忝列衣冠實與盜賊無異清夜自思何以自安況本縣嚴行訪拏斷不令此敗行之徒汙玷黌序除一面訪確申究外合行曉諭為此示仰保甲人等知悉如甲内有前項劣生開塲賭博者甲内人即據實呈報本縣審實立刻申憲黜革懲究如甲内人畏勢隠匿不報本縣自行查出地方甲長一併治罪法在必行各宜凜遵又為嚴禁賭博事照得靈邑地瘠民貧非勤非儉不能過活為農者當力於稼穡為商者當精於貿易各守恒業庶幾可望漸至豐亨本縣下車以來乃訪聞爾民有不務生理專事賭博什伍成羣如醉如狂豈良民善衆之所為合行嚴禁為此示仰闔邑人民知悉除已往不究外自今日始爾民當洗心滌慮盡易前非該方總甲不時稽察如有前項賭博之人立拏報縣以慿究治并具方内並無賭博甘結如容隠不報該方總甲一體治罪此縣内第一惡俗本縣痛心疾首執法如山斷不姑貸各宜自愛毋貽後悔又為賭風不息民累日滋再申嚴飭以安地方事照得賭博為盜賊之源縱賭則縱盜根本不清其流無已靈俗澆競成風民失恒業因而游手蕩徒以賭為事飢寒所逼勢必為非本縣不忍以赤子陷於迷途將來即為禍階業經頒行條約諄諄勸諭近乃批閱詞詳或因賭而雀角兆争或因賭而毆辱斃命構嫌結怨事非一端皆由爾地方人等視為具文以致無籍棍徒引誘良民開塲囮賭放利抽頭博陸呼盧無分晝夜是父兄之教不先子弟之率不謹保甲不稽查隣里不舉首爾等不思此風一熾小而穿窬大而截刼窘迫無聊從此民無寧宇矣言之髮竪除現在察訪並發示嚴禁外合再嚴行申禁為此示仰該地方軍民人等知悉嗣後共相戒勸各安生業該地方不時嚴查不許無籍棍徒局賭誘惑釀成盜患致害地方仍月出具並無賭博甘結呈報如頽風不改仍前賭博倘經告發或被訪聞立刻嚴拏究治地隣不首一併連坐照律治罪決不姑恕凜遵毋忽禁打降示為嚴禁行兇毆打以慎法紀以保身家性命事照得俗尚淳龎禮崇謙遜今靈邑之民賦質强悍好勇鬬狠習以成風本縣下車以來每閱招情屢見兇徒懐挾私忿輙恃强凌弱慿多暴寡横行毆打或折人手足或揉人眼目割耳劓鼻無所不至且有傷重致死畢命於俄頃閒律法開載鬭毆殺人者抵命傷人致殘篤疾與剜眼折指抉耳鼻等項分别充軍流徒煌煌國憲何可輕犯乃不忍一朝之忿害人自害未定罪名先受囹圄桎梏敲扑慘刑已定罪名重則正法輕亦遣戍由此而田園鬻盡衣物變空供費不給飢寒迫身上則累及父母下則累及妻孥且隣里親屬干連在内隆冬盛暑往返解責曠時廢業怨恨無已至此地步悔當何如故消仇解怨忍人讓人乃保守身家安全性命之良法切勿争强逞雄止圗洩忿於一時不顧無窮之禍患也擬合通行飭禁為此示仰城市村莊居民人等知悉恪將本縣之言時時省惕各保身家性命倘有干犯法紀恣行兇暴者立拏重究以正其罪以免無干牽累若里鄰不舉私自講和一併嚴行懲治該地方勿視優游以長悍風各宜凜遵毋忽息訟示為勸息訟以厚風俗事照得健訟之風最為民間大害每因一時小忿不能忍耐一訟在官勢不由已經年累月守候公門受吏胥之侮不敢出聲求逞其小忿而反受無數惡狀不甘於此而甘於彼何其愚也又有所争不過銖兩而訟之費反過於所争甚而破産蕩家者有之故欲争氣則訟之受氣愈多欲争財則訟之破家更甚智者必不為此即幸而勝亦成一刻薄無行之人仁人君子所深耻而況其未必勝耶此皆由唆訟刁民喜於有事乘兩造之小釁因而慫慂成訟希圗取利愚民不知而入其網羅本縣每見此等惡習未嘗不痛之憐之靈夀一邑向稱醇樸寡訟然本縣未入境之前已有抱訟牘而控於道旁者誠恐此等習氣日進月長浸成惡俗為此示仰境内人民知悉除人命盜案萬不容已者方始告官其餘户婚田土小小忿争務宜忍耐聽親族勸息勿聽人唆且如有一事吾固無理耶固當開心見誠自認不是吾固有理耶退讓一步愈見高雅與其争些小之利何如享安静之福本縣雖設有三六九告狀日期然但願爾民為耕田鑿井之民不願爾民為匍匐公廷之民但願爾民為孝友婣睦之民不願爾民為便給善訟之民鄉長保長宜轉相告諭俾咸體本縣此意相與勉為君子而耻為浮薄則人心和而天意動荒旱之災亦可因而消弭矣其有向來慣為刁唆誣告起滅詞訟者亦宜痛自省改洗心易業倘或怙惡不悛本縣訪知定行按法重處決不姑貸禁圖賴人命示為嚴禁輕生以重民命事照得某邑風氣剛勁人每輕生或因口角微嫌或因睚眦小忿輙尋自盡投繯溺井服毒而死者比比皆然原其意謂拚一死以圖賴他人殊不知自盡無抵命之條人未嘗坑害而已死不可復生抛其父母撇其子女永絶夫婦之好舉家號慟慘目傷心死而有知不識其追悔當何如也古人云死生亦大矣又何可一朝之忿自行戕賊致死哉此皆愚夫愚婦一時短見不知此身所闗之重也父母生我則我之一身為父母所倚賴我生子女則我之一身又為子女所仰給輕生自盡耄年父母何人奉養㓜小子女何人撫育人雖至愚莫不有愛父母憐子女之心何其忍於抛棄乎故死之重比於泰山惟男死於忠女死於節烈乃為得所若因微嫌小隙憤恨而死男為頑蠢女為潑悍不孝不義非節非烈枉死而不得善名徒貽人以訕笑由此思之其亦可以猛省矣至於姦惡之徒指屍訛詐糾衆毁人房屋碎人家伙搶人衣貲逢人亂打兇暴等盜賊輕生之人謂有此一番可行故􅍆命之念所由起也擬合嚴行禁飭為此示仰城市村莊軍民人等知悉慎勿因一時嫌隙短見輕生倘有投繯溺井服毒身死者指告他人概不准理若以自縊自溺自毒自刎揑為謀故毆打情詞即坐以誣告之條若不經官糾衆私行打搶借端訛詐一概拘挐治以搶奪之罪各宜凜遵毋忽禁重利示為嚴禁重利以甦民困事照得小民窮苦至極終歲勤動辦完國課尚慮不敷而富室大家悍卒土豪或開當網利或放債盤占吸髓吮脂為富不仁小民當窘迫之際即物值一兩而質當不過一二錢銀不足色秤戥又輕未出門時已耗加一及至取贖足色大戥又違禁取利五分者或六分者不等公然行之無忌至放債之家非寫房地作抵即勒子女為質每月五分以至加一稍一過期即利上起利重重盤算必至房地子女盡歸其手富者益富貧者益貧甚而官糧不完反完私債不獨病民兼之病國莫過於此合行出示禁革當舖放債悉遵定例行利不過三分不許利上起利盤人房地子女窮民省得一分即受一分之惠又與富者無損而赤貧沾恩靡既矣為此示仰闔邑軍民人等知悉無論當舖放債如有行利三分之外者立拏解憲律法如山斷不姑貸速宜易轍毋自貽戚縣賞購盜示為懸賞購盜以期必獲事照得律文凡常人捕獲强盜一名竊盜二名者各賞銀二十兩此正重賞之下必有勇天之意今盜案纍纍而未聞有常人獲盜者縁小民不知律文孰肯犯難緝捕而為此有害無利之事不苐平日不肯捕獲即當救䕶苟非孱弱可擒者不過驅之而已誠恐血口扳害拖累無窮夥賊暗算後患莫測所以捕獲者寡而盜不能終無也合無仰請憲臺通飭闔屬州縣印官出示曉諭徧貼鄉村嗣後有能捕獲強盜一名竊盜二名者無論當塲平日各賞銀二十兩當堂給散外加花紅鼔吹以鼓舞之如獲盜之後或本犯指扳或日後夥賊誣陷皆不准理若暗害報復既嚴保甲復不夜行又何足患如是則人人賈勇莫不争先恐後以闔村之衆奮擊一二十之賊徒奚啻探囊取物即有兎脫鄰封亦必堵截獲之勢難奔逸矣此本縣陳弭盜安民幾款之一䝉撫院憲批通行各屬飭遵在案除轉飭外合出示曉諭為此示仰諸色人等知悉凡有盜賊即各鼓勇擒拏務使匪類斂迹安居樂業共享昇平禁違禁取利示當舖本是便民為商原欲取利本縣豈不知之但立心須平如此地向來有加利至五分六分不等者貪多務得不特有干功令抑且大犯隂隲爾商人謀利不過欲為子孫計為性命計若殘忍至此雖得厚利子孫豈能享用耶性命豈能保其牢固耶本縣惓惓欲爾商人減息非特為窮民計抑亦為爾商人性命子孫計也據呈商人亦自有苦處然窮民之苦不更百倍於商人耶因已之苦而厚取於窮人所謂但知有已而不知有人可乎不可乎宜聽從本縣將心放平重利不如輕利之為安多得不如少得之為美天道昭昭報施不爽誠從清夜一思自知本縣之言不誣倘謂隣封皆然何獨靈邑當輕則爾商人當學好樣不當學不好樣在爾商人中昏明不一明者應先倡率務為公平則人人喜悅皆願到其典中得利未必不反多況天心眷佑積䕃子孫更自無窮乎其深體本縣之言毋忽鄉約保甲示為申明鄉約保甲以挽頽風以靖地方事照得鄉約以勸善保甲以懲惡即古比閭族黨之遺法而行之未善或有其名無其實甚則苛細騷擾反不如不行之為愈是非法之不善行之者未能講求盡善耳昔人云鄉約實行自無姦兇猶有姦兇是鄉約未嘗行也保甲實行自無盜賊猶有盜賊是保甲未嘗行也本縣承乏兹土願爾百姓盡為良民風俗淳美獄訟衰息盜賊屏伏閭閻寧謐惟是力行二法庶幾可有成效而人痛惡苛擾恐反累地方今與爾百姓屏除煩文講求實政為此示仰闔境民人知悉除鄉甲條約漸次申明外擇於幾月某日先於在城舉行鄉約隨即查點保甲以次單騎親往各村莊悉照在城例凡本縣所到之處嚴禁騷擾絲毫不累我民如有借端生事者立拏重處其鄉約保長等務須實心任職倡導鄉民稽查匪類如有仍前視為故套苟且塞責者革除不用外仍治其怠惰溺職之罪各宜自奮互相勸勉以副本縣期望爾民之意毋忽申禁差人示為申禁差人以安民業事照得當差人每多無籍惟知利已奚顧他人受累雖不奉差尚欲空手㺯權何況得票入手勢如狼虎恣意索詐不滿其壑不止如催糧則不計拖欠多寡惟計酒貲輕重重則雖多放鬆輕則雖少帶比如拘審則原被證佐任其播㺯遂其心者多方幇襯拂其意者每事刁難至若多受人賄賂即害人性命亦所不惜小民畏法遙望青衣至門無不神驚膽喪積荒遺孑朝廷尚且蠲逋減賦以愛養之反為若輩呑噬情何以堪差人下鄉雖經禁止然日久法弛亟宜嚴飭催糧拘審一案催糧責之現年拘審即原告帶審庶爾民各安耕鑿閭閻獲寧矣為此示仰諸色人等知悉如有陽奉隂違私自下鄉擾民者一經訪聞法在必行嚴禁冗牙示為禁革冗牙以便民情事照得牙行之設原因小民負物到市價值不一恐人争競設立牙行以主交易誠不可少至於纎微之物價值明白小民自能貿易原不待牙行者自應聽從民便乃有無籍棍徒希圖射利如雞卵零星等物亦皆假借牙行名色把持貨物任意低昻窮民受累合行嚴禁為此示諭後開各行知悉自示之後各務歸農不許赴集評價其有從前朦朧請帖者俱行繳銷如敢陽奉隂違仍假借牙行名色把持市物者查出定行重究不貸禁演戲示為實心敬神嚴禁惡習事照得敬禮神明在實心不在虚文愚民無知乃以演戲為敬神不知此乃䙝瀆神明不敬之大者豈有聰明正直之神肯喜此游戲不經之事必遭殛罰決不眷佑為此示仰城鎮鄉村人民知悉今某月某日本邑城隍誕日爾民當實心敬禮不得仍蹈向來惡習如有倡首演戲䙝瀆神明者定行重究決不姑恕至期本縣率領士民拜神訖即於廟中舉行鄉約宣講六諭爾士民各專心肅聽將此六諭句句思惟字字體驗如有平日素行與此不合者翻然改悔洗滌肺腸庶免天譴其素行與此相合者務益加勸勉以徼神眷此乃敬神之大者本縣深有望焉各宜凜遵毋忽行查示為行查事照得分莫切於師弟禮莫重於死喪未有師長病故為弟子者漠然安坐不行一拜不奠一爵者也有儒學訓導某沒於官已經半月諸生竟有若罔聞知者是可忍也孰不可忍也本縣身在地方有維持禮法之責合行查飭為此票仰儒學門斗逐一查明凡在學文武生員孰到孰不到備悉開列報縣限三日内回覆如有仍前漠然安坐者即以行劣論定當詳報學院處分決不姑恕禁止夜行示為禁止夜行以免截刼事照得保甲若清則居民之盜可以無虞至於道路之間猝然相遇殊難防範然白晝截刼茍非積年賊冦不敢輕發每見道路失事非早即暮或趕集夜歸或攢程早起宵行曠野孤踪踽踽賊遂乘間肆刼此實自取而盜案貽害地方若皆日出而行未晩而息雖有强徒從何下手合無仰請憲臺嚴飭闔屬州縣文武各官曉諭沿途汎兵日將落無許人行水路無許舟行鄉地歇店日未出無容客走馳馹差員不在此例柵門辰開酉閉遵行勿失自無後患倘有行客昏夜被截必須根究於開柵之人治以通賊之罪斷不寛假則夜行無人而截刼之患可除矣此本縣條陳弭盜安民幾款之一䝉撫院憲批通行各屬飭遵在案除轉行外合再出示曉諭為此示仰軍民人等知悉務期恪遵共享敉寧勿視泛常自貽後悔勸諭監犯文爾等犯人這身子也是父母生下的當初父母生你的時節也望你成家立業望你養老送終望你榮宗耀祖誰想你今日到這箇地位這皆由你一念之差不安生理好喫酒好賭錢交結匪類遂做出這箇事來其中也有窮極了沒奈何去做的也有家裏儘可過得道這箇是好生意不肯收心自恃勢力無敢發覺放膽為非毫無忌憚希圗分得財物大家快活不知天理難容王法難躱一朝敗露披枷帶鎖淹禁牢獄在官府豈不知愛惜你一樣的皮肉只是法上去不得了沒奈何只得將刑罰加在你身你等遂受盡了苦楚若是强盜則屍抛曠野頭掛路旁固不必言就是竊盜也有竊盜的刑罰有何趣味你的妻子在家裏悲啼你的父母在家裏痛哭又對人羞耻說不出來真可酸心迴想當初若不是一念之差守分安貧聽天由命就是呑飢忍餓强如今日受這般苦楚如今悔也遲了然天地間人也沒有一定苦海無邊回頭是岸只要你等將這箇心改正了痛悔向日的不是一心要守分安貧如今若得出去再不敢喫酒賭錢再不敢交結匪類再不敢做這樣非為的事將聖諭六言時刻在念頭上轉你若有了這箇心即使今日便死也做一箇好鬼若僥倖出去便從新做箇好人日逺一日人只見你後來的好處漸漸忘了你向日的醜行依舊可以成家立業依舊可以養老送終依舊可以榮宗耀祖不枉了父母生你的心切不可說我今日已做壊了索性做一箇不好的人罷如此則永逺無出頭日子了然更有一說你今日要將這箇心改正也不可看容易了須要將主意挐定方纔改得若主意不定旁邊匪類的人將不好的話來引誘你你被他引去了向日不好的念頭重新發出來了切記切記我今這一番話真箇是你們對病之藥無非哀憐你們一樣是父母所生的故諄諄勸化你你們也動心麽你們這一㸃動的心便是做好人的根基切不可輕看了努力努力三魚堂外集巻五
