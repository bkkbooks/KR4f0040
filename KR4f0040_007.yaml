body:
  text: 三魚堂文集卷七贈內閣學士陸隴其撰尺牘上座師魏柏鄉先生新春即擬趨侍函丈緣上臺以越境為嫌不能得請祗懷耿耿遙知閣下福履倍增發揮道藴日新月盛凡在門牆慶慰何如隴其昔在南方獲見知統録一書知閣下主持正學津梁百代之意至精至深每思盡讀師門講學之書以開其愚蒙待罪恆陽以來私心竊喜謂可朝夕於高山景行而荏苒經年尚未獲立雪台墀雖常兩奉教言銘几書紳不敢須臾忘而微言大義未聞者實多伏惟夫子不鄙愚鈍凡開示學者之書盡得賜教俾朽木糞牆得與雕文刻鏤之盛何幸如之專使附候敬陳微芹表意不莊不備統希俯鑒臨稟曷勝悚惶之至上巡道吳公新春進謁憲墀仰荷從容教誨字字句句皆切學者身心民生利弊雖駑駘下吏無能仰測高深敢不銘几書紳奉以周旋期不負知己今春地方雨澤稍多比之舊嵗民情略定然積荒之後觸目皆鵠面鳩形艱苦萬狀久在執事睿鑒中無庸贅陳諸事祈垂仁格外是荷聞尊刻苑洛志樂已經告竣隴其於聲音之理未能窺見萬一然仰苑洛椒山兩先生之遺風不啻高山景行數年前曾在江南一見其書未得細讀兹幸大君子之表章倘得俯賜一册得於簿書之暇一聞黃鐘大吕遺響消其鄙吝而引其天真沐浴於執事甄陶之內無窮矣辱叨知愛輒敢冒昧上請伏祈台鑒答張玉甲先生先生當代名賢不遺對菲山僻下吏荷蒙垂盻俯賜教言感佩何如每讀青齊政略剔弊釐姦澄源端本無一不中俗吏之膏盲愚駑之姿獲此鞭策受益𢎞多但瞻之在前忽然在後抱愧良深耳至大集中扶持正學諸篇直指金溪姚江為禪此尤世俗所依回而不決得大君子之論定可以為學者指南矣令郎英年好學以謝室芝蘭衍孔庭詩禮將來名業正未可量但靈壽一邑荒涼殊甚學宫尤極蕭條近奉部文有修學紀録之例雖不必因此起見而整頓黌序亦羽翼聖門中一事也不識先生能為令郎一助乎便中瀆布統祈台鑒不宣又日仰高山地分齊趙不得時覲耿光曷勝依依惟反覆理要政略諸書如面承指示啓愚翼懦不啻在羮牆間也敝治蕭條學政久弛自蒙先生捐俸修葺稍稍有起色諸生感佩德意亦皆知鼓舞隴其獲同令郎講書論文於其間皆先生作興之賜也又蒙頒文廟考略板至學士子皆知聖學淵源一洗其固陋之習大君子之德教惠及窮鄉曲學真不淺矣便中附謝不莊不悉答義山叔契濶不覺八載吾叔從容翰墨之場養成舟楫鹽梅之器視鹿鹿簿書者真霄壤也接手教知近來閉關靜坐灑然自得益見深造境界乃猶以淪於枯寂為懼何耶竊意吾叔所謂靜坐必非作瞿曇慧能伎倆不過是謝絶一切專意讀書養氣充此氣象塞天地配道義作用皆從此出何枯寂之有或自熙熙攘攘一流視之以為枯寂則非君子之所謂枯寂也姪自慙學問粗淺年來每思隨暇讀書然如荒村老農從胼胝之餘坐隴畔唱耕田歌思與太常樂工較高下難矣至於承乏畿南土瘠民貧之壤無可展布只得假蓋公治道貴清淨之言稍與休息自分作滹沱河濱一庸吏可矣何知其他耶適修縣志有序例數條奉正亦足見此間荒涼棘手之槩家鄉志書曾付梓否得吾叔主持必有可觀嘉靖間吾族有石居公篤信陽明之學學雖近僻然實篤行君子行囊中偶帶所傳文集今并附閲不知曾入志否倘未及表章不可不增入使旋草復并謝厚貺匆匆未有一芹將敬統希垂鑒不盡答鄰邑某承詢及車木一項此真目前最難處之事我輩本心原不忍𣲖民重以憲票森嚴尤不敢不仰體只得且捐俸採辦未知其能就緒否也各邑情形不同執事酌量可另設法固妙倘不能不問之民寧可借庫先為料理俟工完總算則所費尚有限若目下即責成里長則所費即數倍恐不勝其騷擾大抵向來積弊上下皆以里長為可啖之物一使里長出頭步步皆荆棘矣不識高明以為何如事本掣肘總無長策管見如此惟執事尊裁之與鄰邑某足下愷悌性成英姿天授澗瀍伊洛古今才藪明道伊川康節溫公之遺風在焉意必有端人正士生於其間以為當代羽儀足下豈非其人哉製錦之才烹鮮之政知未足以盡高明之藴也某生浙西未聞大道嘗引領中原思得如古人者以為儀型而未遇也兹幸附鵬翼獲隨驥尾不得見程邵諸君子得見其鄉人之能步武前賢者如見數君子矣開其茅塞引其固陋其在斯乎雀躍何如仰冀照臨曷勝翹企與周井陘前月終驚聞足下遭本生之戚未得一展微忱罪歉殊甚知士民攀轅彌切未容以一已私情拋却綿蔓河頭數萬赤子也捧閲新志稿本韓淮陰背水遺蹤程嬰子孤臺故迹了然在目且足下數載以來飢溺心腸亦具見其中惠教非淺不識何時可付剞劂新道臺未知何人將來郡中聚會想必不逺匆匆附候不盡欲言答崔平山别來忽又經月近事多棘手傳聞之言駭人耳目總非疲邑所能辧弟之愚蠢無他見識惟以仕途利鈍聽之造物而已道之將行也歟命也道之將廢也歟命也孔聖之言豈欺我哉惟盡吾所當為此外非所知也不識髙明以為何如來札中各行其志一語與鄙見最相契匆匆草復不盡欲言答宗冀州郡中獲接耿光如坐春風羡慕之私寤寐以之執事處兹繁劇遊刃有餘真同人之師表某之愚蠢承乏疲邑鳩鵠情形猶然如故毫無益於地方過蒙嘉奬惶愧何似承賜州志得觀漳滏之勝槩郤大夫董江都之遺風受教多矣肅此謝覆答席生漢翼漢廷讀近作甚快雖間有出入然大體都在範圍中熟之而已無他法也所望者要將聖賢道理身體力行不要似世俗只作空言耳小學不止是教童子之書人生自少至老不可須臾離故許魯齋終身敬之如神明近思録乃朱子聚周程張四先生之要語為學者指南一部性理精華皆在於此時時玩味此二書人品學問自然不同外六諭集解係此間新刋雖為愚民而設然暇時一覽亦甚有益相去遼逺時切依依但賢昆仲能以聖賢自期待便如終日覿面也又前月寄來閩中詹先生太極河洛洪範諸解細讀深服其察理之精今日能留心此種學問便非尋常人且一以朱子為宗尤見趨向之正至於處處鞭策學者不空談理數尤後學所當服膺也不佞方鹿鹿簿書未敢率爾作序其中有一二欲商量者謹録於左便中可一請正與李枚吉壻舊嵗懸望壻輩有高發北來者可以一慰契濶不意竟寂寂也文教日興青年不可不奮志努力讀書讀書又當知有向上一途不可專事俗學家務雖不能盡擺脫然要見得此中都是道理觸處皆是此理流行則不患俗務纍人矣愚在此掣肘事儘多幸於此看得一二破心不為所動者只欲隨時隨處盡其職分之所當為耳然正難言之大計後儻得罷黜亦當尋一脫身計不能久向勞擾中作生活矣諸外孫讀書何如經宜多讀寧迂其途勿趨捷徑更宜教看小學以正其根腳不必急急學時文也今嵗江南錢糧捐免有田者應推廣皇仁稍寬佃戶之一二庶為不失本心不識吾壻以為何如署中俱各平安勿煩挂念惟蕭然景象日甚一日無可奉寄殊為歉然人歸匆匆不多及與魯瞻弟到靈壽者雖皆知其清苦然不圖清苦之至於斯也大抵署中之人莫不有歸志獨見吾弟札中此是好消息一語為之三歎居官凜四知此不是難事能使一家之人皆知此是好消息此境界最難得然只是自己學問未至不能感動人非關他也吾弟境界雖苦然亦無别法只是耐去但館於市鎮中要不戾於俗又不溺於俗方好不戾猶易不溺甚難須常以古人為鏡方能自照見小學一書不可不常看也茹素甚不必非儒非釋於義無取耳人回匆匆武修覲文俱不及作字均此不盡答傅君維橒修志議恭讀志議皆據理近情具見留心史學如人物選舉之嫌於太略賦役之嫌於太繁前藁誠有此病既承指示敬改削呈政然其中亦有不能盡如台教者考賦役一類若斷自本朝甚覺簡便然孔子生於周世乃欲考夏殷之禮者蓋夏殷之禮存則周家損益之善與損益之未盡善者皆可得而見故杞宋無徵則惜之有明之法亦本朝夏殷之禮也幸而足徴者可不存乎雖時異勢變有法美而不可行者然存餼羊即所以存告朔難與官師選舉同一例也不識高明以為然否至於慈聖樂曹韓諸公行事之當詳也報燕惠王書僖祖廟議請虛東向之位疏當載也高明以史遷班固之例律之是固然矣然又有説焉昔春秋之人物莫大於孔子文章亦莫過於孔子左丘明作傳序孔子之事不如叔向子産之詳載孔子之文不如叔向子産之多一切相魯適楚刪書正樂事之彰彰於萬世者曾不一見焉一切孝經論語文言繫辭文之昭昭於萬世者曾不一及焉是非詳於叔向子産而略於孔子也誠以孔子萬世聖人不必沾沾稱述於一書所以尊孔子也今樂曹諸公之在靈壽非一邑之士而天下之士其人其文已見正史膾炙於天下人之口不待邑志而始著略舉其槩而不詳亦所以尊之也且太史公作管晏列傳亦云管氏牧民山高乘馬輕重九府及晏子春秋其書世多有之是以勿論論其軼事則有詳有略固太史公之例也似無可疑鄙見如此敢復質之左右儻其中更有當商者伏惟勿吝賜教是荷答仇滄柱太史自聞高捷喜溢寤寐非喜先生之得木天喜木天之得先生也去秋獲承手教兼讀銀河篇有韻之言直可羽翼經傳率天下詞客為窮理之功者其自先生始也乎即欲作一札奉候因適當計典之時不敢輒通書都門恐涉世局情態故雖知己如先生不敢聞問惟耿耿於中而已乃先生代為不平之鳴至昌言於朝此在髙明激濁揚清之意欲先從隗始耳然非隴其之所敢當也隴其自待罪畿南雖硜硜一念可矢天日而鳩鵠滿野猶然如故才平二字乃是定評豈敢不自反而怨人耶所可喜者今春局面忽轉三輔氣象聿新不才庸吏得於光天化日之下效其馳驅雖復鞅掌簿書亦甚快也便中附復并候起居與同年柴炯如去嵗令郎至敝治得悉近祉有一小札奉候想已入台覽遼左風景雖異家鄉然賢者處之自能險易如一想讀書樂道之懷不減在西子湖頭也東坡海外伊川涪州學問更復精進身外之境豈能阻汪汪千頃之度耶願足下勉之矣便中附候興居拙刻一種并呈記室臨楮翹企答沈友聖僻處山署忽接手教一消鄙吝之私何幸如之平生未嘗學問又不能跳脫世網日對鳩形鵠面之衆愧無活人手段有虛先生救民行道之望惟一念硜硜不敢自負初心或不為君子所鄙耳江左風雅一脈先生鼓倡其間古道賴以不墜南巡諸詩略見一班矣伏惟珍重便中草復不盡答安平令陳子萬時屇始和遙知新祉駢集欣慰欣慰前承借剝復録數十年前邪正之辨得了然在目荷教非淺抄録垂竣當另專人奉歸記室文廟考略二本呈上此書所以正會典之失去嵗江南李學臺題請改正蓋本於此但部議未允今當兩存以待論定某有一跋語附後不識高明以為何如外雜刻三種并塵台覽率復不既答藁城令薑上谷握手匆匆言别為悵承賜熊峰文集何啻百朋之錫山城朴陋之區得讀先正鴻篇一消鄙吝惠教無疆矣安敬仲先生元朝大儒著作竟付荒煙蔓草良可歎息儻猶可訪求一為表章其為武城生色更不淺也望切望切草泐奉覆兼謝鴻誼答阜平令潘久失候問時切耿耿承詢審丁事前到保郡曾於撫軍及守憲前痛陳一番未蒙見許然亦不甚以為怪尚在兩岐間在吾輩原非有意缺額不過將地方真實情形陳之上臺自信無愧守定初念可也雖駁詰固所不免然亦怕不得況查從前州縣亦有缺額之時不是吾兩邑今日獨創至貴治之蕭條久在各憲洞鑒中只須立定腳跟諒必無妨芻見如此不識高明以為何如敝治向係通詳近復將原册送府未見批轉即使再駁弟亦惟有補牘復上也草復不既答陳世兄契濶之久數載以來鹿鹿塵冗山川間隔未得一候老師暨足下起居惟耿耿於中而已足下以英姿妙才從容清華之地益廣家學欣慰欣慰前月獲承瑶翰正擬覔便鴻附候頃許使來復蒙手教惓惓深荷注念但某於仕途中惟謹守安命二字奉先人之遺訓不敢失墜故所遇上臺無論知己與不知己皆未嘗稍有干瀆舊冬掣肘已決計藏拙不意新撫涖事畿輔氣象改觀故暫且盤桓至行取一局原非所敢望足下暨許先生垂愛至意謹銘之心腑然斷不敢作此想聽之造物可也許先生素蒙不棄真可謂取之牝牡驪黃之外但吾輩所共砥礪當在學問之消長至一官之升沉何足以煩知己耶匆匆未及作札晤時幸一道意臨楮悚切答曹彞士太史戊午冰雪中旅店把臂不覺九載喜丹山之鳳遂羽儀天下而樗櫟散材猶然留滯山城世遇不足言而學問無能長進良可愧也每思祗候興居因外吏不敢輒通書都門故雖在至戚殊覺落落然景行之思固時耿耿胸中捧讀瑶章恍然如置身龜山整庵之側困知一編得此生色十倍知衛道精進之心卓然砥柱中流不徒作木天詞賦客敬服敬服年來向往斯道者雖有人而含糊兩可者實多舍先生其誰望哉伏惟為道珍重使旋草復種種疏略統希俯照不宣答王新河郡中握手仰荷教益鄙吝一消何快如之吕叔簡呻吟語某所去取與尊意不甚相逺然總不如貴友所云先儒書不用選宜全刻所見甚高蓋吾輩在簿書匆忙中一時筆削恐未必遂可為定論且前輩議論瑕瑜不妨並存俾後人得睹其真面目而討論之愈覺意味深長縱有病痛正不必為之掩也俟刻成後某有所疑數則附志於末使學先生者知所決擇焉不識可否容另呈正也原書奉歸記室至摘本中間有數條為原本所無者今附載於各卷末此亦甚是但須注一補字於下恐後人以原本相對不知其何所出也刻樣照朱子遺書而每行加二字甚好但書既全刻刻資浩繁宜算字若干應價若干傳知諸同寅共成勝事可也統祈裁鑒不既又答安平令陳子萬春間偶讀崔子真政論有感恐為酷吏藉口故借足下誕辰發出一段迂論知為有識所嗤乃蒙瓊瑶之報豈所敢當乎田梁老田梁紫為中州夙儒素為湯潛庵先生心折呻吟語序深服其學問淵源但內一二語及陽明者某所素疑故偶為足下道之聞中州人主持陽明者甚多恐又開一聚訟之端如何如何草豆一事實非長策妄意就近采買庶彼善於此敝治巡檢前往料理未知能有就緒否也使旋率復并謝不一又前接台翰論及出處在足下年力方壯不應遽作蓴鱸之想若某頭鬚半白今冬必為藏拙計當就十畝間追尋村學究事業不能久向簿書作生活矣徐健庵先生最承惓惓真朱門先達中僅見者某向以外吏宜安於卑賤不敢輒通一字都門殊覺落落知己之感則固常在胸臆間也便札中幸一道及呻吟語板樣甚精內有一二應改正者另紙呈閲又承教後又復纍月時切耿耿蒙發來呻吟語當即照單分送諸同人所示田先生大序意義深逺發明隨時立教之旨最得前賢心事不勝歎服用以辨首實可為此書生色中間惟説及王伯安一語微似可商蓋伯安與諸儒大有異同非徒激不激之間也幸致請正之意外有敝同年張武承王學質疑一册前嵗偶為刋行謹并附致不識田先生以為何如制藝拙選偶為初學指點淺陋可笑過蒙奬譽愧何如之承諭又奉一部聊供覆瓿使旋草復又驚聞尊夫人之變未獲一展微忱罪歉殊甚讀行略字字可作閨範不但如安仁之悼亡已也崇祀一録深慰高山景行之思承教自當隨諸君子之後一詠其盛容另呈正田先生來札展卷恭誦篤實真摰之氣溢於言表所云今日沉疴惟在利之一端我輩當實實於本分當知上討論實實於本分當行上勇為只求自信不圖人知真可作座右銘蓋昔孟子一生雖以距楊墨自任而必以對梁惠王數語為開卷第一義此亦急則治其標之意也田先生可謂善讀孟子者矣覺向來汲汲於朱王之辨者未免氣浮而躁原札敬歸記室恨相去道逺不能一識荆州盡質其疑也尊跋義精詞確此刻所必不可少者當并田序更求數紙補入前印諸本中匆匆草復不罄又契濶良久掣肘情形想同之也前讀尊夫人行略閨範之妙久心銘之兹奉教言自不敢以不文辭容稍從容一抒固陋呈正至於隆貺則非所敢當相知兄弟中從無此例也樓山先生集向所寤寐未見者得承賜教又蒙賜令兄詩集真惠我無疆矣健庵先生某渴欲請正向以外吏不敢妄瀆惟心仰止明嵗當猛圖解組扁舟過玉峯從醉白堂中盡質平生所疑便中希道及宣公奏議寒家有一舊板前印數部到此俱送相知訖容覔便再印呈奉統希垂鑒不盡又半載來刻無寧晷既以散賑而驅馳山谷復以祈雨而匍匐街衢加以册籍之駁换上下之牽制俗吏狼狽至斯極矣目前得雨雖有秋禾之可望難救夏麥之枯焦鳩鵠之民不能枵腹以待西成如何如何接台翰知彼此情形大略相同敝治亦已報過夏災不知將來作何景象承賜感悼及倡和諸什情文俱極其至宜巢民先生之擊節不置尊夫人女中大賢非固陋所能表揚不敢附銘志之例草成壙記一篇正欲專人馳上兹附來使呈閲愧不能盡刑于之萬一傅冢宰遺疏其家俱已散逸所存不過十之一二有伊令嗣回札并西山文廟考附呈惟轉達高先生是荷盧龍前令家叔也舊嵗最荷垂愛時切感念外有耿氏農書一册以其可佐備旱一籌因重梓之并塵台覽諸不盡言答曲沃令蔣數載契濶每憶魏里盤桓時恍如昨日足下素敦寬厚筮仕名封天眷吉人良非偶然好生來辱賜瑶函兼承嘉貺曷勝感佩恆陽風景蕭條加以硜硜之性動與時違掣肘萬狀無可為知己道者想貴治雖云衝疲舒展尚易吾輩叨朝廷一命無可報稱值此凋敝之際只有寬恤民力一事當常在胸臆寬得一分盡吾輩一分之職處刑名錢穀中時時提醒此念如是而已不識以為何如貴治咫尺絳州安邑前朝絳有辛復元先生安有曹自梁先生皆一代名儒其遺書不識可訪求否儻若惠賜沐大教非淺好兄回車肅此臨穎神馳候井陘道李公三載托庇帡幪不期忽遭意外世路風波真不可測然在執事春風沂水襟懷固自險夷如一紛紛變態何傷叔度汪汪千頃也况自古豪傑往往從艱貞之時倍加精進蘇子瞻之文章愈窮愈工程伊川之學問彌困彌粹一番否剝焉知非造物有意玉成大君子耶伏惟為道珍重隴其今嵗掣肘益甚萬難支吾大約冬間必為藏拙之局聞駕到郡渴欲一叩起居種種牽制未獲如願肅此附候統希垂鑒上真定焦軍廳荷蒙垂愛種種愚鈍得免掣肘曲成之恩非可言謝道憲執事一項向𣲖靈邑安置原有額設錢糧久已奉裁而仍責之原𣲖地方從前苦纍已不可勝言然大約多𣲖之里下苦纍在民而官固不難於完辦也今則里長俱已奉憲裁革雖欲私𣲖無處可𣲖而此項費用浩繁欲告無罪惟有賠耳那耳而一蕭然窮員本年錢糧又盡經蠲免賠無可賠那無可那實有難為無米之炊者敢懇執事俯憐窮邑酌量設法或查無事州縣均攤分任則衆擎易舉或請署印道憲責成本道衙門挂名直堂諸役此輩不下百餘人各認些須便可竣事使疲邑永免大纍十四里鳩鵠之民世世詠甘棠於勿替職之私感刻骨銘心又無足道矣事急情迫冒昧瀆陳曷勝悚惕之至復谷老師霖蒼先生自庚戍暮春都門追隨函丈不覺十有八載知己之感靡刻不盤旋胸臆世兄來兼領手教得悉起居萬福無任欣慰閣下斗山重望海內瞻仰即紀事一編迄今史家奉為指南已足同班馬千古况教育之恩洋溢浙水東西年彌久而聲彌彰雖中遭顛沛家業寢微閉户授徒益徵高節其為及門榮寵何如隴其樗櫟下材蒙閣下拂拭於塵埃之中初仕江南狼狽而歸再官畿甸動與時違稍將未完整頓亦便當尋蓴鱸滋味終不能脂韋求合強其性所不能也世兄逺辱荒署蕭然負歉殊深率泐附復統希俯鑒臨楮曷勝悚切答張西山先生承教惓惓最荷垂愛至意但隴其自承乏以來無寸益於地方素餐之愧常疚於心兼以頭鬚半白精力漸衰既不能有禆蒼生而平生舊學日就荒落為己為人兩無成就豈不重為大賢所嗤乎故每念乘此餘年退就十畝間將村學究伎倆稍稍整頓庶不虛過一生或亦君子之所許乎歲內尚為未完羈絆開春便當力請來教謂不當作自了漢此在高明之士固然恐非所論於碌碌者也且自了亦正未易少壯已過胸中尚爾茅塞及今磨琢不知能追隨昔人萬一否也况復蹉跎耶恃愛敢一布之答席生漢翼漢廷三載不晤時切惓惓未識尊公先生近况何如頃使來得閲近作充滿流動比舊時功夫大進不勝雀躍以此入場不難搴蝥弧而上也但在熱閙處最宜謹慎稍有不安命之説進者須立定腳跟萬萬不可隨意賢昆仲身家重大不比他人寧可學成而未遇一毫徼幸不得此是利害關頭不但是理欲分塗處也慎之慎之至都門交遊錯雜亦須胸有主張伊尹所謂逆於汝心必求諸道遜於汝志必求諸非道二語當書紳總之離親逺出以謹身為第一義功名次之至囑至囑愚留滯荒城無一善狀大約今冬當作南歸計使旋率復不悉上陳房師自暌函丈忽踰十載所喜老師聲揚嶺外望重朝端舟楫鹽梅之任在指顧間世兄復戰勝藝林益振家學欣慰何如隴其昔遭廢黜自分長老泉石不意復為當世所採擇承乏畿南但迂拙之性猶然如故掣肘情形不減於昔恐駑駘終不能追隨驥足不得不動蓴鱸之想且年來鹿鹿不覺頭鬚半白平生學業汨沒簿書恐為流俗人有負門牆尤所深懼目下擬作乞歸計庶幾以間暇之身整頓書生伎倆冀稍有得仰報知己私心自矢如此而已他無足道也候山東河防朱又韓前歲承賜曹志考核精確經緯燦然洵諸志之冠佩教良深頃季飛來知近祉嘉勝欣慰欣慰議河事者紛紛未有定論正大才脫穎而出之時知將來賈讓王景事業遊刃有餘不特曹南一區尸祝無窮也河漕志不識可惠教否簿書俗吏不應越俎而問司空之事不過書生舊習欲一窺河濟源流為讀禹貢地耳拙刻二種奉正便中附候興居不悉寄趙生魚裳旗公索居山城無一善狀好生歸想能備述梗概不贅賢昆仲近况如何人生學問正當在失意磨鍊出來勿為境纍也不佞年來為此間諸生講書句句欲引入他身心上去好生抄數十篇歸曾見否雖尚須刪改未是定本然大段意思是要針砭學者書自書我自我之病此意可採取也新春又刻得讀書分年日程因較對間細閲其工夫次序真可為學者法今奉到三部其一部煩寄我園因驢背不能多帶鎮上相知未能遍及俟下次續奉也外有寄杭州秦定叟先生札一函不識張雲先處有便可轉達否如無便則與好生商量寄在宋崑友處轉達可也匆匆不悉與俞存齋先生向讀紫陽大旨序知先生干城吾道之盛心未獲親依道範山斗之仰時切寤寐去歲接手教知方從事二程遺書當王事鞅掌之時不忘談經講藝真超出尋常萬萬哉隴其少不知學徒汨沒制舉業中掇其糟粕未嘗識前輩淵源率爾涉世動與時違所至掣肘亦思與當世君子熟講而力行之而年已六旬非復強仕之時行將從十畝詩人歸老於當湖之滸或得以其暇整理舊業稍稍窺見古人緒餘庶不負此生然非所敢期也來札過蒙奬許殊非敢當僻處荒城久稽裁答時切悚惕便中附候拙刻三種并塵台鑒統希垂照不盡與刁再濂不佞在江南時已聞尊公先生之名恨未得讀其書頃至恆陽見用六集稍慰飢渴之思猶以未得生平著作為恨聞尚有斯文正統及潛室劄記易酌辨道録諸書謹專人走請其已刻者幸將來紙刷印賜教其未刻者乞將原本借抄抄畢即當專人奉歸記室斷不敢遺失亦不敢汚損想高明諒其求教之誠必不吝也尊公先生行實并求賜教統希垂鑒不宣答施行唐前接台翰因往府未及裁報罪罪拙詳已蒙太尊轉申未知撫軍之意若何恐未必有益也容再奉聞鹽憲查積鹽一事前此從未曾有某正在躊躇鹽隨引銷自是正理若云有積則引銷而鹽未去非揑銷乎且其所積不知果引內未銷之鹽乎抑引外夾帶之鹽乎吾輩亦無從查核恐未便竟以有積回覆也但商人惟恐一報無積日後有加引之纍此亦當為酌量某意只可以本年荒歉難銷之狀為之訴苦一番不識以為何如且宜從緩再看鄰封光景某處若有定稿當另奉正也率復不既又上碑村中竟夕領教荷益非淺兼擾郇厨更覺慙悚承詢學臺供應此費本無正項開銷向多出於里下殊為纍民敝治自革除里長以來俱係捐俸支應上年因城中有官地廟會時市民願賃以開鋪面稍抵此項之費然亦屬權宜恐非可久之道總之掣肘之事本無良策在高明調劑之何如耳上房師趙耐孺先生春間接手教深荷指示兼知老師於公務之暇閉户讀易惜未能追隨函丈一窺其緒餘也易學至明季龎雜已甚擴而清之因程朱以見羲文當於老師是望矣高景逸有易孔義訪之久未得不知其書何如貴鄉尚有板否一隅拙選偶為初學指點過蒙奬譽兹再奉到十部外讀書日程二部附呈并望裁正便鴻率泐匆匆不盡又復谷老師霖蒼先生世兄來得悉老師近祉康吉深慰羮牆之思竊見古人不朽事業成於林下者較之當途更盛遙想老師靜觀世變閉户著書必有超出時賢之上者不特明史本末一編足式訓千秋已也惜匏繫一方不獲一親函丈開其茅塞悵何如之隴其待罪恆南不覺六載素餐之愧與日俱積今年已六旬頭鬚半白行當歸尋三徑了一書生未完之事不能久鹿鹿簿書矣拙刻三種奉塵台覽掣肘中愧無可以展寸忱者惟深愧歉耳種種景象世兄歸自能述之不敢瑣贅統希垂鑒不宣答柏鄉魏荔彤接手教并批點王學質疑知足下留心正學師門箕裘不墜喜何如之自王學盛行以來漸漬於人心高明之士多陷溺其中不可救藥武承一書刋行不滿者甚衆甚有欲毁其板者如足下之咄咄歎賞豈可多得哉嘉靖時粵東陳清瀾曾著學蔀通辨一書其言朱陸異同尤詳曾見之否近年新刋其書於南中當另覔奉也外程氏讀書分年日程言工夫次第確是程朱家法弟新為刋行謹奉正師門諸書惟知統偶筆數種已經佩服至奏疏文集譜傳及鑑語約言諸書俱未得寓目欲悉受讀以當羮牆謹備紙張專人走刷惟勿吝賜教是荷統希垂鑒臨楮神馳答周好生五月初接台札始悉去冬風波情狀兼知尊體平復深慰逺懷承諭處逆境之難某於子路問成人章講義略敷衍及之似可玩味今歲讀辛復元書并熊敬修學統備載前賢壁立千仞之槩悠悠宇宙固不乏人吾輩不可自外也一隅集何足辱廣老之盛心恐翻刻校閲又增賢者一分逆境如何如何若松陽講義則正須斟酌萬萬未可授梓夏秋間因呈送學臺又校訂一畨改易數處容面時奉正也孚九青年志向便能如此可謂良友此間别來無他事惟今歲旱災異常民生甚艱已經題請得旨量蠲稍救萬分之一耳平山公於七月中丁艱謝事亦無大虧空目下便可回籍也便羽匆匆不能多及統候續音寄曹星佑壻自去歲八月使者歸後此間即因旱災上司往來查勘絡繹不絶錢糧盡行捐免今春又復奉上諭放賑簿書煩雜日無寧晷屢欲遣人回南輒復阻滯不佞久處荒城無一善狀硜硜之性動與時違祗恃方寸泰然不以得失動於中故雖在掣肘中得免狼狽看來此道到底難行惟書生舊業更覺津津有味分年日程一書平生所最服膺故特梓行欲學者胸中先知有讀書規模然後以漸加功倘從前已經蹉跎者一二年補讀一經可也吾壻試事何如秋闈在轉盻間磨礪以須斯其時矣高發北上過此庶可盤桓望之望之考亭淵源録奉還此書儘有滋味細閲一番有益於學問不少松陽講義吾壻所見者幾篇今録一部校對奉寄望細閲之即未講者亦可類推而見來札云養氣盡心諸章今當漸次及之也刋刻尚未敢輕言恐有粗疏處須細加斟酌方可問世餘俟人歸續悉與柏鄉魏荔彤舊冬承賜諸書得窺師門之奧義荷教良多內小學一書最關係風俗人心某欲多印幾本分給邑中士子但其中尚有訛字數十今先將較本呈上望命梓人改正當另差人持紙來刷印也外多識集一書尚未得讀倘有先刷者便中幸一惠教是荷農書一册附呈統希垂鑒答嘉定吳生燮臣初春逺辱光臨匆匆言别殊覺悵然接手札知近履康泰且刻刻以工夫進益為念此段光景殊難得也舊本日程已抄畢謹奉歸記室此本上截所載旁證甚有益學者惜向未見止據韓求仲刋本付梓不能令學者盡覩程氏苦心也必將此本重刻乃為善耳學蔀通辨一册并拙刻日程質疑各二册附覽其一隅集及松陽講義俟刷印覔便再寄尊處所有焦弱侯小學刻本便中倘可一借閲荷甚答某敬讀尊公先生之書網羅宏博皆有關世道之言不特為高門一家典型也足下繼述而表章之此純孝中第一事矣某學淺識疏雖高山知仰不能盡窺其微奧承命不敢自外敬識數語於簡端豈能揄揚萬一耶其先後之序考先儒隨手記録之書多不拘次序鄙意每卷內凡周程張朱五先生之語應檢出列於前略見學術所宗其餘則俱仍舊可也內有字畫誤謬者臨刻時應檢原書對明魏叔子一傳亦宜并梓使讀者知尊人大德真能行其所聞尤見是書足重也肅此奉覆統希台鑒寄曹星佑壻南北間隔音問動輒經年一官羈絆未能脫身舊歲滿擬吾壻秋闈一捷不意又復杳然未識近來用功何如此道非難事惟屢折而志益鋭則將來必勝之兆也科舉文字固不能不做然須本原上著力要看作是真實道理不要看作一時應試之事沾沾徒求之時文中方妙外孫能讀書最可喜尤當教看小學以正其根腳今年會場䇿題亦以小學為問蓋近日大老中賢者皆留心此書不可視為迂濶其他種種來人自能詳之答李金華足下生長文靖之鄉而學其學方正之槩已著於恆陽兹幸借重金華撫殘黎而挽頽俗當於足下是望矣敝鄉撫軍亦大賢也將來自必有水乳之合意者天所以成足下乎宋吕東萊及何王金許四先生皆金華産也其遺書殘闕已甚得大賢訪求而表章之此尤同志之所共禱某碌碌無能承乏西臺展布實難惟隕越是懼不審髙明何以教之逺辱台翰奬許過當曷勝惶汗便羽率復統希垂照答范彪西捧讀來教知先生於王陳之學舍短取長正與綱目取荀卿之論一例弟前札恐學者混淆未免過慮來教云學術一道全在躬行此真大儒名言足救近世學者空言之病當敬書之座右以當嚴師至詢及靈壽之政教不覺汗下自計承乏此邦將近七載惟不敢為暴而已實無一善狀嘗歎今日事勢百病之源起於民窮故以寬賦稅絶私𣲖為救時急務然動多肘掣不能盡如其意至民風士習興起之猶易變化之尤難孟子所謂一杯水救一車薪之火雖由火之難熄亦由在己之水止一杯耳今雖僥幸量移然猶是火也猶是水也且頭鬚已白壯猶不如人況老乎每念先生超然泉石讀書樂道乃真當今第一流此處未能決斷又何他躬行之可言惟高明有以啓迪之辛先生經世碩畫敬拜受教其他著述有可賜教者并祈不棄統希垂鑒答周好生别後留滯山城者又二年無日不在掣肘中救過不遑家鄉音問遂爾濶絶今夏忽蒙量移初意謂或可稍展所見不意目前時局處處棘手孫綽遂初之念倍殷於昔接來札尚期望之深惶恐惶恐一隅集猥蒙重刻極承雅愛但恐未必能多行徒費足下一番經營耳至如來札所云欲將八科問答附刋集後斷斷不可此係偶然評閲未經刪削豈可問世久經棄置不知足下從何處見之萬祈為之藏拙不可畫蛇添足也崑友習是編可佩服者極多但亦有繁碎處竊欲為之酌量刪減輒以簿書牽制而止故久未為作序便時幸先道意容續圖請正京邸無他善狀惟覺紛紜熙擾中此心耿耿如故匆匆不多及與曹翁臻萊屈指契濶不覺九載令郎到京得悉近祉深慰渴思某自慙固陋留滯都門無一善狀夏間幾蹈不測僥幸得免掣肘情形莫可言喻愈覺親翁優遊園亭真為至樂曾點之春風沂水賢於僕僕風塵者多矣令郎一畨逺遊恢擴見聞不為無益至於時局功名則某深知其不佳不欲以此損少年之志氣勸其專心致志於正塗求一出頭以為顯揚計不識以為何如聞令孫今嵗亦已就試愚意亦不必汲汲與其勉強早入泮不如多讀幾年書使之學問充足下筆沛然不患功名不到手此一生受用不盡之道若一味欲速未培其根先求其華縱得僥幸恐病痛非小此某年來閲歷人情世態所見如此敢以質之高明此間種種景象令郎歸自能道之不贅與叔元旗翁吾叔歸後諸事日積又以沿海軍工上臺臨縣益加繁擾苦不可言錢糧完數寥寥當此荒月雖加鞭撲終無濟事惟有坐受承差之逼迫而已南翔盜案頗有葛藤然此有大數非姪所憂時局中事必不能為諸友多以為倔強實非倔強也解銀一事以往來協助之人未定故暫令張錦何瑞元為之此元非長策只可權宜一時俟吾叔來再商之可也匆匆不能盡言總望吾叔撥冗即至是荷懇切懇切又夏間寓匏南歸姪附一信想已入覽嗣後兩次信歸俱匆匆不及作字然靈壽景象吾叔必已知其大槩矣此邑接連山右幸不當衝錢糧亦少而易完但地瘠民貧在真郡三十州縣中最為貧苦又連年荒旱憔悴不堪又有協濟鄰郡之苦以姪處此雖簡僻相宜而撫字亦正不易惟喜上臺皆寬仁長者凡事俱在情理之內絶不似南中光景署中覺人太少故急欲家眷北來然路途遙逺須得老成照管方能放心姪雖囑履平弟同來然渠未曾經歷長途必欲吾叔撥冗一來姪到此會計一年經費僅可支持此番人歸手無一文北來盤費未有著落吾叔可於城中覔主緩急百金妙甚家中種種俱望主裁凡事經吾叔剖斷姪無不心服前承吾叔惓惓為姪螽斯計最荷至愛目前匆匆似難及此萬一有可商量者并望留神威叔貽孫不及另札俱乞叱致吾叔來須乘騾轎不可惜小費跨騾也并囑又别後不覺已經月未審吾叔何日抵家長途不困頓否懸念懸念月餘來署中頗無事惟奉憲檄催取縣志甚急不免拮據今抄本已告竣送府付梓則尚未有期也錢糧忽遇特恩蠲免三分之一歡聲遍山谷時事之最可喜者守道竟不起巡道以易州一案降調半月之內兩臺盡更殊出意外偶筆匆匆不盡又别來忽復經年吾叔近祉如何懸念懸念恆陽光景舊冬幾在昏黑中幸逢新撫到任氣象一新州縣得偷安無事但民生不辰地方災祲疊見舊嵗水今嵗蝗百計籌持不能救其萬一至一官之蕭條固無足道也吾鄉景象不知若何因豫馨久病思歸急不能待此中近狀豫老能述之匆匆不悉又吾叔南旋不覺再易星霜耿耿何如此間兩年變態疊出所遇上臺非臭味之不投則意見之不合莫非命也固無足道蓴鱸之想時在胸臆晤期當不甚逺家鄉光景如何北方去嵗遭蝗蝻氣象蕭條今嵗幸錢糧盡蠲稍有起色然此時尚未有雨二麥可慮將來又未知作何景狀也署中俱各平安但淡泊之狀比舊更甚耳威叔聞已選拔可喜之甚不及另札望道意縣志并雜刻呈閲匆匆不悉又舊秋接來札知吾叔近履佳勝一慰逺懷姪浮沉此地愈久愈困一官偃蹇非關世局只是學問不長進之故地方幸去嵗錢糧蠲免民力稍舒今春覺有起色將來亦可藉此遂蓴鱸之願矣嘉邑未完殊出意外造船一項不見移咨直撫必已在赦內倘有混擾回之可也讀叔祖兩傳簡核精確無可更易姪意欲待詩學稍進作一長歌以志高山之仰而日來胸次冗雜未能成章容續成上正又去秋人歸匆匆不及作一字冬春以來地方有蠲賑之事刻無寧晷家鄉音問不勝遼濶六月中到都門見子展弟知吾叔近祉佳勝欣慰欣慰姪此畨行取出人意外初欲借此告假回南而勢不容遲只得勉強到部且再看光景何如此時言路甚是煩難且蕭然一身在長安中亦大費躊躇不勝進退維谷如何如何種種景象六符叔歸自能詳之不贅又家眷回南時有一札呈吾叔想已入覽十月終旬文端叔到京接吾叔手札知近祉佳勝深慰逺懷姪數年來蓴鱸之想時刻在胸一畨行取初意或可稍展所見不意目前時局處處棘手吾叔陽城有待之言固屬老成之識然恐不若孫綽之遂初更為高妙也如何如何松陽講義尚屬草本乃蒙付梓恐迂愚之説未必能行徒費吾叔一番經營也所寄刻本中多差字想係傳寫之訛特託思逺弟較對尚未能盡前三兒帶歸一本乃姪所自較可取一對改正為妙有脫落字句者不妨雙行補入承命率作一序亦殊不文聊志其大略耳并呈上叔祖至行時時在念因不敢草率屬筆只管蹉跎心境稍間即當有以報命匆匆不多及又兩接吾叔手札知起居佳勝深慰逺懷一隅集松陽講義復纍吾叔尤覺無謂不知可稍償刻資不至大折否講義止此一百十餘章無續做者蓋此只是完靈壽一局原不必其全也刻成幸寄數部到京是荷姪在都門終日鹿鹿無一善狀時事甚難言路恐不可久居如何如何又初夏人歸有一札呈上想已入覽姪以不能隨衆於六月中幾遭竒禍雖蒙寬免而勢甚可畏目前又未敢便告假不意世局之險至此然只是聽命無他法也嘉定有未完二件一係邊海城垣核減銀一係河工解費問之部中此二案內俱拖遲未完若到原籍來催照前回覆可也望吾叔留神姚親翁在京並無他舉動已有南歸之意并聞餘不悉又中秋虞山館歸匆匆即去未得圖晤講義稿本校畢呈上但目下未能料理紙張如何如何序文不必另刻附數行於目録後用此體甚覺古雅不識吾叔以為何如今并寫一式呈上種種晤悉不一與三兒宸徵接汝臨清寄字知舟行甚遲未識何時抵家心甚懸懸我自九月初三夜在張家灣起身初四日進城至初十始到暢春苑引見十三日奉以御史用之旨二十日奉補四川道之旨草四日到任隨奉堂𣲖協理山東道事所管者稽察各省刑名事件此尚不難料理惟求盡言職則甚棘手我於十月初七日上畿輔民情一疏自謂委曲之甚見者猶目為戅面奏時雖蒙皇上首肯竟阻於部議可歎可歎大抵目前時勢甚難且看光景我寓中盤費目前僅可支持未能照管家中汝母子到家必甚窘迫只得與五叔商量可且借飯米數擔俟過新春再商接濟之法也家中光景可一一寫示我我既在京家中諸務汝當留心照管但不可以此廢讀書求其並行不悖惟有主一無適之法當應事時則一心在事上當讀書時則一心在書上自不患其相妨不可怠惰亦不可過勞須要得中小學及程氏分年日程當常置案頭時時玩味元旗叔祖寄到所刻松陽講義中多差字若欲將汝帶歸之本較對可即送去但對畢可即將原本取回不可遺失我在京有一江陰人徐名世沐者講書甚精近數與往還頗得其益將來欲採其説附入松陽講義中另刻一本目前且不必論也又正月初五接元旗叔祖札始知家眷於十一月初八日到家心始一慰歲前我有一字寄子展帶歸京中光景想已知悉不知家中何時可有人來須人到方可遣歸接濟汝到家不知作何光景須將聖賢道理時時放在胸中小學及程氏日程宜時常展玩日間須用一二箇時辰工夫在四書上依我看大全法先將一節書反覆細看看得十分明白毫無疑了方始及於次節如此循序漸進積久自然觸處貫通此是根本工夫不可不及早做去次用一二箇時辰將讀過書挨次溫習不可專讀生書忘却看書溫書兩事也目前既未有師友須自家將工夫限定方不至優忽過日努力努力然亦不可過勞善讀書者從容涵泳工夫日進而精神不疲此又不可不知我意欲於二三月內告假回南然未知可得否且再看光景五叔及各房諸叔俱不及作字可一一説聲又我自二月初六日欽點會場外監試至三月初一日揭曉始回寓初七日用中及黃大等到見汝兩字洞悉家中光景此等艱難之狀不涉歷不知到處可長學問不可但心焦至於讀書在家中杜門靜坐須依我平日話頭去做工夫不可優忽過日一無長進旁人之言不可輕信須要辨其是非自家立箇主張常將小學近思録之言放在胸中去聽人言便如以鏡照物自然是非了然我在京安好不必挂念但常想南歸未有機會耳倘秋間未得歸汝當到京來時須用騾轎不可勉強跨騾長途比不得靈壽至京也汝雖在家我心常在汝身上汝當以父母之心為心也其餘京中光景黃大歸自能言之又黃大四月初三日在京起身此時必已到家我京中光景渠歸想已備悉一月來亦無他事前月終因捐納之人紛紛只得又上一疏旨意甚好然未知部議何如也我前字中欲汝秋間到京然須再看光景待我七月中再遣人歸商量黃大若有盤費可先遣來若盤費艱難遲遲亦不妨新宗師必已發牌汝於舉業尚未能精通待下次考亦不妨功名遲早自有天數不必強求但讀書不可不勤緊孔子曰不患莫已知求為可知也當常思此言有便信來須將所用工夫一一寫示我然日間亦不可過勞苦須有從容自得之樂方是真會讀書人誥命已領到可對母親説聲凡事自要立主意不可輕聽人言人言之是非亦不難辨只是以聖賢之義理為權衡而已汝能不為衆楚所咻我心方慰念之念之又我八月初已開列在外轉中復蒙停止目前又有試俸一局未知作何光景總之聽命而已汝且不必進來文宗幾時考嘉興汝文章尚未能精進且待下次考亦不妨只要上緊讀書不怕無功名也我寓中日用甚窘下半年俸銀因靈壽上年錢糧未完罰去此番人歸又無一錢可寄當待仲冬遣人歸矣汝事事須謹慎不可輕聽人言將書帖到府縣中親友不知利害者甚多須要自家有主意若有要緊事務須到城中與元祈叔祖商量星佑此畨來一慰契濶甚好但我寓中清淡不能有所加厚甚覺歉然惟勸其讀小學書若平日能將小學字字熟讀深思則可為聖為賢亦可保身保家汝當互相砥礪人而不知小學其猶正牆面而立也歟彭年於中秋後到京我亦勸其讀小學近來愈覺此書有味也又縣考一事文理稍通者無有不取所遺者不過十之一耳此無論不宜干瀆亦且不必干瀆向來鄉紳多紛紛開薦我所不解汝見靈壽曾有一人來説乎此一節賢於我鄉風氣逺矣且預先要開薦分明自處於極不通之地少年志氣亦不宜如此此番汝與曹家外舅同就試只宜聽其自然但要用心做文字文字若好自無不取之理一則可驗自已之力量一則可見當事之公道豈不美乎如果落在孫山外不過事之偶然公道不泯下次自然必取但要讀書不必以此為慮城中親族有欲開薦者可俱以我此意説知與武修弟今年正月內始聞大姪之變深可痛惜此最朴實人天何以使至此我逺在京不能少申其意附代奠些須弟可為我備一享祀以慰其靈痛甚痛甚弟今止有兩姪當為其婚姻計此是目前第一要務然亦不必心焦自然水到渠成也我在京甚多掣肘未知將來若何弟明歲館地且看我光景如何再作計較可也種種黃大自能言之不多及與用中姪見吾姪札知為天津靳公所招不勝欣慰靳公居官服政極為謹飭愚向在都門熟聞其概況河臺先生之立德立功吾輩心殊傾慕諒其家風必有倣佛且渠令弟曾與我同城姪得親炙之亦三生之緣結也但相與之間必須誠敬方可為久訓課之法必導以聖賢路頭如小學等書不可不授與幕友相接要極和婉之中須有一番主張不可為所轉腳跟也大槩作幕者自有一種氣習若稍或漸染便非儒者氣象知吾姪雖有定見然愚不得不囑至於館政之暇自家學業斷不可荒廢愚自南旋以來即謝去世故舌耕糊口仍館席氏日對古昔聖賢較之宦途鹿鹿倍覺綽然自豫東翁從未識荆可道我景慕之意羽便附此不盡三魚堂文集卷七
