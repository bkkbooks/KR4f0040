body:
  text: 三魚堂文集卷九贈內閣學士陸隴其撰序黃陶菴先生集序豫自束髮受書即讀陶菴先生之文見其精深純粹高者可以羽翼經傳下者可以凌轢韓歐心竊慕之以為是何如人而其文之超軼絶倫如此及聞先生從容就義慨然太息謂先生於死生之際不苟如此志與日月爭光而行與天地同久宜其發為文章精純超絶協金石而中宫商也既又思之自變故以來平日談忠孝講仁義之徒臨利害而喪其所守者何可勝數而先生獨毅然不變人之所隱忍徘徊而不能決者先生視之若渴飲飢食之不容已夏葛冬裘之一定而不待擬議也此豈可以强至而卒辦哉蓋其所積者厚而所養者深矣及待罪先生之鄉見其遺老訪問先生之平生則羣以為先生平日孝友忠信取與不苟泊然於富貴而發憤於正學孜孜矻矻惟以聖賢為己任而世俗之塵埃不足以入之嗚呼此其所以能臨利害而不變也歟自世教之衰士不知以廉隅自飭謂正學為迂濶謂功利為不可已遇小利害則攘臂而起蠅聚蟻逐無所復顧平日之志氣如此欲其臨大節而不可奪豈不難哉由是發為文章不入於卑陋則病於雜駁雖欲彌縫潤色自附前賢如寠人之裝為富貴非其所有張皇支吾百病俱見無怪也故豫以為先生之文本乎行先生之行所以能卓然於臨變者本於平日之養士苟能以先生之養為養自然險夷如一履變則為嵗寒之松柏處盛則為高岡之鳴鳳皆是物也區區文章之焜耀何足道耶不然雖文如先生猶不足貴也而況乎其必不能哉因先生之門人裒集遺文以傳而為之推論其本俾世之學先生者知所取則焉張東海先生集序鄭端簡公曉年譜言端簡初第時將殿試首相石齊楊公使人道意致殷勤端簡父吾核公戒端簡曰汝不聞兩及相門張師德無書抵政府劉元城乎因誦張東海先生戒子詩權門要地是危機句端簡所以能卓然於始進而不枉尋直尺於公卿之門者東海之詩有以啓之也余讀之未嘗不歎前輩操行之高真今日後生藥石哉訪東海集未得適先生裔孫世偉以家藏遺集索余序因得盡讀其詩文與其行實蓋先生之學根柢程朱而胸次灑落一切齷齪不足嬰其懷當時賢士大夫如李西涯謝方石彭鳳儀王守溪皆歎服其學問政事之超出流俗一南安守而朝野交重不啻慶雲景星宜其流溢於詩文者足以楷模後進如此也世多重公之草書公嘗自評吾書不如詩詩不如文以余觀之誠然非書之不如詩文書得詩文乃重耳然非學之有本如世之嘲風弄月雕琢雲山刻畫星露則詩又何足重而況能重其書也哉余竊怪虞山錢氏輯列朝詩集於先生之詩登者寥寥無幾如今集中所載養馬行昔有篇諸詩其用意深逺與杜子美兵車行諸作相為表裏有天下國家者所不可不知而如吾核公所稱尤足針學者之膏肓錢氏皆逸而不録亦所謂不揣其本而齊其末者歟典型既逺奔走危機者滔滔皆是矣先生之詩文具在安得如吾核公者日諷誦於其子弟之前一洗滌其肺腸也哉屠我法詩敘論語載長沮桀溺學者見其與聖人之言抵牾遂疑耦耕之賢與洙泗心事若莛與楹僅可與考槃衡門諸詩人出沒於煙霞泉石間而不可與羔羊之大夫甘棠之召伯同日而道也余謂不然有沮溺之心然後可以行孔子之道有考槃衡門之節然後可以處羔羊甘棠之位夫聖人所以經天緯地育萬物而理萬事者必自洗濯其心始其心灑然爵祿軒冕不足入其中是故其神閒其氣定物至而能應事至而能斷惟理是視可貴可賤而不可奪然後能有成功不然得失之念營於中其所以為萬事之根本者壓於紛華靡麗之下而不能自主方且左顧右盻日不暇給而能成天下之事者未之聞也故世之處高位擁大權而考其功業無絲毫當於聖人者非盡其聰明才力不如也無沮溺之心以為之本耳自漢以來作史者雖王侯將相功名赫赫不可殫述而於隱逸之士必詳記而備載之其亦有見於斯耶我郡屠我法先生積學隱居與鹿豕為侣者四十年天下之士方攘攘於富貴得一爵若登天失一爵若沉淵而先生視之無有也曠然若處雲霞之上而人世之汙濁不足以纍之嗚呼使以先生是心而處廊廟之上無利害得失以攖其胸而從容經畫天下之事何事之不可為耶誰謂沮溺與孔子有二道也其詩一編大抵皆寫其胸中高曠之致讀其詩可以見其心矣人謂此淵明歸去來辭之類吾謂此諸葛武侯鞠躬盡瘁范希文以天下自任之本領也天濤詩文序眉山蘇氏兄弟文章為一代宗自宋以來操觚家仰之若泰山北斗然吾嘗竊病焉文以明道道不明何以文為蘇氏之文拾蘇張之緒餘者什之五醉佛老之糟粕者什之五且以伊川大賢而目之為姦幾乎目不辨黑白而耳不聞雷霆者矣尚安取其文章哉我家天濤筮仕於峽蘇氏之墓在焉禁其樵採新其廟貌又間以政事之暇成詩文若干篇人皆謂天濤嚮往蘇氏而得力焉者吾謂不然天濤平生朴實敦厚其在峽也仁而明當軍興之際從容經畫不廢事不纍民惻怛至誠之念浹洽乎境內峽人愛之如父母然此真可與學伊川之學者豈蘇氏之比哉其詩若文皆言其性情所自得而非有蘇張佛老之習氣於方正之士未嘗疾之也其表章蘇氏墓特以為先賢遺趾不忍其滅沒於樵夫牧豎之手而非宗其學師其人也余方欲與天濤究程氏之遺書追居敬窮理之學脉求所謂吟風弄月之㫖趣布帛菽粟之滋味恐不知者見其官蘇氏之地表蘇氏之迹猥以為眉山一派也故為敘之母以文忠兄弟辱我天濤哉李先五詩序豫在疁城未嘗得與文章之士相親也逮休陽丘藏嶽以李子先五詩集見貽且為請序因歎豫之不能知李子有如此詩矣染鼎者不足以知味吹管者不足以賞音況乎塵坌之餘何能高談風雅為李子振踔藝苑也哉然而竊嘗論之矣詩自三百篇來代有不同變而不失其正者詩固不沒於人之心也國風雖不登朝廟其一時士女謳吟祗以輸寫性情闡揚興㑹而貞淫舒慘之氣王者采之以徵治忽焉有唐以詩取士其所奏對皆質有其文務以平生所得著之篇牘識者尚譏其漸開淫靡況下此者乎今之稱詩者吾惑焉生未嘗探詩之源流與其閫奧也輒欲誇騷雅之盛事鄙屈宋為後塵矣而且閥閲之家人有應劉投贈之章詞皆曹陸豈當世之才人果若是其盛哉夫亦徵逐以為榮名抑羔鴈以資潤澤乎故豫謂近人之詩雖有可觀而求其不沒於心如古人者正少也李子雖今之人乎其詩則固有可采者或見其艷發滃鬱則以為其才俊也見其頓挫渾脫則以為其法敏也見其鴻博雄肆而不竭則以為其學瞻而思深也是則然矣而皆不足以盡李子吾之所以取李子者以其品與養耳夫詩以文身假以為名利之梯則非品矣詩以攝性挾以為奔走之具則非養矣李子少壯著書評隲諸家生不出里卷四方名賢時招致蒼雪樓樽酒問業絶無裘馬聲色之娛以亂其情則其品與所養可知矣今日有李子意吾之所謂詩之不沒於人之心者乎太史公云國風好色而不淫小雅怨誹而不亂蓋欲進屈原於詩以揚其盛也乃吾將進李子於有唐作者以表其微獲附於賞音知味之後其可乎藏嶽試為我問先五抑更有進焉者歟王上台詩序王子上台示豫詩一卷讀之大抵和平高曠有古風人之致焉尤喜其和華天御先生夏日村居詩曰書囊隨我甘淪落世路從他自險巇夫世路之險巇有盡而我甘淪落之心無窮以甘淪落之心處險巇之中世路其如我何哉斯言也必有契於華先生而王子之詩所以能和平高曠自逺於流俗者其亦有得於此也耶然豫又有說焉夫天之生士與士之生世非止自淑其身已也蓋將以為斯世之標凖矩矱而引翼變化使之咸盡其性也故古之聖人有以一夫不獲為恥而欲堯舜其君民雖進必以禮退必以義而其心一日不忘天下即終不用於世矣猶必刪詩書述仁義明先王之道以待後之學者惟恐大道之終不明於世而斯世之終不得與於道也嗚呼聖賢之用心固如此哉雖曰窮則獨善其身達則兼善天下然所謂獨善者窮居自守不能如臯夔稷契之所為耳非置斯世於度外也置斯世於度外而以嘯傲林臯為高是沮溺之所謂獨善而非聖賢之獨善也然則當吾世而猶有險巇焉是亦吾之恥也故任其險巇而勿與爭衡則可任其險巇而弗為憐憫則不可或出或處或進或退聖賢之行雖不必同而憐憫斯世之險巇曲盡吾所以救之之心則無不同也惟有甘淪落之心以高曠其懷和平其氣而又有不忍險巇之心與萬物為一體然後天所以生士之意始無負華先生抱道高隱今之大賢也其必有得於此矣因讀王子之詩而附吾所見如此華先生聞之其亦以吾言為然乎楊碩甫詩序唐顔魯公千載偉人好神仙浮屠之說儒者曰是其天資高故學雖雜不能汨其忠義之性仙者曰是幸得吾術故能有所成就是二說者世莫能定也虞山瞿公稼軒殉難粵西其節最烈而雪湖楊君碩甫諱藝出入於鋒鏑之閒負其遺骸收而殯之義聲動三軍武夫悍卒皆為感泣無攔阻者楊君自言曾遇異人能知未來事所言多竒中瞿公好其說與之周旋艱難中嘗奉其言為金鏡我不知君與瞿公果得力於其術乎抑其稟於性者厚賦於天者粹故所操雖不必盡儒者之學而忠義之發光耀宇宙不可遏抑乎辛酉春豫遇楊君於虞山望其貌渾厚真朴出詩一編示我瀟灑自得無纎毫俗氛嗚呼此其所以能臨危難而不苟者歟其得於天性無疑也我因君而知瞿公矣世之人資稟不如君而徒欲學其術雖遇赤松洪崖面命耳提盡得其奧㫖妙道使之當變故其不視君友如秦越人掉臂不顧者幾希矣使君早年不遇所謂異人而遇濂洛之儒以如是之天資切磋而肆力焉其所成就豈但如今所稱者哉然如君者亦可謂竒男子矣天下滔滔使盡如君之險夷一節何至如江河之日下哉傅鷺來感懷詩序傅子鷺來示豫感懷詩一卷磊落纒綿有唐人風工詩者自能賞之然特賞其詞云耳非知傅子者夫感也者觸乎外者也懷也者存乎中者也觸乎外者其末存乎中者其本余微窺傅子之懷蓋有足多者焉其詩曰五頃薄田兩具牛三餐脫粟鹿皮裘能淡泊也又曰仔細隋珠休彈雀商量寶劒莫屠牛能寧靜也又曰莫同狡兔營三窟閒看祥鸞振九苞能不以利而以義也夫淡泊寧靜而不以利豈非孔子所云君子懷德者耶有是懷也故其詞雖哀而不為傷雖怨而不為懟皆情之所當然而義理之正也苟無是懷而徒感慨悲歌歎李廣之數竒嗟劉蕡之下第憐馮暖之窮哀鄭䖍之老寄悶於瞿曇慧能抒愁於黃鳥芳草懟耳傷耳君子安取焉雖然傅子之懷善矣吾尤願其充之也夫人光明正大之懷不難其發於一時而難操持辨别於平日操持固然後嗜欲不得而奪辨别精然後疑似不得而淆故古之君子戒慎恐懼無時敢懈慮此懷之或奪也讀書窮理無時或息慮此懷之或淆也用力之久至於醇粹堅固暢乎四支發乎事業無往非此懷之流行則聖賢不過是矣不然守之不固析之不精乍出而乍入忽隱而忽見光明正大於翰墨之間而不能不糊塗委靡於日用之際則非吾所敢知也傅子勉之矣一隅集序一隅集共經義八十八首余甲寅嵗選而評之以課長兒定徵者也曷言乎一隅也吾見人家子弟殫精敝神於時文中積案盈箱矻矻窮年而一切經史皆不暇讀讀亦不暇精故擇此數十篇授之且為指㸃其淺深虛實賓主反正提挈照應之法使其因此擴而充之則時文之規矩盡是矣此舉一隅以三隅反之意也庶幾有餘力讀天下應讀之書得從容講究聖賢全學長兒如吾法漸通文義四書本經之外以次讀詩春秋三禮國語國策史記漢書韓栁歐蘇之文涉獵通鑑綱目性理漸知聖賢門路壬戌九月不幸夭沒年止二十有三日月如馳倏忽已經三載而此集儼然在敝簏中余既痛吾長兒之遺迹且以其可稍救俗學之失故出以授問學之士蓋嘗譬之庖人治饌時文則在筵席之饌也一切經史則在庖之粱肉山珍海錯也庖中無粱肉山珍海錯而徒廣收筵席之餘饌而藏之欲以此饗嘉賓其不至臭穢不堪者幾希此集則不然指示其烹飪之法觀一席而千萬席可知暇則置備粱肉珍錯尋其出産之處廣求豫積客至按法烹之馨香鮮潔客無不悅且不徒可待客也一家之中養老慈幼無不綽然有餘較之收拾殘羮剩汁者相去豈不逺哉子弟用功之法當如是有志斯文者其亦有取於此也夫黃陶菴先生制義序豫既序陶菴先生之詩文而推論其平日之養或曰先生之制義何如豫曰先生可謂得制義之意矣何謂制義之意以其出入班馬馳騁韓歐耶曰不然以其㫖必濂洛法必成𢎞耶曰不然以其法乎古不戾乎今得乎已不駭乎人耶曰不然然則何謂制義之意曰子亦知制義之所自起乎此宋明以來取士之具也蓋自公卿大臣以至於都邑之長是天子所以寄股肱耳目者也所以共社稷民人者也所以為治亂安危之分者也而皆於制義一途取之其間非無英君哲相計深慮逺辨别人材鄭重名器而卒不廢此者何也亦曰是制義者所以發揮聖賢之理也能言聖賢之言者必能行聖賢之行以若人而寄之股肱耳目託之民人社稷則必有安而無危有治而無亂是取制義之意也是五六百年來所以行之而不廢也自士習壞而制義為虛文方其執筆而為之所言者無非仁義也而孰知言仁義者之背乎仁義也所言者無非忠信也而孰知言忠信者之背乎忠信也舉世滔滔以為是取爵祿之具耳而忘其爵祿之何以必歸乎此也苟可以悅於人而僥幸一第焉斯已矣遑問其言行之合與不合哉嗚呼士習如此而欲得真材以期治安豈可得哉是無他則失乎制義之意也今觀先生之制義與其養於平日而從容於遇變者可謂言與行合矣言與行合者是朝廷所以重制義之意也惜先生不幸而特以節見耳使其生當明盛而任股肱耳目之寄受民人社稷之重其所樹立豈可量哉若夫不能學先生之行而徒學其文以之欺世取榮常則不足以翼休明變則不足以衛綱常於是羣焉罪之曰制義之不足得人也嗚呼是制義之咎耶抑失乎制義之意之咎耶先生之制義傳者頗多間有非其手筆而僞託者亦有非先生欲存之作而未及刪者用是定為若干篇天下學者誠讀其文而想見其人無失乎制義之意焉則庶幾矣談念苕窗稿序談子念苕與余居相距咫尺時得其文讀之其辭沛然以充其氣爽然以清望而知其將奮翮雲霄者也今秋果舉於鄉同里莫不相慶蓋喜文章之有據遇合之權不在於天而在於人也然余之為念苕喜者又不獨在是余嘗聞商文毅公之言曰士無以致身科目為榮而以無負於科目為重夫今之人束髮讀書揣摩當世之好尚皇皇焉庶幾其一中得之則以為喜不得則以為憂非此科目也耶而自文毅言之則人雖幸列於科目而其中猶有負有不負焉則是科目也者未足喜也而可懼也夫必如何而後可以無負耶將閎覽博物以備顧問乎七略九流之書無所不窺畢方二負之竒無所不識求之科目之中千百而一二焉此足以無負矣然昔人猶病之曰此記誦之學耳記誦之學可謂無負乎將著書修辭以垂不朽乎如遷固之史歐蘇之文長卿子雲之賦太白子美之詩求之科目之中千百而一二焉此足以無負矣然昔人猶病之曰此辭章之學耳辭章之學可謂無負乎將樹功立業以自表見乎戡亂如蕭曹守文如房杜救一時之危振一時之弊求之科目之中千百而一二焉此足以無負矣然昔人猶病之曰此功利之學耳功利之學可謂無負乎夫徒有其科目既不足以為榮加之以記誦辭章功業赫然顯名於世而猶未免乎負此非刻論也蓋士固有其當為者而此未足以塞我之責也士所當為者非他孔孟程朱之道而已是道也閎覽博物而非如世之記誦也著書修辭而非如世之辭章也樹功立業而非如世之功利也是不待逺而求之即我束髮所讀之書其中聖賢之所訓誡先儒之所注釋至精至備舉而措之則道在是矣而人往往徒習其言以為科目之資而不能反求之身一日焉得其所欲則棄之如敝屣夫是以遇益隆而行益汙位益尊而品愈卑間有能自異於流俗則又沒溺於記誦辭章功利之間而不能深求乎聖賢之道嗚呼求其無負焉者豈不難哉然我嘗思之人之不能造於是者惟其志不立耳不則自以為足不求進焉耳苟志立而不自足進而不已天下何事不可為而獨難於是耶我見念苕之於舉業也奮然不肯居人下而恂恂焉若無能是以英年而奮飛人之聽於天而不可必得者獨取之若寄操是心也以往豈其能得之科目而不能得之道哉此我所以為念苕喜也故因讀其文而序之於其首使天下見念苕之文者知其所重將在彼不在此則世之囿於科目中者其亦可以知返矣錢孝端經義序儒者往往謂舉業盛而聖學衰余嘗語同志吾輩皆從舉業出身當相與努力一雪此聲請問雪之如何曰所惡乎舉業者為其以利祿之心從事於聖賢之書探精索微手拮据而口呻吟者非以求道也將以求其所欲也甚者則又不待其精微苟可以悅於人而止飾僞長詐如市賈然是以君子惡之今使為舉業者無以利祿存於胸惟知道之當求而聖賢之不可不學以居敬為本以窮理為用求之六經以探其奧求之濂洛關閩以一其途求之史以窮其變求之敬軒敬齊月川整菴諸君子之書以博其識精擇而篤行之口之所言必使無愧其心身之所行必使無愧其言其發而為文者皆其得於心而體於身者也一旦學成而薦乎有司登乎金馬石渠天下之人見其由是得舉也則指其所業命之曰舉業而學者固未嘗自謂之舉業也其遇耶是道之將行也吾無與焉其不遇耶是道之將廢也吾亦無與焉夫如是則舉業與聖學豈有二乎哉然吾嘗持此以告人而人率笑其迂一日錢子孝端以其所作經義數十篇示我其氣沛然其光蔚然讀之者皆以為琅玕球琳可以登廟廊可以耀宇宙錢氏世有聞人將復鍾於是矣顧錢子若不敢以是為足不憚跋涉而詢於芻蕘其心豈但與世俗之舉業較短長者哉愚時方在苫塊未暇答也服既闋乃舉平日之所以告人者以復於錢子錢子當不以我言為迂也同邑文序胡敬齊先生嘗歎科舉之學壞人才謂其麗乎辭不知志乎善余讀其言未嘗不慨然也雖然是豈科舉之咎哉夫科舉之設原非取其辭也謂其辭善者其志必善能為孔孟之言者必其志孔孟者也能為程朱之言者必其志程朱者也譬之作室而求匠召而問之其言棟宇榱桷廣深修短之法井井如燭照而數計則授之材而豫之稍食未為大謬也自學者見上之人所取在辭也於是日夜磨礪其辭以求當於有司孔孟程朱之道鍊習於筆端言之侃侃真若可信而問其志則曰吾以是求吾所欲耳豈真思實其言哉譬之拙匠不務精其業而徒拾魯般之陳言以應對主人幸而獲其稍食則吾事畢矣其室之成壞堅脆於吾何有哉為主人者方慶其獲良工而廣厦曲榭可藉以成孰知其志之不在斯耶所謂鷦鷯已翔乎遼廓羅者猶視乎藪澤而科舉於是弊矣此猶就其辭之善者言之也其又甚者則并其辭亦不能善穅粃雜陳稂莠錯出幸而塗飾有司之耳目冒昧一第則泰然自謂其業之成不復知有人間學問是又無足論矣然吾終不謂科舉之無用者天下大矣有碔玞則必有和璞有魚目則必有隋珠明道紫陽獨非科目中人乎士苟有志雖使處秦之初宋之季廢詩書禁道學猶將修身獨善以守先待後為己任而況煌煌功令以仁義為鵠以六經為羅以洙泗濂洛為招而茫茫宇宙無人起而應之吾不信也吾邑素號才藪起蓬蔂而陟青雲者踵相接也後進之士益蒸蒸向風相與集其揣摩之文梓以問世而命余序之夫殫精竭思上追秦漢下凌唐宋語必破的言必中繩吾黨之士講而習之久矣豈待余言哉然竊有願陳者則未知我二三同學所朝夕揣摩而爛焉於是集者果發於其志乎抑但麗於辭乎其真見聖賢之道若飢食渴飲之不容已而侃侃言之乎抑曰姑以求合於功令乎二者之相去在毫釐之間而有天壤之别我同人必有知之者庶幾哉相與砥礪各即其所言反而實求之身以不能為明道紫陽自恥毋徒思與文章之士逐鹿於中原使天下後世謂科舉之中有人焉而無為敬齊所歎則豈惟一邑之光世運人心實共賴之歷科小題永言集序程子有言古之人自能食能言即有教蓋人之幼也知慮未有所主則當以格言至論日陳於前盈耳充腹久自安習若固有之又曰人多以子弟輕俊為可喜而不知其可憂也有輕俊之質者必教以通經學朱子嘗有取於陸子壽之言謂子弟教作虛誕之文皆壞其氣質古人之為子弟慮者如此今之教子弟者吾惑焉方其幼也既未嘗習之於灑掃應對朱子所輯小學一書常束之高閣不使寓目雖日讀孔孟之言不過以為此利祿之階梯未嘗知其必可行不可不行也稍長教之為文則挑其心機奬其浮華惟以驚人耳目為能事不問其虛誕不虛誕通經學不通經學也僥幸一第則便以為學成不復知人間尚有當讀之書當為之事然則風俗之不端士習之日壞豈非自童子時始哉故吾每教童子作文未嘗不戰戰兢兢惟恐一言之病中於其心異日將碩大蕃滋鬯茂條達不可救藥蓋人之聰明當擴充於範圍之內不當擴充於範圍之外往者嘉靖以前天下無異學士皆由程朱以窺孔孟其文渾厚醇朴惟恐一言之越乎繩墨士習如此風氣安得不醇哉自是以後學日雜而文日奇風俗日偷非天之生材有異乎前也其所以教之者然也成童之時其心先也離琢破壞求其長大之歸於醇朴不可得矣故當今之急務必自教小子始教之道必以小學為基址以濂洛關閩之書為根本以先正渾醇厚朴之文為彀率使自孩提有識即浸灌於仁義中正之中游衍於規矩凖繩之內如水之汪洋浩渺而不得越乎其防則文章不期正而自正風俗不期厚而自厚矣張子質夫惇五蔣子聲御選歷科小題之文以為童子式吾見其一出一入不敢苟且惟誤後學是懼其亦有程子朱子之慮耶故為推古人所以教童子者辨於其首使讀者知文章一途非徒貴其機巧浮華已也當求程子所謂可憂者如何朱子所謂壞氣質者如何聰明日擴而範圍常存必為轉移風氣之人勿為風氣所轉之人庶幾不負三子之志也夫授經堂壽序今年春嘉善沈芷岸太史寓書於余曰我邑畏碞先生我舅氏子宗老也生平慷慨敦氣誼重然諾樂善好施屢戰棘闈數奇未偶年來閉户課孫天倫自樂今且七旬矣子盍有以壽之且我表弟端明舞綵承歡之意甚摰吾輩無以侑之不可隴其不敏方自放於煙霞泉石之間筆墨久荒承命不知所措適讀史記萬石君傳胸中若有不可已者遂敬書之以質於太史當萬石君時人才濟濟毛萇董仲舒申公諸大儒言行醇備者固無論其他如施讎孟喜趙綰王臧之屬以經術顯司馬相如枚臯之徒以文詞著公孫𢎞以曲學阿世封平津侯而萬石君皆無有也蜀卓氏宛孔氏魯曹邴氏宣曲任氏皆以資財雄郡國而萬石君亦無有也獨其父子兄弟循循孝謹自內達外無幾微緣飾年彌高而行彌篤積久而彰天下仰之雖齊魯諸儒之質行皆自以為不及夫以龍門之好奇於一切庸行若不屑然者而獨於萬石君家風津津不能已後千餘年朱子輯小學書去取謹嚴雖經傳之文不輕入而獨於萬石君事詳哉其言之由此觀之莫榮於孝謹莫壽於孝謹假使當日萬石君有卓孔之資財有平津之爵位有枚馬之文章有施孟之經術而孝謹不逮其名未必傳於今即傳亦必不能使人敬仰之如今日也又使當日若卓孔若平津若枚馬施孟之徒能孝謹如萬石其姓名傳於今不知當如何敬仰必不落寞如今日也鳲鳩之詩曰淑人君子其儀一兮其儀一兮心如結兮儀一者孝謹之醇乎外也如結者孝謹之常於中也其卒章曰正是國人胡不萬年言孝謹之效也孝謹而外無他道矣毛董諸大儒亦全乎此而已自古聖賢所以繼往開來卓然不可磨滅者無不基於此有淺深安勉生熟之殊耳今我畏碞叔少壯修行晚年天倫自樂可謂有萬石遺風矣吾又烏乎祝之亦祝之曰自今以往長如萬石君家而已萬石君區區一趙布衣率其子弟躬行孝謹身享遐齡一門貴顯令名無窮況加之以經術文學增其所有而有其所無其所致寧可量乎我焉知得效之盛不如鳲鳩詩人之所祝又焉知異日無網羅舊聞如史遷者採其家風為魏里萬石藏之名山傳之其人更焉知千餘年後無裒集嘉言善行如朱晦翁者述其遺事補入小學遐陬僻壤三尺童子皆知有畏碞先生也是在端明與諸子孫能敬承之而已何難之有端弟試以吾言復於太史其必以為然也靈壽教諭張君壽序靈壽諸生有問於余者曰今月某日為吾師張子誕辰請問所以稱觴者余曰此非而師所喜也誕辰稱觴非古也自漢晉以前未聞有此禮有之自齊梁之間始顔氏家訓中嘗備言其非故近世士大夫之好禮者皆鄙而不為諸生亦何取於此無已則有一焉而師張子為西山先生令嗣西山先生嘗纂儒宗理要一書聚濂洛關閩之精言以告天下之學者此而師之家學也聞之於家庭者必將推之於庠序諸生欲敬其師則莫若服其教誠取其書而拳拳服膺焉口誦之心維之體之於身推之於事深嗜篤好相磨相磋以太極圖西銘為必可契以主敬窮理為必可學不敢以記誦詞章奪之也不敢以虛無寂滅亂之也不敢以功利權術雜之也自邇而逺自卑而高真積力久豁然貫通和順積中英華發外而師張子得藉手以告於西山先生曰蕞爾靈壽有光風霽月如茂叔者矣有瑞日祥雲規圓矩方如二程者矣有民胞物與如橫渠者矣有平生所學惟四字如考亭者矣儒宗理要之書浹於肌膚淪於骨髓與文山俱高衛水俱永矣西山先生聞之且怡然而樂曰是能推吾學以行吾教是真吾子也諸生所以敬其師者莫大乎是胡不此之務而俗禮之汲汲乎倘諸生云是禮也相習已久一旦除之吾諸生有不安於心者則又有說焉昔魯人獵較孔子亦獵較而先簿正祭器獵較所同也簿正所獨也諸生如不容已則以稱觴為獵較而以儒宗理要為簿正無謂烹羊炮羔已足盡敬師之禮而沉潛反覆於五先生之言必求無負於師之望而止其庶乎諸生唯唯請記其言於學以相勗於是作歌以遺之曰方今學術鬱而不昌西山先生崛起范陽探精索微掃去粃糠濂洛關閩於赫有光纂成嘉編畀我津梁猗歟張子克守義方青年力學脫去膏粱秉鐸於靈厥聲洋洋以其家學惠我宫牆既修廟貌以及門廂遂布微言示之周行濟濟多士奮於綱常曰我有師箕裘煌煌開我聾瞽滌我膏肓自今伊始孰敢怠荒努力鑽仰入道之航必窺程奧必登朱堂驅除功利寂滅詞章惟德惟義是崇是匡極天蟠地吾志始償繭絲牛毛無敢或亡洛閩真傳庶幾勿喪俾我師譽如山如岡笑彼愚俗昧厥短長何以嘉師㫖酒承筐以吾視之是曰色莊吾敬吾師豈在豆觴潘泗菴先生壽序余嘗讀呂涇野集見其與人子言事親曰子欲子之親為郿人張殿中丞乎張生於景德天禧之間今已數百年矣其壽猶與太華終南爭高未艾也抑欲子之親為汴人程大中公乎程生於乾興景佑之間今已數百年矣其壽猶與嵩少黃河爭長未已也每一誦之未嘗不大其言以為凡為人子宜書置坐右夫殿中丞與大中公則賢矣其所以能與太華終南嵩少黃河爭壽者豈非以橫渠明道伊川為之子耶人能以橫渠明道伊川之學為學何慮親之壽不殿中丞大中公若也錫山潘逺亭與余同官恆陽既歸而寓書於余問所以顯親之道余不敏幼誦孝經之言白首而未能入其室何足以辱逺亭之問無已則亦以涇野之告人者告我逺亭而已逺亭之尊人泗菴先生少負不羈之才涉獵經史上下古今居家孝友不減石建薛包而肝膽接人在汲鄭間遭遇時變以韜略顯慨然慕趙營平馬伏波之遺風視衛霍蔑如也膂力方剛勳名正未可量顧其志不苐是蓋鼎鐘之業先生所以自勵者也箕裘之傳先生所以望之逺亭者也為營平為伏波洵樂矣為殿中丞為大中公不更樂乎逺亭誠體此志而黽勉焉無以世局之利鈍為憂喜而必以為程張自任立身者於斯事親者亦於斯西銘正蒙吾溫凊之具也定性書顔子好學論吾甘㫖之奉也經學理窟穎考叔之羮也易傳春秋傳遺書外書老萊之斑衣也繹之於心而體之於身所謂不愧屋漏者弗能弗措也所謂擴然而大公物來而順應者弗能弗措也日就月將焉真積力久焉義精仁熟天下將翕然曰關洛之學復見於梁溪二泉間泗菴先生顧而欣然曰吾何幸得追隨於程張二翁間也其為樂何如耶其為壽何如耶其於世之獲一官進一秩以誇耀於父母者所得孰多耶逺亭豈有意乎且吾聞逺亭之鄉高景逸顧涇陽兩先生所居也皆學程朱而有得者也高顧與程張其有異同焉否且未深論然學而有得至今兩先生之名與日月爭光兩先生之親亦與日月爭光豈高顧學之能壽其親而生於其鄉者不能乎吾勿信也況逺亭之官於武强也撫民以慈而繩姦以嚴能除一切苛斂不合於時弗顧也有卓然不苟同於流俗之志矣推是心也以自奮於學何前賢之不可企及耶昔朱子一生學問自同安歸後益加策勵以至為萬世儒宗今逺亭之年髣佛朱子同安之年苟能策勵如朱子是亦朱子而已矣我見異日名揚親顯與太華終南嵩少黃河爭壽者非他人必逺亭與逺亭之親也涇野之言豈欺我哉敢以是祝吳母朱太孺人壽序梅村吳先生以文章經術炳蔚海內不啻若永叔之在慶厯子瞻之在元祐其學之湛深其人之卓犖士大夫固有定論矣然有未可定者歐蘇後人若棐若過雖負有文名弗能盡紹父業蓋極盛者難為繼也而梅村先生有丈夫子二三人方發憤讀書莫能量其所至古今人同不同未可知矣三子皆出自朱孺人孺人又以斷機丸熊之誡日夜磨礪其子俾紹先烈而光大之其又可量也哉孺人五十誕辰姻黨謀所以祝之豫曰此無他詞為也即孺人所以望其子者為孺人祝可矣夫孺人所望於子者無他欲其克成梅村之志而已吾聞君子之志與流俗異今天下熙熙攘攘所禱祀而求者位高而家溫金滿於篋粟滿於庾印纍纍而綬若若此富貴之士耳君子之望其子不但如是也擅雕龍繡虎之才寫風雲月露之態相如子雲爭妍比麗子山孝穆並驅連鑣此詞章之士耳君子之望其子不但如是也成功若管晏得志若衍儀其勳烈爛然其心術厭然可以震宇宙不可以安寤寐此功利之徒耳亦豈君子所以望其子哉夫君子愛其子則必欲其為全人欲其為全人則必欲其學聖賢欲其學聖賢則必欲其履仁義而敦忠信仁義德之輿也忠信德之基也有子如是此其為祥非富貴詞章功利之可並矣豈非梅村之志哉則請進而祝之曰願孺人之子大其志擴其學毋汨於俗毋囿於習以浮華為可恥以雜伯為可鄙以道為歸以古為法以窮理格物為入德之門以戒慎恐懼為存心之本必正誼明道如董仲舒必淡泊寧靜如諸葛武侯必先憂後樂如范希文臯䕫尹旦吾鵠也思孟程朱吾師也左圖右史吾箕裘也內聖外王吾堂構也日而就焉月而將焉優游而漸漬焉浸假而孺人之子赫然為大賢則孺人為大賢之母矣浸假而孺人之子粹然為醇儒則孺人為醇儒之母矣榮莫大焉福莫厚焉為之而已豈其難哉敢以是祝曹母成孺人壽序余承乏恆陽余壻曹子星佑寄語余云吾父今年春秋六十有四吾母春秋六十請問所以祝壽者余度星佑愛其親凡可以祝其無疆如天保之詩人所云岡陵松柏者當無所不至不待余言且星佑尊人臻萊翁暨成孺人皆生長名族而能以勤儉治家以禮法檢身無膏粱華靡之習氣其道自應得壽又何待星佑祝無已則有一焉其惟順親之志乎親之順則樂樂則壽此星佑所當勉也順志如何親之志有顯而易見者順之易有隱而難知者順之難今人自成童而後其親未嘗不日夕望之曰願吾子學成而得位也得位矣則又曰願其進而益尊也進益尊矣則又曰願其垂裕後昆也此其顯而易見者也聞古之人有二程子者大賢人也有子如是可謂榮矣然不敢以責其子聞古之人有朱子者大賢人也有子如是可謂榮矣然不敢責其子是非不欲其子為二程朱子恐其未必能而不敢輕責之也使其子果能如之則親心之愈快必有百倍焉者此其隱而難知者也順其顯而易見者而親壽增順其隱而難知者而親壽益增然則星佑欲順親志以祝親壽亦學程朱而已人之不能如程朱者非不能也不為也讀程朱之書行程朱之行是亦程朱而已矣求之五經四書傳注以定其宗求之小學近思録以握其要求之遺書外書文集語類以觀其全求之性理綱目以廣其識口誦心維身體力行必登其堂必造其奧動靜語默罔敢或越其不為程朱者鮮矣星佑勉之哉星佑之學日進則臻萊翁暨成孺人之心日悅而壽日增天保詩人之頌豈難握劵而取哉請酌而祝曰願我星佑沉潛踊躍於理窟中惟洛惟閩是尊是崇居敬窮理不輟其功自近而逺日益擴充真積日久豁然貫通在昔程子弄月吟風繭絲牛毛曰惟晦翁誰謂道逺我見其同為世麟鳳實茂聲鴻高堂白首其樂融融喜我有子道通厥躬至誠洋溢格於上穹天降福祉益熾益豐我兩老人日懌於衷而目加明而耳加聰雖在期頤有如黃童王母于太孺人壽序余承乏靈壽密邇行唐孟津王子方宰行唐謂余曰我有老母今年九月春秋五十願有以壽之余不敏文詞鄙陋無以應命雖然竊有獻也夫人之有親誰不思榮之而壽之顧其志異其所以為壽者亦異志乎富貴者以富貴壽其親志乎道德者以道德壽其親富貴有時而盡道德無時而泯故使人稱我母為公卿之母孰若使人稱我母為賢人之母王子家居近洛不聞洛之先賢有二程先生乎當宋之時享高位擁厚祿聲勢赫奕以顯其親者不可勝數二程子生其間問其官則上元主簿耳扶溝令耳監察御史耳崇政殿說書耳非有宰相之尊萬鍾千駟之富也然二程子發憤自振以孔孟為宗以六經為本以居敬窮理為功以正誼明道為事以灑掃應對至於窮理盡性學成而天下宗之迄於今去二程子數百年矣而其名巍然其親之名亦巍然當日之貴與富什百倍於二程者皆不若也王子以為彼之壽孰與此之壽乎且余聞王子之母于太孺人孀居矢節課子讀書待婢僕以恩接姻戚以禮平生無疾言遽色支持門户晝夜操作備厯勤苦昔從太常公官於翰林秉憲於浙備藩於江寧極人世之榮華未嘗有幾微富貴容是能以道德自重必將以道德望其子我知王子所以壽其親者在此不在彼矣請酌而祝曰願我王子學程伯子不如伯子吾學不止願我王子學程叔子不如叔子吾學不止男兒胸中當融萬理龔黃召杜特一斑耳母氏顧之翩然色喜謂吾有子芬若蘭芷天鑒厥德增我福祉眉壽無疆令聞不已嵩嶽同高澗瀍齊齒三魚堂文集卷九
