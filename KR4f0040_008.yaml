body:
  text: 三魚堂文集卷八贈內閣學士陸隴其撰序舊本四書大全序舊本四書大全余舊所讀本也用墨筆點定去其煩復及未合者又採䝉引存疑淺說之要者附於其間其萬厯以後諸家之說則别為一册不入於此依朱子讀書法每讀一句必反覆玩味俟其貫通然後及於下句或思索未定遇有他事當酬應應畢輒復思此嘗有一字一句盤桓於胸中數日而後止自戊戌至癸卯用力六年而始畢然是時雖粗知讀書之門户而程朱之語録文集皆未之見敬軒敬齊諸君子之書皆未知求嘉隆以後陽儒陰釋之徒改頭換面似是而非者猶未盡燭其蔀自庚戌以來乃始悉求諸家之書觀之然後知向之去取未能盡當有先儒見到之語讀之若平淡而實關學術之得失者不知取也有先儒一時之言讀之若無病而實開假借之途者不知辨也又有先儒微言奧義大全諸書所不及載或載而不詳者則此本亦竟闕如又有兩說互異當存疑而輒輕斷當畫一而務並存每取而覆視之輒赧然於心欲遂棄之則又念其曾用數年之力於此不忍便置且欲因此自知其陋鑒於前者或毖於後也故嘗櫝而藏之不敢以示人親友聞其有是書皆欲得而觀焉或且疑其有所吝惜故敢序其始末以告使知其陋相與戒而勉焉則勝於讀此書也夫松陽講義序隴其在靈壽簿書之暇輒至學聽諸生講書有所觸發間疏其意示諸生或述先儒注解或自抒所見欲其即聖賢之言引而歸之身心不徒視為干祿之具使書自書我自我積久得一百十有八章有攜以南者家叔祖話山翁家叔訥菴翁見之謂是有裨於學者非獨可以教靈壽諸生也遂謀付梓既成而寄於京師命隴其自敘之隴其不敏雖嘗有志於學而不得其要領中年涉獵先儒之書始若稍稍望見涯涘而質鈍功淺終未得入其堂奧自汨沒簿書以來益復鹵莽嘗思乞身歸田整理書生舊業與同志之士講求討論或可追隨先儒之萬一而一官羈絆尚未得遂至於此編因於諸生有一日之長職當竭其愚故據胸中一時所得告之以稍逭尸素之慚云耳非能著書講學也若其拳拳於諸生者則有之矣董子有言仁人者正其誼不謀其利明其道不計其功程子云佛氏之言學者當如淫聲美色以逺之此二者學之大綱也大綱不差然後可漸而進焉自明中葉以來學術壞而風俗乖卑者迷溺於功利高者沉淪於虛寂視董子程子之言若茹毛結繩之不可復行於後世不知有大綱又何論其他耶是世道之憂也故嘗以為今之為世道計者必自羞乞墦賤壟斷闢佛老黜陽儒陰釋之學始而是編之中亦三致意焉此隴其所嘗奉教於君子者也或有小補於世意在斯乎若夫擴而充之探其深而盡其微則尚願與學者共進之焉周永瞻先生四書斷序學術之得失世運所由盛衰也然當衆說紛紜之日非深識逺見之士不能斷而得其所宗今天下以四書課士使天下士浸灌於孔孟之言以培其德而間其心斯固教化之本而治平之原也然天下之言四書者嘗紛紛其莫定矣習功利者以功利之見讀之則孔孟之言莫非功利也溺虛無者以虛無之見讀之則孔孟之言莫非虛無也其卑瑣無識者既得其貌而不得其神而髙明之徒又挾之以自申其說此曰吾孔孟也彼亦曰吾孔孟也非無鋭志學聖之人而不識其真以為是直孔孟也始悅其言繼移其行漸涵浸漬不可復變即或覺其非矣而其雄論宏辨洞心駭目汨沒已久亦且信且疑而不能自振於是孔孟之言不足以成天下之材而適以墮天下之行蓋自漢以來其發明聖訓以維持世道者固不勝數而其借以開釁於天下者亦代不乏焉有宋之興程朱大儒繼出而正學始明天下之士如去雲霧覩日月始曉然識吾道之真而紛紛之說不足以惑之其道雖未盡行於宋而明興尊而奉之以為規矩準繩洪永成𢎞之間上非此不以為教下非此不以為學天下之言有不出於程朱者如怪物焉不待禁令而衆共棄之學術正而耳目一是故朝多純德之彥野皆方正之儒治化之隆幾比三代有由然也嘉隆以降教弛而俗衰天下之言不歸功利則歸虛無不以程朱為迂濶則以為支離縱橫之習佛老之餘皆隂託於孔孟以誑惑於天下曰孔孟之道固如是也彼程朱所言非孔孟之真也嗚呼是何異適越而北其轍而曰此越之道也哉又何怪政日亂而俗日敗以至於不可救藥也故嘗論之曰明之所以盛者程朱之學行也其所以衰者程朱之學廢也聖人復起不易斯言矣武塘周永瞻先生隴其父執也以所著四書斷示隴其隴其受而讀之其書剖析疑似貫串義理固後學之津梁而其大綱則以程朱為宗者也方先生之始為是書天下之紛紛於異說者猶未定也先生獨識其正而斷然從之以為學者倡今天子敦崇正學程朱之說復行於世士之執筆為文章者非其言不敢道非其書不敢讀雖未能踐其實而其學已不詭於正駸駸乎洪永成𢎞之初矣然後服先生之能斷而得所宗也隴其讀先生之書益慨然於學術之不可不慎先生留心世道其於古今治亂之故思之熟矣其必以隴其之言為不誣乎敢序以質之周雲虬先生四書集義序四書自考亭朱子集諸儒之大成而發明其義章句或問集注而外有輯略有精義有文集有語類大義明而微言著其後西山真氏仁山金氏雲峯胡氏之徒又各自著書以發明考亭之意及明永樂時又彚為大全懸示於上以為天下之準繩而河津之讀書録餘干之居業録又往往發其精微以羽翼其間至矣盡矣後之學者但取其成說而心㑹之身體之患不行不患不明不待復講矣今之所以不能不講者則以嘉隆以來姚江之說行而考亭之學晦白黑混淆是非顛倒譬白日在天而浮雲蔽之浮雲不去則白日不見故論四書於嘉隆之時不講則不晦論四書於今日不講則不明學者苟徒拘守一說而不深究其異同之故熟察其毫釐之别一旦聰明才辨之士舉陽儒陰釋之論雜而進之其不為所奪者鮮矣吾邑周雲虬先生潛心於諸家之說者四十餘年輯為集義一編嘗北走京師就正於孫退谷先生深相契焉退谷之學深不滿於姚江者也則是書之取舍可知矣余不敏於學無所窺少時聞陽明之名而竊誦其言亦嘗不勝高山景行之思而以宋儒為不足學三十以來始沉潛反覆乎朱子之書然後知操戈相向者之謬也然猶且信且疑未敢顯言於人及考有明一代盛衰之故其盛也學術一而風俗淳則尊程朱之明效也其衰也學術岐而風俗壞則詆程朱之明效也每論啓禎喪亂之事而追原禍始未嘗不歎息痛恨於姚江故斷然以為今之學非尊程朱黜陽明不可而聞此說者或以為怪嘗思就大賢君子而正之適雲虬先生以集義自敘寄示雖未讀全書而莊誦其敘則所宗者考亭也所訾者文成也所追思者成𢎞以前也所慨歎者嘉隆以後也撥浮雲而見白日我知先生有同心矣敢一言以附於其書之末昔董生當漢武之世百家並行故其言曰諸不在六藝之科孔子之術者皆絶其道不使並進此董生所以有功於世道也繼孔子而明六藝者朱子也非孔子之道者皆當絶則非朱子之道者皆當絶此今日挽回世道之要也先生著書之㫖已握其要其有功學者豈淺鮮哉朱子語類後序代語類一書朱子所以闡道妙而淑人心者具在宗朱子者宜弦誦不置而卷帙繁衍未能卒讀魏里幾亭陳先生擇其尤要者釐為十一卷復於其中採其說之切於六經四書者别為經解十四卷使讀者便其簡要樂其條貫誠紫陽氏之功臣也書甫成而先生已全節為完人遂不及盛行於世板亦多散佚余不敏幸生理學昌明之日竊欲表章語類用佐聖朝崇尚朱子之意樂陳先生之先得我心也就其家購求原板訂補其缺復成完書以公海內慨自朱陸異同之說興聚訟千古以必不可已之學而謂其殊途同轍也異哉謂陸之學尚高明所以接上根一路朱之學尚實踐所以接中下者流然則是朱子者有實踐而無高明可以接中下而不可以接上根乎未得其門未升其堂未入其室徒為調停之說適足見其妄而為朱子竊笑焉耳以余所見羅整菴先生記丘文莊朱子學的陳清瀾學蔀通辨皆為朱子洗剔其眉目而或猶為晚年定論援朱入陸顛倒附㑹以文其說不信朱子可也誣朱子可乎是編苐芟其煩冗正其互異擷其菁華恰還朱子眉目公諸海內使為士者益生尊信之心端在於是余始祖與考亭之祖同源而分𣲖況是書為理學正宗方且人奉髙曾家珍弓冶余小子敢辭不敏而不為表章哉文廟考略序文廟考略一卷大興西山張先生提督江南學政時輯以示多士者也其書備詳先賢先儒之名氏行蹟附以禮樂器數皆學者所不可不知先生又慨然於金溪新建之從祀不無遺議而著其意於篇首俾學者知陽儒陰釋之非尤可謂卓然者矣先生令子塏署靈壽教諭攜其板至任一時滹沱衛水之濱窮鄉甕牖之士皆得聞聖學淵源二千年來之賢若儒歷在目前髙山景行之思油然而生不亦善乎教諭君又恐士子習其文而未識先生輯書深意也請余一言導之余因推先生之意告諸生曰先生之為是書非欲諸生知先賢先儒姓氏爵里與夫從祀之嵗月已也又非欲諸生徒誦其嘉言懿行已也論語不云乎見賢思齊焉見賢而弗思齊猶弗見也且賢又非難齊者也乍而觀之其巍然於百世之上者似不可幾及考其實不過居敬窮理循序深造而至乎其域者耳又非高逺難行之事諸生誠因是而奮興焉退而求之六經語孟以及周程張朱子之書博學審問慎思明辨而篤行焉精之一之真積力久安知今日之興起於滹沱衛水間者不將有紹洙泗繼洛閩接河津餘干又為後人之高山景行者哉能如是庶幾無負先生輯書之㫖與教諭君攜板之意若徒推而尊之謂是古昔聖賢天授非人力而不知此心此理之同如窶人之視隋珠和璧徒見其光輝燦爛目眩心駭自分為終身必不可得之物則是書亦徒為陳編而已先生尚有儒宗理要孝經衍義諸書與是書相表裹教諭君方將盡推其家學以與諸生共砥礪然必俟其憤而後啓悱而後發諸生其勉乎哉四禮輯宜序儒者言禮詳則有朱子儀禮經傳通解約則有朱子家禮是二書者萬世規矩準繩也人道之綱紀備矣但自世教衰其書雖存講求而率由之者蓋少後生小子見其父兄師友未嘗從事於是也雖有舉而示之者亦且以為迂逺不可行吾知隨俗而已安用是為哉而秉禮之士亦不能强以其素所不習者一朝歸我範圍使其一鄉一邑之閒先有人焉啓其端而動其心然後示以禮之全何至如爰居之駭鐘鼓乎故曰不學操縵不能安絃不學雜服不能安禮靈壽馬介愍公嘗本朱子意作四禮輯宜一卷以示其鄉之人其書與紫陽原書雖間有出入然其惓惓為風俗人心計亦至矣學者觀之則知禮非迂逺不可行之物由是而求之家禮又由是而求之儀禮經傳吾知其不難耳其為操縵雜服也不亦多乎惜自兵燹以後板毁不存漸就湮沒後進之士且不知先生有是書又何論朱子所考定者哉馬氏子孫謀復梓而傳之余喜其能承先人之志可以挽頽風敝俗漸納之規矩準繩之中也而為之序今而後讀紫陽之書者當勿河漢也矣呻吟語序呻吟語者新吾呂先生省察克治之言也謂之呻吟者先生自視其身若常在病中時時呻吟事事呻吟察之嚴而克之勇自不能已故以是名其書蓋嘗論之人之生具仁義禮智之性然不能無氣稟之偏及其感物而動則又有物欲之蔽故自大賢以下鮮有無病者其所以能不汨於流俗而卓然為天地間偉人亦在乎能知其病而已知其病而呻吟者治之也易不知其病而不呻吟者治之也難自古賢人君子未有不如是而能成其德者也博文約禮顔子之呻吟也臨深履薄曾子之呻吟也戒慎恐懼子思之呻吟也知言養氣孟子之呻吟也人徒見其德之成睟面盎背暢於四支發於事業極天蟠地繼往開來而不知皆從呻吟中得之吾見今人之病多矣能知其病者有幾氣質之不能變化物欲之不能掃除意必固我之念膠於中聲色貨利之私誘於外豈徒不呻吟而已哉方且揚揚自得以為快意所以揚其波而助其焰者無所不為此和扁所以望而却步也使能呻吟如先生庶幾其有瘳乎先生當萬厯之世天下方日弊卑者溺功利高者迷佛老聖學蓁莽生民塗炭先生獨能以正大篤實為學卓然超出於流俗之上其言皆與程朱相表裏間有出入者亦少矣呻吟之功大矣哉是書止寧陵有板未能逺播購者艱難康熙丁卯孟夏真定諸州縣以公事㑹於郡城語及同寅協恭之義僉以善相勸過相規為約適王子益仲先生鄉人也攜是書在郡咸謂能以先生之呻吟者勸且規則吾同人其庶幾矣遂謀協力梓之余喜先生之書得廣其傳而吾同人皆將有以自拔於流俗也謹敘於末是舉也賢於蘭亭之一觴一詠豈不逺哉王學質疑序余嘗聞高子景逸之言曰姚江天挺豪傑妙悟良知一洗支離其功甚偉豈可不謂孔子之學然而非孔子之教也今其弊昭昭矣始也掃見聞以明心耳究且任心而廢學於是乎詩書禮樂輕而士鮮實悟始也掃善惡以空念耳究且任空而廢行於是乎名節忠義輕而士鮮實修斯言似乎深知陽明之病者然余不能無疑焉既曰非孔子之教又可謂孔子之學乎學與教有二道乎陽明之所謂良知即無善無不善之謂也是佛老之糟粕也非孟子之良知也何妙悟之有支離之弊正由見聞未廣善惡未明耳掃見聞掃善惡以洗之支離愈甚矣功安在乎徒見其流之弊而未察其源之謬比之龍溪海門之徒抉陽明之波者雖若有間而聖人之道終未明也以高子之好學篤行充其力豈難登洙泗之堂入程朱之室然猶溺其餘習未能自脫莠之亂苗鄭之亂雅豈不甚哉康熙癸亥余在京師張武承先生示余王學質疑一卷其言良知之害至明至悉特不盡掃龍溪海門之毒而凡梁溪之所含糊未決者一旦如撥雲霧見白日蓋自羅整菴陳清瀾而後未有言之深切著明如斯者也抑愚又有懼焉當陽明之世其害未見故知之也甚難而其病未深救之也尚易至今日其害已見故知之也似易而其病既深救之也則難無論顯樹姚江之幟鋭與吾角者未易勝也即聞吾言而唯唯歎息擊節不敢置一辭而遺毒之潛伏隱藏於肺腑者不知其幾也蕩滌而消融之豈易也哉孟子曰七年之病求三年之艾我未有艾而徒咎人之病非良醫也閲先生之書者其急講蓄艾之術也哉王學質疑後序余既序張武承先生王學質疑方謀付梓以公同好而先生已於乙丑十一月捐館舍矣因略述其生平附於書末使學者誦其書知其人蓋非無所本而能為是書者先生諱烈其先浙江金華府東陽縣人嘉靖時先生之曾祖始自浙遷居大興康熙丙午先生以易中順天舉人庚戌登進士已未舉博學宏詞授翰林院編修充纂修明史官乙丑六月升右春坊右贊善自為諸生以至立朝始終以清白自勵不屑世俗榮利純如也其學以程朱為宗深疾陽儒陰釋之徒以間邪衛道為已任晚尤嗜小學近思録故是書所發明皆從平生學問中流出非苟而已也先生又嘗論道學傳惟宋史宜有之周程紹先聖之遺緒朱子集諸儒之大成以道學立傳宜也餘則篤學如蔡西山父子高明如陸子靜兄弟純粹有用如真西山僅可列之儒林元儒亦不立道學傳若有明一代純正如曹月川薛文清不能過真許而光芒橫肆如陽明者列之道學恐後世以史臣為無識其修明史分纂孝武兩朝如劉健李東陽王守仁秦竑李成梁金鈜史可法諸傳皆先生手筆嘗曰吾此數傳是非不爽銖兩其論孝宗謂明知閹宦之壞法而不能逺成陰勝之漸是知不至意不誠之故也其論李東陽謂李公文章之士與劉謝同朝則著侃直之風與芳瑾為伍盡露委蛇之態而聲華素著奬借後進故競為之掩飾謂東陽若去縉紳之禍不知所底此欺心之論也五年之中寃死者不可勝數縉紳之禍亦已至矣李公拱手而不敢異偶申救一二人遂詫以為善類賴之則張綵救吳廷舉劉宇救王時中亦得為保全善類耶又云楊文襄功名之士也以為將之智用之為相晚年欲以其術籠絡張桂而卒為所敗齎恨以沒智巧之不可恃如此此皆卓然不可磨滅而此書則其綱領也王學考序自陽明之學行天下迷惑溺沒於其中者百五十餘年近嵗以來好學深思之士乃敢昌言排之然以其功業赫赫於人之耳目間者疑信且半錢塘應潛齊獨一言以斷之曰陽明之功譎而不正詭遇獲禽耳又推其本而論之曰陽明自少馳馬試劒獨學無師而始堅於自用則又直窮其病根陽明復起不能不服斯言嗚呼以陽明之天資豪邁向使自幼涵養薰陶於小學中加之以良師友磨礱砥礪如二程之有濂溪朱子之有延平何至放言高論如此哉所以敢為放言高論者其所由來漸矣故愚嘗言小學一書乃世道升降之本小學行而天下人才範圍於規矩準繩之中然後學術一而風俗同潛齊之論可謂知本矣潛齊論性論太極頗與程朱抵牾余不敢從然其教人用功必以窮理格物為本謹守朱子家法故其言多可羽翼經傳其論次陽明言行凡一卷附於其所輯性理大中內余以為此當自為一書不當附性理故特表而出之而名之曰王學考欲知學術異同之所由來者其必有取於此也夫六諭集解序士讀聖賢書無有肯虐民者然孔子謂不教而殺謂之虐今之教比古之司徒黨正三物六行為何如也有毫髮不如古而怒民之犯法從而刑之皆虐也然則吾輩今日坐於民上懲姦鋤暴操三尺以從事雖事事咸當厥辜敢自謂不虐乎曾子曰如得其情則哀矜而勿喜痛哉言乎朝廷未嘗無教民之法今州縣所奉行六諭明白正大二十四字中一部大學修齊治平之㫖犂然具備雖蚩蚩之民咸可通曉與古之三物六行何異而移風易俗未收其效是有司之過也余承乏靈壽目擊民情不古每思孔曾之言不勝愧懼間嘗巡行村野取六諭之義為之講解又恐其入於耳者不能不久而忘也因梓以授之冀其漸磨於仁義而自逺於刑罰然七年之病必三年之艾是求車薪之火非一杯之水能救斯民之漸漬於薄俗久矣豈區區一卷之書朔望一讀其遂能勝殘去殺釋吾愧懼耶亦以是啓其端云耳若夫擴而充之引而伸之俾家喻户曉淪肌浹膚邪穢盡滌渣滓盡融則視乎繼自今而往行之何如耳天下無不可化之民而亦無易化之民其必如程子之於上元扶溝朱子之於同安南康盡吾居敬窮理之學勞來而匡直焉庶幾免於虐也夫陸桴亭思辨録序士生斯世而欲言學豈不難哉功利之習浸淫於人心根深蒂固而不可拔幸而能自拔於功利矣則或溺於記誦詞章終身竭蹶而適長其浮薄驕吝之氣幸而又不溺於是而有志於道矣則佛老之徒又從而惑之舍三代以來聖賢相傳之道而欲求所謂虛無寂滅者求之愈力去道愈逺幸而不惑於佛老而歸於儒矣而儒者之道復分途各驅宋之洛閩金溪明之河津餘干新㑹姚江同師孔孟同講仁義其辨在毫釐之間而其流至於相去懸絶若方圓氷炭之不同學者未嘗辨其同異晰其疑似浮慕乎學之名而用力焉其不舍坦途而趨荒徑者幾希矣於此有人焉以身示之且别白而告之其有功於世何如也余家居時聞太倉陸桴亭先生之學而未獲親炙及承乏嘉定去先生之鄉咫尺而先生已成古人乃訪其遺書得所謂思辨録者其辨同異晰疑似一準於程朱其於金溪新㑹姚江雖未嘗力排深拒而深知其流弊之禍世其教人先小學而後大學以立志居敬為本而以聖經之八條目為程然後漸進於天人之微旁及於百家之言其先後次序悉洛閩之遺法也雖未熟識其生平然考其發於言而著於書者可謂有道之士矣蓋先生自言二十七嵗即志於斯學心體躬行未嘗敢懈則其所以能成就如此者亦非一日之故也嗚呼處功利浸淫之日而能自振拔又不溺於詞章記誦又不惑於佛老又不惑於儒之近佛老者而卓然自立豈不難哉先生之子諱顧正者請余敘其書余不敏雖於先儒異同之間嘗聞其大略然明不足以察理勇不足以衛道優游嵗月將汨沒之是懼何能敘先生之書哉姑記其仰慕於先生者如此尚當盡求先生之書而訪於其良友高弟以琢磨焉其庶幾乎靜中吟序性理大全一書明初學者奉為規矩準繩其時士行醇而風俗隆蓋其學使然也自中葉而後胥溺於詞章記誦陽儒陰釋之學此書雖存無復講求而涵泳之者風俗之壞有由然矣今朝廷尊崇正學士非程朱之言弗敢道於是此書復行於天下然多襲其皮膚以塞功令求其真信而篤好之者亦罕其人焉三韓梁震先作靜中吟一卷其於太極西銘之㫖伊川考亭之論言之親切有味不啻燭照數計蓋其講求而涵泳之者深矣以是風於天下尚有甘自溺於俗學而以性理為迂者其亦可翻然也夫適余鄉馬子以是示余余喜正學之將昌而風俗之將隆也因書於其簡端以志欣慕之意云功行録廣義序聖賢之書勸善戒惡而已或以義正或以福誘而勸同或以義禁或以禍怵而戒同夫禍福之於善惡猶影之於形也君子衡理不衡數而其教人未有不兼言禍福也者理足以尊天下之君子而言福然後足以引天下之中人言禍然後足以懼天下之不肖其見于經傳者固已深切而著明矣君子雖不以欲福而為善不以畏禍而不為惡而夫子猶曰君子懷刑是以聖賢自勉而恆以不肖自防也於乎此其所以為君子與周禮司徒掌邦教以擾安邦國保息六以養之本俗六以安之三物以興之八刑以糾之月吉而始和嵗終而受㑹鄉州黨族閭比之中莫不以時而讀法故其為教也有本有根博而貫簡而詳蕩蕩焉平平焉無細碎蔓衍之說而其時之人亦但以為道而不以為利知畏法而不知畏天吉凶休咎之說僅見於聖君賢相之誥誡而非所以為教民之具明明棐常絶地天通此其所以為盛也聖賢不作教化不明法足以禁顯惡而不足以禁隱慝惟天之報施終古不易以濟人之所不及而又不能無盈縮遲疾之異錯綜參互之變原始要終不失纍黍而當時鮮不以為杳渺而不可知蓋禍福之自人者直而彰自天者微而變直而彰者既有所不及而微而變者又不能以天下信則中人以下將無所畏而靡所不為仁人君子能無憂乎不得已而博考古今述其福善禍淫之迹而備著其所由以明天道之必然家懸一律令於屋漏之中户置一斧鉞於衽席之上使覽者惕然於心以去其所疑而堅其所畏雖其言若屑屑焉而離類析歸鈎深索隱略顯惡而嚴隱慝其察物也無遁形可不謂慎獨之助與宋之季也而感應篇出焉明之季也而功過格出焉是皆仁人君子居下位不得已而救世之作也故曰易之興也其於中古乎作易者其有憂患乎王道不明於上而夫子作春秋今雖萬不敢比是而意則庶幾焉此固非盛世之所宜有也雖然既已有作則雖盛世有所不廢又豈獨不廢而已必將為之敷暢其說擴其所未備闡其所未至以丁寧天下之耳目而惟恐其不信以從是亦仁人君子之用心也疁邑李子蓀竒字九蘭所輯功行録廣義蓋本功過格而敷暢其說者余甚敬其用心之厚用力之勤也嗚呼士君子得志於時身任民物之責舉先生之教而明之大綱舉萬目張無取乎細碎蔓衍之說而所以勸戒人者亦不俟乎天降之威福則是書可以不作今李子既不得志於時藴其意而無所發蒿目而不能已於言而又不欲其言之大且深以無當於流俗也乃取夫世所易信之書廣為衍說平易朴茂不飾不文而勤懇曲至應規入矩期無失於聖賢之意而後已昔賢有云不為良相則願為良醫李子之書其亦世之藥石與假令李子得有為之柄以行其所欲而不徒見諸空言其所就果當何如也詒安録序余向客武塘與沈淵伯先生共晨夕有年見其所為詩文皆有法度可觀而先生又不欲僅以詩文自居時時以古道相勗嘗慨世之浮薄殘刻如江河日下而不可止而欲以篤實忠厚之道維持而挽回之蓋每談論及之未嘗不歎息致意數年以來余與先生雖各居一方然嘗佩服之不敢忘今年夏月先生扁舟至疁城既敘契濶即出一編示余顔曰詒安録余展而讀之則向之晨夕談論歎息致意者皆聚於一編中先生又謂此吾筆以詒吾子焉耳使知浮薄殘刻非所以為安而此乃所以為安也其庶幾乎噫此豈獨可以詒先生之子哉夫世之罹殃蹈尤而不知止者彼豈好危而惡安哉蓋未有以安之道告之者故莫危於浮薄而彼且以浮薄為安莫危於殘刻而彼且以殘刻為安方其習焉而不覺膠固於其中而不知變方且自以為得計而不知其所以為安者乃其所以為危也使有人焉持先生之書以告之使知如是則危如是則安其孰肯舍安而就危耶士庶人而知此必不敢以浮薄殘刻行於鄉卿大夫而知此必不敢以浮薄殘刻行於國小可以安一家大可以安天下其所維持而挽回者多矣是豈獨可以詒先生之子哉余既喜先生之來得慰數年契濶而又喜是書之成行將使古道復敦於天下遂操筆而為之敘詒安録後序淵伯先生既以詒安録授豫豫授而讀之凡先生之所言者皆豫之所欲言者也先生復指其後一條示余曰與子不合者獨此耳豫取而視之大約言三教之合一尊佛老即所以尊孔孟也先生知豫持三教異同之辨甚嚴而不欲自易其說所謂各成其是者耶然豫竊有請焉夫三教之不同若黑白然白者之不可為黑猶夫黑者不可為白必欲合黑白而一之寧有是理乎為此說者蓋因近世學者不能深究天道之微不幸溺於其學又知不可自絶於孔孟乃牽合附㑹以自掩蓋焉耳豈通論哉以先生之文學行誼後學楷模因近年以來偶涉獵於神仙而深有取於其說吾知其終當改正而未必守為定論也先生若以余之言淺陋不足信則古之大儒如程子朱子以及近世敬軒敬齊整菴諸子皆嘗辨之其遺書具在取而讀之則黑白明而取舍定矣以先生之學力而為此豈其難哉先生既以文學行誼自振流俗偶濡迹於異端而又不憚改絃易轍粹然一出於正後之人讀詒安一録考其前後本末豈不益歎先生之勇於從善而不可及也哉雖與程朱諸大儒爭光可也畜德録序人之心譬如田以良苗植之則成良苗以稂莠植之則成稂莠嘉言懿行者人心之良苗也浸灌於嘉言懿行之中其心不明且正者鮮矣浸灌於淫辭詖說之中其不昏且蕩者鮮矣王何嵇阮浸灌於虛無而成放誕盧駱王楊浸灌於辭章而成浮薄自明季以來俗衰學駁偏僻之說淫艷之詞所以眩人耳目撼人心志者雜然並作如入五都之市百怪之物具陳非志定守固其不舍布帛菽粟而逐紛華靡麗者幾希取舍一移日長月益與之俱化何所不至哉故今之學者不但不讀書之弊不可勝言即讀書之弊亦不可勝言能於諸子百家中精擇而慎收之不離乎規矩準繩則可以養其心而為吾道之羽翼矣席子獻臣奉其先尊人文輿公所纂畜德録示豫曰昔我祖太僕公有格言類編一書我先人謹承先志搜補而廣之平生不好聲伎玩物嬉戲之具而獨皇皇是書病革時猶置簀上俯首晲視豫授而讀之則上自周秦下迄近代學士大夫之嘉言懿行萃焉網羅博而取舍當內之有益於身心外之有補於世道非如晉人世說長傲助輕唐人藝文類聚諸書編輯風雲月露已也可謂精擇而慎收者矣豫聞文輿性孝友好施與周人之急常若不及雖久病應得官而未仕不及見之政事而其篤行於門內施及於鄉黨者事事皆可為法江西魏叔子不妄譽人者也為席舍人傳曰雖沒而祭於社無忝焉是其得力於是書者豈淺鮮哉吾以是益知人心之不可不養而所以浸灌之者不可不擇也賈生有言習與正人居不能無不正猶生長於齊不能不齊言也習與不正人居不能無不正猶生長於楚不能不楚言也讀書亦然天下浮誇放僻之書其為楚言者多矣不擇而取之弊可勝窮耶取舍如文輿庶幾弗畔於道也夫蘇眉聲讀史影言序古人云前事之不忘後事之師也此史所由尚也然史之可以為後世師者亦顧其讀之何如耳唐虞三代之書讀之而長僞增浮者有矣況乎後世之史邪正錯出是非混淆學者以無主之中涉獵其閒所見為是者未必是而所見為非者未必非安在其可師哉中有主矣讀之而是非不謬矣而見其表不見其裏知其顯不知其微得其成敗之迹而不知其所以成敗者議論侃然而膠固難通又安在其可師哉表裏顯微皆見矣得其所以成敗矣而言之無關於當世得失之林如對病者而談粱肉對飢者而陳藥石藥非不精而肉非不美也然而所陳非所急也讀史者豈不難哉蘇眉聲先生以所著讀史影言示豫豫讀之其是非皆本經術其論事必推見至隱自源及流如醫者之洞見五臟而其指陳愷切寄託深逺尤有鶴鳴沔水詩人殷勤諷諫之思焉蓋信乎可謂善讀史者矣昔司馬子長述貨殖游俠特以自舒其孤憤而不知是非謬於聖人歐陽子於柴守禮石敬儒之事反覆致意欲以自解其濮議而未免欲蓋彌彰何如眉聲之所論列皆為風俗人心起見而不激不亢言者無罪而聞者足戒乎嗚呼自秦漢以來治亂如循環使治世之事長為法於天下則治可長治亂世之事長為鑒於天下則亂不復亂而高曾之事視若辨髦前車已覆後車不鑒者比比而是也使時有好古篤論之儒如先生者提撕警覺其間亦何至沈溺不反不可救藥乎先生著述甚富此特其一斑而其關係於世已如此他日盡出其所著以為天下準的其足以法今傳後又不知當何如也蘚書序和州成吾存諱性號杏懷居官正直言天下事切中利病亦近世賢者也嘗刋其所作雜文一卷名曰蘚書其書中自言無日不㑹客所不㑹者塵容俗狀之人而已無日不言懷所不言者增租益室之談而已因歷敘郭林宗以下數十人謂此數十人者一日不㑹則鄙吝生一日不與言則心胸結此其立意高曠卓然塵表矣然所謂數十人者上不及孔孟下不及程朱近世則不知有河津餘干而荆軻聶政朱家郭解劉伶阮籍以至李卓吾皆得與於其間何其取舍之異若是哉甚矣道之不明賢者往往入於岐途而不覺雖其天資之高有不盡汨沒者然其為纍必多矣豈不可惜也哉余嘗見張武承跋鄒忠介儒宗語略曰讀此書知先生所學之虛浮也於宋獨取陸楊而姑以明道先之於明獨取陽明而兼以白沙心齊配之兩代大儒若伊川晦庵河津餘干盡可刪而去也忠介所學若是亦何怪其立朝事業僅止於是耶知言哉武承乎嘉定縣加編録序余蒞嘉定之二年奉部議以催科不力罷黜既謝事乃進其民謂之曰吾為吏無狀罷黜固宜但願爾民繼自今以往早完官課無或後時耆民郁某等進曰吾儕小人非不知急公之義也往者故明之時吾嘉民之完課常為諸邑先吏於兹者皆獲上考豈昔之民良而今之民頑耶蓋昔賦輕而今賦重爾姑以康熙十二年之㑹計與萬厯三十七年之賦役全書較之加增者蓋九萬有竒而自十二年以後軍興之所增者不在焉然則民安得不困而賦安得不逋豈其甘為頑民哉因以其所輯加編録示豫豫閲之喟然歎息無以對也夫主持國計者未有不知民力之當惜也特以一事偶加未必病民不知今嵗加若干焉明嵗加若干焉加者不可復減復者又復議加積而計之民其能堪乎蕞爾嘉定其土瘠民貧較之明季日甚而賦之加多如此其死於催科與流離失所者可勝計耶且夫九萬之中如地畝九釐之銀三庫四部折色之增猶為他邑所同若官布折色之驟增至二萬八千有奇省衛行月之驟增二萬六千有奇則嘉定所獨也他邑之增不至如嘉定之多而猶不堪命然則嘉定之民日困而逋日積何怪也方且流離轉死之是懼而何暇顧其官之考成哉長此不已吾不知數年之後更當何如矣或曰子不知今之軍需孔急耶朝廷固無日不以百姓為念苟四方底定自然漸次減除方將蠲蘇松之浮糧去沿海之坍荒復九分考成之舊法豈特如萬厯所行而已哉子何憂焉而今則非當言之時也然豫又有說焉夫民之困憊有旦夕不能待之勢而恤民者亦當隨時而為之計故四方底定仁政盡行固斯民萬世之福也即以目前計之亦宜斟酌於緩急之閒調劑其輕重之平去其太甚而救其顛沛庶幾寬一分民受一分惠焉則是編也固仁人憂國者所宜急進矣靈壽縣志序靈壽於真定三十二州縣中最為瘠壤其民遇豐嵗豆飯藿羮僅免溝壑一遇水旱螽雹之災流離轉死不可救藥蓋在前代已然兵燹之後元氣益復衰耗以故文獻散佚無徵按史傳所記故事詢之土人無有能道之者大禹治衛疏鑿何所鮮虞中山之時疆理若何武靈衛文屯兵何方昌國君遺址安在樂叔繼封何鄉何里邳侯食采第宅何存何年始廢曹武惠韓忠獻父子聚族何村始遷何代大聖大賢之故迹如煙雲之過目不可復求穆然徒見滹沱流而太行峙而已即户口之盛衰賦役之繁簡典禮之廢興自明以前亦湮沒不可考豈不可慨也哉國學生傅君維橒憫舊志之殘缺網羅放失舊聞彚緝成編藏於家孰筆削詳略具有法度不鑿不濫然其已湮沒者亦末如之何也適余奉部檄徵縣志因取其書稍為更定附以管見分為十卷聊以備採擇云耳閲是編者見其土瘠民窮慨然思為政者宜安靜不宜紛更寧損上毋損下宜便民毋便官則可矣若曰一方之文獻在是則余與傅君皆不能無慨焉傅氏家乘序故吏部尚書惺涵傅公暨少保掌雷傅公父子先後居高位文章事業彪炳宇宙靈壽傅氏於是乎始大天下共仰其勳名而莫知其何以至此也余至靈壽見其家乘載其先槐軒巖軒朴菴諸公纍世積德敦龎醇固然後知二公之彪炳於宇宙者其來有自譬諸水然有星宿之源然後有龍門砥柱之竒有岷嶓之源然後有彭蠡中江北江之盛未有無其源而其流汪洋浩渺者也亦未有有其源而無其流者也特患閉塞壅遏之則亦終於涸耳有人焉引而導之豈有不滔滔汨汨者哉然則求水之盛而不涸無他亦嘗濬其源而已求家之盛而不衰無他亦常積其德而已故二公者特善濬焉者也使傅氏子孫皆能濬焉常如槐軒巖軒朴庵之敦龎醇固則其昌熾豈有艾哉輯家乘者冢宰公季子維橒也好文而篤行有父祖風昔范宣子自言其先世在夏為御龍氏在商為豕韋氏在周為唐杜氏而叔孫穆子云此之為世祿不如立德立功立言之不朽余嘗疑御龍豕韋以來必代有明德故能久而不廢廢而復興宣子不知推原其本而徒誇其世族之盛所以絀於穆子今傅君輯家乘能歷歷道其先世之本末知其所重在世德不在世祿賢於宣子逺矣傅氏之源其再濬於此也夫三魚堂文集卷八
